s","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, возьмите в каждую руку по гантели, ладони обращены к телу. Держите локти близко к туловищу, а спину держите прямо. Выдохните и согните гантель в правой руке к плечу, сохраняя плечо неподвижным. Продолжайте поднимать гантель до тех пор, пока ваши бицепсы полностью не сократятся и гантель не окажется на уровне плеч. Вдохните и медленно опустите гантель обратно в исходное положение. Повторите сгибание левой рукой. Завершив сгибание левой рукой, выдохните и нажмите гантель в правой руке над головой. Полностью вытяните руку и задержитесь на мгновение в верхней точке. Вдохните и медленно опустите гантель обратно в исходное положение. Повторите нажатие левой рукой. Продолжайте чередовать сгибания и жимы желаемое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Попеременный молотковый подъём на бицепс с гантелями и жим стоя"},{"id":"0414","n":"dumbbell standing alternate overhead press","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч, держа в каждой руке по гантели на уровне плеч ладонями вперед. Выжмите одну гантель над головой, полностью выпрямляя руку. Опустите гантель обратно на уровень плеч. Повторите с другой рукой. Продолжайте чередовать руки желаемое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Попеременный жим гантелей над головой стоя"},{"id":"0415","n":"dumbbell standing alternate raise","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"traps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите в каждой руке по гантели ладонями к телу. Держите спину прямо, а корпус напряженным. Поднимите одну гантель в сторону, держа руку прямой ладонью вниз. Продолжайте поднимать, пока ваша рука не станет параллельна земле. Задержитесь на мгновение в верхней точке, затем медленно опустите гантель обратно в исходное положение. Повторите с другой рукой. Чередуйте руки, выполняя желаемое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Попеременный подъём гантелей стоя"},{"id":"1739","n":"dumbbell standing alternating tricep kickback","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держа в каждой руке по гантели. Слегка согните колени и наклонитесь вперед в бедрах, сохраняя спину прямой. Вытяните руки прямо назад, держа локти близко к телу. Задержитесь на мгновение в верхней точке, затем медленно опустите гантели обратно в исходное положение. Повторите то же самое с другой рукой, чередуя стороны при каждом повторении.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Попеременное разгибание руки с гантелью назад стоя"},{"id":"2143","n":"dumbbell standing around world","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите в каждую руку по гантели. Вытяните руки прямо в стороны на уровне плеч ладонями вниз. Держа руки прямыми, медленно вращайте ими круговыми движениями, поднимая гантели перед собой, а затем над головой. Продолжайте круговые движения, возвращая гантели в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Круговые движения гантелями вокруг тела стоя"},{"id":"1740","n":"dumbbell standing bent over one arm triceps extension","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, в одной руке возьмите гантель. Наклонитесь вперед в талии, сохраняя спину прямой и параллельной земле. Вытяните руку прямо назад, держа локоть близко к телу. Медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Разгибание на трицепс одной рукой с гантелью в наклоне стоя"},{"id":"1741","n":"dumbbell standing bent over two arm triceps extension","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите в каждую руку по гантели. Наклонитесь вперед в талии, сохраняя спину прямой и слегка согнутыми в коленях. Вытяните руки прямо назад, держа локти близко к телу. Медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Разгибание на трицепс двумя руками с гантелями в наклоне стоя"},{"id":"0416","n":"dumbbell standing biceps curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Stand up straight with a dumbbell in each hand, palms facing forward and arms fully extended. Удерживая плечи неподвижно, выдохните и согните гантели, одновременно сокращая бицепсы. Продолжайте поднимать гантели до тех пор, пока ваши бицепсы полностью не сократятся и гантели не окажутся на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно начните опускать гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс с гантелями стоя"},{"id":"0417","n":"dumbbell standing calf raise","bp":"lower legs","eq":"dumbbell","tg":"calves","mg":"ankles","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держа в каждой руке по гантели. Поднимите пятки от земли как можно выше, используя икроножные мышцы. Задержитесь на мгновение в верхней точке, затем медленно опустите пятки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носки с гантелями стоя"},{"id":"0418","n":"dumbbell standing concentration curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте, расставив ноги на ширине плеч, и возьмите в одну руку гантель, полностью вытянув руку и ладонью внутрь. Положите противоположную руку на бедро для поддержки. Удерживая плечо неподвижно, выдохните и поднимите гантель к плечу, напрягая бицепс. Продолжайте поднимать гантель до тех пор, пока ваши бицепсы полностью не сократятся и гантель не окажется на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Концентрированный подъём на бицепс с гантелью стоя"},{"id":"0419","n":"dumbbell standing front raise above head","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"trapezius","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите по гантели в каждой руке хватом сверху. Держите руки прямо и поднимите гантели перед собой, подняв их над головой. Задержитесь на мгновение в верхней точке, затем медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подъём гантелей перед собой над головой стоя"},{"id":"2321","n":"dumbbell standing inner biceps curl v. 2","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, возьмите в каждую руку по гантели, ладони обращены к туловищу. Держите локти близко к туловищу и поворачивайте ладони рук так, чтобы они смотрели вперед. Удерживая плечи неподвижно, согните гири, напрягая бицепсы. Продолжайте поднимать гири до тех пор, пока ваши бицепсы полностью не сократятся и гантели не окажутся на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. На вдохе медленно начните возвращать гантели в исходное положение. Повторите рекомендуемое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на внутреннюю часть бицепса с гантелями стоя вариант 2"},{"id":"0420","n":"dumbbell standing kickback","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите в каждую руку по гантели. Слегка согните колени и наклонитесь вперед в бедрах, сохраняя спину прямой. Вытяните руки прямо назад, сжимая трицепсы в верхней точке движения. Сделайте паузу на мгновение, затем медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Разгибание руки с гантелью назад стоя"},{"id":"0421","n":"dumbbell standing one arm concentration curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, ноги на ширине плеч, возьмите в одну руку гантель ладонью вверх. Положите свободную руку на бедро для поддержки. Удерживая плечо неподвижно, выдохните и поднимите гантель к плечу, напрягая бицепс. Продолжайте поднимать гантель до тех пор, пока ваши бицепсы полностью не сократятся и гантель не окажется на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Концентрированный подъём на бицепс одной рукой с гантелью стоя"},{"id":"0422","n":"dumbbell standing one arm curl (over incline bench)","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, в одной руке держите гантель ладонью вперед. Другую руку положите на наклонную скамью для поддержки. Удерживая плечо неподвижно, выдохните и поднимите гантель к плечу, напрягая бицепс. Задержитесь на мгновение в верхней точке, затем вдохните и медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс одной рукой с гантелью на наклонной скамье стоя"},{"id":"1680","n":"dumbbell standing one arm curl over incline bench","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, в одной руке держите гантель. Другую руку положите на наклонную скамью для поддержки. Удерживая плечо неподвижно, поднимите гантель к плечу, напрягая бицепс. Задержитесь на мгновение в верхней точке, затем медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс одной рукой с гантелью на наклонной скамье стоя"},{"id":"0423","n":"dumbbell standing one arm extension","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, в одной руке держите гантель. Поднимите гантель над головой, полностью выпрямляя руку. Держите плечо близко к голове и перпендикулярно земле. Медленно опустите гантель за голову, сгибая локоть. Сделайте паузу на мгновение, затем поднимите гантель обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Разгибание одной руки с гантелью стоя"},{"id":"0424","n":"dumbbell standing one arm palm in press","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите гантель в одной руке на уровне плеч ладонью внутрь. Напрягите корпус и держите спину прямо. Нажмите гантель вверх, пока рука полностью не выпрямится. Задержитесь на мгновение в верхней точке, затем медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем переключитесь на другую руку.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Жим гантели одной рукой нейтральным хватом стоя"},{"id":"0425","n":"dumbbell standing one arm reverse curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, ноги на ширине плеч, возьмите гантель в одну руку хватом сверху. Держите руку полностью вытянутой и близко к телу ладонью вниз. Медленно поднимите гантель к плечу, сохраняя плечо неподвижным. Задержитесь на мгновение в верхней точке, затем медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем переключитесь на другую руку.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратный подъём на бицепс одной рукой с гантелью стоя"},{"id":"0426","n":"dumbbell standing overhead press","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч, держа в каждой руке по гантели на уровне плеч ладонями вперед. Выжмите гантели вверх, пока руки полностью не выпрямятся над головой. Задержитесь на мгновение в верхней точке, затем медленно опустите гантели обратно до уровня плеч. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Жим гантелей над головой стоя"},{"id":"0427","n":"dumbbell standing palms in press","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите по гантели в каждой руке на уровне плеч ладонями внутрь. Удерживая корпус напряженным, а спину прямой, жмите гантели вверх, пока руки полностью не выпрямятся над головой. Задержитесь на мгновение в верхней точке, затем медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Жим гантелей нейтральным хватом стоя"},{"id":"0428","n":"dumbbell standing preacher curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, ноги на ширине плеч, возьмите в каждую руку по гантели ладонями вперед. Положите тыльную часть рук на скамью проповедника или наклонную скамью, слегка согнув локти. Удерживая плечи неподвижно, выдохните и согните гантели, одновременно сокращая бицепсы. Продолжайте поднимать гантели до тех пор, пока ваши бицепсы полностью не сократятся и гантели не окажутся на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно начните опускать гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс с гантелями на скамье Скотта стоя"},{"id":"0429","n":"dumbbell standing reverse curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, ноги на ширине плеч, возьмите в каждую руку по гантели ладонями к телу. Удерживая плечи неподвижно, выдохните и согните гантели, одновременно сокращая бицепсы. Продолжайте поднимать гири до тех пор, пока ваши бицепсы полностью не сократятся и гантели не окажутся на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно начните опускать гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратный подъём на бицепс с гантелями стоя"},{"id":"0430","n":"dumbbell standing triceps extension","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, в одной руке возьмите гантель. Поднимите гантель над головой, держа руку прямо. Согните локоть и опустите гантель за голову, сохраняя плечо неподвижным. Вытяните руку обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Разгибание на трицепс с гантелями стоя"},{"id":"2293","n":"dumbbell standing zottman preacher curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, взяв в каждую руку по гантели ладонями вперед. Положите плечи на скамью проповедника и держите локти слегка согнутыми. Поднимите гантели к плечам, сохраняя плечи неподвижными. В верхней точке движения поверните запястья так, чтобы ладони были направлены вниз. Медленно опустите гантели обратно в исходное положение, также поворачивая запястья обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс Зоттмана на скамье Скотта с гантелями стоя"},{"id":"1684","n":"dumbbell step up single leg balance with bicep curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте перед ступенькой или платформой, держа в каждой руке по гантели, ладонями к телу. Поставьте правую ногу на ступеньку так, чтобы вся стопа касалась поверхности. Напрягите корпус и толкните правую пятку, чтобы поднять тело на ступеньку, подтягивая левое колено к груди. В верхней точке движения выполните подъем на бицепс, согнув руки в локтях и поднеся гантели к плечам. Опустите гантели обратно вниз и одновременно опустите левую ногу обратно на землю. Повторите движение на противоположную сторону, поднимая левую ногу и сгибая гантели. Продолжайте чередовать стороны желаемое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"low","sp":1,"kn":0,"sh":1,"ru_name":"Зашагивание на возвышение на одной ноге с подъёмом на бицепс с гантелями"},{"id":"0431","n":"dumbbell step-up","bp":"upper legs","eq":"dumbbell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте перед скамьей или сделайте шаг вперед, взяв в каждую руку по гантели ладонями к телу. Поставьте правую ногу на скамью или ступеньку так, чтобы вся ступня касалась поверхности. Оттолкнитесь правой пяткой и поднимите тело на скамью или ступеньку, выпрямляя правую ногу. Поднимите левую ногу на скамью или ступеньку, встав полностью вертикально. Сделайте шаг назад левой ногой, затем правой ногой, возвращаясь в исходное положение. Повторите необходимое количество повторений, затем поменяйте ногу.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Зашагивание на возвышение с гантелями"},{"id":"2796","n":"dumbbell step-up lunge","bp":"upper legs","eq":"dumbbell","tg":"quads","mg":"glutes","img":null,"gif":null,"ru":"Встаньте перед ступенькой или платформой, держа в каждой руке по гантели, ладонями в стороны. Поставьте правую ногу на ступеньку так, чтобы вся стопа находилась на поверхности. Надавите на правую пятку и поднимите тело на ступеньку, одновременно поднимая левую ногу. Как только обе ноги окажутся на ступеньке, опустите левую ногу обратно в исходное положение, удерживая правую ногу на ступеньке. Повторите движение, каждый раз чередуя ногу, на которую вы наступаете. Продолжайте необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Выпад с зашагиванием на возвышение с гантелями"},{"id":"2812","n":"dumbbell step-up split squat","bp":"upper legs","eq":"dumbbell","tg":"quads","mg":"glutes","img":null,"gif":null,"ru":"Встаньте перед скамьей или сделайте шаг вперед, взяв в каждую руку по гантели ладонями к телу. Поставьте правую ногу на скамью или ступеньку так, чтобы вся ступня касалась поверхности. Встаньте на скамью или шагните правой ногой, отталкиваясь пяткой, чтобы поднять тело вверх. Делая шаг вперед, одновременно поднимите левое колено к груди. Сделайте паузу в верхней части движения, затем медленно опустите левую ногу обратно на землю, удерживая правую ногу на скамье или ступеньке. Повторите движение, поставив левую ногу на скамью или ступеньку. Продолжайте чередовать правую и левую ногу необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Сплит-присед с зашагиванием на возвышение с гантелями"},{"id":"0432","n":"dumbbell stiff leg deadlift","bp":"upper legs","eq":"dumbbell","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите по гантели в каждой руке хватом сверху. Удерживая спину прямой и напряженным корпус, наклонитесь в бедрах и опустите гантели к земле, слегка согнув колени. Опускайте гантели до тех пор, пока не почувствуете растяжение подколенных сухожилий, затем сожмите ягодицы и толкните пятки, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Становая тяга на прямых ногах с гантелями"},{"id":"0433","n":"dumbbell straight arm pullover","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"latissimus dorsi","img":null,"gif":null,"ru":"Лягте на скамью, положив голову на один конец и твердо поставив ноги на землю. Возьмите гантель обеими руками и вытяните руки прямо над грудью. Держа руки прямыми, медленно опустите гантель за голову дугообразным движением. Сделайте паузу на мгновение, затем поднимите гантель обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Пуловер с гантелью на прямых руках"},{"id":"0434","n":"dumbbell straight leg deadlift","bp":"upper legs","eq":"dumbbell","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите по гантели в каждой руке хватом сверху. Удерживая спину прямой и напряженным корпус, наклонитесь в бедрах и опустите гантели к земле, позволяя туловищу наклониться вперед. Продолжайте опускать гантели, пока не почувствуете растяжение подколенных сухожилий, сохраняя колени слегка согнутыми. Задержитесь на мгновение в нижней точке, затем задействуйте ягодицы и мышцы задней поверхности бедра, чтобы поднять туловище обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Становая тяга на прямых ногах с гантелями"},{"id":"2808","n":"dumbbell sumo pull through","bp":"upper legs","eq":"dumbbell","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, поставив ноги шире плеч, носки направлены наружу. Держите гантель обеими руками перед телом, руки вытянуты. Согните колени и опустите бедра в положение приседа, сохраняя спину прямой. Опустите гантель между ног, держа руки прямыми. Проведите пятками и вытяните бедра вперед, подтягивая гантель вверх и перед собой. Сожмите ягодицы в верхней точке движения, затем опустите гантель обратно между ног. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Протяжка сумо с гантелью между ног"},{"id":"2803","n":"dumbbell supported squat","bp":"upper legs","eq":"dumbbell","tg":"quads","mg":"glutes","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держа по гантели в каждой руке по бокам. Удерживая грудь поднятой и напряженным корпусом, медленно опустите тело вниз, сгибая колени и отводя бедра назад. Продолжайте опускаться до тех пор, пока ваши бедра не станут параллельны земле или настолько низко, насколько вам будет удобно. Задержитесь на мгновение внизу, затем оттолкнитесь пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Присед с опорой с гантелями"},{"id":"0436","n":"dumbbell tate press","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на ровную скамью, взяв в каждую руку по гантели, ладони обращены друг к другу. Поднимите гантели на высоту плеч, затем поверните запястья так, чтобы ладони были направлены от вас. Выжимайте гантели вверх до тех пор, пока руки полностью не выпрямятся, затем опустите их обратно на высоту плеч. Верните запястья в исходное положение и повторите желаемое количество повторений.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Жим Тейта с гантелями"},{"id":"1742","n":"dumbbell tricep kickback with stork stance","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите в правую руку гантель. Слегка согните колени и наклонитесь вперед в бедрах, сохраняя спину прямой. Поднимите правый локоть в сторону, сохраняя его согнутым под углом 90 градусов. Вытяните правую руку прямо назад, сжимая трицепс. Сделайте паузу на мгновение, затем медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание руки с гантелью назад стоя на одной ноге"},{"id":"1743","n":"dumbbell twisting bench press","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Лягте на скамью, поставьте ступни на землю и прижмите спину к скамье. Возьмите по гантели в каждую руку хватом сверху, ладонями от себя. Вытяните руки прямо вверх над грудью, сохраняя небольшой изгиб в локтях. Опустите гантели вниз к груди, держа локти близко к телу. Опуская гантели, поверните запястья так, чтобы ладони были обращены к вам в нижней части движения. Сделайте небольшую паузу в нижней точке, затем поменяйте направление движения, вернув гантели в исходное положение. Выжимая гантели вверх, верните запястья в исходное положение ладонями от себя. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим лёжа с гантелями с разворотом"},{"id":"0437","n":"dumbbell upright row","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"traps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите по гантели в каждой руке хватом сверху. Пусть гантели висят перед бедрами, руки полностью выпрямлены. Удерживая спину прямой и напрягая корпус, выдохните и поднимите гантели прямо вверх к подбородку, ведя локтями. Задержитесь на мгновение в верхней точке, затем вдохните и медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Тяга гантелей к подбородку стоя"},{"id":"1765","n":"dumbbell upright row (back pov)","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"traps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите по гантели в каждой руке хватом сверху. Пусть гантели висят перед бедрами, руки полностью вытянуты, ладони обращены к телу. Удерживая спину прямой и напрягая корпус, выдохните и поднимите гантели прямо вверх к подбородку, ведя локтями. Продолжайте поднимать гантели до тех пор, пока гантели не окажутся на уровне плеч, локти будут направлены в стороны. Задержитесь на мгновение в верхней точке, затем вдохните и медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Тяга гантелей к подбородку стоя вид сзади"},{"id":"0864","n":"dumbbell upright shoulder external rotation","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"rotator cuff","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите в каждую руку по гантели ладонями к телу. Поднимите руки в стороны до тех пор, пока они не станут параллельны земле, сохраняя локти слегка согнутыми. Поверните руки наружу, поднеся гантели к голове, сохраняя при этом локти в том же положении. Задержитесь на мгновение в верхней точке, затем медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Внешнее вращение плеча с гантелями в тяге к подбородку"},{"id":"5201","n":"dumbbell waiter biceps curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, взяв в каждую руку по гантели ладонями вперед. Держите плечи близко к телу, а локти согнутыми. Медленно поднимите гантели к плечам, сохраняя запястья прямыми. Задержитесь на мгновение в верхней точке, затем медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс с гантелью на вытянутой руке"},{"id":"0438","n":"dumbbell w-press","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Сядьте на скамью, взяв в каждую руку по гантели ладонями вперед. Поднимите гантели на высоту плеч, локти согнуты, ладони обращены вперед. Выжмите гантели вверх, пока руки полностью не выпрямятся над головой. Опустите гантели обратно на высоту плеч. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"W-образный жим гантелей"},{"id":"0439","n":"dumbbell zottman curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, возьмите в каждую руку по гантели, ладони обращены к телу. Держите локти близко к туловищу и поверните ладони лицом вперед. Поднимите гантели к плечам, сохраняя плечи неподвижными. В верхней точке движения поверните запястья так, чтобы ладони были направлены от тела. Медленно опустите гантели обратно в исходное положение, поворачивая ладони обратно к телу. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс Зоттмана с гантелями"},{"id":"2294","n":"dumbbell zottman preacher curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на скамью для проповедника, взяв в каждую руку по гантели, ладонями вверх и локтями на подушечку. Поднимите гантели к плечам, сохраняя плечи неподвижными и ладонями вверх. В верхней части сгибания поверните запястья так, чтобы ладони были направлены вниз. Медленно опустите гантели обратно в исходное положение, поворачивая при этом запястья обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс Зоттмана на скамье Скотта с гантелями"},{"id":"2189","n":"dumbbells seated triceps extension","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на скамью, выпрямив спину и поставив ноги на землю. Возьмите гантель обеими руками прямым хватом и поднимите ее над головой. Согните руки в локтях и опустите гантель за голову, держа плечи близко к ушам. Вытяните руки и поднимите гантель обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Разгибание на трицепс с гантелями сидя"},{"id":"1167","n":"dynamic chest stretch (male)","bp":"chest","eq":"body weight","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте прямо, ноги на ширине плеч. Вытяните руки прямо в стороны, параллельно земле. Медленно вытяните руки вперед, скрестив их перед телом. Почувствуйте растяжение мышц груди. Удерживайте растяжку 10–30 секунд. Вернитесь в исходное положение и повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Динамическая растяжка груди"},{"id":"3287","n":"elbow dips","bp":"upper arms","eq":"body weight","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Сядьте на край скамьи или стула, взявшись руками за край рядом с бедрами. Сдвиньте бедра вперед со скамьи и выпрямите ноги, удерживая пятки на земле. Согните локти и опустите тело к земле, держа спину близко к скамье. Задержитесь на мгновение в нижней точке, затем подтолкните руки, чтобы выпрямить руки и поднять тело обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отжимания на локтях"},{"id":"1772","n":"elbow lift - reverse push-up","bp":"back","eq":"body weight","tg":"upper back","mg":"triceps","img":null,"gif":null,"ru":"Начните с того, что лягте на землю лицом вниз, вытянув ноги и положив руки прямо под плечи. Напрягите корпус и надавите ладонями, чтобы оторвать верхнюю часть тела от земли, держа локти близко к бокам. Задержитесь на мгновение в верхней точке, напрягая мышцы верхней части спины. Медленно опустите тело обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на локтях обратное отжимание"},{"id":"0443","n":"elbow-to-knee","bp":"waist","eq":"body weight","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Начните с того, что лягте на спину, согните колени и поставьте ступни на землю. Положите руки за голову локтями наружу. Напрягите пресс и поднимите верхнюю часть тела от земли, поднеся правый локоть к левому колену. В то же время поднесите левое колено к правому локтю, создавая скручивающее движение. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела и вытяните ноги обратно в исходное положение. Повторите движение, на этот раз поднеся левый локоть к правому колену, а правое колено к левому локтю. Продолжайте чередовать стороны желаемое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Касание локтем колена"},{"id":"3292","n":"elevator","bp":"back","eq":"body weight","tg":"upper back","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч и слегка согнув колени. Положите руки на бедра или скрестите их перед грудью. Сохраняя спину прямой, медленно наклонитесь вперед в талии, опуская верхнюю часть тела к земле. Задержитесь на мгновение в нижней точке, затем медленно поднимите верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Лифт"},{"id":"1332","n":"exercise ball alternating arm ups","bp":"back","eq":"stability ball","tg":"lats","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на мяч, поставив ноги на землю и выпрямив спину. Возьмите по гантели в каждую руку ладонями внутрь и вытяните руки по бокам. Напрягите корпус и медленно поднимите одну руку к плечу, слегка согнув локоть. Задержитесь на мгновение в верхней точке, затем медленно опустите руку обратно в исходное положение. Повторите движение другой рукой. Продолжайте чередовать руки желаемое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Попеременный подъём рук на фитболе"},{"id":"1333","n":"exercise ball back extension with arms extended","bp":"back","eq":"stability ball","tg":"spine","mg":"glutes","img":null,"gif":null,"ru":"Положите мяч на землю и лягте на него лицом вниз, положив бедра на мяч, а ступни упираясь в стену для устойчивости. Вытяните руки прямо перед собой ладонями вниз. Напрягите корпус и медленно поднимите верхнюю часть тела с мяча, сохраняя спину прямой, а шею на одной линии с позвоночником. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Разгибание спины на фитболе с вытянутыми руками"},{"id":"1334","n":"exercise ball back extension with hands behind head","bp":"back","eq":"stability ball","tg":"spine","mg":"glutes","img":null,"gif":null,"ru":"Положите мяч на землю и лягте на него лицом вниз, опираясь бедрами на мяч. Поставьте ноги напротив стены или другой устойчивой поверхности для поддержки. Скрестите руки за головой, касаясь ладонями затылка. Напрягите корпус и медленно поднимите верхнюю часть тела с мяча, вытягивая спину до тех пор, пока тело не образует прямую линию от головы до бедер. Сделайте паузу на мгновение в верхней точке движения, затем медленно опустите верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Разгибание спины на фитболе с руками за головой"},{"id":"1335","n":"exercise ball back extension with knees off ground","bp":"back","eq":"stability ball","tg":"spine","mg":"glutes","img":null,"gif":null,"ru":"Положите мяч на землю и лягте на него лицом вниз, положив бедра на мяч, а ступни упираясь в стену для устойчивости. Положите руки за голову или скрестите на груди. Напрягите корпус и медленно поднимите верхнюю часть тела с мяча, вытягивая спину до тех пор, пока тело не образует прямую линию от головы до пяток. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Разгибание спины на фитболе с поднятыми коленями"},{"id":"1336","n":"exercise ball back extension with rotation","bp":"back","eq":"stability ball","tg":"spine","mg":"glutes","img":null,"gif":null,"ru":"Начните с того, что лягте на мяч лицом вниз, положив бедра на мяч и твердо поставив ступни на землю. Заведите руки за голову или скрестите их на груди. Напрягите корпус и медленно поднимите верхнюю часть тела с мяча, вытягивая спину до тех пор, пока тело не образует прямую линию от головы до пяток. Задержитесь на мгновение в верхней точке, затем медленно поверните туловище в сторону, сохраняя бедра и ноги устойчивыми. Вернитесь в центр и повторите вращение в другую сторону. Опустите верхнюю часть тела обратно в исходное положение и повторите желаемое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Разгибание спины на фитболе с поворотом"},{"id":"1744","n":"exercise ball dip","bp":"upper arms","eq":"stability ball","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Сядьте на мяч для стабилизации, поставьте ступни на землю и согните колени под углом 90 градусов. Положите руки на мяч рядом с бедрами, пальцы направлены вперед. Задействуйте трицепсы и толкайте руки, чтобы оторвать тело от мяча, выпрямляя руки. Опустите тело обратно вниз, сгибая локти и держа их близко к бокам. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отжимания на трицепс на фитболе"},{"id":"1559","n":"exercise ball hip flexor stretch","bp":"upper legs","eq":"stability ball","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Положите мяч на землю и встаньте перед ним на колени. Поставьте правую ногу на фитбол, согнув колено под углом 90 градусов. Вытяните левую ногу позади себя, сохраняя ее прямой. Наклонитесь вперед, подталкивая бедра к мячу, пока не почувствуете растяжение в сгибателе правого бедра. Удерживайте растяжку 20–30 секунд, затем поменяйте сторону и повторите.","pos":"kneeling","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка сгибателей бедра на фитболе"},{"id":"1338","n":"exercise ball hug","bp":"back","eq":"stability ball","tg":"spine","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на мяч, поставив ноги на землю и выпрямив спину. Держите мяч обеими руками, прижав его к груди. Задействуйте мышцы корпуса и медленно откиньтесь назад, держа спину прямо, а ноги на земле. Продолжайте откидываться назад, пока не почувствуете растяжение мышц спины. Удерживайте положение несколько секунд, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обхват фитбола"},{"id":"1339","n":"exercise ball lat stretch","bp":"back","eq":"stability ball","tg":"lats","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на мяч, поставив ноги на землю и выпрямив спину. Возьмите гантель в одну руку и вытяните руку прямо над головой. Медленно наклонитесь в противоположную сторону, чувствуя растяжение широчайших мышц. Удерживайте растяжку 20–30 секунд, затем вернитесь в исходное положение. Повторите с другой стороны.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка широчайших на фитболе"},{"id":"1341","n":"exercise ball lower back stretch (pyramid)","bp":"back","eq":"stability ball","tg":"lats","mg":"glutes","img":null,"gif":null,"ru":"Сядьте на мяч для стабилизации, поставьте ступни на землю и согните колени под углом 90 градусов. Медленно пройдите ногами вперед, катя мяч по спине, пока нижняя часть спины не окажется на мяче. Заведите руки за голову или скрестите их на груди. Напрягите корпус и медленно опустите верхнюю часть тела к земле, позволяя нижней части спины растянуться над мячом. Удерживайте растяжку несколько секунд, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка поясницы на фитболе пирамидой"},{"id":"1342","n":"exercise ball lying side lat stretch","bp":"back","eq":"stability ball","tg":"lats","mg":"shoulders","img":null,"gif":null,"ru":"Лягте на бок, вытянув ноги и подперев голову мячом-стабилизатором. Положите верхнюю руку на фитбол. Вытяните верхнюю руку над головой и позвольте туловищу слегка повернуться. Почувствуйте растяжение широчайших мышц по бокам тела. Удерживайте растяжку 20–30 секунд, затем поменяйте сторону и повторите.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка широчайших лёжа на боку на фитболе"},{"id":"1382","n":"exercise ball on the wall calf raise","bp":"lower legs","eq":"dumbbell","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте спиной к стене и поместите мяч для упражнений между поясницей и стеной. Поставьте ноги на ширине плеч, носки ног направлены вперед. Возьмите по гантели в каждую руку, вытянув руки по бокам. Поднимите пятки от земли, перенеся вес тела на подушечки стоп. Задержитесь на мгновение в верхней точке, затем медленно опустите пятки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носки у стены с фитболом"},{"id":"3241","n":"exercise ball on the wall calf raise (tennis ball between ankles)","bp":"lower legs","eq":"dumbbell","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте лицом к стене, ноги на ширине плеч. Поместите мяч для упражнений между стеной и поясницей. Возьмите по гантели в каждую руку, вытянув руки по бокам. Поместите теннисный мяч между лодыжками. Поднимите пятки от земли, поднимая тело на носки. Задержитесь на мгновение в верхней точке, затем медленно опустите пятки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носки у стены с фитболом и теннисным мячом между лодыжками"},{"id":"3240","n":"exercise ball on the wall calf raise (tennis ball between knees)","bp":"lower legs","eq":"dumbbell","tg":"calves","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте спиной к стене и поместите мяч для упражнений между поясницей и стеной. Поставьте ноги на ширине плеч и немного впереди себя. Возьмите по гантели в каждую руку, вытянув руки по бокам. Поместите теннисный мяч между коленями. Поднимите пятки от земли, поднимая тело на носки. Задержитесь на мгновение в верхней точке, затем медленно опустите пятки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носки у стены с фитболом и теннисным мячом между коленями"},{"id":"1416","n":"exercise ball one leg prone lower body rotation","bp":"upper legs","eq":"stability ball","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Лягте на мяч лицом вниз, положив бедра на мяч и вытянув ноги прямо позади себя. Положите руки на землю перед собой для поддержки. Задействуйте ягодицы и мышцы корпуса, чтобы стабилизировать тело. Медленно поднимите одну ногу с земли, держа ее прямой и параллельной полу. Поверните ногу наружу, от тела, сохраняя при этом бедра и верхнюю часть тела устойчивыми. Сделайте небольшую паузу в конце вращения, затем медленно верните ногу в исходное положение. Повторите вращение другой ногой. Продолжайте чередовать ноги желаемое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Вращение нижней части тела на одной ноге лёжа на фитболе"},{"id":"1417","n":"exercise ball one legged diagonal kick hamstring curl","bp":"upper legs","eq":"stability ball","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Начните с того, что лягте на спину, вытянув ноги и положив пятки на мяч для стабилизации. Положите руки по бокам для устойчивости. Задействуйте ягодицы и мышцы корпуса, чтобы оторвать бедра от земли, создавая прямую линию от плеч до пяток. Согните правое колено и поднесите его к груди, сохраняя левую ногу вытянутой, а ступню согнутой. Ударьте правой ногой по диагонали через тело, полностью выпрямляя ее и задействуя мышцы задней поверхности бедра. Медленно верните правую ногу в исходное положение, сохраняя контроль и устойчивость. Повторите движение левой ногой, чередуя стороны необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Диагональный мах одной ногой со сгибанием на бицепс бедра на фитболе"},{"id":"1296","n":"exercise ball pike push up","bp":"chest","eq":"stability ball","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Начните с позиции для отжиманий, положив руки на пол и положив голени на мяч для стабилизации. Напрягите корпус и поднимите бедра к потолку, катя мяч к рукам. Держите ноги прямыми, а тело в положении пики, образуя перевернутую V-образную форму. Согните локти и опустите верхнюю часть тела к полу, удерживая голову на одной линии с руками. Оттолкнитесь руками и вытяните руки, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания пайк на фитболе"},{"id":"1343","n":"exercise ball prone leg raise","bp":"back","eq":"stability ball","tg":"spine","mg":"abdominals","img":null,"gif":null,"ru":"Лягте лицом вниз на коврик, вытянув ноги и положив пальцы ног на мяч для стабилизации. Положите руки на пол на ширине плеч и задействуйте мышцы корпуса. Держа ноги прямыми, медленно поднимите их от земли, используя поясницу и ягодицы, чтобы поднять их как можно выше. Задержитесь на мгновение в верхней точке, затем медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Подъём ног лёжа на фитболе"},{"id":"1560","n":"exercise ball seated hamstring stretch","bp":"upper legs","eq":"stability ball","tg":"hamstrings","mg":"glutes","img":null,"gif":null,"ru":"Сядьте на мяч для стабилизации, поставьте ступни на землю и согните колени под углом 90 градусов. Медленно катите мяч вперед, вытягивая ноги вперед, пока верхняя часть спины не окажется на мяче, а ноги не вытянуты прямо перед собой. Положите руки на бедра для поддержки. Напрягите корпус и медленно опустите верхнюю часть тела к земле, сохраняя спину прямой и грудь приподнятой. Остановитесь, когда почувствуете растяжение подколенных сухожилий, и удерживайте это положение 20–30 секунд. Медленно вернитесь в исходное положение, отталкиваясь пятками и используя мышцы задней поверхности бедра, чтобы подтянуться обратно. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка бицепса бедра сидя на фитболе"},{"id":"1745","n":"exercise ball seated triceps stretch","bp":"upper arms","eq":"stability ball","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на мяч, поставив ноги на землю и выпрямив спину. Возьмите гантель в одну руку и вытяните руку прямо над головой. Согните локоть и опустите гантель за голову, держа плечо близко к уху. Удерживайте растяжку несколько секунд, затем вернитесь в исходное положение. Повторите с другой рукой.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка трицепса сидя на фитболе"},{"id":"1746","n":"exercise ball supine triceps extension","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на гимнастический мяч, поставьте ступни на землю и согните колени под углом 90 градусов. Возьмите гантель обеими руками и вытяните руки прямо вверх к потолку. Медленно опустите гантель за голову, держа локти близко к ушам. Сделайте паузу на мгновение, затем поднимите гантель обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание на трицепс лёжа на фитболе"},{"id":"1747","n":"ez bar french press on exercise ball","bp":"upper arms","eq":"ez barbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на гимнастический мяч и возьмите штангу EZ хватом сверху. Вытяните руки прямо вверх, держа локти близко к голове. Медленно опустите штангу за голову, сгибая локти. Сделайте паузу на мгновение, затем вытяните руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Французский жим с EZ-грифом на фитболе"},{"id":"3010","n":"ez bar lying bent arms pullover","bp":"back","eq":"ez barbell","tg":"lats","mg":"triceps","img":null,"gif":null,"ru":"Лягте на скамью, положив голову на один конец и поставив ноги на пол. Держите штангу EZ пронированным хватом (ладонями от себя), руки на ширине плеч. Вытяните руки прямо над грудью, сохраняя небольшой изгиб в локтях. Опустите штангу дугообразным движением за голову, сохраняя небольшой изгиб в локтях. Сделайте паузу на мгновение, затем верните штангу в исходное положение, изменив движение по дуге. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Пуловер с EZ-грифом на согнутых руках лёжа"},{"id":"1748","n":"ez bar lying close grip triceps extension behind head","bp":"upper arms","eq":"ez barbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Лягте на скамью, положив ноги на землю, а голову на край скамьи. Возьмите штангу ez узким хватом ладонями вверх и вытяните руки прямо над грудью. Удерживая плечи неподвижно, медленно опустите штангу за голову, сгибая локти. Сделайте паузу на мгновение, затем вытяните руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание на трицепс из-за головы узким хватом с EZ-грифом лёжа"},{"id":"1344","n":"ez bar reverse grip bent over row","bp":"back","eq":"ez barbell","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч и слегка согнуты в коленях. Держите штангу ez обратным хватом ладонями вверх, руки на ширине плеч. Наклонитесь вперед в бедрах, держа спину прямо и грудь вверх, пока туловище не станет почти параллельно полу. Потяните штангу EZ к нижней части груди, сжимая лопатки вместе. Задержитесь на мгновение в верхней точке, затем медленно опустите штангу EZ обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Тяга в наклоне обратным хватом с EZ-грифом"},{"id":"1682","n":"ez bar seated close grip concentration curl","bp":"upper arms","eq":"ez barbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на скамью, поставьте ноги на землю и возьмите штангу EZ хватом снизу. Положите локоть на внутреннюю часть бедра, чуть выше колена. Поднимите штангу к плечу, сохраняя плечо неподвижным. Напрягите бицепсы в верхней точке движения, затем медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Концентрированный подъём на бицепс узким хватом с EZ-грифом сидя"},{"id":"1749","n":"ez bar standing french press","bp":"upper arms","eq":"ez barbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, и возьмите штангу ez хватом сверху. Поднимите штангу над головой, полностью выпрямив руки. Держа плечи близко к голове, медленно опустите штангу за голову, сгибая локти. Сделайте паузу на мгновение, затем вытяните руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Французский жим с EZ-грифом стоя"},{"id":"0445","n":"ez barbell anti gravity press","bp":"shoulders","eq":"ez barbell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Начните с того, что встаньте, расставив ноги на ширине плеч, и возьмите штангу ez хватом сверху. Поднимите штангу на высоту плеч, держа локти слегка согнутыми и ладонями вперед. Выжмите штангу над головой, полностью выпрямив руки. Опустите штангу обратно на высоту плеч и повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Антигравитационный жим с EZ-штангой"},{"id":"1627","n":"ez barbell close grip preacher curl","bp":"upper arms","eq":"ez barbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на скамью для сгибаний рук и положите плечи на подушечку, возьмите штангу обратным хватом. Положите трицепсы на подушку и полностью выпрямите руки, сохраняя спину прямой. Медленно поднимите штангу к плечам, напрягая бицепсы. Задержитесь на мгновение в верхней точке, напрягая бицепсы. Опустите штангу обратно в исходное положение, полностью выпрямив руки. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс узким хватом на скамье Скотта с EZ-штангой"},{"id":"0446","n":"ez barbell close-grip curl","bp":"upper arms","eq":"ez barbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, ноги на ширине плеч, возьмите штангу обратным хватом, руки на ширине плеч. Держите локти близко к туловищу, а плечи неподвижно на протяжении всего движения. Поднимите штангу к плечам, напрягая бицепсы. Задержитесь на мгновение в верхней точке, затем медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс узким хватом с EZ-штангой"},{"id":"0447","n":"ez barbell curl","bp":"upper arms","eq":"ez barbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, ноги на ширине плеч, возьмите штангу обратным хватом ладонями вверх. Держите локти близко к туловищу, а плечи неподвижно на протяжении всего движения. На выдохе поднимите штангу к плечам, напрягая бицепсы. Сделайте паузу на мгновение в верхней точке, затем на вдохе медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс с EZ-штангой"},{"id":"0448","n":"ez barbell decline close grip face press","bp":"upper arms","eq":"ez barbell","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Лягте на наклонную скамью так, чтобы голова была ниже ног. Возьмите штангу ez узким хватом, ладони обращены друг к другу. Вытяните руки прямо над грудью, держа локти близко к телу. Опустите штангу ко лбу, согнув локти. Сделайте паузу на мгновение, затем верните штангу в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим к лицу узким хватом на наклонной скамье вниз головой с EZ-штангой"},{"id":"2186","n":"ez barbell decline triceps extension","bp":"upper arms","eq":"ez barbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Лягте на наклонную скамью, опустив голову ниже ног и закрепив ступни. Держите штангу ez хватом сверху, руки на ширине плеч. Полностью выпрямите руки, держа локти близко к голове. Медленно опустите штангу ко лбу, сгибая локти. Сделайте паузу на мгновение, затем вытяните руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание на трицепс на наклонной скамье вниз головой с EZ-штангой"},{"id":"0449","n":"ez barbell incline triceps extension","bp":"upper arms","eq":"ez barbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Установите наклонную скамью под углом 45 градусов. Сядьте на скамью, прислонившись спиной к подушке, и возьмите штангу ez верхним хватом. Вытяните руки полностью над головой, держа локти близко к голове. Опустите штангу за голову, согнув локти, сохраняя плечи неподвижными. Сделайте паузу на мгновение, затем вытяните руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Разгибание на трицепс на наклонной скамье с EZ-штангой"},{"id":"0450","n":"ez barbell jm bench press","bp":"upper arms","eq":"ez barbell","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Лягте на скамью, поставьте ступни на землю и прижмите спину к скамье. Возьмите штангу ez хватом сверху, на расстоянии чуть шире плеч. Опустите штангу к груди, держа локти близко к телу. Верните штангу в исходное положение, полностью выпрямив руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим лёжа JM с EZ-штангой"},{"id":"0451","n":"ez barbell reverse grip curl","bp":"upper arms","eq":"ez barbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, ноги на ширине плеч и возьмите штангу обратным хватом. На протяжении всего упражнения держите локти близко к туловищу, а плечи — неподвижно. Поднимите штангу вверх, напрягая бицепсы и выдыхая. Продолжайте поднимать штангу до тех пор, пока ваши бицепсы полностью не сократятся и штанга не окажется на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Медленно на вдохе начните возвращать штангу в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратный подъём на бицепс с EZ-штангой"},{"id":"0452","n":"ez barbell reverse grip preacher curl","bp":"upper arms","eq":"ez barbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на скамью для проповедника, прижав грудь к подушке и поставив ноги на пол. Возьмите штангу ez обратным хватом, руки на ширине плеч. Положите плечи на подушку так, чтобы предплечья свисали вниз. Удерживая плечи неподвижно, выдохните и поднимите штангу к плечам. Задержитесь на мгновение в верхней точке, затем вдохните и медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс обратным хватом на скамье Скотта с EZ-штангой"},{"id":"1458","n":"ez barbell seated curls","bp":"upper arms","eq":"ez barbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на скамью, поставив ноги на землю и выпрямив спину. Держите штангу ez обратным хватом ладонями вверх, руки на ширине плеч. Положите плечи на бедра, позволяя штанге свисать перед вами. Удерживая плечи неподвижно, выдохните и поднимите штангу вверх к плечам. Задержитесь на мгновение в верхней точке, напрягая бицепсы. Вдохните и медленно опустите штангу EZ в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс с EZ-штангой сидя"},{"id":"0453","n":"ez barbell seated triceps extension","bp":"upper arms","eq":"ez barbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на скамью, выпрямив спину и поставив ноги на землю. Держите штангу ez хватом сверху, руки на ширине плеч. Поднимите штангу над головой, полностью выпрямив руки. Удерживая плечи неподвижно, опустите штангу за голову, согнув локти. Сделайте паузу на мгновение, затем поднимите штангу обратно в исходное положение, вытянув руки. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Разгибание на трицепс с EZ-штангой сидя"},{"id":"0454","n":"ez barbell spider curl","bp":"upper arms","eq":"ez barbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите штангу обратным хватом ладонями вверх. Положите плечи на скамью проповедника или мяч для стабилизации, позволяя локтям свисать вниз. Удерживая плечи неподвижно, выдохните и поднимите штангу к плечам. Задержитесь на мгновение в верхней точке, напрягая бицепсы. Вдохните и медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс паук с EZ-штангой"},{"id":"1628","n":"ez barbell spider curl","bp":"upper arms","eq":"ez barbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите штангу обратным хватом ладонями вверх. Положите плечи на скамью проповедника или мяч для стабилизации, позволяя локтям свисать вниз. Удерживая плечи неподвижно, выдохните и поднимите штангу к плечам. Задержитесь на мгновение в верхней точке, напрягая бицепсы. Вдохните и медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс паук с EZ-штангой"},{"id":"2404","n":"ez-bar biceps curl (with arm blaster)","bp":"upper arms","eq":"ez barbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, ноги на ширине плеч, возьмите штангу обратным хватом ладонями вверх. Прижмите плечи к армбластеру, сохраняя их неподвижными на протяжении всего упражнения. Держа локти близко к телу, выдохните и поднимите штангу к плечам. Задержитесь на мгновение в верхней точке, напрягая бицепсы. Вдохните и медленно опустите штангу обратно в исходное положение, полностью выпрямляя руки. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс с EZ-грифом с изолятором для рук"},{"id":"2432","n":"ez-bar close-grip bench press","bp":"upper arms","eq":"ez barbell","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Лягте на скамью, поставьте ступни на землю и прижмите спину к скамье. Возьмите штангу ez узким хватом, руки на ширине плеч, ладони смотрят вперед. Снимите штангу со стойки и держите ее прямо над грудью, полностью вытянув руки. Медленно опустите штангу к груди, держа локти близко к телу. Сделайте паузу на мгновение, когда штанга коснется вашей груди. Верните штангу в исходное положение, полностью выпрямив руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим лёжа узким хватом с EZ-грифом"},{"id":"2741","n":"ez-barbell standing wide grip biceps curl","bp":"upper arms","eq":"ez barbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, ноги на ширине плеч, возьмите штангу обратным хватом, руки шире ширины плеч. Держите локти близко к туловищу, а плечи неподвижно на протяжении всего движения. Поднимите штангу к плечам, напрягая бицепсы. Задержитесь на мгновение в верхней точке, затем медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс широким хватом с EZ-штангой стоя"},{"id":"2133","n":"farmers walk","bp":"upper legs","eq":"dumbbell","tg":"quads","mg":"calves","img":null,"gif":null,"ru":"Встаньте прямо, возьмите в каждую руку по гантели, ладони повернуты в стороны. Держите спину прямо, а плечи отведите назад. Делайте небольшие контролируемые шаги вперед, сохраняя вертикальное положение. Продолжайте идти желаемое расстояние или время. В завершение остановитесь и осторожно опустите гантели в стороны.","pos":"standing","ax":"high","iap":"high","imp":"low","sp":0,"kn":1,"sh":1,"ru_name":"Прогулка фермера"},{"id":"0455","n":"finger curls","bp":"lower arms","eq":"barbell","tg":"forearms","mg":"wrist flexors","img":null,"gif":null,"ru":"Сядьте на скамью, поставьте ступни на землю и возьмите штангу обратным хватом ладонями вверх. Положите предплечья на бедра, позволяя запястьям свисать с края. Медленно согните пальцы к ладоням, крепко сжимая штангу. Удерживайте напряжение на мгновение, затем медленно отпустите пальцы и верните их в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание пальцев"},{"id":"3303","n":"flag","bp":"waist","eq":"body weight","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Начните с захвата вертикального шеста обеими руками, ладони обращены друг к другу, руки полностью выпрямлены. Напрягите корпус и поднимите ноги от земли, сохраняя их прямыми. Используя силу корпуса и верхней части тела, поднимите ноги, пока они не станут параллельны земле. Удерживайте это положение как можно дольше, сохраняя прямую линию тела. Медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Флаг"},{"id":"0456","n":"flexion leg sit up (bent knee)","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Положите руки за голову локтями наружу. Включив пресс, медленно поднимите верхнюю часть тела от земли, наклоняясь вперед, пока туловище не окажется под углом 45 градусов. В то же время отрывайте ноги от земли, сгибая колени и приближая их к груди. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела и ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Подъём корпуса со сгибанием ног согнув колени"},{"id":"0457","n":"flexion leg sit up (straight arm)","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, вытянув ноги и выпрямив руки над головой. Включив пресс, поднимите верхнюю часть тела от земли, одновременно поднимая ноги к груди. Протяните руки к пальцам ног, поднимая верхнюю часть тела и ноги. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела и ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Подъём корпуса со сгибанием ног прямыми руками"},{"id":"0458","n":"floor fly (with barbell)","bp":"chest","eq":"barbell","tg":"pectorals","mg":"deltoids","img":null,"gif":null,"ru":"Лягте на спину на пол, согните колени и поставьте ступни на землю. Держите штангу хватом сверху, руки вытянуты прямо над грудью. Медленно опустите штангу в стороны, сохраняя небольшой изгиб в локтях. Опускайте штангу до тех пор, пока руки не станут параллельны полу, чувствуя растяжение в груди. Сделайте паузу на мгновение, затем сожмите мышцы груди, чтобы вернуть штангу в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разведение рук лёжа на полу со штангой"},{"id":"0459","n":"flutter kicks","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, вытянув ноги и положив руки по бокам. Напрягите корпус и поднимите ноги над землей примерно на 6 дюймов. Удерживая ноги прямыми, поочередно поднимайте одну ногу немного выше другой. Продолжайте это порхающее движение желаемое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Махи ногами лёжа"},{"id":"1472","n":"forward jump","bp":"upper legs","eq":"body weight","tg":"quads","mg":"calves","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч. Согните колени и опустите тело в присед. Отведите руки назад для придания импульса. Резко прыгните вперед, выпрямляя бедра, колени и лодыжки. Мягко приземлитесь на подушечки стоп и сразу же переходите к следующему прыжку. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"med","imp":"high","sp":0,"kn":0,"sh":1,"ru_name":"Прыжок вперёд"},{"id":"3470","n":"forward lunge (male)","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, руки на бедрах. Сделайте большой шаг вперед правой ногой, опуская тело в положение выпада. Согните правое колено примерно на 90 градусов, удерживая колено на одном уровне с лодыжкой. Оттолкнитесь правой ногой и вернитесь в исходное положение. Повторите то же самое с левой ногой, чередуя стороны, необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Выпад вперёд"},{"id":"3194","n":"frankenstein squat","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, и держите штангу перед собой прямыми руками. Сохраняя спину прямой, опустите тело, сгибая колени и бедра, как будто садитесь на стул. Продолжайте опускаться до тех пор, пока ваши бедра не станут параллельны земле или настолько низко, насколько вам будет удобно. Сделайте паузу на мгновение, затем оттолкнитесь пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Фронтальный присед Франкенштейна"},{"id":"2429","n":"frog crunch","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Положите руки за голову локтями наружу. Включив пресс, поднимите верхнюю часть тела от земли, наклонившись вперед, пока туловище не окажется под углом 45 градусов. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Скручивания лягушка"},{"id":"3301","n":"frog planche","bp":"waist","eq":"body weight","tg":"abs","mg":"shoulders","img":null,"gif":null,"ru":"Начните с позиции для отжиманий, поставив руки на ширине плеч, а ноги вместе. Согните руки в локтях и опустите тело к земле, сохраняя спину прямой. Опуская тело, поднимите ноги от земли и подтяните колени к груди. Удерживайте это положение несколько секунд, затем вытяните ноги и вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Планш лягушка"},{"id":"3296","n":"front lever","bp":"waist","eq":"body weight","tg":"abs","mg":"lats","img":null,"gif":null,"ru":"Начните с подвешивания на перекладине хватом сверху, руки на ширине плеч. Напрягите корпус и потяните лопатки вниз и назад. Согните колени и подтяните их к груди. Одновременно поднимите ноги вверх и вытяните их прямо перед собой, сохраняя тело параллельно земле. Удерживайте это положение как можно дольше, стремясь к полному положению переднего рычага. Чтобы расслабиться, медленно опустите ноги вниз и вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Передний вис"},{"id":"3295","n":"front lever reps","bp":"back","eq":"body weight","tg":"upper back","mg":"core","img":null,"gif":null,"ru":"Повисните на перекладине хватом сверху, ладонями от себя. Напрягите корпус и потяните лопатки вниз и назад. Сохраняя тело прямым, поднимите ноги вверх, пока они не станут параллельны земле. Удерживайте это положение как можно дольше, стараясь удержаться в течение 10–20 секунд. Медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Передний вис в повторениях"},{"id":"0464","n":"front plank with twist","bp":"waist","eq":"body weight","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Начните с позиции высокой планки, положив руки прямо под плечи, а тело образуя прямую линию от головы до пят. Задействуйте корпус и ягодицы, чтобы сохранить устойчивое положение. Поверните туловище вправо, подняв правую руку и вытянув ее к потолку. Во время поворотов сохраняйте устойчивость бедер и ног. Задержитесь на мгновение, затем вернитесь в исходное положение. Повторите поворот с левой стороны. Продолжайте чередовать стороны желаемое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Передняя планка с поворотом"},{"id":"3315","n":"full maltese","bp":"waist","eq":"body weight","tg":"abs","mg":"shoulders","img":null,"gif":null,"ru":"Начните с того, что встаньте, поставив ноги на ширине плеч и вытянув руки в стороны. Медленно наклонитесь вперед, держа руки прямыми, пока верхняя часть тела не станет параллельна земле. Напрягите корпус и удерживайте это положение в течение нескольких секунд. Вернитесь в исходное положение, оттолкнувшись ногами и снова встав. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Полный мальтийский крест"},{"id":"3299","n":"full planche","bp":"waist","eq":"body weight","tg":"abs","mg":"shoulders","img":null,"gif":null,"ru":"Начните с позиции для отжиманий, поставив руки на ширине плеч и пальцы направлены вперед. Напрягите корпус и медленно перенесите вес вперед, отрывая ноги от земли. Продолжайте переносить вес вперед, пока ваше тело не станет параллельно земле, балансируя на руках. Удерживайте это положение как можно дольше, сохраняя прямую линию тела. Медленно опустите ноги обратно на землю и вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Полный планш"},{"id":"3327","n":"full planche push-up","bp":"chest","eq":"body weight","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Начните с позиции отжимания, поставив руки чуть шире плеч. Напрягите корпус и опустите тело вниз к земле, держа локти близко к бокам. Опускаясь, наклоните тело вперед и оторвите ноги от земли, балансируя на руках. Продолжайте опускать тело до тех пор, пока грудь не окажется чуть выше земли. Оттолкнитесь руками и вытяните руки, чтобы поднять тело обратно в исходное положение. На протяжении всего движения сохраняйте прямую линию от головы до пят. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания в полном планше"},{"id":"0466","n":"gironda sternum chin","bp":"back","eq":"body weight","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Встаньте лицом к высокой перекладине, ноги на ширине плеч. Потянитесь вверх и возьмите перекладину хватом сверху, на расстоянии чуть шире ширины плеч. Повисните на перекладине, полностью вытянув руки и выпрямив тело. Задействуйте широчайшие и бицепсы, чтобы подтянуть грудь к перекладине, ведущей вперед грудиной. Задержитесь на мгновение в верхней точке, затем медленно опуститесь обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подтягивания к груди по Жиронде"},{"id":"3561","n":"glute bridge march","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Напрягите ягодицы и поднимите бедра от земли, образуя прямую линию от колен до плеч. Удерживая бедра приподнятыми, оторвите одну ногу от земли и поднесите колено к груди. Опустите ногу обратно на землю и повторите движение другой ногой. Продолжайте чередовать ноги марширующим движением, сохраняя положение мостика. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Ягодичный мостик с шагами"},{"id":"3523","n":"glute bridge two legs on bench (male)","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Сядьте на край скамьи, прислонившись к ней спиной и поставив ноги на землю. Положите руки на скамью рядом с бедрами для поддержки. Задействуйте ягодицы и мышцы задней поверхности бедра, затем поднимите бедра со скамьи, пока ваше тело не образует прямую линию от колен до плеч. Задержитесь на мгновение в верхней точке, затем медленно опустите бедра обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Ягодичный мостик с двумя ногами на скамье"},{"id":"3193","n":"glute-ham raise","bp":"upper legs","eq":"body weight","tg":"hamstrings","mg":"glutes","img":null,"gif":null,"ru":"Отрегулируйте тренажер для подъема ягодичных мышц так, чтобы он соответствовал вашему телу. Расположитесь на тренажере лицом вниз, зафиксировав лодыжки. Положите руки на грудь или скрестите их на груди. Задействуйте мышцы задней поверхности бедра и ягодицы, чтобы поднять верхнюю часть тела к потолку. Продолжайте поднимать, пока ваше тело не станет прямой линией от головы до пяток. Задержитесь на мгновение в верхней точке, затем медленно опустите тело обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Сгибание ног в ягодично-икроножном тренажёре"},{"id":"0467","n":"gorilla chin","bp":"waist","eq":"body weight","tg":"abs","mg":"forearms","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине
