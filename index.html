ко к туловищу, а плечи неподвижно на протяжении всего движения. На выдохе сгибайте штангу и одновременно напрягайте бицепсы. Продолжайте поднимать штангу до тех пор, пока ваши бицепсы полностью не сократятся и штанга не окажется на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. На вдохе начните медленно возвращать штангу в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс узким хватом со штангой стоя"},{"id":"1456","n":"barbell standing close grip military press","bp":"shoulders","eq":"barbell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч, и возьмите штангу хватом сверху, руки чуть ближе ширины плеч. Поднимите штангу на высоту плеч, держа локти близко к телу. Выжмите штангу над головой, полностью выпрямив руки. Опустите штангу обратно на высоту плеч. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Жим штанги узким хватом стоя"},{"id":"2414","n":"barbell standing concentration curl","bp":"upper arms","eq":"barbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите в одну руку штангу ладонью вверх. Положите противоположную руку на бедро для поддержки. Удерживая плечо неподвижно, выдохните и поднимите вес к плечу. Задержитесь на мгновение в верхней точке, напрягая бицепсы. Вдохните и медленно опустите вес обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Концентрированный подъём на бицепс со штангой стоя"},{"id":"0107","n":"barbell standing front raise over head","bp":"shoulders","eq":"barbell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, удерживая штангу перед бедрами хватом сверху. Держите спину прямо и задействуйте корпус. Медленно поднимите штангу перед собой, держа руки прямыми ладонями вниз. Продолжайте поднимать штангу до тех пор, пока она не окажется немного выше уровня плеч. Задержитесь на мгновение в верхней точке, затем медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подъём штанги перед собой над головой стоя"},{"id":"0108","n":"barbell standing leg calf raise","bp":"lower legs","eq":"barbell","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, положите штангу на верхнюю часть спины. Поднимите пятки от земли как можно выше, используя икроножные мышцы. Задержитесь на мгновение в верхней точке, затем медленно опустите пятки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носки со штангой стоя"},{"id":"0109","n":"barbell standing overhead triceps extension","bp":"upper arms","eq":"barbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите штангу хватом сверху. Поднимите штангу над головой, полностью выпрямив руки. Держа плечи близко к голове, медленно опустите штангу за голову, сгибая локти. Сделайте паузу на мгновение, затем поднимите штангу обратно в исходное положение, вытянув руки. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Разгибание рук на трицепс из-за головы со штангой стоя"},{"id":"0110","n":"barbell standing reverse grip curl","bp":"upper arms","eq":"barbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, ноги на ширине плеч, возьмите штангу обратным хватом ладонями вверх. Держите локти близко к туловищу, а плечи неподвижны. Выдохните и согните штангу, одновременно напрягая бицепсы и поднося штангу как можно ближе к плечам. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс обратным хватом со штангой стоя"},{"id":"0111","n":"barbell standing rocking leg calf raise","bp":"lower legs","eq":"barbell","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите штангу на верхней части спины. Поднимите пятки от земли как можно выше, балансируя на подушечках стоп. Медленно опустите пятки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Покачивающийся подъём на носки со штангой стоя"},{"id":"0112","n":"barbell standing twist","bp":"waist","eq":"barbell","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите штангу перед грудью обеими руками ладонями вниз. Напрягите корпус и держите спину прямо на протяжении всего упражнения. Медленно поверните туловище вправо, поворачиваясь на ступнях и бедрах, сохраняя при этом нижнюю часть тела устойчивой. Сделайте небольшую паузу в конце поворота, затем медленно вернитесь в исходное положение. Повторите поворот в левую сторону. Продолжайте чередовать скручивания желаемое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Скручивания со штангой стоя"},{"id":"1629","n":"barbell standing wide grip biceps curl","bp":"upper arms","eq":"barbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите штангу обратным хватом, руки шире ширины плеч. Держите спину прямо, а локти близко к туловищу. Выдохните и поднимите штангу к плечам, сохраняя плечи неподвижными. Задержитесь на мгновение в верхней точке, напрягая бицепсы. Вдохните и медленно опустите штангу обратно в исходное положение, полностью выпрямляя руки. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс широким хватом со штангой стоя"},{"id":"1457","n":"barbell standing wide military press","bp":"shoulders","eq":"barbell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч, и возьмите штангу хватом сверху, чуть шире ширины плеч. Поднимите штангу на высоту плеч, держа локти немного впереди штанги. Выжмите штангу над головой, полностью выпрямив руки. Опустите штангу обратно на высоту плеч и повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Жим штанги широким хватом стоя"},{"id":"0113","n":"barbell standing wide-grip curl","bp":"upper arms","eq":"barbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, ноги на ширине плеч, возьмите штангу хватом сверху, руки на ширине плеч. Пусть штанга висит на расстоянии вытянутой руки перед бедрами, ладонями от тела. Удерживая плечи неподвижно, выдохните и поднимите штангу вверх, напрягая бицепсы. Продолжайте поднимать штангу до тех пор, пока ваши бицепсы полностью не сократятся и штанга не окажется на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно начните опускать штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс широким хватом со штангой стоя"},{"id":"0114","n":"barbell step-up","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте перед скамьей или сделайте шаг, положив штангу на верхнюю часть спины. Поставьте одну ногу на скамью или ступеньку так, чтобы вся стопа соприкасалась с поверхностью. Надавите пяткой и встаньте на скамью или ступеньку, полностью выпрямляя бедро и колено. Сделайте короткую паузу в верхней точке, затем опуститесь обратно в исходное положение. Повторите с противоположной ногой. Продолжайте чередовать ноги желаемое количество повторений.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Зашагивания на платформу со штангой"},{"id":"0115","n":"barbell stiff leg good morning","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч и слегка согнув колени. Держите штангу на верхней части спины, положив ее на трапеции. Сохраняя спину прямой, наклонитесь вперед в бедрах, отводя ягодицы назад. Опускайте туловище до тех пор, пока оно не станет параллельно земле, чувствуя растяжение подколенных сухожилий. Задействуйте ягодицы и мышцы задней поверхности бедра, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Наклоны на прямых ногах со штангой"},{"id":"0116","n":"barbell straight leg deadlift","bp":"upper legs","eq":"barbell","tg":"hamstrings","mg":"glutes","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч, носки ног направлены вперед. Возьмите штангу хватом сверху, руки чуть шире плеч. Согните бедра и опустите штангу к земле, сохраняя спину прямой и слегка согнутыми в коленях. Опускайте штангу до тех пор, пока не почувствуете растяжение подколенных сухожилий. Задействуйте мышцы задней поверхности бедра и ягодицы, чтобы поднять штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Становая тяга на прямых ногах со штангой"},{"id":"0117","n":"barbell sumo deadlift","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, расставив ноги шире плеч, носки наружу. Положите штангу на землю перед собой по центру между стопами. Согните ноги в коленях и опустите бедра, держа спину прямо и грудь вверх, чтобы взять штангу хватом сверху. Напрягите корпус и двигайтесь пятками, чтобы поднять штангу с земли, одновременно вытягивая бедра и колени. Во время подъема держите грудь и спину прямо, а бедра выдвигайте вперед, чтобы полностью задействовать ягодицы. Задержитесь на мгновение в верхней точке, затем медленно опустите штангу обратно в исходное положение, сохраняя контроль на протяжении всего движения. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Становая тяга сумо со штангой"},{"id":"3305","n":"barbell thruster","bp":"shoulders","eq":"barbell","tg":"delts","mg":"quadriceps","img":null,"gif":null,"ru":"Начните с того, что встаньте, поставив ноги на ширине плеч, удерживая штангу на уровне плеч хватом сверху. Опуститесь в присед, согнув колени и отведя бедра назад. Достигнув нижней точки приседа, резко поднимите пятки, чтобы встать, одновременно выжимая штангу над головой. Опустите штангу обратно на высоту плеч, возвращаясь в положение приседа. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":0,"ru_name":"Трастеры со штангой"},{"id":"0120","n":"barbell upright row","bp":"shoulders","eq":"barbell","tg":"delts","mg":"traps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите штангу хватом сверху, руки расставлены чуть шире плеч. Пусть штанга висит перед бедрами, руки полностью выпрямлены. Удерживая спину прямой и напряженным корпус, выдохните и поднимите штангу прямо вверх к подбородку, ведя локтями. Задержитесь на мгновение в верхней точке, затем вдохните и медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Тяга штанги к подбородку"},{"id":"0119","n":"barbell upright row v. 2","bp":"shoulders","eq":"barbell","tg":"delts","mg":"traps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите штангу хватом сверху, руки расставлены чуть шире плеч. Пусть штанга висит перед бедрами, руки полностью выпрямлены. Удерживая спину прямо, выдохните и поднимите штангу прямо вверх к подбородку, ведя локтями. Задержитесь на мгновение в верхней точке, затем вдохните и медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Тяга штанги к подбородку вариант 2"},{"id":"0121","n":"barbell upright row v. 3","bp":"shoulders","eq":"barbell","tg":"delts","mg":"traps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите штангу хватом сверху, руки расставлены чуть шире плеч. Пусть штанга висит перед бедрами, руки полностью выпрямлены. Удерживая корпус напряженным и спину прямой, на выдохе поднимайте штангу прямо вверх к подбородку, ведя локтями. Сделайте паузу на мгновение в верхней точке, затем на вдохе медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Тяга штанги к подбородку вариант 3"},{"id":"0122","n":"barbell wide bench press","bp":"chest","eq":"barbell","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Лягте на скамью, поставьте ступни на землю и прижмите спину к скамье. Возьмите штангу широким хватом, на расстоянии чуть шире ширины плеч. Снимите штангу со стойки и держите ее прямо над грудью, полностью вытянув руки. Медленно опустите штангу к груди, слегка разведя локти. Сделайте паузу на мгновение, когда штанга коснется вашей груди, затем поднимите ее обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим штанги лёжа широким хватом"},{"id":"1258","n":"barbell wide reverse grip bench press","bp":"chest","eq":"barbell","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Лягте на скамью, поставьте ступни на землю и прижмите спину к скамье. Возьмите штангу широким обратным хватом, на расстоянии чуть шире ширины плеч. Снимите штангу со стойки и держите ее прямо над грудью, полностью вытянув руки. Медленно опустите штангу к груди, держа локти согнутыми и запястья прямыми. Сделайте паузу на мгновение, когда штанга коснется вашей груди, затем поднимите ее обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим штанги лёжа широким обратным хватом"},{"id":"0124","n":"barbell wide squat","bp":"upper legs","eq":"barbell","tg":"quads","mg":"glutes","img":null,"gif":null,"ru":"Встаньте, поставив ноги шире плеч, носки слегка направлены наружу. Держите штангу на верхней части спины, опираясь на трапеции или задние дельты. Напрягите корпус и держите грудь поднятой, опуская тело в присед, отводя бедра назад и сгибая колени. Опускайтесь до тех пор, пока бедра не станут параллельны земле или настолько низко, насколько вам будет удобно. Задержитесь на мгновение внизу, затем оттолкнитесь пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Приседания со штангой широкой постановкой ног"},{"id":"0123","n":"barbell wide-grip upright row","bp":"shoulders","eq":"barbell","tg":"delts","mg":"traps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите штангу хватом сверху, руки шире ширины плеч. Пусть штанга висит перед бедрами, руки полностью выпрямлены. Удерживая спину прямо, выдохните и поднимите штангу прямо вверх к подбородку, ведя локтями. Задержитесь на мгновение в верхней точке, затем вдохните и медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Тяга штанги к подбородку широким хватом"},{"id":"0126","n":"barbell wrist curl","bp":"lower arms","eq":"barbell","tg":"forearms","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на скамью, поставьте ступни на землю, а предплечья положите на бедра, возьмите штангу хватом снизу. Позвольте штанге скатиться до кончиков пальцев, сохраняя запястья прямыми. Медленно поднимите штангу к предплечьям, сгибая запястья. Задержитесь на мгновение в верхней точке, затем медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание запястий со штангой"},{"id":"0125","n":"barbell wrist curl v. 2","bp":"lower arms","eq":"barbell","tg":"forearms","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на скамью, поставьте ноги на землю и согните колени. Держите штангу обратным хватом ладонями вверх, руки на ширине плеч. Положите предплечья на бедра, позволяя запястьям свисать с края. Медленно поднимите запястья вверх, поднося штангу к предплечьям. Задержитесь на мгновение в верхней точке, затем медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание запястий со штангой вариант 2"},{"id":"0127","n":"barbell zercher squat","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч и слегка развернув пальцы ног. Держите штангу на сгибах локтей, обхватив ее руками для устойчивости. Напрягите корпус и держите грудь поднятой, опуская бедра назад и вниз в положение приседа. Держите колени на одной линии с пальцами ног, а вес тела перенесите на пятки. Задержитесь на мгновение в нижней части приседа, затем оттолкнитесь пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Приседания Зерхера со штангой"},{"id":"3212","n":"basic toe touch (male)","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, руки по бокам. Наклонитесь вперед в талии, сохраняя спину прямой и слегка согнутыми в коленях. Потянитесь руками к пальцам ног, сохраняя ноги как можно более прямыми. Задержитесь на мгновение внизу, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Наклоны к носкам мужской вариант"},{"id":"0128","n":"battling ropes","bp":"shoulders","eq":"rope","tg":"delts","mg":"forearms","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч и слегка согнуты в коленях. Возьмите по одному концу веревки в каждую руку ладонями друг к другу. Поднимите руки на высоту плеч, слегка согнув локти. Начните делать попеременные волны с помощью веревок, быстро поднимая и опуская каждую руку. Продолжайте желаемую продолжительность или количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Упражнение с канатами"},{"id":"3360","n":"bear crawl","bp":"cardio","eq":"body weight","tg":"cardiovascular system","mg":"core","img":null,"gif":null,"ru":"Встаньте на четвереньки, положив руки прямо под плечи и колени прямо под бедрами. Слегка поднимите колени от земли, сохраняя спину ровной и напряженным корпус. Одновременно переместите вперед правую руку и левую ногу, а затем левую руку и правую ногу. Продолжайте ползти вперед, чередуя движения рук и ног. Поддерживайте устойчивый темп и держите корпус напряженным на протяжении всего упражнения. Продолжайте движение желаемое расстояние или время.","pos":"kneeling","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Медвежья походка"},{"id":"1259","n":"behind head chest stretch","bp":"chest","eq":"assisted","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте прямо, ноги на ширине плеч. Переплетите пальцы за головой так, чтобы локти были направлены наружу. Медленно сведите лопатки вместе и выдвиньте грудь вперед. Удерживайте растяжку 15–30 секунд. Освободите растяжку и повторите по желанию.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка груди с заведением рук за голову"},{"id":"0129","n":"bench dip (knees bent)","bp":"upper arms","eq":"body weight","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Сядьте на край скамьи или стула, взявшись руками за край рядом с бедрами. Оторвите ягодицы от скамьи и выпрямите ноги перед собой, удерживая пятки на земле. Согните локти и опустите тело к земле, держа спину близко к скамье. Задержитесь на мгновение в нижней точке, затем вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратные отжимания от скамьи с согнутыми коленями"},{"id":"1399","n":"bench dip on floor","bp":"upper arms","eq":"body weight","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Сядьте на край скамьи или стула, взявшись руками за край, пальцами вперед. Сдвиньте ягодицы со скамьи, поддерживая вес руками. Опустите тело, сгибая локти, пока плечи не станут параллельны полу. Вернитесь в исходное положение, выпрямляя руки. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратные отжимания от скамьи с упором в пол"},{"id":"0130","n":"bench hip extension","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Сядьте на скамью, прислонившись спиной к скамье, а ноги поставьте на землю. Положите руки на скамью для поддержки. Задействуйте ягодицы и мышцы задней поверхности бедра, затем поднимите бедра со скамьи, пока ваше тело не образует прямую линию от колен до плеч. Задержитесь на мгновение в верхней точке, затем медленно опустите бедра обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание бедра на скамье"},{"id":"3019","n":"bench pull-ups","bp":"back","eq":"body weight","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Расположитесь под перекладиной или прочной горизонтальной поверхностью на уровне груди. Возьмитесь за перекладину или поверхность хватом сверху, на расстоянии чуть шире плеч. Висите, полностью вытянув руки и выпрямив тело. Подтяните грудь к перекладине или поверхности, сведя лопатки вместе и согнув локти. Продолжайте тянуть, пока подбородок не окажется над перекладиной или поверхностью. Опуститесь обратно в исходное положение, сохраняя контроль. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подтягивания на скамье"},{"id":"3639","n":"bent knee lying twist (male)","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"obliques","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Вытяните руки в стороны перпендикулярно телу. Держа колени вместе, медленно опустите их в сторону, стараясь коснуться коленями земли. Сделайте паузу на мгновение, затем задействуйте корпус и медленно поднимите колени обратно в исходное положение. Повторите движение в другую сторону. Продолжайте чередовать стороны желаемое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Скручивания лёжа с согнутыми коленями мужской вариант"},{"id":"1770","n":"biceps leg concentration curl","bp":"upper arms","eq":"body weight","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на скамью, раздвинув ноги и поставив ступни на землю. Возьмите гантель в одну руку и поместите локоть на внутреннюю часть бедра, чуть выше колена. Поверните ладонь вверх и согните гантель к плечу, сохраняя плечо неподвижным. Напрягите бицепсы в верхней точке движения, затем медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Концентрированный подъём на бицепс с упором в ногу"},{"id":"0139","n":"biceps narrow pull-ups","bp":"upper arms","eq":"body weight","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Повисните на перекладине, повернув ладонями к себе и расставив руки на ширине плеч. Напрягите корпус и подтяните себя к перекладине, сосредоточившись на использовании бицепсов для подъема тела. Задержитесь на мгновение в верхней точке, затем медленно опуститесь обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подтягивания узким хватом на бицепс"},{"id":"0140","n":"biceps pull-up","bp":"upper arms","eq":"body weight","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Повисните на перекладине, повернув ладонями от себя и расставив руки на ширине плеч. Напрягите корпус и подтяните себя, сгибая локти и приближая грудь к перекладине. Сделайте паузу в верхней точке движения, затем медленно опуститесь обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подтягивания на бицепс"},{"id":"0137","n":"body-up","bp":"upper arms","eq":"body weight","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Начните с того, что положите руки на приподнятую поверхность, например на скамью или брусья, ладонями вниз и пальцами вперед. Вытяните ноги перед собой, удерживая пятки на земле, а тело прямо. Опустите тело, согнув локти и держа их близко к бокам, пока плечи не станут параллельны земле. Сделайте паузу на мгновение, затем подтолкните ладони, чтобы выпрямить руки и поднять тело обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём корпуса"},{"id":"3543","n":"bodyweight drop jump squat","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч. Опустите тело в присед, согнув колени и отведя бедра назад. Резко подпрыгните вверх, вытягивая бедра, колени и лодыжки. Находясь в воздухе, быстро сведите ноги вместе. Мягко приземлитесь на подушечки стоп и сразу же вернитесь в присед. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"high","sp":0,"kn":0,"sh":1,"ru_name":"Приседания с выпрыгиванием в глубину с весом тела"},{"id":"3544","n":"bodyweight incline side plank","bp":"waist","eq":"body weight","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Начните с того, что лягте на бок, вытянув ноги и положив их друг на друга. Положите предплечье на землю прямо под плечом, согнув локоть под углом 90 градусов. Напрягите корпус и поднимите бедра от земли, создавая прямую линию от головы до ступней. Удерживайте это положение желаемое время. Опустите бедра обратно на землю и повторите то же самое с другой стороны.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Боковая планка на наклонной поверхности с весом тела"},{"id":"1771","n":"bodyweight kneeling triceps extension","bp":"upper arms","eq":"body weight","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте на колени на землю, расставив колени на ширине плеч. Положите руки на пол перед собой на ширине плеч, пальцы направлены вперед. Вытяните ноги прямо позади себя, балансируя на пальцах ног и руках, образуя прямую линию от головы до пяток. Согните локти и опустите верхнюю часть тела к земле, держа локти близко к бокам. Задержитесь на мгновение в нижней точке, затем оттолкнитесь руками, чтобы выпрямить руки и вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"kneeling","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание рук на трицепс с колен с весом тела"},{"id":"1769","n":"bodyweight side lying biceps curl","bp":"upper arms","eq":"body weight","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Лягте на бок, вытянув ноги и подперев голову рукой. Прижмите плечо к боку и согните локоть, чтобы предплечье приблизилось к плечу. Задержитесь на мгновение в верхней точке, затем медленно опустите предплечье обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс лёжа на боку с весом тела"},{"id":"3168","n":"bodyweight squatting row","bp":"back","eq":"body weight","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держитесь за прочный предмет или тренажер для подвешивания, вытянув руки. Опустите тело в положение приседа, сохраняя спину прямой и колени за носками. Из положения приседа подтяните тело вверх к предмету или тренажеру, сжимая лопатки вместе. Задержитесь на мгновение в верхней точке, затем медленно опустите тело обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Тяга в приседе с весом тела"},{"id":"3167","n":"bodyweight squatting row (with towel)","bp":"back","eq":"body weight","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите перед собой полотенце ладонями вниз. Согните ноги в коленях и опустите тело в положение приседа, держа спину прямо и грудь вверх. Опускаясь в присед, одновременно подтягивайте полотенце к груди, сжимая лопатки вместе. Сделайте паузу на мгновение в нижней части приседа, затем медленно вернитесь в исходное положение, выпрямляя руки. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Тяга в приседе с весом тела с полотенцем"},{"id":"1373","n":"bodyweight standing calf raise","bp":"lower legs","eq":"body weight","tg":"calves","mg":"ankles","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, носки направлены вперед. Положите руки на стену или устойчивую поверхность для равновесия. Медленно поднимите пятки от земли, перенеся вес тела на подушечки стоп. Задержитесь на мгновение в верхней точке, затем медленно опустите пятки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носки стоя с весом тела"},{"id":"3156","n":"bodyweight standing close-grip one arm row","bp":"back","eq":"body weight","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, колени слегка согнуты, в одной руке возьмите гантель нейтральным хватом. Наклонитесь вперед в бедрах, сохраняя спину прямой и напряженный корпус. Подтяните гантель к груди, держа локоть близко к телу и сжимая лопатки вместе. Задержитесь на мгновение в верхней точке, затем медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Тяга одной рукой узким хватом стоя с весом тела"},{"id":"3158","n":"bodyweight standing close-grip row","bp":"back","eq":"body weight","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч и слегка согнуты в коленях. Наклонитесь вперед в талии, сохраняя спину прямой и напрягая корпус. Вытяните руки прямо перед собой, крепко взявшись за перекладину или ручки. Потяните штангу или ручки к себе, сведя лопатки вместе. Задержитесь на мгновение в верхней точке движения, затем медленно расслабьтесь и вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Тяга узким хватом стоя с весом тела"},{"id":"3162","n":"bodyweight standing one arm row","bp":"back","eq":"body weight","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, колени слегка согнуты, в одной руке возьмите гантель. Наклонитесь вперед в бедрах, сохраняя спину прямой и напряженный корпус. Пусть гантель висит прямо перед вами, полностью выпрямив руку. Подтяните гантель к груди, держа локоть близко к телу. В верхней точке движения сведите лопатки вместе. Опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Тяга одной рукой стоя с весом тела"},{"id":"3161","n":"bodyweight standing one arm row (with towel)","bp":"back","eq":"body weight","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, колени слегка согнуты, одной рукой держите полотенце. Наклонитесь вперед в бедрах, сохраняя спину прямой и напряженный корпус. Подтяните полотенце к груди, сведя лопатки вместе. Задержитесь на мгновение в верхней точке, затем медленно опустите полотенце обратно в исходное положение. Повторите желаемое количество повторений, затем переключитесь на другую руку.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга одной рукой стоя с весом тела с полотенцем"},{"id":"3166","n":"bodyweight standing row","bp":"back","eq":"body weight","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч и слегка согнуты в коленях. Возьмите перекладину или ручки верхним хватом ладонями вниз. Держите спину прямо и напрягите корпус. Потяните штангу или ручки к себе, сведя лопатки вместе. Сделайте паузу на мгновение в верхней точке движения. Медленно расслабьте и вытяните руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга стоя с весом тела"},{"id":"3165","n":"bodyweight standing row (with towel)","bp":"back","eq":"body weight","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите полотенце перед собой обеими руками. Слегка согните колени и наклонитесь вперед в бедрах, сохраняя спину прямой. Подтяните полотенце к груди, сведя лопатки вместе. Задержитесь на мгновение в верхней точке, затем медленно ослабьте напряжение и вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга стоя с весом тела с полотенцем"},{"id":"0138","n":"bottoms-up","bp":"waist","eq":"body weight","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Лягте на спину, вытянув ноги и положив руки по бокам. Согните колени и подтяните их к груди, не отрывая ступни от земли. Включив пресс, поднимите бедра от земли, поднеся колени к голове. Задержитесь на мгновение в верхней точке, затем медленно опустите бедра обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Стойка на голове с подъёмом таза"},{"id":"1374","n":"box jump down with one leg stabilization","bp":"lower legs","eq":"body weight","tg":"calves","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте перед ящиком или платформой, поставив ноги на ширине плеч. Согните колени и прыгните на ящик, мягко приземлившись, поставив одну ногу на ящик, а другую свесив с края. Зафиксируйтесь на ящике стоящей на нем ногой, удерживая при этом другую ногу над землей. Удерживайте это положение несколько секунд, задействуя икроножные мышцы для сохранения равновесия. Медленно шагните вниз ногой, стоящей на ящике, возвращаясь в исходное положение. Повторите упражнение с другой ногой.","pos":"standing","ax":"low","iap":"low","imp":"high","sp":1,"kn":0,"sh":1,"ru_name":"Спрыгивание с тумбы со стабилизацией на одной ноге"},{"id":"2466","n":"bridge - mountain climber (cross body)","bp":"waist","eq":"body weight","tg":"abs","mg":"glutes","img":null,"gif":null,"ru":"Начните с позиции высокой планки, положив руки прямо под плечи, а тело образуя прямую линию. Напрягите корпус и поднимите правую ногу от земли, поднеся правое колено к левому локтю. Верните правую ногу в исходное положение и повторите движение левой ногой к правому локтю. Продолжайте чередовать стороны, двигаясь в контролируемом темпе. Держите бедра ровно, не поднимайте бедра слишком высоко и не опускайте их слишком низко. Поддерживайте ровный ритм дыхания на протяжении всего упражнения. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Скалолаз в упоре лёжа накрест"},{"id":"1160","n":"burpee","bp":"cardio","eq":"body weight","tg":"cardiovascular system","mg":"quadriceps","img":null,"gif":null,"ru":"Начните с положения стоя, поставив ноги на ширине плеч. Опустите тело в присед, согнув колени и положив руки на пол перед собой. Верните ноги в положение для отжимания. Выполните отжимание, удерживая тело прямой. Верните ноги в положение приседа. Резко подпрыгните вверх, вытянув руки над головой. Мягко приземлитесь и сразу же опуститесь в присед, чтобы начать следующее повторение.","pos":"standing","ax":"low","iap":"high","imp":"high","sp":0,"kn":0,"sh":0,"ru_name":"Бёрпи"},{"id":"0870","n":"butt-ups","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Положите руки по бокам ладонями вниз. Включив пресс, поднимите ноги от земли, подтянув колени к груди. В верхней точке движения напрягите пресс и сделайте паузу на мгновение. Медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Подъёмы таза в упоре"},{"id":"1494","n":"butterfly yoga pose","bp":"upper legs","eq":"body weight","tg":"adductors","mg":"hamstrings","img":null,"gif":null,"ru":"Сядьте на пол, вытянув ноги перед собой. Согните колени и соедините подошвы ног вместе, позволяя коленям развалиться в стороны. Держитесь руками за лодыжки или ступни. Сядьте прямо и удлините позвоночник. Аккуратно прижмите колени к полу, чувствуя растяжение внутренней поверхности бедер. Задержитесь в этом положении на несколько вдохов. Чтобы расслабиться, медленно поднимите колени вверх и выпрямите ноги.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Поза бабочки в йоге"},{"id":"0148","n":"cable alternate shoulder press","bp":"shoulders","eq":"cable","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, расставив ноги на ширине плеч, и возьмитесь за рукоятки канатного тренажера верхним хватом. Расположите руки на уровне плеч, ладонями вперед. Держите корпус напряженным, а спину прямой. Нажмите одну ручку вверх и вперед, пока рука полностью не выпрямится. Задержитесь на мгновение в верхней точке, затем медленно опустите рукоятку обратно в исходное положение. Повторите с другой рукой. Чередуйте руки, выполняя желаемое количество повторений.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Попеременный жим над головой на блоке"},{"id":"0149","n":"cable alternate triceps extension","bp":"upper arms","eq":"cable","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте лицом к канатному тренажеру, поставив ноги на ширине плеч. Возьмите рукоятку троса правой рукой и поднимите руку так, чтобы плечо было параллельно земле, а локоть был согнут под углом 90 градусов. Держите плечо неподвижно и вытяните предплечье назад, полностью выпрямляя руку. Сделайте паузу на мгновение, затем медленно вернитесь в исходное положение. Повторите то же самое с левой рукой. Продолжайте чередовать руки желаемое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Попеременное разгибание на трицепс на блоке"},{"id":"3235","n":"cable assisted inverse leg curl","bp":"upper legs","eq":"cable","tg":"hamstrings","mg":"glutes","img":null,"gif":null,"ru":"Отрегулируйте тросовую машину так, чтобы крепление голеностопного сустава было на самом низком уровне. Лягте лицом вниз на скамью, выпрямите ноги и закрепите фиксатор лодыжки на лодыжках. Держитесь за ручки скамьи для устойчивости. Удерживая верхнюю часть тела неподвижно, выдохните и согните ноги к ягодицам, согнув колени. Задержитесь на мгновение в верхней точке движения, сжимая мышцы задней поверхности бедра. Вдохните и медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Сгибание ног лёжа с поддержкой на блоке"},{"id":"0150","n":"cable bar lateral pulldown","bp":"back","eq":"cable","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Установите тросовый шкив в верхнее положение и прикрепите прямую штангу. Сядьте лицом к канатной машине, поставьте ступни на землю и слегка согните колени. Возьмите штангу хватом сверху, на расстоянии чуть шире ширины плеч. Слегка откиньтесь назад и держите грудь вверх, сохраняя небольшой изгиб в пояснице. Потяните штангу вниз к груди, ведя локти и сжимая лопатки вместе. Сделайте паузу на мгновение в нижней части движения, затем медленно верните штангу в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга верхнего блока с прямым грифом"},{"id":"0151","n":"cable bench press","bp":"chest","eq":"cable","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Отрегулируйте канатную машину на высоту груди и прикрепите ручки. Встаньте лицом к тренажеру, поставив ноги на ширине плеч. Возьмитесь за рукоятки верхним хватом и сделайте шаг вперед, чтобы создать натяжение тросов. Твердо поставьте ноги на землю и задействуйте корпус. Согните руки в локтях и поднимите руки на уровень плеч, держа локти под углом 90 градусов. Выдвиньте рукоятки вперед, полностью вытянув руки перед собой. Сделайте паузу на мгновение, затем медленно поменяйте направление движения, возвращая руки на уровень плеч. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим лёжа в кроссовере"},{"id":"1630","n":"cable close grip curl","bp":"upper arms","eq":"cable","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Прикрепите прямую штангу к канатной машине с низким шкивом. Встаньте лицом к тренажеру, ноги на ширине плеч и слегка согнуты в коленях. Возьмитесь за перекладину хватом снизу, руки на ширине плеч. На протяжении всего упражнения держите локти близко к бокам, а плечи неподвижными. Выдохните и поднимите штангу к плечам, напрягая бицепсы. Задержитесь на мгновение в верхней точке движения, напрягая бицепсы. Вдохните и медленно опустите штангу обратно в исходное положение, полностью выпрямляя руки. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс узким хватом на блоке"},{"id":"1631","n":"cable concentration curl","bp":"upper arms","eq":"cable","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на скамью или стул, поставьте ступни на пол и слегка согните колени. Возьмите рукоятку троса обратным хватом снизу и прижмите локоть к внутренней стороне бедра. Удерживая плечо неподвижно, выдохните и согните рукоятку троса к плечу, одновременно напрягая бицепс. Сделайте паузу на мгновение в верхней точке движения, затем вдохните и медленно опустите рукоятку троса обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Концентрированный подъём на бицепс на блоке"},{"id":"0152","n":"cable concentration extension (on knee)","bp":"upper arms","eq":"cable","tg":"triceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на скамью или стул, согните колени и поставьте ступни на землю. Возьмите рукоятку троса правой рукой и поместите локоть на внутреннюю часть правого колена. Полностью выпрямите руку, держа локоть неподвижно и близко к колену. Задержитесь на мгновение в верхней точке, затем медленно опустите руку обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Концентрированное разгибание на трицепс с упором в колено на блоке"},{"id":"0153","n":"cable cross-over lateral pulldown","bp":"back","eq":"cable","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Прикрепите рукоятку для троса к каждой стороне канатной машины на высоте плеч. Встаньте посередине тренажера, поставив ноги на ширине плеч. Возьмитесь за рукоятки верхним хватом и отступите назад, чтобы создать натяжение тросов. Слегка наклонитесь вперед от бедер, держа спину прямо и грудь вверх. Потяните ручки вниз и поперек тела, сжимая лопатки вместе. Сделайте паузу на мгновение в нижней части движения, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга верхнего блока в кроссовере"},{"id":"0154","n":"cable cross-over revers fly","bp":"shoulders","eq":"cable","tg":"delts","mg":"rhomboids","img":null,"gif":null,"ru":"Прикрепите D-образную рукоятку к каждому тросу нижнего шкива и встаньте в середину машины для пересечения тросов. Возьмитесь за рукоятки пронированным хватом (ладонями вниз) и сделайте шаг вперед, поставив ноги на ширине плеч. Слегка согните колени и наклонитесь вперед в талии, сохраняя спину прямой и напряженный пресс. Вытянув руки в стороны и слегка согнув их в локтях, выдохните и сведите лопатки вместе, одновременно ведя тросы назад и вверх в обратном движении. Сделайте паузу на мгновение в момент максимального сокращения, затем вдохните и медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратное разведение рук в кроссовере"},{"id":"0155","n":"cable cross-over variation","bp":"chest","eq":"cable","tg":"pectorals","mg":"deltoids","img":null,"gif":null,"ru":"Отрегулируйте шкивы троса на высоту груди. Встаньте в центр канатной машины, поставив одну ногу перед другой. Возьмитесь за ручки ладонями вниз и вытяните руки в стороны. Сделайте шаг вперед, держа руки слегка согнутыми. Слегка согнув локти, соедините руки перед грудью. Сделайте паузу на мгновение, затем медленно верните руки в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сведение рук в кроссовере вариация"},{"id":"0868","n":"cable curl","bp":"upper arms","eq":"cable","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте лицом к канатному тренажеру, поставив ноги на ширине плеч. Возьмитесь за блочное крепление снизу ладонями вверх. Держите локти близко к бокам, а плечи неподвижно. Выдохните и согните трос к плечам, напрягая бицепсы. Задержитесь на мгновение в верхней точке движения, напрягая бицепсы. Вдохните и медленно опустите тросовое крепление обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс на блоке"},{"id":"0157","n":"cable deadlift","bp":"upper legs","eq":"cable","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте лицом к канатному тренажеру, поставив ноги на ширине плеч. Согните бедра и колени, опуская туловище до тех пор, пока спина не станет параллельна земле. Возьмитесь за рукоятки троса верхним хватом, держа руки прямыми, а плечи отведенными назад. Задействуйте ягодицы и мышцы задней поверхности бедра, чтобы поднять рукоятки троса, выпрямив бедра и встав прямо. Задержитесь на мгновение в верхней точке, затем медленно опустите рукоятки троса обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Становая тяга на блоке"},{"id":"0158","n":"cable decline fly","bp":"chest","eq":"cable","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Отрегулируйте тросную машину в положение опускания. Встаньте лицом к тренажеру, поставив ноги на ширине плеч. Возьмитесь за ручки ладонями вперед и вытяните руки прямо перед собой. Сохраняя небольшой изгиб в локтях, контролируемым движением разведите руки в стороны. Задержитесь на мгновение в полностью выпрямленном положении, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разведение рук на наклонной скамье вниз головой в кроссовере"},{"id":"1260","n":"cable decline one arm press","bp":"chest","eq":"cable","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Отрегулируйте тросную машину в положение опускания. Встаньте лицом к машине и возьмитесь за ручку одной рукой. Встаньте спиной к скамье для наклонов и вытяните руку прямо перед собой. Согните локоть и опустите рукоятку к груди, сохраняя плечо неподвижным. Задержитесь на мгновение внизу, затем верните ручку вверх в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим одной рукой на наклонной скамье вниз головой на блоке"},{"id":"1261","n":"cable decline press","bp":"chest","eq":"cable","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Отрегулируйте тросную машину в положение опускания. Сядьте на наклонную скамью лицом к канатной машине. Возьмитесь за ручки верхним хватом и расположите их на уровне груди. Держите ноги ровно на земле, а спину крепко прижимайте к скамье. Выдохните и оттолкните ручки от тела, полностью выпрямляя руки. В конце движения задержитесь на мгновение, напрягая мышцы груди. Вдохните и медленно верните ручки в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим на наклонной скамье вниз головой на блоке"},{"id":"0159","n":"cable decline seated wide-grip row","bp":"back","eq":"cable","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на наклонную скамью лицом к канатной машине, надежно поставив ноги на подножки. Возьмите блочное крепление широким хватом сверху ладонями вниз. Слегка откиньтесь назад, сохраняя спину прямой и напряженный корпус. Потяните трос к нижней части груди, сжимая лопатки вместе. Сделайте паузу на мгновение на пике сокращения, затем медленно отпустите трос обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга широким хватом сидя на наклонной скамье вниз головой на блоке"},{"id":"1632","n":"cable drag curl","bp":"upper arms","eq":"cable","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте лицом к канатному тренажеру, поставив ноги на ширине плеч. Возьмитесь за блочное крепление обратным хватом, ладонями вверх и полностью выпрямленными руками. Удерживая плечи неподвижно, выдохните и согните трос к плечам, напрягая бицепсы. Задержитесь на мгновение в верхней точке движения, напрягая бицепсы. Вдохните и медленно опустите трос обратно в исходное положение, полностью выпрямив руки. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс с протяжкой на блоке"},{"id":"0160","n":"cable floor seated wide-grip row","bp":"back","eq":"cable","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на пол, вытянув ноги и выпрямив спину. Прикрепите рукоятку троса к низкому шкиву и расположите тросовую машину позади себя. Возьмите рукоятку широким хватом сверху ладонями вниз. Слегка откиньтесь назад, сохраняя спину прямой и приподняв грудь. Потяните ручку к талии, сжимая лопатки вместе. Сделайте паузу на мгновение в верхней точке движения, затем медленно отпустите рукоятку обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга широким хватом сидя на полу на блоке"},{"id":"0161","n":"cable forward raise","bp":"shoulders","eq":"cable","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч и слегка согнув колени. Держите рукоятку троса хватом сверху, ладонями вниз, а руки полностью вытянуты перед собой. Держа руки прямыми, поднимите рукоятку троса до уровня плеч. Задержитесь на мгновение в верхней точке, затем медленно опустите рукоятку троса обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём рук перед собой на блоке"},{"id":"0162","n":"cable front raise","bp":"shoulders","eq":"cable","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмитесь за рукоятку троса хватом сверху. Держите спину прямо, а корпус напряженным. Поднимите рукоятку троса перед собой, держа руки прямыми и ладонями вниз. Продолжайте подъем, пока ваши руки не станут параллельны полу. Задержитесь на мгновение в верхней точке, затем медленно опустите рукоятку троса обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём рук перед собой на блоке"},{"id":"0164","n":"cable front shoulder raise","bp":"shoulders","eq":"cable","tg":"delts","mg":"trapezius","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмитесь за рукоятку троса хватом сверху. Держите спину прямо, а корпус напряженным. Поднимите рукоятку троса перед собой, держа руки прямыми и ладонями вниз. Продолжайте подъем, пока ваши руки не станут параллельны полу. Задержитесь на мгновение в верхней точке, затем медленно опустите рукоятку троса обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём рук перед собой на блоке"},{"id":"0165","n":"cable hammer curl (with rope)","bp":"upper arms","eq":"cable","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, ноги на ширине плеч и слегка согните колени. Держите тросовое крепление обратным хватом снизу, ладони обращены друг к другу, руки полностью выпрямлены. Удерживая плечи неподвижно, выдохните и согните гантели, одновременно сокращая бицепсы. Продолжайте поднимать веревку до тех пор, пока ваши бицепсы полностью не сократятся и веревка не окажется на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно начните опускать трос обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Молотковый подъём на бицепс на блоке с канатом"},{"id":"1722","n":"cable high pulley overhead tricep extension","bp":"upper arms","eq":"cable","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Прикрепите веревку к высокому шкиву и встаньте лицом от машины. Возьмите веревку обеими руками и вытяните руки над головой. Держите локти близко к голове, а плечи неподвижно. Медленно опустите веревку за голову, сгибая локти. Сделайте паузу на мгновение, затем вытяните руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание на трицепс из-за головы на верхнем блоке"},{"id":"0167","n":"cable high row (kneeling)","bp":"back","eq":"cable","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Прикрепите прямую штангу к канатному тренажеру на уровне груди. Встаньте на колени перед канатным тренажером и возьмитесь за перекладину хватом сверху, руки на ширине плеч. Сядьте на пятки, держа спину прямо и напрягая корпус. Потяните штангу к верхней части живота, сжимая лопатки вместе. Сделайте паузу на мгновение в верхней точке движения, затем медленно отпустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"kneeling","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга верхнего блока с колен"},{"id":"0168","n":"cable hip adduction","bp":"upper legs","eq":"cable","tg":"adductors","mg":"glutes","img":null,"gif":null,"ru":"Прикрепите манжету на лодыжку и встаньте лицом к канатной машине. Расположитесь достаточно далеко от машины, чтобы трос был натянут. Положите руки на машину для поддержки. Удерживая ногу прямой, медленно перемещайте ногу поперек тела к средней линии. Сделайте небольшую паузу в конце движения, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сведение бедра на блоке"},{"id":"0169","n":"cable incline bench press","bp":"chest","eq":"cable","tg":"pectorals","mg":"deltoids","img":null,"gif":null,"ru":"Отрегулируйте скамью под углом 45 градусов. Прикрепите ручки троса к высоким шкивам. Сядьте на скамью лицом к канатной машине, поставив ноги на землю. Возьмитесь за ручки верхним хватом и поднимите их на высоту плеч. Толкайте ручки вперед и вверх, пока руки полностью не выпрямятся. Сделайте паузу на мгновение, затем медленно опустите рукоятки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим на наклонной скамье в кроссовере"},{"id":"1318","n":"cable incline bench row","bp":"back","eq":"cable","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Установите наклонную скамью под углом 45 градусов и прикрепите тросовую ручку к нижнему шкиву. Сядьте на скамью лицом к блочному тренажеру, поставьте ступни на пол и слегка согните колени. Возьмитесь за рукоятку троса верхним хватом и вытяните руки полностью перед собой. Наклонитесь вперед от бедер, сохраняя при этом спину прямой и напряженный корпус. Потяните рукоятку троса к груди, сводя лопатки и сгибая локти. Напрягите мышцы спины в верхней точке движения, затем медленно вытяните руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга лёжа на наклонной скамье на блоке"},{"id":"0171","n":"cable incline fly","bp":"chest","eq":"cable","tg":"pectorals","mg":"deltoids","img":null,"gif":null,"ru":"Установите тросовую машину в нижнее положение и прикрепите ручки. Сядьте на наклонную скамью, прислонившись спиной к подушке, а ступни поставьте на пол. Возьмитесь за рукоятки верхним хватом и вытяните руки прямо перед собой. Сохраняя небольшой изгиб в локтях, контролируемым движением разведите руки в стороны. Задержитесь на мгновение в полностью выпрямленном положении, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разведение рук на наклонной скамье в кроссовере"},{"id":"0170","n":"cable incline fly (on stability ball)","bp":"chest","eq":"cable","tg":"pectorals","mg":"deltoids","img":null,"gif":null,"ru":"Установите мяч для стабилизации под углом наклона. Прикрепите рукоятки троса к высоким шкивам канатной машины. Сядьте на стабилизирующий шар лицом в сторону от машины, твердо поставьте ноги на землю. Возьмитесь за рукоятки троса верхним хватом, ладонями вперед. Слегка наклонитесь вперед, сохраняя спину прямой и напряженным корпусом. Контролируемым движением разведите руки в стороны, сохраняя небольшой изгиб в локтях. Продолжайте движение, пока ваши руки не станут параллельны земле. Сделайте паузу на мгновение, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разведение рук на наклонной скамье на фитболе в кроссовере"},{"id":"0172","n":"cable incline pushdown","bp":"back","eq":"cable","tg":"lats","mg":"triceps","img":null,"gif":null,"ru":"Прикрепите прямую штангу к канатной машине с высоким шкивом. Встаньте лицом к тренажеру, поставив ноги на ширине плеч. Возьмите перекладину хватом сверху, руки на расстоянии чуть шире плеч. Слегка наклонитесь вперед и держите спину прямо. Потяните штангу вниз к бедрам, разгибая локти. Задержитесь на мгновение в нижней точке, затем медленно верните штангу в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание на трицепс на наклонной скамье на блоке"},{"id":"0173","n":"cable incline triceps extension","bp":"upper arms","eq":"cable","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Отрегулируйте тросовую машину в нижнее положение шкива. Прикрепите к кабелю прямую перекладину. Встаньте лицом к тренажеру, поставив ноги на ширине плеч. Возьмите штангу хватом сверху и вытяните руки прямо над головой. Слегка наклонитесь вперед, сохраняя спину прямой и напряженным корпусом. Согните руки в локтях и опустите штангу за голову, держа плечи близко к ушам. Сделайте паузу на мгновение, затем вытяните руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание на трицепс на наклонной скамье на блоке"},{"id":"0174","n":"cable judo flip","bp":"waist","eq":"cable","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Встаньте лицом к канатному тренажеру, поставив ноги на ширине плеч. Держите рукоятку троса обеими руками на уровне груди ладонями вниз. Включите корпус и поверните туловище вправо, протягивая трос через тело. Во время вращения поворачивайте заднюю ногу и позволяйте бедрам вращаться естественным образом. Полностью выпрямите руки и завершите движение, перекинув рукоятку троса через плечо. Вернитесь в исходное положение, выполнив обратное движение и повернув туловище обратно в центр. Повторите движение в противоположную сторону. Продолжайте чередовать стороны желаемое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Бросок дзюдо на блоке"},{"id":"0860","n":"cable kickback","bp":"upper arms","eq":"cable","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте лицом к канатному тренажеру, поставив ноги на ширине плеч. Возьмите рукоятку троса правой рукой и отступите назад, чтобы создать натяжение троса. Слегка согните колени и наклонитесь вперед в бедрах, сохраняя спину прямой. Держите плечо близко к телу, а локоть согнут под углом 90 градусов. Вытяните предплечье назад, полностью выпрямляя руку. Сделайте паузу на мгновение, затем медленно вернитесь в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание руки назад на трицепс на блоке"},{"id":"0175","n":"cable kneeling crunch","bp":"waist","eq":"cable","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Прикрепите веревочную ручку к высокому шкиву и встаньте на колени лицом от машины. Возьмите рукоятку веревки обеими руками и поместите ее за голову, держа локти в стороны. Удерживая бедра неподвижными, согните талию и наклоните туловище к бедрам. Задержитесь на мгновение внизу, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"kneeling","ax":"none","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Скручивания с колен на блоке"},{"id":"3697","n":"cable kneeling rear delt row (with rope) (male)","bp":"shoulders","eq":"cable","tg":"delts","mg":"trapezius","img":null,"gif":null,"ru":"Прикрепите веревочную ручку к низкому шкиву и встаньте на колени лицом к машине. Возьмите веревку нейтральным хватом (ладони обращены друг к другу) и вытяните руки полностью перед собой. Удерживая спину прямой и напряженным корпус, потяните веревку к телу, сводя лопатки. В конце движения сведите лопатки вместе и задержитесь на небольшую паузу. Медленно ослабьте напряжение и вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"kneeling","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга на задние дельты с колен на блоке с канатом мужской вариант"},{"id":"0176","n":"cable kneeling triceps extension","bp":"upper arms","eq":"cable","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Прикрепите веревочную ручку к высокому блоку и встаньте на колени лицом к канатной машине. Возьмите веревку нейтральным хватом (ладони обращены друг к другу) и поднимите руки по бокам головы. На протяжении всего упражнения держите локти близко к голове, а плечи неподвижно. Разгибайте предплечья, сокращая трицепсы до тех пор, пока руки не выпрямятся полностью. Сделайте паузу на мгновение, затем медленно вернитесь в исходное положение, согнув руки в локтях. Повторите необходимое количество повторений.","pos":"kneeling","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание на трицепс с колен на блоке"},{"id":"2330","n":"cable lat pulldown full range of motion","bp":"back","eq":"cable","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на тренажер для тяги широчайших, расположив колени под подушечками. Возьмитесь за перекладину хватом сверху, на расстоянии чуть шире ширины плеч. Слегка откиньтесь назад и держите грудь вверх, сохраняя небольшой изгиб в пояснице. Потяните штангу вниз к верхней части груди, сжимая лопатки вместе. Сделайте паузу на мгновение в нижней части движения, затем медленно отпустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга верхнего блока в полной амплитуде"},{"id":"0177","n":"cable lateral pulldown (with rope attachment)","bp":"back","eq":"cable","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Прикрепите веревку к канатной машине в высоком положении. Встаньте лицом к тренажеру, поставив ноги на ширине плеч. Возьмите веревку хватом сверху, ладони обращены друг к другу. Держите спину прямо и слегка отклонитесь назад. Потяните веревку вниз в стороны, сжимая лопатки вместе. Сделайте паузу на мгновение в нижней части движения. Медленно ослабьте натяжение и дайте веревке вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга верхнего блока с канатной рукоятью"},{"id":"2616","n":"cable lateral pulldown with v-bar","bp":"back","eq":"cable","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на машину для протягивания троса и возьмитесь за насадку V-образной рукоятки сверху. Отрегулируйте наколенник так, чтобы ваши бедра были надежно закреплены под ним. Держите спину прямо и слегка откиньтесь назад. Потяните V-образную перекладину вниз к верхней части груди, удерживая локти близко к телу. Напрягите мышцы спины в нижней части движения. Медленно верните гриф в исходное положение и повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга верхнего блока с V-образной рукоятью"},{"id":"0178","n":"cable lateral raise","bp":"shoulders","eq":"cable","tg":"delts","mg":"traps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмитесь за рукоятки троса хватом сверху. Держите руки прямыми и напряженным корпусом. Поднимите руки в стороны, пока они не станут параллельны полу. Задержитесь на мгновение в верхней точке, затем медленно опустите руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разведение рук в стороны на блоке"},{"id":"0179","n":"cable low fly","bp":"chest","eq":"cable","tg":"pectorals","mg":"deltoids","img":null,"gif":null,"ru":"Прикрепите ручки к низким шкивам канатной машины и выберите подходящий вес. Встаньте посередине тренажера, поставив ноги на ширине плеч и слегка согнув колени. Возьмитесь за рукоятки хватом сверху и вытяните руки в стороны, сохраняя небольшой изгиб в локтях. Сохраняя контроль, медленно выведите руки вперед и скрестите их перед телом. Задержитесь на мгновение на пике движения, чувствуя растяжение мышц груди. Сделайте обратное движение и медленно верните руки в исходное положение, сохраняя напряжение мышц груди. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разведение рук снизу на блоке"},{"id":"0180","n":"cable low seated row","bp":"back","eq":"cable","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на тренажер, поставьте ноги на подножки и слегка согните колени. Возьмитесь за рукоятки верхним хватом ладонями вниз. Держите спину прямо и слегка наклонитесь вперед, сохраняя небольшой изгиб в локтях. Потяните ручки к телу, сведя лопатки вместе. Задержитесь на мгновение на пике движения, затем медленно отпустите ручки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга нижнего блока сидя"},{"id":"1634","n":"cable lying bicep curl","bp":"upper arms","eq":"cable","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Прикрепите прямую штангу к канатной машине с низким шкивом. Лягте лицом вверх на плоскую скамью, положив ступни на землю. Возьмитесь за перекладину хватом снизу, руки на ширине плеч. Полностью выпрямите руки, держа локти близко к бокам. Удерживая плечи неподвижно, выдохните и поднимите штангу к плечам. Задержитесь на мгновение в верхней точке, напрягая бицепсы. Вдохните и медленно опустите штангу обратно в исходное положение, полностью выпрямляя руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс лёжа на блоке"},{"id":"0182","n":"cable lying close-grip curl","bp":"upper arms","eq":"cable","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Прикрепите прямую штангу к канатной машине с низким шкивом. Лягте лицом вверх на плоскую скамью, положив ступни на землю. Возьмитесь за перекладину хватом снизу, руки на ширине плеч. Полностью выпрямите руки, держа локти близко к бокам. Удерживая плечи неподвижно, поднимите штангу к груди, напрягая бицепсы. Задержитесь на мгновение в верхней точке, напрягая бицепсы. Медленно опустите штангу обратно в исходное положение, полностью выпрямляя руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс узким хватом лёжа на блоке"},{"id":"0184","n":"cable lying extension pullover (with rope attachment)","bp":"back","eq":"cable","tg":"lats","mg":"triceps","img":null,"gif":null,"ru":"Прикрепите веревку к канатной машине и установите шкив в самое верхнее положение. Лягте на скамью головой в сторону канатной машины. Возьмите веревку обеими руками и вытяните руки прямо над грудью. Держа руки прямыми, медленно опустите веревку за голову, сохраняя контроль. Задержитесь на мгновение внизу, затем медленно поднимите веревку обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Пуловер с разгибанием лёжа на блоке с канатной рукоятью"},{"id":"0185","n":"cable lying fly","bp":"chest","eq":"cable","tg":"pectorals","mg":"deltoids","img":null,"gif":null,"ru":"Прикрепите ручки к тросам и лягте на скамью, поставив ноги на землю. Возьмитесь за ручки ладонями друг к другу, а руки вытяните прямо над грудью. Сохраняя небольшой изгиб в локтях, опустите руки в стороны по широкой дуге, пока не почувствуете растяжение в груди. Сделайте паузу на мгновение, затем сожмите мышцы груди, чтобы вернуть руки в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разведение рук лёжа на блоке"},{"id":"0186","n":"cable lying triceps extension v. 2","bp":"upper arms","eq":"cable","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Прикрепите веревочную ручку к канатной машине с низким шкивом. Лягте на ровную скамью лицом вверх, головой в сторону канатной машины. Возьмитесь за ручку веревки обеими руками, ладонями друг к другу, и вытяните руки прямо над грудью. Удерживая плечи неподвижно, медленно опустите рукоятку веревки ко лбу, сгибая локти. Задержитесь на мгновение в нижней точке, затем вытяните руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание на трицепс лёжа на блоке вариант 2"},{"id":"0188","n":"cable middle fly","bp":"chest","eq":"cable","tg":"pectorals","mg":"deltoids","img":null,"gif":null,"ru":"Прикрепите кабели к обеим сторонам канатной машины на уровне груди. Встаньте в центре тренажера, поставив одну ногу немного впереди другой. Возьмитесь за рукоятки верхним хватом и вытяните руки в стороны. Сохраняйте небольшой изгиб в локтях и сохраняйте небольшой наклон вперед. Задействуйте мышцы груди и сделайте размашистое движение руками вперед. Задержитесь на мгновение в центре, затем медленно верните руки в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сведение рук на уровне груди на блоке"},{"id":"0189","n":"cable one arm bent over row","bp":"back","eq":"cable","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Встаньте лицом к канатному тренажеру, поставив ноги на ширине плеч. Слегка согните колени и наклонитесь вперед в бедрах, сохраняя спину прямой. Возьмитесь за рукоятку троса одной рукой, ладонью внутрь, и полностью вытяните руку. Потяните рукоятку троса к себе, держа локоть близко к боку, пока рука не достигнет нижней части груди. Сделайте паузу на мгновение, затем медленно вытяните руку обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга одной рукой в наклоне на блоке"},{"id":"0190","n":"cable one arm curl","bp":"upper arms","eq":"cable","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте лицом к канатному тренажеру, поставив ноги на ширине плеч. Возьмитесь за рукоятку троса снизу ладонью вверх. Держите локоть близко к боку и медленно согните предплечье к плечу. Задержитесь на мгновение в верхней точке, затем медленно опустите предплечье обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс одной рукой на блоке"},{"id":"1262","n":"cable one arm decline chest fly","bp":"chest","eq":"cable","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Прикрепите D-образную рукоятку к тросовой машине с низким шкивом и установите скамью под углом наклона. Лягте на скамью головой в сторону станка и возьмитесь за рукоятку правой рукой. Вытяните руку прямо над грудью, сохраняя небольшой изгиб в локте. Контролируемым движением опустите руку в сторону, пока она не окажется на одной линии с плечом. Сделайте паузу на мгновение, затем выполните обратное движение и верните руку в исходное положение. Повторите необходимое количество повторений, затем переключитесь на левую руку и повторите упражнение.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разведение рук одной рукой на наклонной скамье вниз головой на блоке"},{"id":"1263","n":"cable one arm fly on exercise ball","bp":"chest","eq":"cable","tg":"pectorals","mg":"deltoids","img":null,"gif":null,"ru":"Сядьте на гимнастический мяч, поставив ноги на землю и выпрямив спину. Возьмите рукоятку троса в одну руку и вытяните руку в сторону параллельно земле. Держите локоть слегка согнутым и ладонью вперед. Медленно проведите рукой поперек тела, сжимая мышцы груди. Сделайте небольшую паузу в конце движения, затем медленно вернитесь в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разведение рук одной рукой на фитболе на блоке"},{"id":"1264","n":"cable one arm incline fly on exercise ball","bp":"chest","eq":"cable","tg":"pectorals","mg":"deltoids","img":null,"gif":null,"ru":"Сядьте на мяч для упражнений, поставив ноги на землю, а спиной опираясь на наклонную скамью. Возьмите рукоятку троса в одну руку, вытянув руку ладонью внутрь. Сохраняя небольшой изгиб в локте, медленно опустите руку в сторону, пока кисть не окажется на одной линии с плечом. Сделайте паузу на мгновение, затем сожмите мышцы груди, чтобы вернуть руку в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разведение рук одной рукой на наклонной скамье на фитболе на блоке"},{"id":"1265","n":"cable one arm incline press","bp":"chest","eq":"cable","tg":"pectorals","mg":"deltoids","img":null,"gif":null,"ru":"Отрегулируйте тросовую машину в нижнее положение шкива. Сядьте на наклонную скамью лицом в сторону от канатной машины. Возьмитесь за ручку одной рукой и поднимите ее на высоту плеч. Твердо поставьте ноги на землю и сохраняйте устойчивое положение. Нажмите ручку вперед и вверх, полностью вытянув руку. Задержитесь на мгновение в верхней точке, затем медленно опустите рукоятку обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим одной рукой на наклонной скамье на блоке"},{"id":"1266","n":"cable one arm incline press on exercise ball","bp":"chest","eq":"cable","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на мяч для упражнений, поставив ноги на землю, а спиной опираясь на наклонную скамью. Возьмите рукоятку троса в одну руку и поместите руку под углом 90 градусов, согнув локоть. Нажмите рукоятку троса вперед и вверх, полностью вытянув руку. Задержитесь на мгновение в верхней точке, затем медленно опустите рукоятку троса обратно в исходное положение. Повторите желаемое количество повторений, затем переключитесь на другую руку.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим одной рукой на наклонной скамье на фитболе на блоке"},{"id":"0191","n":"cable one arm lateral bent-over","bp":"chest","eq":"cable","tg":"pectorals","mg":"deltoids","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч, лицом к канатной машине. Возьмитесь за ручку одной рукой и отступите назад, чтобы создать натяжение троса. Наклонитесь вперед в талии, сохраняя спину прямой и напрягая корпус. Вытяните руку в сторону п
