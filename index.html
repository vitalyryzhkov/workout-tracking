one","sp":1,"kn":1,"sh":1,"ru_name":"Глубокое приседание с опорой"},{"id":"0648","n":"power clean","bp":"upper legs","eq":"barbell","tg":"hamstrings","mg":"glutes","img":null,"gif":null,"ru":"Начните с того, что штанга лежит на земле перед собой, ноги на ширине плеч. Наклонитесь и возьмите штангу хватом сверху, на расстоянии чуть шире плеч. Держите спину прямо и грудь вверх, поднимая штангу с земли, вытягивая бедра и колени. Когда штанга достигнет середины бедра, резко потяните ее вверх, пожимая плечами и отводя локти высоко и в стороны. Когда штанга достигнет своей наивысшей точки, быстро опуститесь под нее, развернув локти и удерживая штангу на плечах в положении переднего приседа. Встаньте со штангой, полностью выпрямив бедра и колени. Опустите штангу обратно в исходное положение, сохраняя контроль над весом на протяжении всего движения. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Взятие штанги на грудь в стойку"},{"id":"3665","n":"power point plank","bp":"waist","eq":"body weight","tg":"abs","mg":"shoulders","img":null,"gif":null,"ru":"Начните с позиции высокой планки, положив руки прямо под плечи, а тело образуя прямую линию от головы до пят. Напрягите корпус и сожмите ягодицы, чтобы сохранить устойчивое положение. Опустите тело на предплечья, по одной руке за раз, сохраняя прямую линию от головы до пят. Удерживайте это положение желаемое время, сохраняя при этом мышцы корпуса и ягодиц. Чтобы вернуться в исходное положение, оттолкнитесь предплечьями и поднимите тело обратно в положение высокой планки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Боковая планка с упором"},{"id":"3203","n":"prisoner half sit-up (male)","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Положите руки за голову локтями наружу. Включив пресс, медленно поднимите верхнюю часть тела от земли, наклоняясь вперед, пока туловище не окажется под углом 45 градусов. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Половинный подъём корпуса с руками за головой"},{"id":"1707","n":"prone twist on stability ball","bp":"waist","eq":"stability ball","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Начните с того, что лягте лицом вниз на мяч для стабилизации, поставив ноги на ширине плеч и коснувшись пальцами ног земли. Заведите руки за голову или скрестите их на груди. Задействуйте мышцы корпуса и медленно поднимите верхнюю часть тела с мяча, сохраняя спину прямой. Поверните туловище в сторону, приближая плечо к бедру. Держите бедра и ноги устойчивыми на протяжении всего движения. Сделайте паузу на мгновение, затем вернитесь в исходное положение. Повторите поворот в другую сторону. Продолжайте чередовать стороны желаемое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Скручивание лёжа на животе на фитболе"},{"id":"0651","n":"pull up (neutral grip)","bp":"back","eq":"body weight","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Повисните на перекладине нейтральным хватом (ладони обращены друг к другу) и полностью выпрямите руки. Напрягите корпус и сведите лопатки вместе. Подтяните тело к перекладине, сгибая локти и направляя локти вниз к бедрам. Продолжайте тянуть, пока подбородок не окажется над перекладиной. Задержитесь на мгновение в верхней точке, затем медленно опустите тело обратно в исходное положение, контролируя его. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подтягивания нейтральным хватом"},{"id":"0650","n":"pull-in (on stability ball)","bp":"waist","eq":"stability ball","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Начните с того, что сядьте на мяч для стабилизации, поставив ступни на землю и согнув колени под углом 90 градусов. Положите руки по бокам мяча для устойчивости. Напрягите пресс и медленно поверните бедра вперед, подтягивая колени к груди. Сделайте паузу на мгновение в верхней точке движения, затем медленно вытяните ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подтягивание коленей на фитболе"},{"id":"0652","n":"pull-up","bp":"back","eq":"body weight","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Повисните на перекладине, повернув ладонями от себя и полностью вытянув руки. Напрягите корпус и сведите лопатки вместе. Подтяните тело к перекладине, сгибая локти и приближая грудь к перекладине. Сделайте паузу в верхней точке движения, затем медленно опустите тело обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подтягивания"},{"id":"1689","n":"push and pull bodyweight","bp":"chest","eq":"body weight","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Начните с позиции для отжиманий, расставив руки чуть шире ширины плеч, а тело образуя прямую линию. Опустите грудь к земле, согнув локти, сохраняя тело прямым. Оттолкнитесь ладонями, чтобы вытянуть руки и вернуться в исходное положение. Из положения отжимания подтяните грудь к земле, сгибая локти, сохраняя тело прямым. Оттолкнитесь ладонями, чтобы вытянуть руки и вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Жим и тяга с весом тела"},{"id":"3638","n":"push to run","bp":"cardio","eq":"body weight","tg":"cardiovascular system","mg":"quadriceps","img":null,"gif":null,"ru":"Начните с позиции для отжиманий, поставив руки на ширине плеч, а тело образуя прямую линию. Опустите грудь к земле, согнув локти, сохраняя тело прямым. Оттолкнитесь руками, чтобы вытянуть руки и вернуться в исходное положение. Быстро поднесите одно колено к груди, затем быстро поменяйте местами и подтяните другое колено к груди. Продолжайте чередовать колени так быстро, как только можете, сохраняя при этом хорошую форму. Продолжайте желаемую продолжительность или количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"low","sp":1,"kn":1,"sh":0,"ru_name":"Толчок с выбеганием"},{"id":"1307","n":"push up on bosu ball","bp":"chest","eq":"bosu ball","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Положите босу-шар на землю плоской стороной вверх. Займите позицию для отжимания, положив руки на внешние края мяча босу. Напрягите корпус и опустите тело вниз к мячу босу, ​​сгибая локти. Вернитесь в исходное положение, вытянув руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания на босу"},{"id":"0662","n":"push-up","bp":"chest","eq":"body weight","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Начните с позиции высокой планки, расставив руки чуть шире плеч и поставив ноги вместе. Напрягите корпус и опустите тело к земле, сгибая локти, удерживая тело на прямой линии. Сделайте паузу на мгновение, когда ваша грудь окажется чуть выше земли, затем вернитесь в исходное положение, выпрямляя руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания"},{"id":"0653","n":"push-up (bosu ball)","bp":"chest","eq":"bosu ball","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Положите босу-шар на землю плоской стороной вверх. Займите позицию для отжимания, положив руки на внешние края мяча босу. Напрягите корпус и опустите тело вниз к мячу босу, ​​сгибая локти. Вернитесь в исходное положение, вытянув руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания на босу"},{"id":"0655","n":"push-up (on stability ball)","bp":"chest","eq":"stability ball","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Положите мяч на землю и расположитесь лицом вниз, положив руки на мяч на ширине плеч. Вытяните ноги прямо позади себя, балансируя на носках. Напрягите корпус и опустите грудь к мячу, сгибая локти, удерживая тело на прямой линии. Задержитесь на мгновение в нижней точке, затем вернитесь в исходное положение, выпрямляя руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания на фитболе"},{"id":"0656","n":"push-up (on stability ball)","bp":"chest","eq":"stability ball","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Положите мяч на землю и расположитесь лицом вниз, положив руки на мяч на ширине плеч. Вытяните ноги прямо позади себя, балансируя на носках. Напрягите корпус и опустите грудь к мячу, сгибая локти, удерживая тело на прямой линии. Задержитесь на мгновение в нижней точке, затем вернитесь в исходное положение, выпрямляя руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания на фитболе"},{"id":"0659","n":"push-up (wall)","bp":"chest","eq":"body weight","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Встаньте лицом к стене на расстоянии вытянутой руки. Положите руки на стену на уровне плеч, чуть шире ширины плеч. Отступите на несколько футов назад, держа тело прямо, а ноги на ширине плеч. Согните руки в локтях и опустите грудь к стене, сохраняя тело прямой. Вернитесь в исходное положение, выпрямляя руки. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания от стены"},{"id":"0658","n":"push-up (wall) v. 2","bp":"chest","eq":"body weight","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Встаньте лицом к стене на расстоянии вытянутой руки. Положите руки на стену на уровне плеч, чуть шире ширины плеч. Отступите ногами назад, держа их на ширине плеч. Напрягите корпус и держите тело на прямой линии от головы до пяток. Согните локти и опустите грудь к стене, сохраняя тело прямым. Сделайте паузу на мгновение, затем вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания от стены вариант 2"},{"id":"0660","n":"push-up close-grip off dumbbell","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Начните с позиции отжимания, поместив руки близко друг к другу, прямо под плечами. Возьмите в каждую руку по гантели, положив их на пол. Опустите тело к земле, согнув локти и держа их близко к бокам. Оттолкнитесь ладонями, чтобы вытянуть руки и вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания узким хватом на гантелях"},{"id":"0661","n":"push-up inside leg kick","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Начните с позиции для отжиманий, поставив руки чуть шире плеч, а ноги вместе. Опустите тело к земле, согнув локти, сохраняя спину прямой и напрягая корпус. Отталкиваясь назад, поднимите одну ногу от земли и отведите ее в сторону, сохраняя ее прямой. Опустите ногу обратно и повторите отжимание, затем переключитесь на другую ногу. Продолжайте попеременные удары ногами при каждом повторении отжимания.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания с махом ногой внутрь"},{"id":"0663","n":"push-up medicine ball","bp":"chest","eq":"medicine ball","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Начните с позиции высокой планки, положив руки на медицинский мяч на ширине плеч. Напрягите корпус и опустите тело к земле, сгибая локти, сохраняя спину прямой. Оттолкнитесь ладонями, чтобы вытянуть руки и вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания на медболе"},{"id":"1467","n":"push-up on lower arms","bp":"upper arms","eq":"body weight","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Начните с положения планки, положив предплечья на землю и локти прямо под плечами. Напрягите корпус и держите тело на прямой линии от головы до пят. Опустите грудь к земле, согнув локти и удерживая их близко к телу. Задержитесь на мгновение в нижней точке, затем вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отжимания на предплечьях"},{"id":"3145","n":"push-up plus","bp":"chest","eq":"body weight","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Начните с положения высокой планки, расставив руки чуть шире плеч, а тело образуя прямую линию от головы до пяток. Опустите тело к земле, согнув локти и держа их близко к бокам. Как только ваша грудь окажется чуть выше земли, протолкните руки, чтобы вытянуть руки и поднять верхнюю часть тела вверх. В верхней точке движения вытяните лопатки, подталкивая верхнюю часть спины к потолку. Сделайте паузу на мгновение, затем поменяйте направление движения, сводя лопатки и опуская тело обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания плюс"},{"id":"0664","n":"push-up to side plank","bp":"waist","eq":"body weight","tg":"abs","mg":"shoulders","img":null,"gif":null,"ru":"Начните с позиции для отжиманий, поставив руки на ширине плеч, а тело образуя прямую линию. Опустите тело к земле, сгибая локти, сохраняя при этом корпус напряженным. Вернитесь в исходное положение. Перенесите вес тела на левую руку и поверните тело вправо, подняв правую руку к потолку. Удерживайте положение боковой планки несколько секунд, затем вернитесь в исходное положение. Повторите отжимание и боковую планку на противоположной стороне. Продолжайте чередовать стороны желаемое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания с переходом в боковую планку"},{"id":"3533","n":"quads","bp":"upper legs","eq":"body weight","tg":"quads","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч. Опустите тело, согнув колени и отведя бедра назад, как будто вы сидите на стуле. Держите грудь поднятой, а спину прямой. Опускайтесь до тех пор, пока бедра не станут параллельны земле. Оттолкнитесь пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Квадрицепсы"},{"id":"3201","n":"quarter sit-up","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Положите руки за голову локтями наружу. Включив пресс, медленно поднимите верхнюю часть тела от земли, наклоняясь вперед, пока туловище не окажется под углом 45 градусов. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Четвертной подъём корпуса"},{"id":"3552","n":"quick feet v. 2","bp":"upper legs","eq":"body weight","tg":"quads","mg":"calves","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, руки по бокам. Начните с быстрого перемещения ногами вверх и вниз, как будто вы бежите на месте. Делайте движения быстрыми и легкими, стараясь оставаться на подушечках стоп. Продолжайте желаемую продолжительность или количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"low","sp":1,"kn":1,"sh":1,"ru_name":"Быстрые ноги вариант 2"},{"id":"0666","n":"raise single arm push-up","bp":"chest","eq":"body weight","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Начните с позиции для отжиманий, поставив руки чуть шире плеч, а ноги вместе. Вытяните одну руку прямо в сторону, параллельно земле. Опустите тело к земле, согнув локти, сохраняя спину прямой и напряженным корпусом. Вернитесь в исходное положение, используя мышцы груди, чтобы поднять тело. Повторите, вытянув другую руку.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания с подъёмом одной руки"},{"id":"0668","n":"rear decline bridge","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Лягте на спину, поставьте ступни на землю и согните колени. Положите руки по бокам ладонями вниз. Задействуйте ягодицы и мышцы задней поверхности бедра и поднимите бедра от земли, пока ваше тело не образует прямую линию от колен до плеч. Удерживайте это положение несколько секунд, затем медленно опустите бедра обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратный наклонный мостик"},{"id":"0669","n":"rear deltoid stretch","bp":"shoulders","eq":"body weight","tg":"delts","mg":"trapezius","img":null,"gif":null,"ru":"Встаньте прямо, ноги на ширине плеч. Вытяните правую руку через грудь, положив левую руку на правый локоть. Аккуратно потяните правую руку к левому плечу, чувствуя растяжение в правом плече. Удерживайте растяжку 15–30 секунд, затем расслабьтесь. Повторите с другой стороны.","pos":"standing","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка задней дельты"},{"id":"0670","n":"rear pull-up","bp":"back","eq":"body weight","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Возьмитесь за перекладину хватом сверху, на расстоянии чуть шире плеч. Повисните на перекладине, полностью вытянув руки и выпрямив тело. Напрягите мышцы спины и подтяните тело к перекладине, держа локти близко к телу. Продолжайте тянуть, пока подбородок не окажется над перекладиной. Задержитесь на мгновение в верхней точке, затем медленно опустите тело обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подтягивания за голову"},{"id":"1582","n":"reclining big toe pose with rope","bp":"upper legs","eq":"rope","tg":"hamstrings","mg":"calves","img":null,"gif":null,"ru":"Лягте на спину, вытянув ноги и положив руки по бокам. Оберните веревку вокруг подушечки правой ноги и держите концы веревки руками. Медленно поднимите правую ногу к груди, сохраняя колено прямым, а ступню согнутой. Удерживайте растяжку несколько секунд, затем медленно опустите ногу обратно в исходное положение. Повторите с левой ногой. Продолжайте чередовать ноги желаемое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Поза захвата большого пальца ноги лёжа с ремнём"},{"id":"3236","n":"resistance band hip thrusts on knees (female)","bp":"upper legs","eq":"resistance band","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Начните с того, что встаньте на колени на землю, расставив колени на ширине плеч и согнув ступни. Оберните ленту сопротивления вокруг бедер, чуть выше колен. Положите руки на бедра или вытяните их перед собой для равновесия. Задействуйте ягодицы и мышцы корпуса. Выдвиньте бедра вперед и сожмите ягодицы, отрывая колени от земли, вытягивая бедра до тех пор, пока бедра не станут параллельны земле. Задержитесь в этом положении на мгновение, затем медленно опустите колени обратно в исходное положение. Повторите необходимое количество повторений.","pos":"kneeling","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём таза с резиной с колен"},{"id":"3007","n":"resistance band leg extension","bp":"upper legs","eq":"resistance band","tg":"quads","mg":"hamstrings","img":null,"gif":null,"ru":"Прикрепите эспандер к прочной точке крепления и закрепите его вокруг лодыжки. Встаньте лицом к точке крепления, поставив ноги на ширине плеч. Сохраняя корпус напряженным, а верхнюю часть тела стабильной, вытяните ногу прямо перед собой. Задержитесь на мгновение в верхней точке, затем медленно верните ногу в исходное положение. Повторите необходимое количество повторений, затем поменяйте ногу.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание ног с резиной"},{"id":"3123","n":"resistance band seated biceps curl","bp":"upper arms","eq":"resistance band","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на стул или скамью, выпрямив спину и поставив ступни на землю. Держите эспандер обратным хватом ладонями вверх и вытянутыми вниз руками по бокам. Удерживая плечи неподвижно, выдохните и согните ленту сопротивления к плечам. Задержитесь на мгновение в верхней точке, напрягая бицепсы. Вдохните и медленно опустите ленту сопротивления обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс с резиной сидя"},{"id":"3124","n":"resistance band seated chest press","bp":"chest","eq":"resistance band","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на стул или скамью, выпрямив спину и поставив ступни на землю. Возьмите ручки эспандеров в каждую руку ладонями вниз и согнутыми в локтях под углом 90 градусов. Вытяните руки вперед, отталкивая ленту сопротивления от груди. Сделайте небольшую паузу в конце движения, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим от груди с резиной сидя"},{"id":"3006","n":"resistance band seated hip abduction","bp":"upper legs","eq":"resistance band","tg":"abductors","mg":"glutes","img":null,"gif":null,"ru":"Сядьте на стул или скамью, выпрямив спину и поставив ступни на землю. Оберните ленту сопротивления вокруг бедер, чуть выше колен. Положите руки по бокам стула или скамьи для поддержки. Задействуйте отводящие мышцы (внешние мышцы бедра) и медленно разведите колени в стороны, преодолевая сопротивление ленты. Сделайте паузу на мгновение в конце движения, затем медленно сведите колени вместе. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отведение бедра с резиной сидя"},{"id":"3122","n":"resistance band seated shoulder press","bp":"shoulders","eq":"resistance band","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Сядьте на стул или скамью, выпрямив спину и поставив ступни на землю. Возьмите эспандер обеими руками ладонями вперед и поднимите его до уровня плеч. Нажмите на ленту над головой, полностью вытянув руки. Задержитесь на мгновение в верхней точке, затем медленно опустите ленту обратно до уровня плеч. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Жим над головой с резиной сидя"},{"id":"3144","n":"resistance band seated straight back row","bp":"back","eq":"resistance band","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на пол, вытянув ноги, и оберните ленту сопротивления вокруг ступней. Возьмите концы эспандера руками, ладонями друг к другу. Держите спину прямо и слегка откиньтесь назад, задействуя корпус. Потяните ленту сопротивления к груди, сжимая лопатки вместе. Задержитесь на мгновение в верхней точке, затем медленно ослабьте напряжение и вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга с резиной сидя с прямой спиной"},{"id":"0872","n":"reverse crunch","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, вытянув руки по бокам. Согните ноги в коленях и оторвите ступни от земли, приведя бедра перпендикулярно полу. Напрягите пресс и оторвите бедра от пола, подтягивая колени к груди. Задержитесь на мгновение в верхней точке, затем медленно опустите бедра обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратные скручивания"},{"id":"0672","n":"reverse dip","bp":"upper arms","eq":"body weight","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Встаньте между двумя параллельными брусьями, полностью выпрямив руки и выпрямив тело. Опустите тело, сгибая локти, пока плечи не станут параллельны земле. Сделайте паузу на мгновение, затем вернитесь в исходное положение, выпрямляя руки. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Обратные отжимания на брусьях"},{"id":"0673","n":"reverse grip machine lat pulldown","bp":"back","eq":"leverage machine","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь на машине так, чтобы колени находились под подушками, а ступни стояли на земле. Возьмитесь за ручки хватом снизу, на расстоянии чуть шире ширины плеч. Сядьте прямо, вытянув грудь и отведя плечи назад, сохраняя небольшой изгиб в пояснице. Потяните ручки вниз к груди, сжимая лопатки вместе. Сделайте паузу на мгновение в нижней части движения, затем медленно отпустите ручки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга верхнего блока обратным хватом в тренажёре"},{"id":"0674","n":"reverse grip pull-up","bp":"back","eq":"body weight","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Возьмитесь за перекладину хватом снизу, руки на ширине плеч. Повисните на перекладине, полностью вытянув руки и выпрямив тело. Задействуйте мышцы спины и подтяните тело к перекладине, ведя грудью. Продолжайте тянуть, пока подбородок не окажется над перекладиной. Задержитесь на мгновение в верхней точке, затем медленно опустите тело обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подтягивания обратным хватом"},{"id":"0675","n":"reverse hyper extension (on stability ball)","bp":"upper legs","eq":"stability ball","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Лягте лицом вниз на мяч для стабилизации, положив бедра на мяч и вытянув ноги прямо позади себя. Положите руки на землю перед собой для устойчивости. Задействуя ягодицы и мышцы задней поверхности бедра, поднимите ноги к потолку как можно выше. Задержитесь на мгновение в верхней точке, затем медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратная гиперэкстензия на фитболе"},{"id":"1423","n":"reverse hyper on flat bench","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Лягте лицом вниз на плоскую скамью, прижав бедра к краю и свесив ноги со скамьи. Держитесь за скамью для устойчивости. Держа ноги прямыми, поднимите их к потолку как можно выше. Напрягите ягодицы в верхней точке движения. Медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратная гиперэкстензия на горизонтальной скамье"},{"id":"3663","n":"reverse plank with leg lift","bp":"waist","eq":"body weight","tg":"abs","mg":"glutes","img":null,"gif":null,"ru":"Сядьте на землю, вытянув ноги перед собой, а руки положите на землю позади себя, пальцы направлены к ногам. Нажмите руками и поднимите бедра от земли, приняв положение обратной планки. Напрягите корпус и поднимите одну ногу от земли, вытягивая ее прямо к потолку. Задержитесь на мгновение, затем опустите ногу обратно вниз. Повторите с другой ногой. Продолжайте чередовать ноги желаемое количество повторений.","pos":"seated","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратная планка с подъёмом ноги"},{"id":"0677","n":"ring dips","bp":"upper arms","eq":"body weight","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Начните с висения на кольцах, полностью вытянув руки и выпрямив тело. Опускайте корпус, сгибая локти, пока плечи не окажутся ниже локтей. Вернитесь в исходное положение, выпрямляя руки. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания на кольцах"},{"id":"2571","n":"rocking frog stretch","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Начните с того, что встаньте на колени на землю, расставив колени на ширине плеч. Положите руки на землю перед собой для поддержки. Медленно наклонитесь вперед, перенеся вес тела на руки и вытянув ноги позади себя. Держите спину прямо и задействуйте ягодицы, толкая бедра назад и вверх к потолку. Удерживайте это положение несколько секунд, чувствуя растяжение ягодиц. Медленно вернитесь в исходное положение, согнув колени и опустив бедра обратно вниз. Повторите необходимое количество повторений.","pos":"kneeling","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка лягушки с покачиванием"},{"id":"0678","n":"rocky pull-up pulldown","bp":"back","eq":"body weight","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Встаньте перед перекладиной, ноги на ширине плеч. Потянитесь вверх и возьмите перекладину хватом сверху, на расстоянии чуть шире ширины плеч. Повисните на перекладине, полностью вытянув руки и выпрямив тело. Задействуйте мышцы спины и подтяните тело к перекладине, ведя грудью. Задержитесь на мгновение в верхней точке, затем медленно опустите тело обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Тяга-подтягивание Рокки"},{"id":"2208","n":"roller back stretch","bp":"back","eq":"roller","tg":"spine","mg":"hamstrings","img":null,"gif":null,"ru":"Начните с того, что сядьте на землю, вытянув ноги перед собой. Поместите валик перпендикулярно телу, чуть ниже ягодиц. Медленно перекатите тело назад, позволяя ролику двигаться вверх по спине. Продолжайте кататься, пока ролик не достигнет верхней части спины. Сделайте паузу на мгновение, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка спины на ролле"},{"id":"2204","n":"roller body saw","bp":"waist","eq":"roller","tg":"abs","mg":"shoulders","img":null,"gif":null,"ru":"Начните с положения планки, положив предплечья на валик, а тело образуя прямую линию. Включите корпус и медленно катите ролик вперед, вытягивая тело как можно дальше, сохраняя при этом контроль. Сделайте паузу на мгновение в самой дальней точке, затем медленно катите ролик обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Пила на ролле"},{"id":"2205","n":"roller hip lat stretch","bp":"upper legs","eq":"roller","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Начните с того, что встанете на колени на землю, расположив валик под бедрами. Положите руки на валик для поддержки. Медленно катите ролик вперед, вытягивая бедра и растягивая ягодицы. Удерживайте растяжку несколько секунд, затем вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"kneeling","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка бедра и широчайших на ролле"},{"id":"2202","n":"roller hip stretch","bp":"upper legs","eq":"roller","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Начните с того, что сядьте на землю, вытянув ноги перед собой. Поместите валик под ягодицы, чуть выше колен. Откиньтесь назад и положите руки на пол позади себя для поддержки. Напрягите ягодицы и медленно катите ролик вперед, сгибая колени и приближая их к груди. Сделайте паузу в конце движения, почувствовав растяжение ягодиц. Медленно перекатите ролик обратно в исходное положение, вытягивая ноги. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка бедра на ролле"},{"id":"2206","n":"roller reverse crunch","bp":"waist","eq":"roller","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, вытяните руки прямо над головой и вытяните ноги прямо перед собой. Поместите валик между стопами и возьмитесь за него пальцами ног. Включив пресс, поднимите ноги от земли и подтяните колени к груди, перекатывая валик по направлению к телу. Задержитесь на мгновение в верхней точке, затем медленно опустите ноги обратно в исходное положение, откатывая валик от тела. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратные скручивания на ролле"},{"id":"2203","n":"roller seated shoulder flexor depresor retractor","bp":"chest","eq":"roller","tg":"pectorals","mg":"deltoids","img":null,"gif":null,"ru":"Сядьте на ровную поверхность, вытянув ноги перед собой. Возьмите валик обеими руками ладонями вниз и положите его на бедра. Слегка наклонитесь вперед и откатите валик от тела, вытянув руки прямо перед собой. Сделайте паузу на мгновение, затем медленно перекатите валик обратно к телу, сгибая руки и возвращая валик обратно к бедрам. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сведение и опускание лопаток сидя на ролле"},{"id":"2209","n":"roller seated single leg shoulder flexor depresor retractor","bp":"chest","eq":"roller","tg":"pectorals","mg":"deltoids","img":null,"gif":null,"ru":"Сядьте на ровную поверхность, вытянув ноги перед собой. Возьмите валик обеими руками ладонями вниз и положите его на бедра. Слегка откиньтесь назад и задействуйте мышцы корпуса. Поднимите валик до уровня плеч, держа руки прямыми. Медленно опустите валик обратно на бедра. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сведение и опускание лопаток сидя на одной ноге на ролле"},{"id":"2207","n":"roller side lat stretch","bp":"back","eq":"roller","tg":"lats","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите валик обеими руками перед собой. Слегка согните колени и наклонитесь вперед в бедрах, сохраняя спину прямой. Вытяните руки вперед и катите валик к ногам, чувствуя растяжение широчайших мышц. Удерживайте растяжку несколько секунд, затем медленно перекатите ролик обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Боковая растяжка широчайших на ролле"},{"id":"0680","n":"rope climb","bp":"back","eq":"rope","tg":"upper back","mg":"forearms","img":null,"gif":null,"ru":"Встаньте лицом к веревке, поставив ноги на ширине плеч. Возьмите веревку обеими руками, ладонями к себе. Слегка согните колени и задействуйте корпус. Начните подтягиваться вверх по веревке, попеременно двигая руками. Используйте ноги, чтобы помочь в движении вверх. Продолжайте подниматься, пока не достигнете желаемой высоты или вершины веревки. Чтобы опуститься, поменяйте направление движения руками, контролируя при этом спуск. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Лазание по канату"},{"id":"0685","n":"run","bp":"cardio","eq":"body weight","tg":"cardiovascular system","mg":"quadriceps","img":null,"gif":null,"ru":"Начните с того, что встаньте прямо, ноги на ширине плеч. Задействуйте корпус и держите верхнюю часть тела расслабленной. Начните бег на месте, подтягивая колени к груди и мягко приземляясь на подушечки стоп. Поддерживайте устойчивый темп и продолжайте бег трусцой желаемую продолжительность или расстояние. Не забывайте глубоко дышать и сохранять правильную осанку на протяжении всего упражнения.","pos":"standing","ax":"low","iap":"low","imp":"high","sp":1,"kn":0,"sh":1,"ru_name":"Бег"},{"id":"0684","n":"run (equipment)","bp":"cardio","eq":"body weight","tg":"cardiovascular system","mg":"quadriceps","img":null,"gif":null,"ru":"Начните с того, что встаньте прямо, ноги на ширине плеч. Задействуйте корпус и держите верхнюю часть тела расслабленной. Начните бег на месте, подтягивая колени к груди и мягко приземляясь на подушечки стоп. Поддерживайте устойчивый темп и продолжайте бег трусцой желаемую продолжительность или расстояние. Не забывайте глубоко дышать и сохранять правильную осанку на протяжении всего упражнения.","pos":"standing","ax":"low","iap":"low","imp":"high","sp":1,"kn":0,"sh":1,"ru_name":"Бег на тренажёре"},{"id":"1585","n":"runners stretch","bp":"upper legs","eq":"body weight","tg":"hamstrings","mg":"calves","img":null,"gif":null,"ru":"Встаньте, расставив ноги на ширине плеч. Сделайте шаг вперед правой ногой, удерживая левую ногу на месте. Согните правое колено и опустите корпус вниз, сохраняя левую ногу прямой. Положите руки на правое бедро для поддержки. Удерживайте растяжку 20–30 секунд, затем поменяйте сторону и повторите.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка бегуна"},{"id":"0687","n":"russian twist","bp":"waist","eq":"body weight","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Сядьте на пол, согните колени и поставьте ступни на пол. Слегка откиньтесь назад, сохраняя спину прямой и напряженный корпус. При желании держите руки вместе перед грудью или держите гирю. Поднимите ноги от земли, балансируя на седалищных костях. Поверните туловище вправо, перемещая руки или вес тела к правой стороне тела. Сделайте паузу на мгновение, затем поверните туловище влево, перемещая руки или вес тела к левой стороне тела. Продолжайте чередовать стороны желаемое количество повторений.","pos":"seated","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Русский твист"},{"id":"3012","n":"scapula dips","bp":"back","eq":"body weight","tg":"traps","mg":"rhomboids","img":null,"gif":null,"ru":"Начните с того, что встаньте, поставив ноги на ширине плеч и вытянув руки перед собой. Слегка согните колени и наклонитесь вперед в бедрах, сохраняя спину прямой. Опустите корпус, сгибая локти и сводя лопатки, как будто пытаетесь зажать между ними карандаш. Задержитесь на мгновение в нижней точке, затем подтолкните руки, чтобы разогнуть локти и вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отжимания на брусьях лопатками"},{"id":"3021","n":"scapula push-up","bp":"chest","eq":"body weight","tg":"serratus anterior","mg":"triceps","img":null,"gif":null,"ru":"Начните с позиции высокой планки, положив руки прямо под плечи, а тело образуя прямую линию. Опустите грудь к земле, держа локти близко к телу. Опускаясь, сведите лопатки вместе и выдвиньте грудь вперед. Задержитесь на мгновение в нижней точке, затем вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отжимания лопатками"},{"id":"0688","n":"scapular pull-up","bp":"back","eq":"body weight","tg":"traps","mg":"biceps","img":null,"gif":null,"ru":"Начните с подвешивания на перекладине, повернув ладони от себя и полностью вытянув руки. Втяните лопатки, потянув их вниз и назад. Напрягите мышцы спины и подтяните тело к перекладине, стараясь свести лопатки вместе. Сделайте паузу на мгновение в верхней точке движения, затем медленно опустите тело обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подтягивания лопатками"},{"id":"3219","n":"scissor jumps (male)","bp":"cardio","eq":"body weight","tg":"cardiovascular system","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч. Спрыгните с земли и одновременно скрестите правую ногу перед левой ногой. При приземлении быстро поменяйте ноги, скрещивая левую ногу перед правой ногой. Продолжайте чередовать ноги и прыгать как можно быстрее. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"high","sp":1,"kn":0,"sh":1,"ru_name":"Прыжки ножницы"},{"id":"1390","n":"seated calf stretch (male)","bp":"lower legs","eq":"body weight","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Сядьте на край стула или скамьи, поставив ноги на землю. Вытяните одну ногу прямо перед собой, удерживая пятку на земле. Слегка наклонитесь вперед, чувствуя растяжение икроножных мышц. Удерживайте растяжку 20–30 секунд. Поменяйте ноги и повторите растяжку.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка икры сидя"},{"id":"1424","n":"seated glute stretch","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Сядьте на пол, вытянув ноги перед собой. Согните правое колено и перекиньте правую лодыжку через левое бедро. Положите правую руку на землю позади себя для поддержки. Левой рукой осторожно надавите на правое колено, чтобы углубить растяжку. Удерживайте растяжку от 30 секунд до 1 минуты. Поменяйте стороны и повторите.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка ягодиц сидя"},{"id":"0689","n":"seated leg raise","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Сядьте на ровную скамью, выпрямив спину и поставив ноги на землю. Положите руки по бокам скамьи для поддержки. Держа ноги прямыми, медленно поднимите их перед собой, пока они не станут параллельны земле. Задержитесь на мгновение в верхней точке, затем медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём ног сидя"},{"id":"0690","n":"seated lower back stretch","bp":"back","eq":"body weight","tg":"lats","mg":"glutes","img":null,"gif":null,"ru":"Сядьте на край стула, поставив ноги на землю. Положите руки на бедра или по бокам стула для поддержки. Медленно наклонитесь вперед от бедер, сохраняя спину прямой. Почувствуйте растяжение в пояснице и задержитесь на 20–30 секунд. Медленно вернитесь в исходное положение и повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка поясницы сидя"},{"id":"2567","n":"seated piriformis stretch","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Сядьте на пол, вытянув ноги перед собой. Согните правое колено и поставьте правую стопу снаружи левого колена. Положите левый локоть на внешнюю сторону правого колена и осторожно поверните туловище вправо. Удерживайте растяжку 20–30 секунд, затем поменяйте сторону и повторите.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка грушевидной мышцы сидя"},{"id":"0691","n":"seated side crunch (wall)","bp":"waist","eq":"body weight","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Сядьте на пол, прислонившись спиной к стене и вытянув ноги перед собой. Согните колени и поставьте ступни на пол, на ширине плеч. Положите руки за голову локтями наружу. Напрягите пресс и наклонитесь в сторону, поднеся локоть к бедру. Сделайте паузу на мгновение, затем вернитесь в исходное положение. Повторите с другой стороны. Продолжайте чередовать стороны желаемое количество повторений.","pos":"seated","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Боковые скручивания сидя у стены"},{"id":"1587","n":"seated wide angle pose sequence","bp":"upper legs","eq":"body weight","tg":"hamstrings","mg":"quadriceps","img":null,"gif":null,"ru":"Сядьте на пол, вытянув ноги под широким углом. Согните ноги и задействуйте квадрицепсы. Положите руки на землю позади себя для поддержки. Сохраняя спину прямой, наклонитесь вперед от бедер. Продолжайте наклоняться вперед, пока не почувствуете растяжение подколенных сухожилий. Задержитесь в этом положении на несколько вдохов. Медленно ослабьте растяжку и вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Серия поз с широким разведением ног сидя"},{"id":"0697","n":"self assisted inverse leg curl","bp":"upper legs","eq":"body weight","tg":"hamstrings","mg":"glutes","img":null,"gif":null,"ru":"Лягте на спину на коврик или скамью, вытянув ноги. Положите руки по бокам или под ягодицы для поддержки. Согните колени и оторвите ступни от земли, подтягивая бедра к груди. Задержитесь на мгновение в верхней точке, затем медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание ног с самостоятельной помощью"},{"id":"1766","n":"self assisted inverse leg curl","bp":"upper legs","eq":"body weight","tg":"hamstrings","mg":"glutes","img":null,"gif":null,"ru":"Лягте лицом вниз на тренажер для сгибания ног, вытянув ноги и зацепив лодыжки под мягким рычагом. Положите руки на боковые ручки машины для поддержки. Удерживая верхнюю часть тела неподвижно, выдохните и поднимите ноги вверх, насколько это возможно. Задержитесь в сокращенном положении на короткую паузу, сжимая мышцы задней поверхности бедра. Медленно опустите ноги обратно в исходное положение на вдохе. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Сгибание ног с самостоятельной помощью"},{"id":"0696","n":"self assisted inverse leg curl (on floor)","bp":"upper legs","eq":"body weight","tg":"hamstrings","mg":"glutes","img":null,"gif":null,"ru":"Лягте на спину, вытянув ноги и положив руки по бокам. Согните колени и поставьте ступни на землю, на ширине плеч. Поднимите бедра от земли, задействуя ягодицы и мышцы задней поверхности бедра. Медленно согните ноги к ягодицам, держа бедра приподнятыми. Задержитесь на мгновение в верхней точке, затем медленно вытяните ноги обратно в исходное положение. Опустите бедра обратно на землю. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание ног с самостоятельной помощью на полу"},{"id":"3222","n":"semi squat jump (male)","bp":"cardio","eq":"body weight","tg":"cardiovascular system","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч. Согните колени и опустите тело в присед. Прыгайте взрывно, разгибая бедра и колени, одновременно размахивая руками для создания импульса. Мягко приземлитесь на подушечки стоп и сразу же переходите к следующему повторению. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"high","sp":0,"kn":0,"sh":1,"ru_name":"Прыжок из полуприседа"},{"id":"3656","n":"short stride run","bp":"cardio","eq":"body weight","tg":"cardiovascular system","mg":"quadriceps","img":null,"gif":null,"ru":"Найдите открытое пространство или беговую дорожку для выполнения упражнения. Встаньте прямо, ноги на ширине плеч. Начните бег на месте, высоко поднимая колени и качая руками. Через несколько секунд начните делать короткие шаги вперед, сохраняя быстрый темп. Продолжайте бежать короткими шагами желаемую продолжительность или расстояние.","pos":"standing","ax":"low","iap":"low","imp":"low","sp":1,"kn":1,"sh":1,"ru_name":"Бег коротким шагом"},{"id":"1763","n":"shoulder grip pull-up","bp":"back","eq":"body weight","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Возьмитесь за перекладину хватом на ширине плеч, ладонями от себя. Свободно висите, полностью вытянув руки. Напрягите мышцы спины и подтяните тело к перекладине, пока подбородок не окажется над перекладиной. Задержитесь на мгновение в верхней точке, затем медленно опустите тело обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подтягивания узким хватом"},{"id":"3699","n":"shoulder tap","bp":"waist","eq":"body weight","tg":"abs","mg":"shoulders","img":null,"gif":null,"ru":"Начните с позиции высокой планки, положив руки прямо под плечи, а тело образуя прямую линию. Напрягите корпус и поднимите правую руку от земли, протягивая руку и коснувшись левого плеча. Положите правую руку обратно на землю и повторите то же самое, постукивая левой рукой по правому плечу. Продолжайте поочередно постукивать плечами, сохраняя при этом бедра и туловище устойчивыми. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Касание плеча"},{"id":"0699","n":"shoulder tap push-up","bp":"chest","eq":"body weight","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Начните с положения высокой планки, расставив руки чуть шире плеч, а тело образуя прямую линию от головы до пяток. Опустите тело к земле, согнув локти и держа их близко к бокам. Отталкиваясь назад, поднимите правую руку от земли и коснитесь левого плеча. Верните правую руку на землю и повторите отжимание, на этот раз подняв левую руку и коснувшись правого плеча. Продолжайте поочередно постукивать по плечам при каждом повторении отжиманий. Поддерживайте стабильное положение корпуса и избегайте чрезмерного вращения бедрами на протяжении всего упражнения. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания с касанием плеча"},{"id":"1774","n":"side bridge hip abduction","bp":"upper legs","eq":"body weight","tg":"abductors","mg":"glutes","img":null,"gif":null,"ru":"Лягте на бок, вытянув ноги и положив их друг на друга. Обопритесь на предплечье, держа локоть прямо под плечом. Напрягите корпус и поднимите бедра от земли, создавая прямую линию от головы до ступней. Удерживая корпус в напряжении, поднимите верхнюю ногу как можно выше, не вращая бедрами. Задержитесь на мгновение в верхней точке, затем опустите ногу обратно вниз. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отведение бедра в боковой планке"},{"id":"0705","n":"side bridge v. 2","bp":"waist","eq":"body weight","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Лягте на бок, вытянув ноги и положив их друг на друга. Положите предплечье на землю прямо под плечом, согнув локоть под углом 90 градусов. Напрягите корпус и поднимите бедра от земли, создавая прямую линию от головы до ступней. Удерживайте это положение желаемое время. Опустите бедра обратно в исходное положение. Повторите с другой стороны.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Боковая планка вариант 2"},{"id":"0709","n":"side hip (on parallel bars)","bp":"waist","eq":"body weight","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Встаньте между двумя параллельными брусьями, поставив ноги на ширине плеч. Положите руки на перекладины и поднимите тело от земли, удерживая вес на руках. Напрягите пресс и медленно поднимите ноги в стороны, сохраняя их прямыми. Задержитесь на мгновение в верхней точке, затем медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подъём бедра на брусьях"},{"id":"0710","n":"side hip abduction","bp":"upper legs","eq":"body weight","tg":"abductors","mg":"glutes","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, руки на бедрах. Перенесите вес тела на одну ногу и поднимите противоположную ногу в сторону, сохраняя ее прямой. Задержитесь на мгновение в верхней точке, затем медленно опустите ногу обратно в исходное положение. Повторите с другой стороны. Продолжайте чередовать стороны желаемое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отведение бедра в сторону"},{"id":"1358","n":"side lying floor stretch","bp":"back","eq":"body weight","tg":"lats","mg":"obliques","img":null,"gif":null,"ru":"Лягте на бок, выпрямив ноги и вытянув нижнюю руку над головой. Согните верхнее колено и поставьте ступню на землю перед нижней ногой. Вытяните верхнюю руку над головой и ухватитесь за что-нибудь устойчивое, например, за стену или предмет мебели. Медленно поднимите нижнюю ногу от земли, удерживая ее прямой, пока не почувствуете растяжение в боку. Удерживайте растяжку 20–30 секунд, затем медленно опустите ногу обратно вниз. Повторите с другой стороны.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка лёжа на боку на полу"},{"id":"3667","n":"side lying hip adduction (male)","bp":"upper legs","eq":"body weight","tg":"adductors","mg":"glutes","img":null,"gif":null,"ru":"Лягте на бок, выпрямив ноги и положив их друг на друга. Поместите нижнюю руку под голову для поддержки. Включите приводящие мышцы и поднимите верхнюю ногу как можно выше, не вращая бедрами и не отклоняясь назад. Задержитесь на мгновение в верхней точке, затем медленно опустите ногу обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Приведение бедра лёжа на боку"},{"id":"1775","n":"side plank hip adduction","bp":"upper legs","eq":"body weight","tg":"adductors","mg":"obliques","img":null,"gif":null,"ru":"Начните с того, что лягте на бок, вытянув ноги и положив их друг на друга. Обопритесь на предплечье, держа локоть прямо под плечом. Напрягите корпус и поднимите бедра от земли, создавая прямую линию от головы до ступней. Сохраняя положение боковой планки, поднимите верхнюю ногу к потолку, сохраняя ее прямой. Медленно опустите ногу обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Приведение бедра в боковой планке"},{"id":"0716","n":"side push neck stretch","bp":"neck","eq":"body weight","tg":"levator scapulae","mg":"trapezius","img":null,"gif":null,"ru":"Встаньте или сядьте прямо, расслабив плечи. Наклоните голову вправо, приближая правое ухо к правому плечу. Положите правую руку на левую сторону головы и осторожно надавите, чтобы усилить растяжение. Удерживайте растяжку 15–30 секунд. Повторите то же самое с другой стороны, наклонив голову влево и надавив левой рукой. Повторите растяжку 2–3 раза с каждой стороны.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка шеи с надавливанием в сторону"},{"id":"0717","n":"side push-up","bp":"upper arms","eq":"body weight","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Начните с того, что лягте на бок, вытянув ноги и положив их друг на друга. Положите нижнюю руку на землю прямо под плечом, пальцы направлены вперед. Надавите нижней рукой, чтобы оторвать тело от земли, сохраняя ноги прямыми и напряженным корпусом. Вытяните верхнюю руку прямо вверх к потолку, создавая прямую линию от головы до пяток. Опустите тело обратно в исходное положение, контролируя его. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Боковые отжимания"},{"id":"0721","n":"side wrist pull stretch","bp":"lower arms","eq":"body weight","tg":"forearms","mg":"wrists","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, руки вытянуты перед собой. Вытяните правую руку в сторону параллельно земле ладонью вниз. Левой рукой возьмите правую руку и осторожно потяните ее к телу, чувствуя растяжение в правом предплечье. Удерживайте растяжку 15–30 секунд, затем расслабьтесь. Повторите с другой стороны.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Боковая растяжка запястья"},{"id":"0720","n":"side-to-side chin","bp":"back","eq":"body weight","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч и слегка согнув колени. Возьмитесь за перекладину хватом сверху, руки на расстоянии чуть шире плеч. Повисните на перекладине, полностью вытянув руки и расслабив тело. Поднимитесь, сгибая локти и подтягивая подбородок к перекладине, сохраняя при этом тело прямым. Как только подбородок окажется над перекладиной, опуститесь обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подтягивания из стороны в сторону"},{"id":"3213","n":"side-to-side toe touch (male)","bp":"waist","eq":"body weight","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, руки вытянуты в стороны. Согнитесь в талии вправо, потянув правую руку к правой ноге, сохраняя при этом левую руку вытянутой в сторону. Вернитесь в исходное положение, а затем согнитесь в талии влево, потянув левую руку к левой ноге, удерживая правую руку вытянутой в сторону. Повторите наклоняющее движение из стороны в сторону необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Касание носков из стороны в сторону"},{"id":"0725","n":"single arm push-up","bp":"chest","eq":"body weight","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Начните с позиции отжимания, поставив руки на ширине плеч и одну руку немного шире другой. Напрягите корпус и опустите тело к земле, сгибая локти, сохраняя спину прямой. Опускаясь, перенесите вес тела в одну сторону и поднимите противоположную руку от земли, вытягивая ее прямо в сторону. Надавите на грудь и трицепс, чтобы поднять тело обратно в исходное положение, одновременно опуская вытянутую руку обратно на землю. Повторите движение, чередуя вытягиваемую руку при каждом повторении.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания на одной руке"},{"id":"3645","n":"single leg bridge with outstretched leg","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Вытяните одну ногу прямо перед собой. Напрягите ягодицы и поднимите бедра от земли, образуя прямую линию от колен до плеч. Задержитесь на мгновение в верхней точке, затем медленно опустите бедра обратно в исходное положение. Повторите необходимое количество повторений, затем поменяйте ногу.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Ягодичный мостик на одной ноге с выпрямленной ногой"},{"id":"0727","n":"single leg calf raise (on a dumbbell)","bp":"lower legs","eq":"dumbbell","tg":"calves","mg":"ankles","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, в одной руке возьмите гантель. Поднимите одну ногу от земли и балансируйте на другой ноге. Медленно поднимите пятку как можно выше, задействуя икроножные мышцы. Задержитесь на мгновение в верхней точке, затем медленно опустите пятку обратно вниз. Повторите желаемое количество повторений, затем переключитесь на другую ногу.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носок на одной ноге на гантели"},{"id":"0730","n":"single leg platform slide","bp":"upper legs","eq":"body weight","tg":"hamstrings","mg":"glutes","img":null,"gif":null,"ru":"Начните с того, что встаньте одной ногой на платформу или слайд-доску. Слегка согните колено и сдвиньте стопу по платформе назад, вытягивая ногу. Держите корпус включенным и сохраняйте прямую осанку на протяжении всего движения. Медленно вернитесь в исходное положение, сдвинув ногу обратно в исходное положение. Повторите движение желаемое количество повторений, затем поменяйте ногу.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Скольжение одной ногой на платформе"},{"id":"1759","n":"single leg squat (pistol) male","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, руки вытянуты перед собой. Поднимите правую ногу от земли и вытяните ее вперед. Медленно опустите тело вниз, согнув левое колено и отведя бедра назад. Держите грудь поднятой, а спину прямой, когда опускаетесь вниз. Опускайтесь до тех пор, пока левое бедро не станет параллельно земле или настолько низко, насколько вам будет удобно. Задержитесь на мгновение внизу, затем оттолкнитесь левой пяткой, чтобы вернуться в исходное положение. Повторите необходимое количество повторений, затем поменяйте ногу.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Пистолетик на одной ноге"},{"id":"1489","n":"sissy squat","bp":"upper legs","eq":"body weight","tg":"quads","mg":"calves","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, носки слегка направлены наружу. При необходимости держитесь за устойчивый предмет для равновесия. Медленно опустите тело, согнув колени и откинувшись назад, сохраняя туловище в вертикальном положении. Продолжайте опускаться до тех пор, пока ваши бедра не станут параллельны земле или настолько далеко, насколько вам будет удобно. Сделайте паузу на мгновение, затем оттолкнитесь пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Сисси-приседания"},{"id":"0735","n":"sit-up v. 2","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Положите руки за голову локтями наружу. Включив пресс, медленно поднимите верхнюю часть тела от земли, наклоняясь вперед, пока туловище не окажется под углом 45 градусов. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Подъём корпуса вариант 2"},{"id":"3679","n":"sit-up with arms on chest","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Скрестите руки на груди. Включив пресс, поднимите верхнюю часть тела от земли к коленям. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Подъём корпуса с руками на груди"},{"id":"3361","n":"skater hops","bp":"cardio","eq":"body weight","tg":"cardiovascular system","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч. Слегка согните колени и прыгните вправо, приземлившись на правую ногу. При приземлении заведите левую ногу за правую и коснитесь земли пальцами левой ноги. Сразу же прыгните влево, приземлившись на левую ногу. При приземлении заведите правую ногу за левую и коснитесь земли пальцами правой ноги. Продолжайте чередовать стороны, подпрыгивая и постукивая по земле каждой ногой. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"high","sp":1,"kn":0,"sh":1,"ru_name":"Прыжки конькобежца"},{"id":"2142","n":"ski ergometer","bp":"upper arms","eq":"skierg machine","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и подножки в удобное положение. Возьмитесь за рукоятки верхним хватом ладонями вниз. Сядьте прямо, положив ноги на подножки. Вытяните руки прямо перед собой, слегка согнув локти. Задействуйте трицепсы и толкните ручки вниз к бедрам. Задержитесь на мгновение внизу, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Лыжный эргометр"},{"id":"3671","n":"ski step","bp":"cardio","eq":"body weight","tg":"cardiovascular system","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч. Слегка согните колени и держите спину прямо. Прыгните вправо, приземлившись на правую ногу и заведя левую ногу за правую. Немедленно прыгните влево, приземлившись на левую ногу и заведя правую ногу за левую. Продолжайте попеременные прыжки из стороны в сторону, имитируя движение на лыжах. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"high","sp":1,"kn":0,"sh":1,"ru_name":"Лыжный шаг"},{"id":"3304","n":"skin the cat","bp":"back","eq":"body weight","tg":"upper back","mg":"shoulders","img":null,"gif":null,"ru":"Начните с висения на перекладине, полностью выпрямив руки и расслабив тело. Напрягите корпус и поднимите ноги вверх, подтягивая колени к груди. Продолжайте поднимать ноги вверх и над головой, позволяя телу проходить через руки. Как только ваши ноги полностью выпрямятся над головой, начните опускать их обратно в исходное положение. Опуская ноги, позвольте телу пройти обратно через руки, пока вы снова не повиснете с полностью выпрямленными руками. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Выкрут на кольцах"},{"id":"1425","n":"sled 45 degrees one leg press","bp":"upper legs","eq":"sled machine","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Отрегулируйте салазки под углом 45 градусов. Сядьте на салазки, прислонившись спиной к подушке и положив ноги на подножку. Поставьте одну ногу на подножку и вытяните ногу, отталкивая сани от себя. Медленно согните колено и опустите сани обратно в исходное положение. Повторите с другой ногой. Продолжайте чередовать ноги желаемое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим одной ногой в наклонном тренажёре 45 градусов"},{"id":"0738","n":"sled 45в° calf press","bp":"lower legs","eq":"sled machine","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Отрегулируйте салазки под углом 45 градусов. Поставьте ноги на платформу саней пальцами ног вперед. Отодвиньте платформу саней от себя, вытянув лодыжки и икроножные мышцы. Задержитесь на мгновение в верхней точке, затем медленно опустите платформу саней обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим носками в наклонном тренажёре 45 градусов"},{"id":"0739","n":"sled 45в° leg press","bp":"upper legs","eq":"sled machine","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Отрегулируйте сиденье и подножку салазок в удобное положение. Сядьте на санки, прислонившись спиной к спинке сиденья и поставив ноги на подножку на ширине плеч. Возьмитесь за ручки по бокам сиденья для устойчивости. Отодвиньте подножку от тела, вытянув ноги и удерживая пятки на подножке. Продолжайте толкать, пока ноги не выпрямятся почти полностью, но не сгибайте колени. Сделайте паузу на мгновение в верхней части движения, затем медленно опустите подножку обратно к телу, согнув колени. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим ногами в наклонном тренажёре 45 градусов"},{"id":"1464","n":"sled 45в° leg press (back pov)","bp":"upper legs","eq":"sled machine","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Отрегулируйте сиденье санной машины так, чтобы колени находились под углом 45 градусов. Сядьте на санки, прислонившись спиной к спинке сиденья и поставив ноги на подножку на ширине плеч. Возьмитесь за ручки по бокам сиденья для устойчивости. Отодвиньте подножку от тела, вытянув ноги и удерживая пятки на подножке. Задержитесь на мгновение в полностью выдвинутом положении. Медленно согните колени и опустите подножку обратно к телу, контролируя движение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим ногами в наклонном тренажёре 45 градусов вид сзади"},{"id":"1463","n":"sled 45° leg press (side pov)","bp":"upper legs","eq":"sled machine","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Отрегулируйте сиденье саней так, чтобы колени находились под углом 90 градусов, когда ступни стоят на подножке. Сядьте на санки, прижав спину к спинке и поставив ноги на подножку на ширине плеч. Возьмитесь за ручки по бокам сиденья для устойчивости. Надавите на подножку, чтобы вытянуть ноги и полностью их выпрямить. Задержитесь на мгновение в верхней точке, затем медленно согните колени, чтобы опустить подножку обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Жим ногами в наклонном тренажёре 45 градусов вид сбоку"},{"id":"0740","n":"sled 45в° leg wide press","bp":"upper legs","eq":"sled machine","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Отрегулируйте салазки под углом 45 градусов. Сядьте на салазки, прислонившись спиной к подушке и поставив ноги на платформу для ног. Поставьте ноги шире ширины плеч. Надавите на платформу для ног, чтобы вытянуть ноги и выпрямить колени. В конце движения сделайте паузу на мгновение, затем медленно согните колени, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Жим ногами широкой постановкой в наклонном тренажёре 45 градусов"},{"id":"1391","n":"sled calf press on leg press","bp":"lower legs","eq":"sled machine","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Отрегулируйте сиденье тренажера для жима ногами так, чтобы колени были слегка согнуты, когда ноги стоят на санях. Поставьте ноги на сани на ширине плеч, носки ног направлены вперед. Отпустите ручки безопасности и оттолкните сани от себя, вытянув колени и лодыжки. Сделайте паузу на мгновение в верхней точке движения, затем медленно опустите сани обратно вниз, сгибая колени и лодыжки. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим носками в тренажёре для жима ногами"},{"id":"0741","n":"sled closer hack squat","bp":"upper legs","eq":"sled machine","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Отрегулируйте сани до удобного веса и расположитесь спиной к подушке. Поставьте ноги на платформу на ширине плеч, носки слегка направлены наружу. Возьмитесь за ручки по бокам машины для устойчивости. Напрягите корпус и медленно опустите тело, сгибая колени и бедра, сохраняя спину прямой. Продолжайте опускаться до тех пор, пока бедра не станут параллельны земле или немного ниже. Задержитесь на мгновение внизу, затем оттолкнитесь пятками, чтобы вытянуть ноги и вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Гакк-приседания с узкой постановкой ног в тренажёре"},{"id":"0742","n":"sled forward angled calf raise","bp":"lower legs","eq":"sled machine","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Отрегулируйте салазки до удобного веса и расположитесь на тренажере, положив пальцы ног на платформу и свесив пятки. Положите руки на ручки или по бокам машины для поддержки. Включите икроножные мышцы и медленно поднимите пятки как можно выше, преодолевая сопротивление саней. Сделайте паузу на мгновение в верхней точке движения, затем медленно опустите пятки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носки с наклоном вперёд в тренажёре"},{"id":"0743","n":"sled hack squat","bp":"upper legs","eq":"sled machine","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Отрегулируйте салазки в удобное положение для вашего роста. Встаньте на платформу, поставив ноги на ширине плеч, носки слегка направлены наружу. Держитесь за ручки или перекладины для устойчивости. Опустите тело, согнув колени и бедра, держа спину прямо и грудь вверх. Продолжайте опускаться до тех пор, пока бедра не станут параллельны земле или немного ниже. Сделайте паузу на мгновение, затем оттолкнитесь пятками, чтобы поднять тело обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Гакк-приседания в тренажёре"},{"id":"2334","n":"sled lying calf press","bp":"lower legs","eq":"sled machine","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Отрегулируйте сани до удобного веса. Сядьте на сани, прислонившись спиной к подушке и поставив ноги на платформу. Поставьте пальцы ног и подушечки стоп на край платформы, свесив пятки. Оттолкните платформу от себя, вытянув лодыжки и слегка согнув колени. Продолжайте нажимать до тех пор, пока икроножные мышцы не будут полностью сокращены. Удерживайте напряжение на мгновение, затем медленно опустите платформу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим носками лёжа в тренажёре"},{"id":"0744","n":"sled lying squat","bp":"upper legs","eq":"sled machine","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Отрегулируйте сани до удобного веса. Лягте на спину на санях, положив ноги на подножку. Поставьте ноги на ширине плеч и слегка разверните их наружу. Возьмитесь за ручки саней для устойчивости. Задействуйте ягодицы и мышцы корпуса. Оттолкнитесь пятками и вытяните ноги, чтобы поднять сани. Опустите сани обратно вниз, согнув колени и бедра. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Приседания лёжа в тренажёре"},{"id":"1392","n":"sled one leg calf press on leg press","bp":"lower legs","eq":"sled machine","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Отрегулируйте сиденье тренажера для жима ногами так, чтобы колени были слегка согнуты, когда ноги стоят на санях. Сядьте на тренажер спиной к спинке, а ногами на салазках на ширине плеч. Поставьте пальцы ног и подушечки стоп на салазки, не касаясь пяток. Толкайте сани вперед, вытянув лодыжки и слегка согнув колени. Задержитесь на мгновение в верхней точке, затем медленно опустите сани обратно вниз, сгибая лодыжки. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим носком одной ноги в тренажёре для жима ногами"},{"id":"1496","n":"sledge hammer","bp":"waist","eq":"hammer","tg":"abs","mg":"forearms","img":null,"gif":null,"ru":"Встаньте, расставив ноги на ширине плеч, и возьмите кувалду обеими руками. Напрягите корпус и держите спину прямо. Поверните кувалду вниз к земле, используя силу корпуса и верхней части тела. Делая мах вниз, разверните бедра и перенесите силу на молот. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Удары кувалдой по покрышке"},{"id":"0746","n":"smith back shrug","bp":"back","eq":"smith machine","tg":"traps","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч и слегка согнув колени. Возьмите штангу хватом сверху, руки на расстоянии чуть шире плеч. Держите руки прямо и позвольте штанге висеть перед бедрами. Поднимите плечи прямо вверх к ушам, сжимая трапеции вверху. Задержитесь на мгновение, затем опустите плечи обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Шраги в Смите за спиной"},{"id":"0747","n":"smith behind neck press","bp":"shoulders","eq":"smith machine","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья машины Смита так, чтобы штанга находилась на уровне плеч. Встаньте, поставив ноги на ширине плеч и слегка согнув колени. Возьмите штангу хватом сверху, на расстоянии чуть шире ширины плеч. Снимите штангу со стоек и отступите назад, сохраняя устойчивую стойку. Опустите штангу к задней части шеи, держа локти направленными вперед. Выжмите штангу вверх над головой, пока руки полностью не выпрямятся. Задержитесь на мгновение в верхней точке, затем медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Жим из-за головы в Смите"},{"id":"0748","n":"smith bench press","bp":"chest","eq":"smith machine","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Отрегулируйте высоту грифа машины Смита до уровня груди. Лягте на скамью, твердо поставив ноги на землю. Возьмите штангу верхним хватом на расстоянии чуть шире плеч. Отпустите штангу и опустите ее к груди, держа локти прижатыми. Сделайте паузу на мгновение, когда штанга коснется вашей груди. Верните штангу в исходное положение, полностью выпрямив руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим лёжа в Смите"},{"id":"0749","n":"smith bent knee good morning","bp":"upper legs","eq":"smith machine","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Начните с того, что встаньте, поставив ноги на ширине плеч, носки направлены вперед. Положите штангу на верхнюю часть спины, положив ее на трапеции. Слегка согните колени и наклонитесь вперед в бедрах, сохраняя спину прямой. Опускайте туловище до тех пор, пока оно не станет параллельно земле, чувствуя растяжение подколенных сухожилий. Задействуйте ягодицы и мышцы задней поверхности бедра, чтобы поднять туловище обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Наклоны вперёд на согнутых ногах в Смите"},{"id":"1359","n":"smith bent over row","bp":"back","eq":"smith machine","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Установите машину Смита так, чтобы штанга находилась на уровне бедер. Встаньте лицом к перекладине, ноги на ширине плеч. Слегка согните колени и наклонитесь вперед в бедрах, сохраняя спину прямой. Возьмите перекладину хватом сверху, руки на расстоянии чуть шире плеч. Потяните штангу к нижней части груди, сжимая лопатки вместе. Задержитесь на мгновение в верхней точке, затем медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Тяга в наклоне в Смите"},{"id":"0750","n":"smith chair squat","bp":"upper legs","eq":"smith machine","tg":"quads","mg":"glutes","img":null,"gif":null,"ru":"Отрегулируйте высоту стержня машины Смита до удобного положения. Встаньте, ноги на ширине плеч, носки слег
