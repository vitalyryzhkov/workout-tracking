лизко к телу. Продолжайте тянуть, пока подбородок не окажется над перекладиной. Задержитесь на мгновение в верхней точке, затем медленно опустите тело обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подтягивания узким параллельным хватом"},{"id":"0257","n":"circles knee stretch","bp":"lower legs","eq":"body weight","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, руки на бедрах. Слегка согните колени и оторвите пятки от земли, балансируя на подушечках стоп. Держа колени согнутыми, вращайте коленями круговые движения сначала по часовой стрелке, а затем против часовой стрелки. Выполните движение необходимое количество повторений.","pos":"standing","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Круговая растяжка коленей"},{"id":"1273","n":"clap push up","bp":"chest","eq":"body weight","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Начните с позиции высокой планки, расставив руки чуть шире плеч. Опустите тело к земле, сгибая локти, сохраняя при этом корпус напряженным. Резко оттолкнитесь ладонями, чтобы оторвать тело от земли. Находясь в воздухе, хлопните в ладоши, прежде чем приземлиться обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"high","sp":1,"kn":1,"sh":1,"ru_name":"Отжимания с хлопком"},{"id":"0258","n":"clock push-up","bp":"chest","eq":"body weight","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Начните с позиции высокой планки, положив руки прямо под плечи, а тело образуя прямую линию. Опустите тело к земле, согнув локти и держа их близко к бокам. Опускаясь, поверните тело влево, вытягивая левую руку прямо в сторону. Вернитесь в исходное положение, одновременно поворачивая тело к центру. Повторите отжимание, на этот раз повернув тело вправо и вытянув правую руку в сторону. Продолжайте чередовать стороны с каждым повторением.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отжимания по кругу"},{"id":"1327","n":"close grip chin-up","bp":"back","eq":"body weight","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Возьмитесь за турник ладонями к себе и руками на ширине плеч. Повисните на перекладине, полностью вытянув руки и оторвав ноги от земли. Напрягите мышцы спины и подтяните тело к перекладине, держа локти близко к телу. Продолжайте тянуть, пока подбородок не окажется над перекладиной. Задержитесь на мгновение в верхней точке, затем медленно опустите тело обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подтягивания узким обратным хватом"},{"id":"0259","n":"close-grip push-up","bp":"upper arms","eq":"body weight","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Начните с позиции высокой планки, положив руки близко друг к другу, прямо под плечами. Напрягите корпус и опустите тело к земле, держа локти близко к бокам. Оттолкнитесь ладонями, чтобы вытянуть руки и вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отжимания узким хватом"},{"id":"2398","n":"close-grip push-up (on knees)","bp":"upper arms","eq":"body weight","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Начните с того, что встаньте на четвереньки, поставив руки на ширине плеч и колени на ширине бедер. Опустите верхнюю часть тела к земле, сгибая локти и держа их близко к бокам. Сделайте паузу на мгновение, когда ваша грудь окажется чуть выше земли. Оттолкнитесь ладонями, чтобы выпрямить руки и вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"kneeling","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отжимания узким хватом с колен"},{"id":"0260","n":"cocoons","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Положите руки за голову локтями наружу. Включив пресс, медленно поднимите верхнюю часть тела от земли, наклоняясь вперед, пока туловище не окажется под углом 45 градусов. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Коконы"},{"id":"1468","n":"crab twist toe touch","bp":"waist","eq":"body weight","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Начните с того, что сядьте на землю, согнув колени и поставив ступни на пол. Положите руки позади себя, пальцы направлены к ногам, и поднимите бедра от земли. Вытяните одну ногу прямо перед собой, одновременно протягивая противоположную руку к пальцам ног. Вернитесь в исходное положение и повторите то же самое в другую сторону. Продолжайте чередовать стороны желаемое количество повторений.","pos":"seated","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Скручивания с поворотом и касанием носка в положении краба"},{"id":"0262","n":"cross body crunch","bp":"waist","eq":"body weight","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Положите руки за голову локтями наружу. Включив пресс, поднимите верхнюю часть тела от земли и повернитесь, чтобы поднести правый локоть к левому колену. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела обратно в исходное положение. Повторите то же самое с другой стороны, поднеся левый локоть к правому колену. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Перекрёстные скручивания"},{"id":"0267","n":"crunch (hands overhead)","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Вытяните руки прямо над головой. Включив пресс, поднимите верхнюю часть тела от земли, наклонившись вперед к коленям. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Скручивания с руками за головой"},{"id":"0271","n":"crunch (on stability ball)","bp":"waist","eq":"stability ball","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Сядьте на мяч для стабилизации, поставьте ступни на землю и согните колени под углом 90 градусов. Лягте на мяч так, чтобы нижняя часть спины получила поддержку, а верхняя часть тела оказалась параллельна полу. Положите руки за голову или на грудь. Напрягите пресс и поднимите верхнюю часть тела к коленям, наклоняя туловище вперед. Сделайте паузу на мгновение в верхней точке движения, затем медленно опустите верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Скручивания на фитболе"},{"id":"0272","n":"crunch (on stability ball, arms straight)","bp":"waist","eq":"stability ball","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Сядьте на мяч для стабилизации, поставьте ступни на землю и согните колени под углом 90 градусов. Лягте на мяч так, чтобы нижняя часть спины получила поддержку, а верхняя часть тела оказалась параллельна полу. Заведите руки за голову или скрестите их на груди. Напрягите пресс и поднимите верхнюю часть тела от мяча, подтягивая плечи к бедрам. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Скручивания на фитболе с прямыми руками"},{"id":"0274","n":"crunch floor","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Положите руки за голову локтями наружу. Напрягите пресс и поднимите плечи от земли, наклонившись вперед к коленям. Задержитесь на мгновение в верхней точке, затем медленно опустите плечи обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Скручивания на полу"},{"id":"3016","n":"curl-up","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Положите руки за голову локтями наружу. Включив пресс, медленно поднимите верхнюю часть тела от земли, наклоняясь вперед, пока туловище не окажется под углом 45 градусов. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Подъём корпуса"},{"id":"3769","n":"curtsey squat","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч. Сделайте шаг по диагонали позади и поперек тела правой ногой, скрестив ее за левой ногой. Согните оба колена, как будто вы делаете реверанс, опуская тело к земле. Держите туловище в вертикальном положении, а вес тела перенесите на переднюю ногу. Оттолкнитесь передней ногой, чтобы вернуться в исходное положение. Повторите то же самое с другой стороны, шагая левой ногой по диагонали позади и поперек тела.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Реверанс-приседания"},{"id":"2331","n":"cycle cross trainer","bp":"cardio","eq":"leverage machine","tg":"cardiovascular system","mg":"quadriceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь на велотренажере. Поставьте ноги на педали и возьмитесь за руль. Начните крутить педали плавными и контролируемыми движениями. Поддерживайте устойчивый темп и при желании увеличивайте сопротивление. Продолжайте крутить педали в течение желаемой продолжительности кардио-тренировки.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Эллиптический тренажёр"},{"id":"0276","n":"dead bug","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, вытянув руки к потолку. Согните колени и оторвите ноги от земли, создавая угол в 90 градусов в бедрах и коленях. Напрягите корпус и поясницу, чтобы прижать поясницу к земле. Медленно опустите правую руку и левую ногу к земле, сохраняя их прямыми и зависая над полом. Сделайте паузу на мгновение, затем вернитесь в исходное положение. Повторите движение левой рукой и правой ногой. Продолжайте чередовать стороны желаемое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Мёртвый жук"},{"id":"0277","n":"decline crunch","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на наклонную скамью, зафиксируйте ноги и согните колени под углом 90 градусов. Положите руки за голову или на грудь. Напрягите пресс и поднимите верхнюю часть тела к коленям, сгибая туловище. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Скручивания на наклонной скамье вниз головой"},{"id":"0279","n":"decline push-up","bp":"chest","eq":"body weight","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Поставьте руки на землю чуть шире ширины плеч, приподняв ноги на устойчивой поверхности. Держите тело прямой линией от головы до пят, задействуя мышцы корпуса. Опустите грудь к земле, согнув локти и удерживая их близко к телу. Оттолкнитесь ладонями, чтобы вытянуть руки и вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отжимания с ногами на возвышении"},{"id":"0282","n":"decline sit-up","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на наклонную скамью, зафиксировав ноги и согнув колени. Положите руки за голову или на грудь. Напрягите пресс и поднимите верхнюю часть тела со скамьи, наклонившись вперед к коленям. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Подъём корпуса на наклонной скамье вниз головой"},{"id":"1274","n":"deep push up","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Начните с положения высокой планки, расставив руки чуть шире плеч, а тело образуя прямую линию. Опустите грудь к земле, согнув локти и удерживая их близко к телу. Оттолкнитесь ладонями, чтобы вытянуть руки и вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Глубокие отжимания"},{"id":"0283","n":"diamond push-up","bp":"upper arms","eq":"body weight","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Начните с положения высокой планки, сложив руки вместе, образуя ромбовидную форму большими и указательными пальцами. Держите тело прямой линией от головы до пят, задействуя корпус и ягодицы. Опустите грудь в сторону ромбовидной формы, образованной руками, держа локти близко к телу. Задержитесь на мгновение в нижней точке, затем вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Алмазные отжимания"},{"id":"0284","n":"donkey calf raise","bp":"lower legs","eq":"body weight","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте пальцами ног на возвышенную поверхность, например на ступеньку или блок. Для равновесия положите руки на устойчивую опору, например стену или перила. Поднимите пятки как можно выше, перенеся вес тела на подушечки стоп. Задержитесь на мгновение в верхней точке, затем медленно опустите пятки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носки осликом"},{"id":"1275","n":"drop push up","bp":"chest","eq":"body weight","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Начните с позиции высокой планки, расставив руки чуть шире плеч. Опустите грудь к земле, держа локти близко к телу. Как только ваша грудь окажется чуть выше земли, быстро опустите колени на землю. Вернитесь в исходное положение, вытянув руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отжимания со сбросом"},{"id":"0285","n":"dumbbell alternate biceps curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, взяв в каждую руку по гантели, ладони направлены вперед, руки полностью выпрямлены. Удерживая плечи неподвижно, выдохните и согните гири, одновременно сокращая бицепсы. Продолжайте поднимать гантели до тех пор, пока ваши бицепсы полностью не сократятся и гантели не окажутся на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно начните опускать гантели обратно в исходное положение. Повторите желаемое количество повторений, чередуя руки.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Попеременное сгибание рук на бицепс с гантелями"},{"id":"2403","n":"dumbbell alternate biceps curl (with arm blaster)","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, ноги на ширине плеч, возьмите в каждую руку по гантели ладонями вперед. Поместите армбластер на плечи, обеспечив надежную фиксацию. Удерживая плечи неподвижно, выдохните и поднимите одну гантель к плечу, одновременно напрягая бицепсы. Продолжайте поднимать гантель до тех пор, пока ваши бицепсы полностью не сократятся и гантель не окажется на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно опустите гантель обратно в исходное положение. Повторите движение противоположной рукой. Продолжайте чередовать руки желаемое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Попеременное сгибание рук на бицепс с гантелями и фиксатором локтей"},{"id":"1646","n":"dumbbell alternate hammer preacher curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на скамью для проповедника, взяв в каждую руку по гантели, ладони обращены к туловищу, руки полностью выпрямлены. Держите плечи неподвижно и выдыхайте, сгибая штангу и одновременно сокращая бицепсы. Продолжайте поднимать гантели до тех пор, пока ваши бицепсы полностью не сократятся и гантели не окажутся на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно начните опускать гантели обратно в исходное положение. Повторите рекомендованное количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Попеременное молотковое сгибание на скамье Скотта с гантелями"},{"id":"1647","n":"dumbbell alternate preacher curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на скамью для проповедника, взяв в каждую руку по гантели ладонями вверх. Положите плечи на подушку скамьи проповедника, позволяя им полностью выпрямиться. Удерживая плечи неподвижно, выдохните и согните гантель в правой руке, одновременно сокращая бицепсы. Продолжайте сгибать гантель до тех пор, пока ваши бицепсы полностью не сократятся и гантель не окажется на уровне плеч. Сделайте паузу на мгновение, затем вдохните и медленно опустите гантель обратно в исходное положение. Повторите движение левой рукой. Продолжайте чередовать руки желаемое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Попеременное сгибание рук на скамье Скотта с гантелями"},{"id":"1648","n":"dumbbell alternate seated hammer curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на скамью, взяв в каждую руку по гантели, ладони обращены к туловищу, руки вытянуты вниз. Держите спину прямо, а локти близко к туловищу. Выдохните и согните гантель в правой руке к плечу, сохраняя плечо неподвижным. Продолжайте поднимать гантель до тех пор, пока ваши бицепсы полностью не сократятся и гантель не окажется на уровне плеч. Сделайте короткую паузу, затем вдохните и медленно опустите гантель обратно в исходное положение. Повторите движение левой рукой. Продолжайте чередовать руки желаемое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Попеременное молотковое сгибание сидя с гантелями"},{"id":"0286","n":"dumbbell alternate side press","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держа в каждой руке по гантели на уровне плеч. Выжмите одну гантель над головой, удерживая другую на уровне плеч. Опустите отжатую гантель обратно на высоту плеч, одновременно выжимая другую гантель над головой. Продолжайте чередовать стороны желаемое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Попеременный жим в сторону с гантелей"},{"id":"1649","n":"dumbbell alternating bicep curl with leg raised on exercise ball","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите в каждую руку по гантели ладонями вперед. Положите позади себя гимнастический мяч и поставьте на него одну ногу, сохраняя равновесие. Полностью выпрямив руки и прижав локти к бокам, согните одну гантель к плечу, сохраняя плечо неподвижным. Опустите гантель обратно в исходное положение и повторите то же самое с другой рукой. Продолжайте чередовать руки желаемое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Попеременное сгибание рук на бицепс с гантелями с поднятой ногой на фитболе"},{"id":"1650","n":"dumbbell alternating seated bicep curl on exercise ball","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на гимнастический мяч, поставив ноги на землю и выпрямив спину. Возьмите в каждую руку по гантели ладонями вперед и полностью выпрямленными руками. Удерживая плечи неподвижно, выдохните и согните одну гантель, одновременно вращая предплечье, пока ладонь не окажется лицом к плечу. Вдохните и медленно опустите гантель обратно в исходное положение. Повторите сгибание другой рукой. Продолжайте чередовать сгибания рук желаемое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Попеременное сгибание рук на бицепс сидя с гантелями на фитболе"},{"id":"2137","n":"dumbbell arnold press","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Сядьте на скамью с поддержкой спины и держите по гантели в каждой руке на уровне плеч, ладони обращены к телу, локти согнуты. Выжимайте гантели вверх до тех пор, пока руки полностью не выпрямятся и ладони не повернутся вперед. Во время подъема вращайте запястья так, чтобы ладони были направлены вперед в верхней точке движения. Задержитесь на мгновение в верхней точке, затем медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Жим Арнольда с гантелями"},{"id":"0287","n":"dumbbell arnold press v. 2","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Сядьте на скамью с поддержкой спины и держите по гантели в каждой руке на уровне плеч, ладони обращены к телу, локти согнуты. Выжимайте гантели вверх до тех пор, пока руки полностью не выпрямятся и ладони не повернутся вперед. Во время подъема вращайте запястья так, чтобы в верхней точке движения ладони были обращены вперед. Задержитесь на мгновение в верхней точке, затем медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Жим Арнольда с гантелями версия 2"},{"id":"0288","n":"dumbbell around pullover","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Лягте на скамью, положив голову на один конец и твердо поставив ноги на землю. Возьмите гантель обеими руками и вытяните руки прямо над грудью. Держа руки прямыми, медленно опустите гантель за голову по дуге. Задержитесь на мгновение в нижней точке, затем поднимите гантель обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Пуловер с гантелью по дуге"},{"id":"0289","n":"dumbbell bench press","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Лягте на скамью, поставьте ступни на землю и прижмите спину к скамье. Возьмите в каждую руку по гантели ладонями вперед и руками, вытянутыми над грудью. Медленно опустите гантели по бокам груди, держа локти под углом 90 градусов. Сделайте паузу на мгновение, затем верните гантели в исходное положение, полностью выпрямляя руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим гантелей лёжа"},{"id":"0290","n":"dumbbell bench seated press","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Сядьте на скамью, взяв в каждую руку по гантели, положив их на бедра. Откиньтесь назад и расположите гантели по бокам груди ладонями вперед. Выжмите гантели вверх, пока руки полностью не выпрямятся. Задержитесь на мгновение в верхней точке, затем медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Жим гантелей сидя на скамье"},{"id":"0291","n":"dumbbell bench squat","bp":"upper legs","eq":"dumbbell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Положите гантель на землю перед скамьей. Встаньте лицом от скамьи, поставив ноги на ширине плеч. Согните колени и бедра, чтобы опуститься к скамье, держа грудь вверх и спину прямо. Как только ваши ягодицы коснутся скамьи, оттолкнитесь пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Приседания с гантелями на скамью"},{"id":"0293","n":"dumbbell bent over row","bp":"back","eq":"dumbbell","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, колени слегка согнуты, в каждой руке держите по гантели ладонями к телу. Наклонитесь вперед в бедрах, сохраняя спину прямой и напряженный корпус. Пусть ваши руки свисают прямо к полу, слегка согнутые в локтях. Подтяните гантели к груди, сведя лопатки вместе. Задержитесь на мгновение в верхней точке, затем медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Тяга гантелей в наклоне"},{"id":"1651","n":"dumbbell bicep curl lunge with bowling motion","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч, держа в каждой руке по гантели ладонями вперед. Сделайте шаг вперед правой ногой, согнув правое колено и опустив тело в положение выпада. Делая выпад вперед, поднимите гантели к плечам, держа локти близко к телу. В нижней части выпада поверните туловище вправо, как если бы вы бросали мяч. Выполните обратное движение, отступив правой ногой и вернувшись в исходное положение, одновременно опуская гантели вниз. Повторите выпад и сгибание рук, на этот раз повернув туловище влево. Продолжайте чередовать стороны желаемое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Сгибание рук на бицепс с гантелями в выпаде с боулинговым движением"},{"id":"1652","n":"dumbbell bicep curl on exercise ball with leg raised","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на гимнастический мяч, поставив ноги на землю и выпрямив спину. Возьмите в каждую руку по гантели ладонями вперед и полностью выпрямленными руками. Медленно поднимите гантели к плечам, держа локти близко к бокам. Сделайте паузу на мгновение в верхней точке движения, затем медленно опустите гантели обратно в исходное положение. Выполняя сгибание рук на бицепс, поднимите одну ногу от земли и удерживайте ее в воздухе на протяжении всего упражнения. Повторите необходимое количество повторений, затем поменяйте ногу и повторите.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание рук на бицепс с гантелями на фитболе с поднятой ногой"},{"id":"1653","n":"dumbbell bicep curl with stork stance","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите в каждую руку по гантели ладонями вперед. Вытяните одну ногу позади себя, балансируя на пальцах этой стопы. Удерживая плечи неподвижно, выдохните и согните гири, одновременно сокращая бицепсы. Продолжайте поднимать гири до тех пор, пока ваши бицепсы полностью не сократятся и гантели не окажутся на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно начните опускать гантели обратно в исходное положение. Повторите необходимое количество повторений, затем поменяйте ногу и повторите.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание рук на бицепс с гантелями в стойке аиста"},{"id":"0294","n":"dumbbell biceps curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, взяв в каждую руку по гантели, ладони направлены вперед, руки полностью выпрямлены. Удерживая плечи неподвижно, выдохните и согните гири, одновременно сокращая бицепсы. Продолжайте поднимать гири до тех пор, пока ваши бицепсы полностью не сократятся и гантели не окажутся на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно начните опускать гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание рук на бицепс с гантелями"},{"id":"2401","n":"dumbbell biceps curl (with arm blaster)","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, взяв в каждую руку по гантели ладонями вперед. Держите локти близко к туловищу, а плечи неподвижны. Выдохните и согните штангу, одновременно сокращая бицепсы. Продолжайте поднимать гири до тех пор, пока ваши бицепсы полностью не сократятся и гантели не окажутся на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно начните опускать гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание рук на бицепс с гантелями и фиксатором локтей"},{"id":"1654","n":"dumbbell biceps curl reverse","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, взяв в каждую руку по гантели, ладонями вниз и полностью выпрямленными руками. Удерживая плечи неподвижно, выдохните и согните гири, одновременно сокращая бицепсы. Продолжайте поднимать гантели до тех пор, пока ваши бицепсы полностью не сократятся и гантели не окажутся на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно начните опускать гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание рук на бицепс с гантелями обратным хватом"},{"id":"1655","n":"dumbbell biceps curl squat","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч, держа в каждой руке по гантели ладонями вперед. Держа спину прямой и локти близко к бокам, выдохните и поднимите гантели к плечам. Задержитесь на мгновение в верхней точке, напрягая бицепсы. Вдохните и медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Сгибание рук на бицепс с гантелями в приседе"},{"id":"1656","n":"dumbbell biceps curl v sit on bosu ball","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на мяч босу, ​​поставив ступни на землю и согнув колени под углом 90 градусов. Возьмите по гантели в каждую руку ладонями вперед и полностью выпрямив руки по бокам. Удерживая плечи неподвижно, выдохните и согните гантели, одновременно сокращая бицепсы. Продолжайте поднимать гантели до тех пор, пока ваши бицепсы полностью не сократятся и гантели не окажутся на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно начните опускать гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание рук на бицепс с гантелями в V-положении на босу"},{"id":"1201","n":"dumbbell burpee","bp":"cardio","eq":"dumbbell","tg":"cardiovascular system","mg":"quadriceps","img":null,"gif":null,"ru":"Начните в положении стоя, ноги на ширине плеч, в каждой руке по гантели. Опустите тело в присед, положив гантели на пол перед собой. Верните ноги в положение для отжимания, сохраняя тело прямой линией. Выполните отжимание, сгибая локти и опуская грудь к земле. Прыгните ногами назад к рукам и приземлитесь в приседе. Резко встаньте, подняв гантели от земли и поднеся их к плечам. Выжмите гантели над головой, полностью выпрямляя руки. Опустите гантели обратно на плечи и повторите всю последовательность желаемое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"high","sp":0,"kn":0,"sh":0,"ru_name":"Бёрпи с гантелями"},{"id":"0295","n":"dumbbell clean","bp":"upper legs","eq":"dumbbell","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите по гантели в каждой руке хватом сверху. Согните ноги в коленях и опустите бедра в положение приседа, держа спину прямо и грудь вверх. Взрывно выпрямите бедра и колени, задействуя пятки, чтобы оторваться от земли. Во время прыжка пожимайте плечами и подтягивайте гантели к плечам, удерживая их близко к телу. Возьмите гантели на уровне плеч, локти должны быть направлены вперед, а ладони — вверх. Опустите гантели обратно в исходное положение, выполняя движение в обратном направлении. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"low","sp":0,"kn":0,"sh":1,"ru_name":"Взятие гантелей на грудь"},{"id":"1731","n":"dumbbell close grip press","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Сядьте на ровную скамью, взяв в каждую руку по гантели, положив их на бедра. Используя бедра для поднятия гантелей, поднимайте гантели по одной так, чтобы вы могли держать их перед собой на ширине плеч. Оказавшись на ширине плеч, поверните запястья вперед так, чтобы ладони были обращены от вас. Это будет ваша исходная позиция. На вдохе медленно опустите гантели в сторону, пока они не окажутся примерно на уровне груди. На выдохе с помощью трицепсов поднимите гантели обратно в исходное положение. Обязательно задействуйте только трицепсы и не задействуйте предплечья или бицепсы для подъема гантелей. После второй паузы в сокращенном положении повторите движение заданное количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим гантелей узким хватом"},{"id":"0296","n":"dumbbell close-grip press","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Сядьте на ровную скамью, взяв в каждую руку по гантели, положив их на бедра. Используя бедра для поднятия гантелей, поднимайте гантели по одной так, чтобы вы могли держать их перед собой на ширине плеч. Оказавшись на ширине плеч, поверните запястья вперед так, чтобы ладони были обращены от вас. Это будет ваша исходная позиция. На вдохе медленно опустите гантели в сторону, пока они не окажутся примерно на уровне груди. На выдохе с помощью трицепсов поднимите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим гантелей узким хватом"},{"id":"0297","n":"dumbbell concentration curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на скамью, раздвиньте ноги и возьмите в одну руку гантель, положив локоть на внутреннюю часть бедра. Полностью выпрямите руку и возьмите гантель обратным хватом. Удерживая плечо неподвижно, выдохните и поднимите вес к плечу, одновременно сокращая бицепсы. Продолжайте поднимать гантель до тех пор, пока ваши бицепсы полностью не сократятся и гантель не окажется на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Концентрированное сгибание рук с гантелью"},{"id":"3635","n":"dumbbell contralateral forward lunge","bp":"upper legs","eq":"dumbbell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держа в каждой руке по гантели. Сделайте шаг вперед правой ногой, сохраняя спину прямой и напряженным корпусом. Опустите тело, согнув оба колена, пока правое бедро не станет параллельно земле. Оттолкнитесь правой пяткой, чтобы вернуться в исходное положение. Повторите с левой ногой. Чередуйте ноги необходимое количество повторений.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Выпад вперёд с гантелями разноимённой рукой"},{"id":"0298","n":"dumbbell cross body hammer curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, возьмите в каждую руку по гантели, ладони обращены к телу. Держите локти близко к туловищу, а плечи неподвижны. Выдохните и согните гантели, напрягая бицепсы, перемещая гантели поперек тела к противоположному плечу. Продолжайте поднимать гантели до тех пор, пока ваши бицепсы полностью не сократятся и гантели не окажутся на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно начните опускать гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Молотковое сгибание с гантелью поперёк тела"},{"id":"1657","n":"dumbbell cross body hammer curl v. 2","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, возьмите в каждую руку по гантели, ладони обращены к телу. Держите локти близко к туловищу, а плечи неподвижны. Выдохните и согните гантели, напрягая бицепсы, поднося гантели как можно ближе к противоположному плечу. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно начните опускать гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Молотковое сгибание с гантелью поперёк тела версия 2"},{"id":"0299","n":"dumbbell cuban press","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч, держа в каждой руке по гантели на уровне плеч ладонями вниз. Удерживая корпус напряженным и слегка согнутыми в локтях, поднимите гантели вверх и над головой, пока руки полностью не выпрямятся. Поверните запястья так, чтобы ладони были направлены вперед. Медленно опустите гантели обратно в исходное положение, поворачивая при этом запястья обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Кубинский жим с гантелями"},{"id":"2136","n":"dumbbell cuban press v. 2","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч, держа в каждой руке по гантели на уровне плеч ладонями вниз. Удерживая корпус напряженным, а спину прямой, поднимите гантели прямо над головой, пока руки полностью не выпрямятся. Поверните запястья так, чтобы ладони были направлены вперед. Опустите гантели обратно на высоту плеч, повернув запястья обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Кубинский жим с гантелями версия 2"},{"id":"0300","n":"dumbbell deadlift","bp":"upper legs","eq":"dumbbell","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, носки направлены вперед. Возьмите по гантели в каждую руку ладонями к телу, руки вытянуты вниз. Согните бедра и колени, опуская гантели к земле, сохраняя при этом спину прямой. Оттолкнитесь пятками и выпрямите бедра и колени, поднимая гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Становая тяга с гантелями"},{"id":"0301","n":"dumbbell decline bench press","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Лягте на наклонную скамью, зафиксировав ноги и опустив голову ниже бедер. Возьмите по гантели в каждую руку и вытяните руки прямо над грудью ладонями вперед. Медленно опустите гантели по бокам груди, держа локти под углом 90 градусов. Верните гантели в исходное положение, полностью выпрямив руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим гантелей на наклонной скамье вниз головой"},{"id":"0302","n":"dumbbell decline fly","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Лягте на наклонную скамью, зафиксировав ноги и опустив голову ниже бедер. Возьмите в каждую руку по гантели, ладони обращены друг к другу, руки вытянуты над грудью. Опускайте гантели в стороны по широкой дуге, пока не почувствуете растяжение в груди. Сделайте паузу на мгновение, затем сожмите мышцы груди, чтобы вернуть гантели в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разведение гантелей на наклонной скамье вниз головой"},{"id":"0303","n":"dumbbell decline hammer press","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Лягте на наклонную скамью, зафиксировав ноги и опустив голову ниже бедер. Возьмите в каждую руку по гантели, ладони обращены друг к другу, руки вытянуты над грудью. Опустите гантели по бокам груди, слегка согнув локти. Верните гантели в исходное положение, полностью выпрямив руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим гантелей молотковым хватом на наклонной скамье вниз головой"},{"id":"1276","n":"dumbbell decline one arm fly","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Лягте на наклонную скамью с гантелью в одной руке, положив ее на бедро. Используя бедро, чтобы поднять гантель, поднимите ее до ширины плеч ладонью к туловищу. Поверните запястье так, чтобы ладонь была обращена вперед. На вдохе медленно опустите гантель в сторону, пока не почувствуете растяжение в груди. Выдохните и задействуйте мышцы груди, чтобы вернуть гантель в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разведение одной гантели на наклонной скамье вниз головой"},{"id":"1617","n":"dumbbell decline one arm hammer press","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Лягте на наклонную скамью с гантелью в одной руке, положив ее на грудь. Вытяните руку прямо вверх, слегка согнув локоть. Опустите гантель к плечу, держа локоть близко к телу. Выжмите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим одной гантели молотковым хватом на наклонной скамье вниз головой"},{"id":"0305","n":"dumbbell decline shrug","bp":"back","eq":"dumbbell","tg":"traps","mg":"shoulders","img":null,"gif":null,"ru":"Установите наклонную скамью под углом 45 градусов. Лягте лицом вниз на скамью, прижавшись к ней грудью и животом. Возьмите по гантели в каждую руку, полностью вытянув руки к полу. Держа руки прямыми, поднимите плечи к ушам как можно выше. Задержите сокращение на мгновение, затем медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Шраги с гантелями на наклонной скамье вниз головой"},{"id":"0304","n":"dumbbell decline shrug v. 2","bp":"back","eq":"dumbbell","tg":"traps","mg":"shoulders","img":null,"gif":null,"ru":"Установите наклонную скамью под углом 45 градусов. Лягте лицом вниз на скамью, положив на нее грудь и живот. Возьмите по гантели в каждую руку ладонями друг к другу и полностью выпрямите руки. Держа руки прямыми, поднимите плечи как можно выше, сводя лопатки вместе. Удерживайте сокращение на короткую паузу, затем опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Шраги с гантелями на наклонной скамье вниз головой вариант 2"},{"id":"0306","n":"dumbbell decline triceps extension","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Лягте на наклонную скамью, опустив голову ниже ног, возьмите в каждую руку по гантели, ладони обращены друг к другу. Полностью выпрямите руки, держа локти близко к голове. Медленно опустите гантели за голову, сгибая локти. Сделайте паузу на мгновение, затем поднимите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание на трицепс с гантелями на наклонной скамье вниз головой"},{"id":"0307","n":"dumbbell decline twist fly","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Лягте на наклонную скамью так, чтобы голова была ниже бедер. Возьмите по гантели в каждую руку ладонями друг к другу, а руки вытяните прямо над грудью. Опускайте гантели в стороны по широкой дуге, пока не почувствуете растяжение в груди. Опуская гантели, поверните запястья так, чтобы ладони смотрели вперед в нижней части движения. Сделайте обратное движение и верните гантели в исходное положение, напрягая мышцы груди в верхней части. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разведение гантелей с поворотом на наклонной скамье вниз головой"},{"id":"1437","n":"dumbbell finger curls","bp":"lower arms","eq":"dumbbell","tg":"forearms","mg":"wrist flexors","img":null,"gif":null,"ru":"Сядьте на скамью или стул, поставив ноги на землю и выпрямив спину. Возьмите гантель в одну руку обратным хватом, положив предплечье на бедро ладонью вверх. Позвольте гантеле скатиться до кончиков пальцев, затем снова согните ее, согнув пальцы. Повторите необходимое количество повторений, затем переключитесь на другую руку.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание пальцами с гантелями"},{"id":"0308","n":"dumbbell fly","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Лягте на скамью, взяв в каждую руку по гантели, ладони обращены друг к другу. Вытяните руки прямо вверх над грудью, слегка согнув их в локтях. Сохраняя небольшой изгиб в локтях, опустите руки в стороны по широкой дуге, пока не почувствуете растяжение в груди. Сделайте паузу на мгновение, затем поменяйте направление движения и верните гантели в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разведение гантелей лёжа"},{"id":"1277","n":"dumbbell fly on exercise ball","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на гимнастический мяч и возьмите в каждую руку по гантели. Пройдите ногами вперед и перекатывайте тело вниз, пока ваша голова, шея и верхняя часть спины не будут поддержаны мячом. Вытяните руки прямо над грудью, ладони обращены друг к другу. Слегка согните локти и опустите руки в стороны по широкой дуге, пока не почувствуете растяжение в груди. Сделайте паузу на мгновение, затем поменяйте направление движения и напрягите мышцы груди, возвращая гантели в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разведение гантелей на фитболе"},{"id":"1732","n":"dumbbell forward lunge triceps extension","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держа в каждой руке по гантели. Сделайте шаг вперед правой ногой, опуская тело в положение выпада. Держите спину прямо и грудь вверх. Вытяните руки прямо над головой, держа локти близко к ушам. Опустите гантели за голову, согнув руки в локтях. Сделайте паузу на мгновение, затем выпрямите руки и вернитесь в исходное положение. Повторите движение желаемое количество повторений, затем поменяйте ноги и повторите.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":0,"kn":0,"sh":0,"ru_name":"Выпад вперёд с разгибанием на трицепс с гантелями"},{"id":"0310","n":"dumbbell front raise","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"biceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите по гантели в каждой руке ладонями к бедрам. Держа руки прямыми, выдохните и поднимите гантели перед собой до уровня плеч. Задержитесь на мгновение в верхней точке, затем вдохните и медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём гантелей перед собой"},{"id":"0309","n":"dumbbell front raise v. 2","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"trapezius","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите по гантели в каждой руке ладонями к бедрам. Держите спину прямо и задействуйте корпус. Медленно поднимите гантели перед собой, выпрямив руки, пока они не окажутся на уровне плеч. Задержитесь на мгновение в верхней точке, затем медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём гантелей перед собой вариант 2"},{"id":"0311","n":"dumbbell full can lateral raise","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"traps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите в каждой руке по гантели ладонями к телу. Держите спину прямо и задействуйте корпус. Поднимите руки в стороны, сохраняя небольшой изгиб в локтях, пока они не станут параллельны земле. Задержитесь на мгновение в верхней точке, затем медленно опустите руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём гантелей в стороны с полной амплитудой"},{"id":"1760","n":"dumbbell goblet squat","bp":"upper legs","eq":"dumbbell","tg":"quads","mg":"glutes","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, удерживая гантель вертикально у груди обеими руками. Удерживая грудь поднятой и напряженным корпус, опустите тело в присед, отведя бедра назад и согнув колени. Продолжайте опускаться до тех пор, пока ваши бедра не станут параллельны земле или настолько низко, насколько вам будет удобно. Задержитесь на мгновение внизу, затем оттолкнитесь пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Гоблет-приседания с гантелей"},{"id":"0313","n":"dumbbell hammer curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, возьмите в каждую руку по гантели, ладони обращены к туловищу. Держите локти близко к туловищу и поворачивайте ладони рук так, чтобы они смотрели вперед. Это будет ваша исходная позиция. Теперь, удерживая плечи неподвижно, выдохните и согните гантели, одновременно сокращая бицепсы. Продолжайте поднимать гири до тех пор, пока ваши бицепсы полностью не сократятся и гантели не окажутся на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Затем вдохните и медленно начните опускать гантели обратно в исходное положение. Повторите рекомендованное количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Молотковые сгибания с гантелями"},{"id":"1659","n":"dumbbell hammer curl on exercise ball","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на гимнастический мяч, поставив ноги на землю и выпрямив спину. Возьмите по гантели в каждую руку ладонями к телу и полностью выпрямленными руками. Удерживая плечи неподвижно, выдохните и согните гантели, одновременно напрягая бицепсы. Продолжайте поднимать гантели до тех пор, пока ваши бицепсы полностью не сократятся и гантели не окажутся на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно начните опускать гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Молотковые сгибания с гантелями на фитболе"},{"id":"0 нями вперед. Держите плечи неподвижно и поднимайте гантели как можно выше, одновременно напрягая бицепсы. Задержитесь на мгновение в верхней точке, затем медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Высокий подъём гантелей на бицепс"},{"id":"3545","n":"dumbbell incline alternate press","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на наклонную скамью, взяв в каждую руку по гантели, положив их на бедра. Откиньтесь на скамью и с помощью бедер поднимите гантели на высоту плеч, ладони смотрят вперед. Оказавшись на высоте плеч, поверните запястья так, чтобы ладони были обращены вперед. Поднимите гантели вверх грудью и плечами, полностью выпрямляя руки. Опустите гантели обратно в исходное положение, слегка согнув локти. Повторите желаемое количество повторений, чередуя руки.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Попеременный жим гантелей на наклонной скамье"},{"id":"0314","n":"dumbbell incline bench press","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Установите наклонную скамью под углом 45 градусов. Сядьте на скамью, поставьте ноги на землю и плотно прижмите спину к скамье. Возьмите по гантели в каждую руку ладонями вперед и поднимите их на высоту плеч. Медленно опустите гантели по бокам груди, держа локти под углом 90 градусов. Верните гантели в исходное положение, полностью выпрямив руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим гантелей на наклонной скамье"},{"id":"0315","n":"dumbbell incline biceps curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на наклонную скамью, взяв в каждую руку по гантели, ладонями вперед и полностью выпрямив руки. У ки, позволяя гантелям свисать прямо с плеч. Подтяните гантели к груди, сведя лопатки вместе. Задержитесь на мгновение в верхней точке, затем медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга гантелей на наклонной скамье"},{"id":"0328","n":"dumbbell incline shoulder raise","bp":"chest","eq":"dumbbell","tg":"serratus anterior","mg":"deltoids","img":null,"gif":null,"ru":"Установите наклонную скамью под углом 45 градусов и сядьте на нее, взяв в каждую руку по гантели ладонями вниз. Положите гантели на бедра и откиньтесь на скамью. Используйте бедра, чтобы поднять гантели на высоту плеч, затем поверните запястья так, чтобы ладони были направлены вперед. Выдохните и медленно поднимите гантели над головой, сохраняя небольшой изгиб в локтях. Задержитесь на мгновение в верхней точке, затем вдохните и медленно опустите гантели обратно на высоту плеч. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подъём плеч с гантелями на наклонной скамье"},{"id":"0329","n":"dumbbell incline shrug","bp":"back","eq":"dumbbell","tg":"traps","mg":"shoulders","img":null,"gif":null,"ru":"Установите наклонную скамью под углом 45 градусов и сядьте на нее, взяв в каждую руку по гантели. Поставьте ноги на землю и позвольте рукам свисать прямо вниз ладонями к телу. Держа руки прямыми, поднимите плечи как можно выше к ушам. Удерживайте напряжение на мгновение, затем медленно опустите плечи обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Шраги с гантелями на наклонной скамье"},{"id":"3542","n":"dumbbell incline t-raise","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"traps","img":null,"gif":null,"ru":"Установите наклонную скамью под углом 45 градусов и сядьте на нее, взяв в каждую руку по гантели ладонями внутрь. Наклонитесь вперед и позвольте рукам свисать прямо вниз, перпендикулярно полу. Держа руки прямыми, поднимите их в стороны, пока они не станут параллельны полу, образуя с телом Т-образную форму. Задержитесь на мгновение в верхней точке, затем медленно опустите руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём гантелей в стороны буквой T на наклонной скамье"},{"id":"0330","n":"dumbbell incline triceps extension","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на наклонную скамью, взяв в каждую руку по гантели ладонями внутрь. Вытяните руки полностью над головой, держа локти близко к голове. Опустите гантели за голову, согнув локти, сохраняя плечи неподвижными. Сделайте паузу на мгновение, затем поднимите гантели обратно в исходное положение, вытянув руки. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Разгибание на трицепс с гантелями на наклонной скамье"},{"id":"0331","n":"dumbbell incline twisted flyes","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Установите наклонную скамью под углом 45 градусов и сядьте на нее, взяв в каждую руку по гантели, ладонями друг к другу. Лягте на скамью и выжмите гантели в исходное положение прямо над грудью, вытянув руки. Опускайте гантели в стороны по широкой дуге, пока не почувствуете растяжение в груди. Опуская гантели, поворачивайте запястья так, чтобы ладони смотрели вперед в нижней части движения. Сделайте обратное движение и верните гантели в исходное положение, сжимая мышцы груди вместе в верхней части. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Разведение гантелей с поворотом на наклонной скамье"},{"id":"1733","n":"dumbbell incline two arm extension","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на наклонную скамью, взяв в каждую руку по гантели, положив их на бедра. Медленно лягте на скамью, держа гантели близко к груди. Как только вы полностью ляжете, вытяните руки прямо вверх к потолку, слегка согнутыми в локтях. Задержитесь на мгновение в верхней точке, затем медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание двумя руками с гантелями на наклонной скамье"},{"id":"3541","n":"dumbbell incline y-raise","bp":"back","eq":"dumbbell","tg":"upper back","mg":"shoulders","img":null,"gif":null,"ru":"Установите наклонную скамью под углом 45 градусов и сядьте на нее, взяв в каждую руку по гантели ладонями внутрь. Слегка наклонитесь вперед и позвольте рукам свисать прямо вниз, сохраняя небольшой изгиб в локтях. Поднимите руки в стороны и вверх в форме буквы Y, пока они не станут параллельны земле. Задержитесь на мгновение в верхней точке, затем медленно опустите руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём гантелей буквой Y на наклонной скамье"},{"id":"0332","n":"dumbbell iron cross","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держа по гантели в каждой руке по бокам. Поднимите руки в стороны, пока они не станут параллельны земле, образуя с телом Т-образную форму. Сделайте паузу на мгновение, затем медленно опустите руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Железный крест с гантелями"},{"id":"0333","n":"dumbbell kickback","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите в каждую руку по гантели. Слегка согните колени и наклонитесь вперед в бедрах, сохраняя спину прямой. Поднесите плечи к бокам, согнув локти под углом 90 градусов. Вытяните руки прямо назад, сжимая трицепсы в верхней точке движения. Сделайте паузу на мгновение, затем медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание гантелей в наклоне на трицепс"},{"id":"1734","n":"dumbbell kickbacks on exercise ball","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на гимнастический мяч, поставив ноги на землю и выпрямив спину. Возьмите по гантели в каждую руку ладонями внутрь и согните руки под углом 90 градусов. Вытяните руки прямо назад, сжимая трицепсы в верхней точке движения. Сделайте паузу на мгновение, затем медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание гантелей в наклоне на трицепс на фитболе"},{"id":"1660","n":"dumbbell kneeling bicep curl exercise ball","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте на колени на пол, положив перед собой мяч для упражнений. Положите локти на гимнастический мяч, держа в каждой руке по гантели ладонями вверх. Удерживая плечи неподвижно, выдохните и согните гантели, одновременно напрягая бицепсы. Продолжайте поднимать гантели до тех пор, пока ваши бицепсы полностью не сократятся и гантели не окажутся на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно начните опускать гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"kneeling","ax":"none","iap":"low","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Сгибание на бицепс с гантелями с колен на фитболе"},{"id":"0334","n":"dumbbell lateral raise","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"traps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите в каждую руку по гантели ладонями к телу. Держите спину прямо и задействуйте корпус. Поднимите руки в стороны до тех пор, пока они не станут параллельны полу, сохраняя небольшой изгиб в локтях. Задержитесь на мгновение в верхней точке, затем медленно опустите руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Разведение рук с гантелями в стороны"},{"id":"0335","n":"dumbbell lateral to front raise","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"trapezius","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите в каждой руке по гантели ладонями к телу. Держите спину прямо и задействуйте корпус. Поднимите руки в стороны до тех пор, пока они не станут параллельны земле, сохраняя небольшой изгиб в локтях. Задержитесь на мгновение в верхней точке, затем медленно опустите руки обратно в исходное положение. Затем поднимите руки перед собой, пока они не станут параллельны земле, снова сохраняя небольшой изгиб в локтях. Задержитесь на мгновение в верхней точке, затем медленно опустите руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подъём гантелей в стороны и перед собой"},{"id":"0336","n":"dumbbell lunge","bp":"upper legs","eq":"dumbbell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держа в каждой руке по гантели. Сделайте шаг вперед правой ногой, опуская тело в положение выпада. При опускании тела держите спину прямо и грудь вверх. Оттолкнитесь правой пяткой, чтобы вернуться в исходное положение. Повторите с левой ногой. Чередуйте ноги необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Выпады с гантелями"},{"id":"1658","n":"dumbbell lunge with bicep curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч, держа в каждой руке по гантели ладонями вперед. Сделайте шаг вперед правой ногой, опуская тело в положение выпада. Правое колено должно быть согнуто под углом 90 градусов, а левое колено должно парить над землей. Делая выпад вперед, одновременно подтягивайте гантели к плечам, держа локти близко к телу. Задержитесь на мгновение в нижней части выпада, затем оттолкнитесь правой пяткой, чтобы вернуться в исходное положение, опуская гантели обратно в стороны. Повторите выпад и сгибание бицепса на противоположной стороне, шагнув вперед левой ногой. Продолжайте чередовать стороны желаемое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Выпады с гантелями со сгибанием на бицепс"},{"id":"0337","n":"dumbbell lying extension (across face)","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Лягте на скамью, положив ноги на землю, а голову на край скамьи. Возьмите гантель обеими руками и вытяните руки прямо над грудью ладонями друг к другу. Удерживая плечи неподвижно, медленно опустите гантель по дуге за голову, пока предплечья не станут параллельны земле. Сделайте паузу на мгновение, затем напрягите трицепс, чтобы вернуть гантель в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Разгибание с гантелями лёжа из-за головы"},{"id":"1729","n":"dumbbell lying alternate extension","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Лягте на скамью, взяв в каждую руку по гантели, ладони обращены друг к другу. Вытяните руки прямо вверх над грудью, сохраняя небольшой изгиб в локтях. Опустите одну гантель к голове, сгибая в локте, сохраняя при этом другую руку вытянутой. Задержитесь на мгновение в нижней точке, затем поднимите гантель обратно в исходное положение. Повторите то же самое с другой рукой, чередуя стороны, необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Попеременное разгибание с гантелями лёжа"},{"id":"0338","n":"dumbbell lying elbow press","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Лягте на скамью, взяв в каждую руку по гантели, ладони обращены друг к другу, руки вытянуты прямо над грудью. Опустите гантели к плечам, сгибая локти, сохраняя плечи неподвижными. Задержитесь на мгновение в нижней точке, затем верните гантели в исходное положение, разгибая локти. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим гантелей лёжа с упором на локти"},{"id":"0863","n":"dumbbell lying external shoulder rotation","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"rotator cuff","img":null,"gif":null,"ru":"Лягте на бок на ровную скамью, прижав плечо к боку и согнув локоть на 90 градусов. Возьмите в руку гантель ладонью вниз. Прижимая плечо к боку, медленно поверните предплечье вверх как можно дальше. Задержитесь на мгновение в верхней точке, затем медленно опустите предплечье обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Наружная ротация плеча с гантелей лёжа"},{"id":"0339","n":"dumbbell lying femoral","bp":"upper legs","eq":"dumbbell","tg":"hamstrings","mg":"glutes","img":null,"gif":null,"ru":"Лягте на спину, вытянув ноги и положив гантель на нижнюю часть живота. Согните ноги в коленях и поднесите гантель к ягодицам, удерживая ступни на земле. Задержитесь на мгновение в верхней точке, затем медленно опустите гантель обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание ног с гантелей лёжа"},{"id":"0340","n":"dumbbell lying hammer press","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Лягте на скамью, взяв в каждую руку по гантели, ладони обращены друг к другу, руки вытянуты вверх. Опустите гантели по бокам груди, держа локти под углом 90 градусов. Верните гантели в исходное положение, полностью выпрямив руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим гантелей молотковым хватом лёжа"},{"id":"2470","n":"dumbbell lying on floor rear delt raise","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"trapezius","img":null,"gif":null,"ru":"Лягте на пол лицом вниз, возьмите в каждую руку по гантели, ладони обращены друг к другу. Вытяните руки прямо перед собой, сохраняя небольшой изгиб в локтях. Задействуя мышцы плеч, поднимите руки вверх и в стороны, сжимая лопатки вместе. Задержитесь на мгновение в верхней точке, затем медленно опустите руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём гантелей на задние дельты лёжа на полу"},{"id":"0341","n":"dumbbell lying one arm deltoid rear","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"trapezius","img":null,"gif":null,"ru":"Лягте лицом вниз на плоскую скамью с гантелью в одной руке ладонью внутрь. Вытяните руку прямо вниз к полу, держа ее близко к телу. Поднимите руку вверх и назад, прижимая лопатку к позвоночнику. Задержитесь на мгновение в верхней точке, затем медленно опустите руку обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разведение одной гантели на заднюю дельту лёжа"},{"id":"0343","n":"dumbbell lying one arm press","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Лягте на скамью с гантелью в одной руке, поставив ноги на землю. Держите гантель на уровне плеч ладонью вперед. Нажмите гантель вверх, пока рука полностью не выпрямится. Задержитесь на мгновение в верхней точке, затем медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем переключитесь на другую руку.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим одной гантели лёжа"},{"id":"0342","n":"dumbbell lying one arm press v. 2","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Лягте на скамью, поддерживая спину и поставив ступни на землю. Возьмите гантель в одну руку ладонью к ногам. Вытяните руку прямо вверх к потолку, слегка согнув локоть. Медленно опустите гантель к груди, держа локоть близко к телу. Задержитесь на мгновение в нижней точке, затем верните гантель в исходное положение. Повторите желаемое количество повторений, затем переключитесь на другую руку.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим одной гантели лёжа вариант 2"},{"id":"0344","n":"dumbbell lying one arm pronated triceps extension","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Лягте на скамью, поддерживая спину и голову, а ноги поставьте на землю. Возьмите гантель в одну руку ладонью вниз и вытяните руку прямо над плечом. Удерживая плечо неподвижно, медленно опустите гантель за голову, сгибая локоть. Задержитесь на мгновение в нижней точке, затем вытяните руку обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание одной рукой пронированным хватом с гантелей лёжа"},{"id":"0345","n":"dumbbell lying one arm rear lateral raise","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"traps","img":null,"gif":null,"ru":"Лягте лицом вниз на ровную скамью с гантелью в одной руке, свисающей к полу. Держите руку прямо и поднимите гантель в сторону, подальше от тела. Задержитесь на мгновение в верхней точке, затем медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем переключитесь на другую руку.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём одной гантели в сторону в наклоне лёжа"},{"id":"0346","n":"dumbbell lying one arm supinated triceps extension","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"forearms","img":null,"gif":null,"ru":"Лягте на скамью, поддерживая спину и голову, а ноги поставьте на землю. Возьмите гантель в одну руку обратным хватом и вытяните руку прямо над плечом. Удерживая плечо неподвижно, медленно опустите гантель за голову, сгибая локоть. Задержитесь на мгновение в нижней точке, затем вытяните руку обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание одной рукой супинированным хватом с гантелей лёжа"},{"id":"0347","n":"dumbbell lying pronation","bp":"lower arms","eq":"dumbbell","tg":"forearms","mg":"biceps","img":null,"gif":null,"ru":"Лягте на скамью грудью вниз и вытяните руки вниз, держа в каждой руке по гантели. Поверните ладони так, чтобы они были направлены вверх. Удерживая плечи неподвижно, выдохните и согните гантели, поворачивая ладони лицом вниз. Вдохните и медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Пронация с гантелей лёжа"},{"id":"2705","n":"dumbbell lying pronation on floor","bp":"lower arms","eq":"dumbbell","tg":"forearms","mg":"biceps","img":null,"gif":null,"ru":"Лягте на пол лицом вниз и вытяните руки прямо перед собой, держа в каждой руке по гантели. Поверните ладони так, чтобы они были направлены вниз к полу. Держа руки прямыми, поднимите гантели от пола, напрягая предплечья. Продолжайте поднимать до тех пор, пока предплечья не сократятся полностью и гантели не окажутся на уровне плеч. Задержитесь на мгновение, затем медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Пронация с гантелей лёжа на полу"},{"id":"1284","n":"dumbbell lying pullover on exercise ball","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Сядьте на мяч для упражнений и перекатывайтесь вперед, пока верхняя часть спины не окажется на мяче. Возьмите гантель обеими руками и вытяните руки прямо над грудью. Медленно опустите гантель за голову, сохраняя руки прямыми. Сделайте паузу на мгновение, затем поднимите гантель обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Пуловер с гантелей лёжа на фитболе"},{"id":"1328","n":"dumbbell lying rear delt row","bp":"back","eq":"dumbbell","tg":"upper back","mg":"shoulders","img":null,"gif":null,"ru":"Лягте лицом вниз на плоскую скамью, взяв в каждую руку по гантели ладонями внутрь. Вытяните руки прямо вниз к полу, сохраняя небольшой изгиб в локтях. Задействуя мышцы спины, поднимите гантели к груди, сведя лопатки вместе. Задержитесь на мгновение в верхней точке, затем медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга гантелей на задние дельты лёжа"},{"id":"0348","n":"dumbbell lying rear lateral raise","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"traps","img":null,"gif":null,"ru":"Лягте лицом вниз на плоскую скамью, взяв в каждую руку по гантели, ладони обращены друг к другу. Вытяните руки прямо вниз к полу, сохраняя небольшой изгиб в локтях. Задействуя мышцы плеч, поднимите руки в стороны, пока они не станут параллельны полу. Задержитесь на мгновение в верхней точке, затем медленно опустите руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём гантелей в стороны в наклоне лёжа"},{"id":"1735","n":"dumbbell lying single extension","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Лягте на скамью, возьмите в одну руку гантель и полностью вытяните руку над грудью. Контролируемо опустите гантель ко лбу, сохраняя плечо неподвижным. Сделайте короткую паузу в конце движения, затем вытяните руку обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание одной рукой с гантелей лёжа"},{"id":"0349","n":"dumbbell lying supination","bp":"lower arms","eq":"dumbbell","tg":"forearms","mg":"biceps","img":null,"gif":null,"ru":"Лягте на скамью, положив ноги на землю. Возьмите по гантели в каждую руку ладонями вверх и полностью выпрямите руки. Удерживая плечи неподвижно, согните гантели к плечам, напрягая предплечья. Задержитесь на мгновение в верхней точке, затем медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Супинация с гантелей лёжа"},{"id":"2706","n":"dumbbell lying supination on floor","bp":"lower arms","eq":"dumbbell","tg":"forearms","mg":"biceps","img":null,"gif":null,"ru":"Лягте на спину на пол, вытянув ноги и положив руки по бокам, держа в каждой руке по гантели. Пове
