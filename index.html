ка развернуты наружу. Положите штангу на верхнюю часть спины, положив ее на трапеции. Напрягите корпус и держите грудь поднятой, медленно опуская тело, сгибая колени и бедра. Продолжайте опускаться до тех пор, пока ваши бедра не станут параллельны земле или настолько низко, насколько вам будет удобно. Сделайте паузу на мгновение, затем оттолкнитесь пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Приседания на стул в Смите"},{"id":"0751","n":"smith close-grip bench press","bp":"upper arms","eq":"smith machine","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь на скамье, поставив ноги на землю. Возьмите штангу узким хватом, на расстоянии чуть уже ширины плеч. Опустите штангу к груди, держа локти близко к телу. Сделайте небольшую паузу в нижней точке, затем верните штангу в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим лёжа узким хватом в Смите"},{"id":"0752","n":"smith deadlift","bp":"upper legs","eq":"smith machine","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Установите машину Смита так, чтобы штанга находилась на уровне бедер. Встаньте, ноги на ширине плеч, носки слегка направлены наружу. Согните бедра и колени, держа спину прямо и грудь вверх, и возьмитесь за перекладину хватом сверху, чуть шире ширины плеч. Напрягите корпус и поднимите штангу, вытягивая бедра и колени, удерживая штангу близко к телу. Встаньте прямо, полностью выпрямив бедра и колени. Опустите штангу обратно вниз, сгибая бедра и колени, сохраняя контроль и сохраняя спину прямой. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Становая тяга в Смите"},{"id":"0753","n":"smith decline bench press","bp":"chest","eq":"smith machine","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Отрегулируйте наклонную скамью под желаемым углом. Лягте на скамью, зафиксировав ноги под подушечками для ног. Возьмите штангу хватом сверху на расстоянии чуть шире плеч. Освободите штангу и медленно опустите ее к груди, держа локти прижатыми. Сделайте паузу в нижней точке, затем поднимите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим на наклонной скамье вниз головой в Смите"},{"id":"0754","n":"smith decline reverse-grip press","bp":"chest","eq":"smith machine","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Отрегулируйте машину Смита в положение опускания. Лягте на скамью, зафиксировав ноги под подушечками для ног. Возьмите штангу обратным хватом, руки чуть шире плеч. Освободите штангу и опустите ее к груди, сохраняя локти прижатыми друг к другу. Задержитесь на мгновение в нижней точке, затем поднимите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим обратным хватом на наклонной скамье вниз головой в Смите"},{"id":"1433","n":"smith front squat (clean grip)","bp":"upper legs","eq":"smith machine","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Установите машину Смита так, чтобы штанга находилась на уровне плеч. Встаньте лицом к штанге, поставив ноги на ширине плеч. Возьмите штангу хватом сверху, на расстоянии чуть шире плеч. Сделайте шаг назад и поместите штангу на передние плечи, положив ее на ключицы и дельтоиды. Держите грудь поднятой, спину прямой и корпус напряженным. Опустите тело, согнув колени и бедра, как будто садитесь на стул. Продолжайте опускаться до тех пор, пока бедра не станут параллельны земле или немного ниже. Сделайте паузу на мгновение, затем оттолкнитесь пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Фронтальные приседания в Смите"},{"id":"3281","n":"smith full squat","bp":"upper legs","eq":"smith machine","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Установите машину Смита так, чтобы штанга находилась на уровне плеч. Встаньте, ноги на ширине плеч, носки слегка развернуты наружу. Встаньте под штангу и расположите ее на верхней части спины, опираясь на трапеции. Возьмитесь за перекладину, расставив руки чуть шире плеч. Снимите штангу и сделайте шаг назад, сохраняя устойчивую стойку. Удерживая грудь поднятой и напряженным корпус, начните приседать, отводя бедра назад и сгибая колени. Опускайте тело до тех пор, пока бедра не станут параллельны земле или настолько низко, насколько позволяет ваша гибкость. Задержитесь на мгновение внизу, затем ведите пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Глубокие приседания в Смите"},{"id":"0755","n":"smith hack squat","bp":"upper legs","eq":"smith machine","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Отрегулируйте штангу на машине Смита на высоту, подходящую для вашего тела. Встаньте, ноги на ширине плеч, носки слегка направлены наружу. Расположитесь под штангой, положив ее на верхнюю часть трапеции и плеч. Возьмите штангу хватом сверху, на расстоянии чуть шире плеч. Напрягите корпус и держите грудь поднятой, когда снимаете штангу со стоек. Сделайте шаг назад и поставьте ноги чуть шире плеч. Согните колени и опустите тело вниз, держа грудь вверх и спину прямо. Продолжайте опускаться до тех пор, пока ваши бедра не станут параллельны земле или немного ниже. Задержитесь на мгновение внизу, затем оттолкнитесь пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Гакк-приседания в Смите"},{"id":"0756","n":"smith hip raise","bp":"waist","eq":"smith machine","tg":"abs","mg":"glutes","img":null,"gif":null,"ru":"Встаньте на тренажер Смита, прислонившись спиной к подушке и поставив ноги на ширине плеч. Положите руки на штангу на расстоянии чуть шире ширины плеч. Задействуйте корпус и ягодицы, затем подтолкните пятки, чтобы поднять бедра от земли. Продолжайте подниматься до тех пор, пока ваше тело не образует прямую линию от колен до плеч. Задержитесь на мгновение в верхней точке, затем медленно опустите бедра обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём таза в Смите"},{"id":"0757","n":"smith incline bench press","bp":"chest","eq":"smith machine","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Отрегулируйте наклон скамьи на 30-45 градусов. Сядьте на скамью, прижав спину к подушке и твердо поставив ноги на землю. Возьмите штангу хватом сверху на расстоянии чуть шире плеч. Освободите штангу и медленно опустите ее к верхней части груди, слегка прижав локти. Сделайте паузу в нижней точке, затем поднимите штангу обратно в исходное положение, полностью выпрямляя руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим на наклонной скамье в Смите"},{"id":"0758","n":"smith incline reverse-grip press","bp":"chest","eq":"smith machine","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Отрегулируйте сиденье машины кузнеца под удобный угол наклона. Сядьте на тренажер, прислонившись спиной к подушке, а ноги поставьте на землю. Возьмите перекладину хватом сверху, на расстоянии чуть шире ширины плеч. Снимите штангу и медленно опустите ее к груди, держа локти прижатыми. Сделайте паузу, когда штанга окажется чуть выше груди. Верните штангу в исходное положение, полностью выпрямив руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим обратным хватом на наклонной скамье в Смите"},{"id":"0759","n":"smith incline shoulder raises","bp":"chest","eq":"smith machine","tg":"serratus anterior","mg":"deltoids","img":null,"gif":null,"ru":"Установите машину Смита в наклонное положение. Встаньте лицом к тренажеру, поставив ноги на ширине плеч. Возьмите штангу хватом сверху, на расстоянии чуть шире ширины плеч. Держите спину прямо и напрягите корпус. Поднимите штангу вверх к потолку, ведя локтями. Задержитесь на мгновение в верхней точке, затем медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подъёмы плеч на наклонной скамье в Смите"},{"id":"0760","n":"smith leg press","bp":"upper legs","eq":"smith machine","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Отрегулируйте сиденье и подножку кузнечного станка в удобное положение. Сядьте на тренажер спиной к спинке и поставьте ноги на подножку на ширине плеч. Возьмитесь за ручки или боковые стороны машины для устойчивости. Отодвиньте подножку от себя, вытянув ноги и прижимая спину к спинке. Задержитесь на мгновение в полностью выдвинутом положении. Медленно согните колени и опустите подножку обратно на себя, возвращаясь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Жим ногами в Смите"},{"id":"1434","n":"smith low bar squat","bp":"upper legs","eq":"smith machine","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Установите тренажер Смита со штангой на высоте, позволяющей удобно расположить ее на верхней части спины. Встаньте, ноги на ширине плеч, носки слегка развернуты наружу. Встаньте под штангу и положите ее на верхнюю часть спины, опираясь на трапеции. Возьмитесь за перекладину, расставив руки чуть шире плеч. Снимите штангу, выпрямив ноги и отойдя от стойки. Сделайте глубокий вдох и напрягите мышцы кора. Начните приседание, отведя бедра назад и согнув колени. Опускайте тело до тех пор, пока бедра не станут параллельны земле или немного ниже. На протяжении всего движения держите грудь поднятой, а спину прямой. Протолкните пятки, чтобы встать обратно, выпрямляя бедра и колени. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Приседания с низким положением грифа в Смите"},{"id":"1683","n":"smith machine bicep curl","bp":"upper arms","eq":"smith machine","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Отрегулируйте высоту грифа машины Смита так, чтобы она находилась на уровне талии. Встаньте лицом к машине Смита, поставив ноги на ширине плеч. Возьмите перекладину хватом снизу, руки на расстоянии чуть шире плеч. Держите локти близко к бокам, а плечи неподвижно. Выдохните и поднимите штангу к плечам, напрягая бицепсы. Задержитесь на мгновение в верхней точке движения, напрягая бицепсы. Вдохните и медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс в Смите"},{"id":"1625","n":"smith machine decline close grip bench press","bp":"upper arms","eq":"smith machine","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Установите скамью на машине Смита в наклонное положение. Лягте на скамью, твердо поставив ноги на землю. Возьмите штангу узким хватом, на расстоянии чуть уже ширины плеч. Снимите штангу и медленно опустите ее к груди, держа локти близко к телу. Сделайте паузу на мгновение, когда штанга окажется чуть выше груди. Верните штангу в исходное положение, полностью выпрямив руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим лёжа узким хватом на наклонной скамье вниз головой в Смите"},{"id":"1752","n":"smith machine incline tricep extension","bp":"upper arms","eq":"smith machine","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Отрегулируйте сиденье машины кузнеца так, чтобы штанга находилась на уровне плеч. Сядьте на скамью, прислонившись спиной к подушке, а ноги поставьте на землю. Возьмите штангу хватом сверху, на расстоянии чуть шире ширины плеч. Полностью выпрямите руки, подняв штангу со стойки и удерживая ее прямо над грудью. Медленно опустите штангу ко лбу, держа локти близко к голове. Сделайте небольшую паузу в нижней точке, затем поднимите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Французский жим на наклонной скамье в Смите"},{"id":"1626","n":"smith machine reverse decline close grip bench press","bp":"chest","eq":"smith machine","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Отрегулируйте машину Смита в положение опускания. Лягте на скамью, зафиксировав ноги под подушечками для ног. Возьмите штангу узким хватом, на расстоянии чуть уже ширины плеч. Освободите штангу и медленно опустите ее к груди, держа локти прижатыми. Сделайте паузу в нижней точке, затем поднимите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим обратным хватом узким хватом на наклонной скамье вниз головой в Смите"},{"id":"0761","n":"smith narrow row","bp":"back","eq":"smith machine","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь на тренажере, поставив ноги на пол. Возьмитесь за ручки хватом сверху, на расстоянии чуть уже ширины плеч. Держите спину прямо и грудь вверх, подтягивая рукоятки к телу, сжимая лопатки вместе. Задержитесь на мгновение на пике движения, затем медленно отпустите ручки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга узким хватом в Смите"},{"id":"1360","n":"smith one arm row","bp":"back","eq":"smith machine","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Отрегулируйте высоту грифа машины Смита до уровня талии. Встаньте лицом к машине Смита, поставив ноги на ширине плеч. Слегка согните колени и наклонитесь вперед в бедрах, сохраняя спину прямой. Возьмите перекладину одной рукой хватом сверху, ладонью вниз. Держите локоть близко к телу и потяните штангу к талии, сжимая лопатки вместе. Сделайте паузу на мгновение в верхней точке движения, затем медленно опустите штангу обратно в исходное положение. Повторите желаемое количество повторений, затем переключитесь на другую руку.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Тяга одной рукой в Смите"},{"id":"1393","n":"smith one leg floor calf raise","bp":"lower legs","eq":"smith machine","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Расположитесь на полу под стойкой станка Смита лицом от станка. Поставьте подушечки стоп на возвышенную поверхность, например, на блин или блок. Расположите гриф тренажера Смита на голенях чуть выше лодыжек. Держитесь за перекладину руками для устойчивости. Поднимите пятки от земли, вытянув лодыжки и подняв тело вверх. Сделайте паузу в верхней точке движения, затем медленно опустите пятки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носок одной ноги с пола в Смите"},{"id":"0762","n":"smith rear delt row","bp":"shoulders","eq":"smith machine","tg":"delts","mg":"trapezius","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь на машине так, чтобы грудь опиралась на подушку, а ступни стояли на земле. Возьмитесь за ручки хватом сверху, на расстоянии чуть шире плеч. Держите спину прямо, а корпус напряженным, подтягивая рукоятки к груди, сжимая лопатки вместе. Задержитесь на мгновение в верхней точке движения, затем медленно отпустите рукоятки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга к груди на задние дельты в Смите"},{"id":"0763","n":"smith reverse calf raises","bp":"lower legs","eq":"smith machine","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Отрегулируйте гриф машины Смита на высоту чуть ниже плеч. Встаньте лицом к перекладине, ноги на ширине плеч, носки направлены вперед. Поставьте подушечки стоп на край ступеньки или платформы, свесив пятки. Держитесь за перекладину для поддержки, сохраняя спину прямой и напряженный корпус. Поднимите пятки как можно выше, перенеся вес тела на подушечки стоп. Задержитесь на мгновение в верхней точке, затем медленно опустите пятки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носки обратным движением в Смите"},{"id":"1394","n":"smith reverse calf raises","bp":"lower legs","eq":"smith machine","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Отрегулируйте гриф машины Смита на высоту чуть ниже плеч. Встаньте лицом к перекладине, ноги на ширине плеч, носки направлены вперед. Поставьте подушечки стоп на край ступеньки или платформы, свесив пятки. Держитесь за перекладину для поддержки. Поднимите пятки как можно выше, поднимая тело на носки. Задержитесь на мгновение в верхней точке, затем медленно опустите пятки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носки обратным движением в Смите"},{"id":"1361","n":"smith reverse grip bent over row","bp":"back","eq":"smith machine","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Установите машину Смита так, чтобы штанга находилась на уровне бедер. Встаньте лицом к перекладине, ноги на ширине плеч. Слегка согните колени и наклонитесь вперед в бедрах, сохраняя спину прямой. Возьмитесь за перекладину хватом снизу, руки на ширине плеч. Потяните штангу к нижней части груди, сжимая лопатки вместе. Задержитесь на мгновение в верхней точке, затем медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Тяга в наклоне обратным хватом в Смите"},{"id":"0764","n":"smith reverse-grip press","bp":"chest","eq":"smith machine","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Отрегулируйте высоту грифа машины Смита до уровня груди. Встаньте лицом к перекладине, ноги на ширине плеч. Возьмите перекладину хватом сверху, руки на расстоянии чуть шире плеч. Сделайте шаг назад и расположитесь, слегка согнув колени. Держите грудь поднятой и напряженным корпусом на протяжении всего упражнения. Опустите штангу к груди, держа локти прижатыми друг к другу. Задержитесь на мгновение в нижней точке, затем поднимите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Жим обратным хватом в Смите"},{"id":"1395","n":"smith seated one leg calf raise","bp":"lower legs","eq":"smith machine","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Сядьте на тренажер спиной к подушке, а ногами на подножке. Поставьте одну ногу на подставку для ног, а другую ногу держите подальше от подставки для ног. Используя икроножные мышцы, поднимите пятку как можно выше. Задержитесь на мгновение в верхней точке, затем медленно опустите пятку обратно в исходное положение. Повторите необходимое количество повторений, затем поменяйте ногу и повторите.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носок одной ноги сидя в Смите"},{"id":"0765","n":"smith seated shoulder press","bp":"shoulders","eq":"smith machine","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья так, чтобы ручки находились на уровне плеч. Сядьте на тренажер, прислонившись спиной к подушке, а ноги поставьте на пол. Возьмитесь за рукоятки верхним хватом и поднимите их с опор, полностью выпрямив руки. Опустите рукоятки до уровня плеч, держа локти слегка согнутыми. Поднимите ручки над головой, пока руки полностью не выпрямятся. Задержитесь на мгновение в верхней точке, затем медленно опустите ручки обратно до уровня плеч. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Жим на плечи сидя в Смите"},{"id":"1426","n":"smith seated wrist curl","bp":"lower arms","eq":"smith machine","tg":"forearms","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на скамью перед тренажером Смита, поставив ноги на землю. Возьмите штангу хватом снизу, руки на ширине плеч. Положите предплечья на бедра, позволяя запястьям свисать. Медленно поднимите запястья вверх, поднося штангу к предплечьям. Задержитесь на мгновение в верхней точке, затем медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание запястий сидя в Смите"},{"id":"0766","n":"smith shoulder press","bp":"shoulders","eq":"smith machine","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь на машине Смита, поставив ноги на ширине плеч. Возьмите штангу хватом сверху, на расстоянии чуть шире ширины плеч. Снимите штангу со стойки и поместите ее на уровне плеч, согнув локти и повернув ладони вперед. Выжимайте штангу вверх до тех пор, пока руки полностью не выпрямятся над головой. Задержитесь на мгновение в верхней точке, затем медленно опустите штангу обратно до уровня плеч. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Жим на плечи в Смите"},{"id":"0767","n":"smith shrug","bp":"back","eq":"smith machine","tg":"traps","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч и слегка согнув колени. Возьмите штангу хватом сверху, руки на расстоянии чуть шире плеч. Держите руки прямыми, а плечи расслабленными. Поднимите плечи к ушам, сжимая трапеции вверху. Задержитесь на мгновение, затем медленно опустите плечи обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Шраги в Смите"},{"id":"0768","n":"smith single leg split squat","bp":"upper legs","eq":"smith machine","tg":"quads","mg":"glutes","img":null,"gif":null,"ru":"Встаньте перед машиной Смита, поставив ноги на ширине плеч. Поставьте одну ногу позади себя на скамью или ступеньку так, чтобы пальцы ног были направлены вперед. Держитесь за стержень машины Смита для устойчивости. Согните переднее колено и опустите тело в положение выпада, сохраняя спину прямой. Задержитесь на мгновение внизу, затем оттолкнитесь передней пяткой, чтобы вернуться в исходное положение. Повторите необходимое количество повторений, затем поменяйте ногу.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Сплит-приседания на одной ноге в Смите"},{"id":"0769","n":"smith sprint lunge","bp":"upper legs","eq":"smith machine","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Установите машину Смита так, чтобы штанга находилась на уровне бедер. Встаньте лицом к тренажеру, поставив ноги на ширине плеч. Сделайте шаг назад правой ногой и поставьте ее на штангу, положив верхнюю часть стопы на перекладину. Согните левое колено и опустите тело в положение выпада, сохраняя спину прямой. Оттолкнитесь левой пяткой, чтобы вернуться в исходное положение. Повторите то же самое в другую сторону, отступив левой ногой назад. Продолжайте чередовать стороны желаемое количество повторений.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Спринтерские выпады в Смите"},{"id":"0770","n":"smith squat","bp":"upper legs","eq":"smith machine","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Установите машину Смита со штангой на высоте, подходящей для вашего приседания. Встаньте, ноги на ширине плеч, носки слегка развернуты наружу. Расположитесь под штангой, положив ее на верхнюю часть трапеции и плеч. Возьмите штангу широким хватом, на расстоянии чуть шире ширины плеч. Напрягите корпус и снимите штангу со стойки, отступив назад, чтобы освободить стойку. Подняв грудь и спину прямо, начните приседание, сгибая бедра и колени. Опускайте тело до тех пор, пока бедра не станут параллельны земле или немного ниже. Задержитесь на мгновение внизу, затем ведите пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Приседания в Смите"},{"id":"0771","n":"smith standing back wrist curl","bp":"lower arms","eq":"smith machine","tg":"forearms","mg":"biceps","img":null,"gif":null,"ru":"Встаньте лицом к машине Смита, поставив ноги на ширине плеч. Возьмите штангу хватом сверху, руки на ширине плеч. Держите спину прямо, а локти близко к телу. Медленно поднимите запястья вверх, приближая штангу к телу. Задержитесь на мгновение в верхней точке, затем медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание запястий за спиной стоя в Смите"},{"id":"0772","n":"smith standing behind head military press","bp":"shoulders","eq":"smith machine","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья машины Смита так, чтобы штанга находилась на уровне плеч. Встаньте, поставив ноги на ширине плеч и слегка согнув колени. Возьмите штангу хватом сверху, на расстоянии чуть шире ширины плеч. Снимите штангу со стоек и отступите назад, сохраняя устойчивую стойку. Расположите штангу за головой, опираясь на верхние трапеции. На протяжении всего упражнения держите корпус напряженным, а грудь приподнятой. Нажмите на штангу над головой, вытянув руки и полностью выпрямив их. Сделайте короткую паузу в верхней части движения, затем медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Армейский жим из-за головы стоя в Смите"},{"id":"0773","n":"smith standing leg calf raise","bp":"lower legs","eq":"smith machine","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Отрегулируйте гриф машины Смита на такую ​​высоту, чтобы вы могли стоять, поставив ноги на землю, а плечи - под гриф. Встаньте под перекладиной, ноги на ширине плеч, носки ног направлены вперед. Положите руки на перекладину для устойчивости. Включите икроножные мышцы и медленно поднимите пятки от земли, поднимая тело на носки. Задержитесь на мгновение в верхней точке, затем медленно опустите пятки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носки на одной ноге стоя в Смите"},{"id":"0774","n":"smith standing military press","bp":"shoulders","eq":"smith machine","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч и слегка согнув колени. Возьмите штангу хватом сверху, на расстоянии чуть шире плеч. Снимите штангу со стойки и опустите ее на уровень плеч, ладонями вперед. Нажмите штангу вверх, пока руки полностью не выпрямятся над головой. Задержитесь на мгновение в верхней точке, затем медленно опустите штангу обратно до уровня плеч. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Армейский жим стоя в Смите"},{"id":"3142","n":"smith sumo squat","bp":"upper legs","eq":"smith machine","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Установите машину Смита так, чтобы штанга находилась на уровне бедер. Встаньте, расставив ноги шире плеч, носки наружу. Расположитесь под штангой, положив ее на верхнюю часть спины и плечи. Напрягите корпус и держите грудь поднятой, опуская тело в присед, отводя бедра назад и сгибая колени. Опускайтесь до тех пор, пока бедра не станут параллельны земле или настолько низко, насколько вам будет удобно. Задержитесь на мгновение внизу, затем оттолкнитесь пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Приседания сумо в Смите"},{"id":"1396","n":"smith toe raise","bp":"lower legs","eq":"smith machine","tg":"calves","mg":"ankles","img":null,"gif":null,"ru":"Отрегулируйте планку машины Смита на такую ​​высоту, чтобы вам было удобно стоять, поставив ноги на землю. Встаньте под перекладиной так, чтобы плечи находились прямо под ней, а ноги были на ширине плеч. Поставьте подушечки стоп на приподнятую платформу или блины так, чтобы пятки свисали с края. Возьмите штангу хватом сверху, на расстоянии чуть шире ширины плеч. Напрягите корпус и держите спину прямо на протяжении всего упражнения. Медленно поднимите пятки как можно выше, перенося вес тела на подушечки стоп. Задержитесь на мгновение в верхней точке, затем медленно опустите пятки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём носков в Смите"},{"id":"0775","n":"smith upright row","bp":"shoulders","eq":"smith machine","tg":"delts","mg":"traps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, лицом к машине Смита. Возьмите штангу хватом сверху, руки на расстоянии чуть шире плеч. Держите спину прямо, а корпус напряженным. Подтяните штангу к подбородку, ведя локтями. Задержитесь на мгновение в верхней точке, затем медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Тяга к подбородку в Смите"},{"id":"1308","n":"smith wide grip bench press","bp":"chest","eq":"smith machine","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Установите скамью в удобное положение на машине кузнеца. Лягте на скамью, положив ноги на землю. Возьмите штангу широким хватом, на расстоянии чуть шире ширины плеч. Снимите штангу и медленно опустите ее к груди, держа локти в стороны. Сделайте паузу на мгновение, когда штанга коснется вашей груди. Верните штангу в исходное положение, полностью выпрямив руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим лёжа широким хватом в Смите"},{"id":"1309","n":"smith wide grip decline bench press","bp":"chest","eq":"smith machine","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Отрегулируйте наклонную скамью под желаемым углом. Лягте на скамью, зафиксировав ноги под подушечками для ног. Возьмите штангу широким хватом, на расстоянии чуть шире ширины плеч. Снимите штангу и медленно опустите ее к груди, держа локти направленными наружу. Сделайте паузу на мгновение, когда штанга коснется вашей груди. Верните штангу в исходное положение, полностью выпрямив руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим лёжа широким хватом на наклонной скамье вниз головой в Смите"},{"id":"0776","n":"snatch pull","bp":"upper legs","eq":"barbell","tg":"quads","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, положите штангу на землю перед собой. Согните колени и наклоните бедра, чтобы опуститься в присед, удерживая штангу хватом сверху. Держите спину прямо и грудь вверх, поднимая пятки, чтобы поднять штангу с земли, вытягивая бедра и колени. Когда штанга достигнет уровня бедер, резко потяните ее вверх, пожимая плечами и отводя локти высоко и в стороны. Когда штанга достигнет своей высшей точки, быстро опуститесь под нее, приняв положение глубокого приседа. Возьмите штангу над головой, полностью выпрямив руки и согнув колени. Встаньте, вытянув бедра и колени, удерживая штангу над головой. Опустите штангу обратно в исходное положение, выполняя движение в обратном направлении. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":0,"ru_name":"Тяга рывковая"},{"id":"0777","n":"spell caster","bp":"waist","eq":"dumbbell","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, в одной руке возьмите гантель. Слегка согните ноги в коленях и наклонитесь вперед в талии, сохраняя спину прямой. Вытяните руку с гантелью к противоположной ноге, вращая при этом туловище. Вернитесь в исходное положение и повторите то же самое в другую сторону. Продолжайте чередовать стороны желаемое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Спелл-кастер с гантелями"},{"id":"1362","n":"sphinx","bp":"back","eq":"body weight","tg":"spine","mg":"glutes","img":null,"gif":null,"ru":"Лягте лицом вниз на пол, положив предплечья на пол, локти прямо под плечами. Напрягите корпус и поднимите грудь от земли, удерживая предплечья и пальцы ног на полу. Удерживайте это положение несколько секунд, следя за тем, чтобы шея оставалась в нейтральном положении. Медленно опустите грудь обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Поза сфинкса"},{"id":"0778","n":"spider crawl push up","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"core","img":null,"gif":null,"ru":"Начните с позиции для отжиманий, поставив руки чуть шире плеч, а ноги вместе. Поднесите правое колено к правому локтю, не отрывая его от земли. Возвращая правое колено назад, одновременно опустите тело к земле, сгибая локти. Вернитесь в исходное положение и повторите, подтянув левое колено к левому локтю. Продолжайте чередовать стороны желаемое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отжимания с подтягиванием колена паучьим шагом"},{"id":"1363","n":"spine stretch","bp":"back","eq":"body weight","tg":"spine","mg":"hamstrings","img":null,"gif":null,"ru":"Сядьте на пол, вытянув ноги перед собой. Положите руки на землю позади себя, пальцы направлены к телу. Напрягите корпус и медленно откиньтесь назад, сохраняя спину прямой. Продолжайте откидываться назад, пока не почувствуете растяжение в позвоночнике. Удерживайте растяжку несколько секунд, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка позвоночника"},{"id":"2329","n":"spine twist","bp":"waist","eq":"body weight","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Сядьте на пол, вытянув ноги перед собой. Согните колени и поставьте ступни на землю, на ширине плеч. Положите руки за голову локтями наружу. Напрягите пресс и медленно поверните туловище вправо, приближая правый локоть к левому колену. Сделайте небольшую паузу в конце поворота, затем медленно вернитесь в исходное положение. Повторите поворот в левую сторону, поднеся левый локоть к правому колену. Продолжайте чередовать стороны желаемое количество повторений.","pos":"seated","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Скручивание позвоночника"},{"id":"2368","n":"split squats","bp":"upper legs","eq":"body weight","tg":"quads","mg":"glutes","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч. Сделайте шаг вперед одной ногой и поставьте ее примерно на два фута перед другой ногой. Опустите тело, согнув колени и бедра, сохраняя спину прямой. Продолжайте опускаться до тех пор, пока переднее бедро не станет параллельно земле, а заднее колено не окажется прямо над землей. Сделайте паузу на мгновение, затем оттолкнитесь передней пяткой, чтобы вернуться в исходное положение. Повторите необходимое количество повторений, затем поменяйте ногу и повторите.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Сплит-приседания"},{"id":"0786","n":"squat jerk","bp":"upper legs","eq":"barbell","tg":"quads","mg":"glutes","img":null,"gif":null,"ru":"Начните с того, что штанга лежит на плечах, ноги на ширине плеч. Опустите тело в положение приседа, удерживая грудь поднятой, а колени касаясь пальцев ног. Достигнув нижней точки приседа, резко разведите ноги и вытолкните штангу над головой. Когда штанга достигнет пика, быстро опуститесь в положение шпагата, поставив одну ногу вперед, а другую назад. Возьмите штангу над головой, полностью вытянув руки и слегка касаясь земли задним коленом. Встаньте из позиции шпагата, снова сводя ноги вместе. Опустите штангу обратно на плечи и повторите желаемое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":0,"ru_name":"Толчок из приседа"},{"id":"1705","n":"squat on bosu ball","bp":"upper legs","eq":"bosu ball","tg":"quads","mg":"glutes","img":null,"gif":null,"ru":"Положите босу-шар на землю плоской стороной вверх. Встаньте, расставив ноги на ширине плеч, и расположитесь на вершине мяча босу. Опустите тело вниз, согнув колени и бедра, как будто садитесь на стул. Держите грудь поднятой, а вес тела перенесите на пятки. Опускайтесь до тех пор, пока бедра не станут параллельны земле. Сделайте паузу на мгновение, затем оттолкнитесь пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Приседания на босу"},{"id":"1685","n":"squat to overhead reach","bp":"upper legs","eq":"body weight","tg":"quads","mg":"glutes","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч и слегка развернув пальцы ног. Опустите тело в положение приседа, согнув колени и отведя бедра назад. Поднявшись из приседа, вытяните руки над головой, дотягиваясь до потолка. Вернитесь в исходное положение, опустив руки и согнув колени, чтобы снова присесть. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Приседания с вытягиванием рук над головой"},{"id":"1686","n":"squat to overhead reach with twist","bp":"upper legs","eq":"body weight","tg":"quads","mg":"glutes","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч и слегка развернув пальцы ног. Опустите тело в присед, согнув колени и отведя бедра назад. Поднявшись из приседа, поднимите руки над головой и поверните туловище в одну сторону. Вернитесь в исходное положение и повторите приседание, на этот раз повернув туловище в противоположную сторону. Продолжайте чередовать стороны при каждом повторении приседаний.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Приседания с вытягиванием рук над головой и поворотом"},{"id":"2297","n":"stability ball crunch (full range hands behind head)","bp":"waist","eq":"stability ball","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Сядьте на мяч для стабилизации, поставьте ступни на землю и согните колени под углом 90 градусов. Положите руки за голову локтями наружу. Включив пресс, медленно наклоните верхнюю часть тела вперед, приближая грудь к коленям. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Скручивания на фитболе с руками за головой в полную амплитуду"},{"id":"3291","n":"stalder press","bp":"upper arms","eq":"body weight","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Начните с того, что встаньте, поставив ноги на ширине плеч и вытянув руки над головой. Слегка согните колени и задействуйте корпус. Опустите тело в положение приседа, держа руки вытянутыми над головой. Приседая, прижмите руки к земле, задействуя трицепсы. Задержитесь на мгновение в нижней части приседа, затем оттолкнитесь пятками, чтобы снова встать, одновременно поднимая руки над головой. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":0,"ru_name":"Сталдер-выход в стойку"},{"id":"3669","n":"standing archer","bp":"back","eq":"body weight","tg":"upper back","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч и слегка согнув колени. Вытяните руки прямо перед собой на уровне плеч, параллельно земле. Поверните туловище вправо, держа руки вытянутыми и спину прямой. Во время вращения вытяните правую руку вперед, а левую назад, имитируя движение натягивания тетивы. Удерживайте положение на мгновение, затем вернитесь в исходное положение. Повторите движение, на этот раз повернув туловище влево и вытянув левую руку вперед, а правую назад. Продолжайте чередовать стороны желаемое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Стойка лучника стоя"},{"id":"0788","n":"standing behind neck press","bp":"shoulders","eq":"barbell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, и держите штангу за шеей хватом сверху. Держите спину прямо и напрягите корпус. Выжмите штангу над головой, вытянув руки и полностью разогнув локти. Задержитесь на мгновение в верхней точке, затем медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Жим из-за головы стоя"},{"id":"1490","n":"standing calf raise (on a staircase)","bp":"lower legs","eq":"body weight","tg":"calves","mg":"ankles","img":null,"gif":null,"ru":"Встаньте на край ступеньки или прочной платформы, свесив пятки и положив пальцы ног на ступеньку. При необходимости держитесь за перила или стену для равновесия. Медленно поднимите пятки как можно выше, перенося вес тела на подушечки стоп. Задержитесь на мгновение в верхней точке, затем медленно опустите пятки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носки стоя на ступеньке"},{"id":"1397","n":"standing calves","bp":"lower legs","eq":"body weight","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, носки направлены вперед. Поднимите пятки от земли как можно выше, встав на носки. Задержитесь в этом положении на мгновение, затем медленно опустите пятки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носки стоя"},{"id":"1398","n":"standing calves calf stretch","bp":"lower legs","eq":"body weight","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте лицом к стене или прочному предмету на расстоянии вытянутой руки. Place your hands on the wall or object at shoulder height. Сделайте шаг назад одной ногой, удерживая пятку на земле. Bend your front knee slightly and lean forward, keeping your back leg straight. Вы должны почувствовать растяжение икроножной мышцы. Удерживайте растяжку 20–30 секунд. Повторите на другой ноге.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка икр стоя"},{"id":"1599","n":"standing hamstring and calf stretch with strap","bp":"upper legs","eq":"rope","tg":"hamstrings","mg":"calves","img":null,"gif":null,"ru":"Встаньте прямо, ноги на ширине плеч. Возьмите ремешок обеими руками и наденьте его на подушечку стопы. Держите ногу прямо и медленно наклонитесь вперед от бедер, сохраняя спину прямой. Почувствуйте растяжение подколенных сухожилий и икроножных мышц. Удерживайте растяжку 20–30 секунд. Освободите растяжку и повторите с другой ногой. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка задней поверхности бедра и икры стоя с ремнём"},{"id":"0794","n":"standing lateral stretch","bp":"back","eq":"body weight","tg":"lats","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч и слегка согнув колени. Вытяните руки прямо в стороны, параллельно земле. Медленно наклоните верхнюю часть тела в сторону, чувствуя растяжение в боках и широчайших. Удерживайте растяжку 15–30 секунд. Вернитесь в исходное положение и повторите то же самое в другую сторону. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Боковая растяжка стоя"},{"id":"1364","n":"standing pelvic tilt","bp":"back","eq":"body weight","tg":"spine","mg":"abdominals","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч и слегка согнув колени. Положите руки на бедра или позвольте им свисать по бокам. Задействуйте мышцы корпуса и наклоните таз вперед, прижимая поясницу к стене позади себя. Удерживайте положение несколько секунд, затем расслабьтесь и вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Наклон таза стоя"},{"id":"0795","n":"standing single leg curl","bp":"upper legs","eq":"body weight","tg":"hamstrings","mg":"glutes","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, руки на бедрах. Перенесите вес тела на левую ногу и поднимите правую ногу от земли, согнув колено. Медленно подогните правую пятку к ягодицам, сжимая подколенное сухожилие. Задержитесь на мгновение в верхней точке, затем медленно опустите правую ногу обратно в исходное положение. Повторите необходимое количество повторений, затем поменяйте ногу.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание одной ноги стоя"},{"id":"0796","n":"standing wheel rollerout","bp":"waist","eq":"wheel roller","tg":"abs","mg":"lower back","img":null,"gif":null,"ru":"Начните с того, что встаньте прямо, ноги на ширине плеч и ролик-колесо перед собой. Согнитесь в талии и медленно катите колесо вперед, сохраняя спину прямой и напряженный корпус. Продолжайте перекатываться вперед до тех пор, пока не почувствуете растяжение мышц пресса и тело не выпрямится настолько, насколько это возможно. Сделайте паузу на мгновение, затем медленно поверните колесо обратно к телу, возвращаясь в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Раскатка ролика стоя"},{"id":"3223","n":"star jump (male)","bp":"cardio","eq":"body weight","tg":"cardiovascular system","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, руки по бокам. Слегка согните колени и резко подпрыгните вверх. Во время прыжка раздвиньте ноги и вытяните руки в стороны, образуя своим телом звездообразную форму. Мягко приземлитесь на подушечки стоп, слегка согнув колени. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"high","sp":1,"kn":0,"sh":1,"ru_name":"Прыжок звездой"},{"id":"2138","n":"stationary bike run v. 3","bp":"cardio","eq":"stationary bike","tg":"cardiovascular system","mg":"quadriceps","img":null,"gif":null,"ru":"Отрегулируйте высоту и положение сиденья, чтобы обеспечить правильное выравнивание. Поставьте ноги на педали и закрепите их ремнями, если таковые имеются. Start pedaling at a comfortable pace. Поддерживайте устойчивый ритм и увеличивайте сопротивление по желанию. Задействуйте основные мышцы, чтобы поддерживать устойчивость и правильную осанку. Продолжайте крутить педали в течение желаемой продолжительности тренировки. Постепенно уменьшайте сопротивление и замедляйтесь, прежде чем полностью остановиться. Разомните ноги и остыньте после тренировки.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Бег на велотренажёре"},{"id":"0798","n":"stationary bike walk","bp":"cardio","eq":"leverage machine","tg":"cardiovascular system","mg":"quadriceps","img":null,"gif":null,"ru":"Отрегулируйте высоту и положение сиденья на велотренажере, чтобы обеспечить правильное выравнивание. Поставьте ноги на педали и закрепите их ремнями, если таковые имеются. Начните крутить педали в удобном темпе, держа спину прямо и напрягая корпус. Поддерживайте устойчивый ритм и при желании увеличивайте уровень сопротивления. Продолжайте крутить педали в течение желаемой продолжительности кардио-тренировки. Охладитесь, постепенно снижая темп и уровень сопротивления. Растягивайте мышцы ног после тренировки, чтобы предотвратить напряжение и ускорить восстановление.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Ходьба на велотренажёре"},{"id":"3314","n":"straddle maltese","bp":"waist","eq":"body weight","tg":"abs","mg":"shoulders","img":null,"gif":null,"ru":"Начните с подвешивания на паре колец, полностью вытянув руки и выстроив тело по прямой линии. Широко разведите ноги в стороны, образуя положение сидя. Напрягите корпус и медленно опускайте тело, пока руки не станут параллельны земле. Удерживайте это положение несколько секунд, затем вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Мальтийский крест в разножке"},{"id":"3298","n":"straddle planche","bp":"waist","eq":"body weight","tg":"abs","mg":"shoulders","img":null,"gif":null,"ru":"Начните с позиции для отжиманий, поставив руки на ширине плеч и широко расставив ноги. Напрягите корпус и медленно перенесите вес вперед, перенося плечи на руки. Согните локти и опустите тело к земле, держа локти близко к бокам. Задержитесь на мгновение в нижней точке, затем подтолкните руки, чтобы выпрямить руки и поднять тело обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Планш в разножке"},{"id":"1427","n":"straight leg outer hip abductor","bp":"upper legs","eq":"body weight","tg":"abductors","mg":"glutes","img":null,"gif":null,"ru":"Лягте на бок, выпрямив ноги и положив их друг на друга. Поместите нижнюю руку под голову для поддержки. Напрягите корпус и поднимите верхнюю ногу как можно выше, не вращая бедрами и не отклоняясь назад. Задержитесь на мгновение в верхней точке, затем медленно опустите ногу обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отведение прямой ноги в сторону"},{"id":"0803","n":"superman push-up","bp":"chest","eq":"body weight","tg":"pectorals","mg":"core","img":null,"gif":null,"ru":"Начните с позиции высокой планки, расставив руки чуть шире плеч и поставив ноги вместе. Напрягите корпус и опустите тело к земле, держа локти близко к бокам. Опуская тело, одновременно поднимите правую руку и левую ногу от земли, вытягивая их прямо. Задержитесь на мгновение в верхней точке, затем опустите руку и ногу обратно вниз, одновременно возвращаясь в исходное положение. Повторите движение, на этот раз поднимая левую руку и правую ногу. Продолжайте чередовать стороны желаемое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отжимания супермен"},{"id":"0805","n":"suspended abdominal fallout","bp":"waist","eq":"body weight","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Прикрепите тренажер для подвески к высокой точке крепления и отрегулируйте ремни по высоте талии. Встаньте лицом от точки крепления и возьмитесь за ручки, вытянув руки перед собой. Наклонитесь вперед в талии, сохраняя тело прямым и напряженным корпусом. Опустите тело как можно ниже, сохраняя при этом контроль и напряжение в прессе. Задержитесь на мгновение в нижней точке, затем медленно поднимите тело обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Выкат корпуса вперёд в петлях"},{"id":"0806","n":"suspended push-up","bp":"chest","eq":"body weight","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Найдите тренажер для подвески и отрегулируйте его на подходящую высоту. Встаньте лицом от точки крепления и возьмитесь за ручки верхним хватом. Идите ногами вперед, наклоняя тело вперед, пока ваш вес не будет поддержан тренажером для подвески. Держите тело прямо от головы до пяток, задействуйте корпус и опустите грудь к ручкам. Оттолкнитесь грудью и руками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отжимания в петлях"},{"id":"0807","n":"suspended reverse crunch","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Повисните на перекладине, полностью вытянув руки и повернув ладони от себя. Напрягите корпус и поднимите колени к груди, подогнув таз к грудной клетке. Задержитесь на мгновение в верхней точке, затем медленно опустите колени обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратные скручивания в петлях"},{"id":"0808","n":"suspended row","bp":"back","eq":"body weight","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Установите тренажер для подвески на подходящей высоте. Встаньте лицом к точке крепления, поставив ноги на ширине плеч. Возьмитесь за ручки хватом сверху, ладонями друг к другу. Откиньтесь назад, держа тело прямо, а пятки на земле. Подтяните грудь к ручкам, сведя лопатки вместе. Задержитесь на мгновение в верхней точке, затем медленно опуститесь обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга в петлях"},{"id":"0809","n":"suspended split squat","bp":"upper legs","eq":"body weight","tg":"quads","mg":"glutes","img":null,"gif":null,"ru":"Встаньте лицом к тренажеру с подвеской, поставив ноги на ширине плеч. Вытяните одну ногу вперед и поместите верхнюю часть стопы в подставку для подвесного тренажера. Согните стоящую ногу и опустите тело в положение выпада, удерживая грудь вверх, а колено на одной линии с пальцами ног. Оттолкнитесь пяткой, чтобы вернуться в исходное положение. Повторите необходимое количество повторений, затем поменяйте ногу.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Сплит-приседания в петлях"},{"id":"3433","n":"swimmer kicks v. 2 (male)","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Лягте лицом вниз на коврик, вытянув руки над головой. Напрягите корпус и одновременно поднимите грудь и ноги от земли. Двигайте ногами вверх и вниз порхающими движениями, как будто вы плывете. Продолжайте выполнять удары ногами желаемое количество повторений. Опустите грудь и ноги обратно в исходное положение.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Плавательные махи ногами"},{"id":"3318","n":"swing 360","bp":"cardio","eq":"body weight","tg":"cardiovascular system","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч и слегка согнуты в коленях. Держите руки прямо перед собой, параллельно земле. Напрягите корпус и совершайте круговые движения руками, вращая при этом туловище. Продолжайте круговое движение, размахивая руками и вращая туловищем желаемое количество повторений. Не забывайте дышать на протяжении всего упражнения.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Мах гирей на 360 градусов"},{"id":"1753","n":"three bench dip","bp":"upper arms","eq":"body weight","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Сядьте на скамью, взявшись руками за край, пальцами вперед. Сдвиньте ягодицы со скамьи, поддерживая вес руками. Согните локти и опустите тело до тех пор, пока плечи не станут параллельны земле. Вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания от трёх скамей"},{"id":"2459","n":"tire flip","bp":"upper legs","eq":"tire","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч, лицом к шине. Согните колени и наклонитесь в бедрах, опускаясь в присед. Наклонитесь вниз и возьмитесь за нижний край шины обеими руками, пальцами к себе. Задействуйте ягодицы и мышцы ног и резко совершите движение ногами, чтобы поднять колесо с земли. Когда шина переворачивается, используйте силу верхней части тела, чтобы направлять ее и сохранять контроль. Как только шина полностью перевернется, быстро отступите назад и восстановите стойку. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"low","sp":0,"kn":0,"sh":0,"ru_name":"Переворот покрышки"},{"id":"0811","n":"trap bar deadlift","bp":"upper legs","eq":"trap bar","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, поставьте трэп-штангу на землю перед собой. Согните бедра и колени, чтобы опуститься вниз, и возьмитесь за ручки трэп-перекладины хватом сверху. Держите спину прямо и грудь вверх, когда начнете отрывать трэп-штангу от земли, вытягивая бедра и колени. Во время подъема сосредоточьтесь на том, чтобы двигаться пятками и сжимать ягодицы в верхней части движения. Опустите трэп-штангу обратно на землю, сгибая бедра и колени, сохраняя спину прямой на протяжении всего движения. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Становая тяга с трэп-грифом"},{"id":"0814","n":"triceps dip","bp":"upper arms","eq":"body weight","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Сядьте на край скамьи или стула, взявшись руками за край, пальцами вперед. Сдвиньте ягодицы со скамьи, поддерживая вес руками. Согните локти и опустите тело к земле, держа спину близко к скамье. Задержитесь на мгновение в нижней точке, затем вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания на брусьях на трицепс"},{"id":"0812","n":"triceps dip (bench leg)","bp":"upper arms","eq":"body weight","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Сядьте на край скамьи, взявшись руками за край, пальцами вперед. Пройдите ногами вперед, сдвинув ягодицы со скамьи, и выпрямите руки. Согните локти и опустите тело к земле, держа спину близко к скамье. Оттолкнитесь ладонями, чтобы выпрямить руки и вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания на трицепс от скамьи с упором ногами на скамью"},{"id":"0813","n":"triceps dip (between benches)","bp":"upper arms","eq":"body weight","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Сядьте на скамью, взявшись руками за край скамьи, пальцами вперед. Сдвиньте ягодицы со скамьи, поддерживая вес руками. Согните локти и опустите тело к земле, держа спину близко к скамье. Задержитесь на мгновение в нижней точке, затем вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания на трицепс между двумя скамьями"},{"id":"0815","n":"triceps dips floor","bp":"upper arms","eq":"body weight","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Сядьте на край стула или скамьи, положив руки рядом с бедрами, пальцами вперед. Сдвиньте задницу с передней части стула, вытянув ноги перед собой. Выпрямите руки, сохраняя небольшой изгиб в локтях, чтобы сохранить напряжение в трицепсах и локтевых суставах. Медленно согните локти, чтобы опустить тело к полу, пока локти не окажутся под углом примерно 90 градусов. Как только вы достигнете нижней точки движения, прижмитесь к стулу, чтобы выпрямить локти и вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания на трицепс с пола"},{"id":"0816","n":"triceps press","bp":"upper arms","eq":"body weight","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч и слегка согнув колени. Вытяните руки прямо перед собой, параллельно земле. Согните локти и опустите тело к земле, держа плечи близко к бокам. Задержитесь на мгновение в нижней точке, затем вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Жим на трицепс"},{"id":"0817","n":"triceps stretch","bp":"upper arms","eq":"body weight","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте или сядьте прямо, спина прямая. Вытяните одну руку над головой, согнув ее в локте. Положите противоположную руку на согнутый локоть и осторожно потяните ее к голове. Удерживайте растяжку 15–30 секунд, ощущая легкое растяжение в трицепсе. Освободите растяжку и повторите то же самое для другой руки.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка трицепса"},{"id":"0871","n":"tuck crunch","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Положите руки за голову локтями наружу. Включив пресс, поднимите лопатки от земли и подтяните колени к груди, одновременно сгибая верхнюю часть тела к коленям. Задержитесь на мгновение в верхней точке, затем медленно опустите лопатки и вытяните ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Скручивания с подтягиванием коленей"},{"id":"0818","n":"twin handle parallel grip lat pulldown","bp":"back","eq":"cable","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь лицом к канатной машине. Возьмитесь за рукоятки хватом сверху, руки на ширине плеч. Сядьте и расположите бедра под подушечками для бедер, удерживая ступни ровно на полу. Слегка откиньтесь назад и держите грудь вверх, сохраняя нейтральное положение позвоночника. Потяните ручки вниз к верхней части груди, сжимая лопатки вместе. Сделайте паузу на мгновение в нижней части движения, чувствуя сокращение широчайших мышц. Медленно отпустите ручки и вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга верхнего блока с параллельной двойной рукоятью"},{"id":"1466","n":"twist hip lift","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"obliques","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Положите руки по бокам для поддержки. Напрягите ягодицы и поднимите бедра от земли, образуя прямую линию от колен до плеч. Удерживая бедра поднятыми, поверните нижнюю часть тела вправо, приближая колени к земле. Вернитесь в исходное положение и повторите поворот в левую сторону. Продолжайте чередовать скручивания желаемое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём таза с поворотом"},{"id":"2802","n":"twisted leg raise","bp":"waist","eq":"body weight","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Лягте на спину, вытянув ноги и положив руки по бокам. Положите руки под ягодицы для поддержки. Напрягите пресс и поднимите обе ноги от земли, удерживая их прямыми. Поднимая ноги, поверните бедра в одну сторону, приближая ноги к противоположному плечу. Задержитесь на мгновение в верхней точке, затем медленно опустите ноги обратно в исходное положение. Повторите движение, на этот раз повернув бедра в другую сторону. Продолжайте чередовать стороны желаемое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Подъём ног с поворотом"},{"id":"2801","n":"twisted leg raise (female)","bp":"waist","eq":"body weight","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Лягте на спину, вытянув ноги и положив руки по бокам. Согните ноги в коленях и оторвите ноги от земли, поднеся их к груди. Поднимая ноги, поверните бедра в одну сторону, приближая колени к противоположному плечу. Задержитесь на мгновение в верхней точке, затем медленно опустите ноги обратно в исходное положение. Повторите движение, на этот раз повернув бедра в другую сторону. Продолжайте чередовать стороны желаемое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Подъём ног с поворотом"},{"id":"3231","n":"two toe touch (male)","bp":"back","eq":"body weight","tg":"spine","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, руки вытянуты в стороны. Наклонитесь вперед в талии, сохраняя спину прямой и слегка согнутыми в коленях. Потянитесь обеими руками к пальцам ног, держа ноги прямыми. Задержитесь на мгновение в нижней точке, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Касание носков двумя руками"},{"id":"1365","n":"upper back stretch","bp":"back","eq":"body weight","tg":"upper back","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте прямо, ноги на ширине плеч. Вытяните руки прямо перед собой, параллельно земле. Переплетите пальцы и поверните ладони от тела. Медленно поднимите руки над головой, держа их прямыми и параллельными друг другу. Поднимая руки, сведите лопатки вместе. Удерживайте растяжку 15–30 секунд, затем отпустите и повторите.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка верха спины"},{"id":"1366","n":"upward facing dog","bp":"back","eq":"body weight","tg":"spine","mg":"shoulders","img":null,"gif":null,"ru":"Лягте на пол лицом вниз, вытянув ноги позади себя. Положите руки на пол рядом с нижними ребрами, пальцы направлены вперед. Плотно прижмите руки к полу и выпрямите руки, отрывая туловище и бедра от земли. Поверните плечи назад и вниз, раскрывая грудь и подняв взгляд к потолку. Задержитесь в этом положении на несколько вдохов, затем медленно опустите тело обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Поза собаки мордой вверх"},{"id":"3420","n":"v-sit on floor","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Сядьте на пол, вытянув ноги перед собой. Слегка откиньтесь назад и оторвите ноги от земли, сохраняя их прямыми. Одновременно поднимите верхнюю часть тела от земли и протяните руки к ногам. Удерживайте это положение несколько секунд, затем медленно опустите верхнюю часть тела и ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Уголок сидя на полу"},{"id":"0826","n":"vertical leg raise (on parallel bars)","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Повисните на параллельных брусьях, полностью вытянув руки и выпрямив тело. Напрягите корпус и поднимите ноги перед собой, сохраняя их прямыми. Продолжайте поднимать, пока ваши ноги не станут параллельны земле или немного выше. Задержитесь на мгновение в верхней точке, затем медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Подъём ног в висе на брусьях"},{"id":"2141","n":"walk elliptical cross trainer","bp":"cardio","eq":"elliptical machine","tg":"cardiovascular system","mg":"quadriceps","img":null,"gif":null,"ru":"Отрегулируйте уровень сопротивления и наклон эллиптического тренажера до желаемых настроек. Встаньте на педали машины и слегка возьмитесь за ручки. Начните с отталкивания ногами и подтягивания ручек к телу. Продолжайте это движение, чередуя толкание и вытягивание, чтобы имитировать ходьбу или бег. Поддерживайте устойчивый темп и задействуйте корпус на протяжении всего упражнения. Продолжайте кардио-тренировку в течение желаемой продолжительности. Постепенно уменьшайте интенсивность и скорость тренажера, прежде чем сойти с него.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Ходьба на эллиптическом тренажёре"},{"id":"3655","n":"walking high knees lunge","bp":"cardio","eq":"body weight","tg":"cardiovascular system","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, расставив ноги на ширине плеч. Поднимите правое колено к груди как можно выше, балансируя на левой ноге. Сделайте шаг вперед правой ногой и опустите тело в положение выпада, сгибая оба колена под углом 90 градусов. Оттолкнитесь правой ногой и поднимите левое колено к груди. Сделайте шаг вперед левой ногой и опустите тело в положение выпада. Продолжайте чередовать ноги и делать выпады вперед, напрягая корпус и сохраняя постоянный темп. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"low","sp":1,"kn":0,"sh":1,"ru_name":"Выпады с высоким подъёмом колена в ходьбе"},{"id":"1460","n":"walking lunge","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч. Сделайте шаг вперед правой ногой, опуская тело в положение выпада. Держите туловище прямо, а переднее колено на одной линии с лодыжкой. Оттолкнитесь правой ногой и вынесите левую ногу вперед, приняв положение выпада левой ногой. Продолжайте чередовать ноги и идти вперед, сохраняя контролируемый и устойчивый темп. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Выпады в ходьбе"},{"id":"3666","n":"walking on incline treadmill","bp":"cardio","eq":"leverage machine","tg":"cardiovascular system","mg":"quadriceps","img":null,"gif":null,"ru":"Отрегулируйте уровень наклона беговой дорожки до желаемой интенсивности. Встаньте на беговую дорожку, поставив ноги на ширине плеч. Начните ходить в удобном темпе, следя за тем, чтобы поддерживать правильную форму. Задействуйте мышцы корпуса и держите спину прямо на протяжении всего упражнения. Продолжайте ходить по наклонной беговой дорожке в течение желаемой продолжительности кардиотренировки. Постепенно уменьшайте наклон и скорость беговой дорожки, чтобы она остыла перед остановкой.","pos":"standing","ax":"low","iap":"low","imp":"low","sp":1,"kn":1,"sh":1,"ru_name":"Ходьба по беговой дорожке с наклоном"},{"id":"2311","n":"walking on stepmill","bp":"cardio","eq":"stepmill machine","tg":"cardiovascular system","mg":"quadriceps","img":null,"gif":null,"ru":"Отрегулируйте шаговую дорожку до комфортного уровня. Встаньте на тренажер и положите руки на поручни для поддержки. Начните ходьбу, поставив одну ногу на ступеньку, а затем другую, чередуя ноги. Сохраняйте вертикальное положение и задействуйте мышцы корпуса. Продолжайте идти желаемое время или расстояние. Постепенно увеличивайте интенсивность или скорость по мере того, как вы будете чувствовать себя более комфортно в выполнении упражнения. Не забудьте остыть и растянуться после завершения упражнения.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Ходьба на лестничном тренажёре"},{"id":"0830","n":"weighted bench dip","bp":"upper arms","eq":"weighted","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Сядьте на скамью, взявшись руками за край, пальцами вперед. Сдвиньте ягодицы со скамьи, поддерживая вес руками. Опустите тело, сгибая локти, пока плечи не станут параллельны полу. Вернитесь в исходное положение, выпрямляя руки. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания от скамьи на трицепс с отягощением"},{"id":"2987","n":"weighted close grip chin-up on dip cage","bp":"back","eq":"weighted","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Встаньте перед клеткой и возьмитесь за параллельные брусья хватом снизу, руки на ширине плеч. Повисните на перекладинах, полностью вытянув руки, оторвав ноги от земли и выпрямив тело. Задействуйте мышцы спины и подтяните тело к перекладинам, держа локти близко к бокам. Продолжайте тянуть, пока подбородок не окажется над перекладинами, затем сделайте паузу на мгновение. Медленно опустите тело обратно в исходное положение, полностью выпрямив руки. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подтягивания узким хватом с отягощением на станции для брусьев"},{"id":"3643","n":"weighted cossack squats (male)","bp":"upper legs","eq":"weighted","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, поставив ноги шире ширины плеч, носки слегка направлены наружу. Держите гирю перед грудью обеими руками. Перенесите вес тела в одну сторону и опустите тело, согнув колено той стороны, в которую вы сместились, сохраняя при этом другую ногу прямой. Опускайтесь как можно ниже, сохраняя равновесие и поднимая грудь вверх. Оттолкнитесь пяткой согнутой ноги, чтобы вернуться в исходное положение. Повторите то же самое с другой стороны, чередуя ноги.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Казацкие приседания с отягощением"},{"id":"0832","n":"weighted crunch","bp":"waist","eq":"weighted","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Держите блин или гантель на груди. Напрягите пресс и поднимите верхнюю часть тела от земли, наклоняясь вперед, пока лопатки не оторвутся от земли. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Скручивания с отягощением"},{"id":"3670","n":"weighted decline sit-up","bp":"waist","eq":"weighted","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на наклонную скамью, зафиксировав ступни под подушечками для ног. Положите руки за голову или на грудь. Напрягите пресс и медленно поднимите верхнюю часть тела со скамьи, наклоняясь вперед, пока туловище не станет перпендикулярно земле. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Подъём корпуса на наклонной скамье вниз головой с отягощением"},{"id":"0833","n":"weighted donkey calf raise","bp":"lower legs","eq":"weighted","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте на приподнятую платформу, положив пальцы ног на край и свесив пятки. Держитесь за устойчивый объект для поддержки. Поднимите пятки как можно выше, вытянув лодыжки. Задержитесь на мгновение в верхней точке, затем медленно опустите пятки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носки ослик с отягощением"},{"id":"1310","n":"weighted drop push up","bp":"chest","eq":"weighted","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Начните с позиции высокой планки, расставив руки чуть шире плеч и поставив ноги вместе. Опустите грудь к земле, держа локти близко к телу. Как только ваша грудь окажется над землей, резко подтолкните себя вверх, отрывая руки от земли. Отжимаясь, быстро разведите руки в стороны и немного вперед, позволяя телу опуститься к земле. Поймайте себя, поставив руки в более широкое положение, и сразу же снова опустите грудь к земле. Повторите движение отжимания, опускаясь вниз и ловя руки в более узком положении. Продолжайте чередовать более широкие и более узкие положения рук необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"low","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания с хлопком и отягощением"},{"id":"2135","n":"weighted front plank","bp":"waist","eq":"weighted","tg":"abs","mg":"shoulders","img":null,"gif":null,"ru":"Для начала лягте на пол лицом вниз. Положите предплечья на землю так, чтобы локти находились прямо под плечами. Вытяните ноги прямо позади себя, положив пальцы ног на землю. Напрягите корпус и поднимите тело от земли, балансируя на предплечьях и пальцах ног. Держите тело на прямой линии от головы до пяток. Удерживайте это положение желаемое время. Опустите тело обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Планка на локтях с отягощением"},{"id":"0834","n":"weighted front raise","bp":"shoulders","eq":"weighted","tg":"delts","mg":"biceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите по гантели в каждой руке ладонями к бедрам. Держа руки прямыми, выдохните и поднимите гантели перед собой до уровня плеч. Задержитесь на мгновение в верхней точке, затем вдохните и медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подъём рук перед собой с отягощением"},{"id":"0866","n":"weighted hanging leg-hip raise","bp":"waist","eq":"weighted","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Повисните на перекладине, полностью вытянув руки и повернув ладони от себя. Напрягите корпус и поднимите ноги перед собой, сохраняя их прямыми. Продолжайте поднимать, пока ваши ноги не станут параллельны земле или немного выше. Задержитесь на мгновение в верхней точке, затем медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Подъём ног и таза в висе с отягощением"},{"id":"0835","n":"weighted hyperextension (on stability ball)","bp":"back","eq":"weighted","tg":"spine","mg":"glutes","img":null,"gif":null,"ru":"Расположитесь лицом вниз на мяче для стабилизации, опираясь бедрами на мяч, а ступнями упираясь в стену для устойчивости. Заведите руки за голову или скрестите их на груди. Напрягите корпус и медленно поднимите верхнюю часть тела с мяча, вытягивая спину, пока тело не образует прямую линию. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Гиперэкстензия на фитболе с отягощением"},{"id":"3641","n":"weighted kneeling step with swing","bp":"shoulders","eq":"weighted","tg":"delts","mg":"triceps
