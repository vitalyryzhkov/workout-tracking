","img":null,"gif":null,"ru":"Начните в положении стоя на коленях, расставив колени на ширине плеч и выпрямив спину. Возьмите по гантели в каждую руку, вытянув руки прямо перед собой. Напрягите корпус и поднимите гири вверх и над головой, держа руки прямыми. Опустите гири обратно в исходное положение и повторите желаемое количество повторений.","pos":"kneeling","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Шаг с колена с махом и отягощением"},{"id":"3644","n":"weighted lunge with swing","bp":"upper legs","eq":"weighted","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держа в каждой руке по гире. Сделайте шаг вперед правой ногой, опуская тело в положение выпада. Делая выпад вперед, делайте махи гантелями вперед и вверх, держа руки прямыми. Оттолкнитесь правой ногой и вернитесь в исходное положение, опуская гирю обратно. Повторите то же самое левой ногой и продолжайте чередовать ноги желаемое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Выпады с махом и отягощением"},{"id":"3286","n":"weighted muscle up","bp":"back","eq":"weighted","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Начните с подвешивания на перекладине, повернув ладонями от себя и расставив руки чуть шире плеч. Напрягите корпус и подтяните тело к перекладине, ведя грудью. Достигнув вершины движения, поменяйте хват так, чтобы ладони были обращены к вам. Продолжайте подтягиваться до тех пор, пока грудь не достигнет перекладины, затем сделайте паузу на мгновение. Медленно опуститесь обратно в исходное положение, сохраняя контроль на протяжении всего движения. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"high","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Выход силой с отягощением"},{"id":"3312","n":"weighted muscle up (on bar)","bp":"back","eq":"weighted","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Начните с подвешивания на перекладине, повернув ладонями от себя и расставив руки чуть шире плеч. Напрягите корпус и потяните лопатки вниз и назад. Согните локти и подтяните грудь к перекладине, сохраняя тело прямым. Как только ваша грудь достигнет перекладины, оттолкнитесь руками и отведите локти назад, поднимая тело над перекладиной. Сделайте паузу в верхней точке движения, затем медленно опуститесь обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"high","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Выход силой на турнике с отягощением"},{"id":"3290","n":"weighted one hand pull up","bp":"back","eq":"weighted","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Возьмитесь за перекладину хватом сверху, на расстоянии чуть шире плеч. Повисните на перекладине, полностью вытянув руку и выпрямив тело. Напрягите корпус и подтяните тело к перекладине, сгибая локоть и напрягая мышцы спины. Продолжайте тянуть, пока подбородок не окажется над перекладиной. Опустите тело обратно в исходное положение, контролируя его. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подтягивания на одной руке с отягощением"},{"id":"0840","n":"weighted overhead crunch (on stability ball)","bp":"waist","eq":"weighted","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Сядьте на мяч, поставив ступни на землю и согнув колени под углом 90 градусов. Возьмите блин или гантель обеими руками и вытяните руки над головой. Напрягите пресс и медленно согните туловище вперед, приближая грудь к коленям. Задержитесь на мгновение в верхней точке, затем медленно опустите туловище обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Скручивания с руками над головой на фитболе с отягощением"},{"id":"0841","n":"weighted pull-up","bp":"back","eq":"weighted","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Возьмитесь за перекладину хватом сверху, на расстоянии чуть шире плеч. Повисните на перекладине, полностью вытянув руки и выпрямив тело. Напрягите мышцы спины и подтяните тело к перекладине, держа локти близко к телу. Продолжайте тянуть, пока подбородок не окажется над перекладиной. Задержитесь на мгновение в верхней точке, затем медленно опустите тело обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подтягивания с отягощением"},{"id":"0844","n":"weighted round arm","bp":"shoulders","eq":"weighted","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите в каждую руку по гантели. Слегка согните колени и наклонитесь вперед в бедрах, сохраняя спину прямой. Поднимите руки в стороны, сохраняя небольшой изгиб в локтях. Продолжайте поднимать руки, пока они не станут параллельны земле. Задержитесь на мгновение в верхней точке, затем медленно опустите руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Круговые махи рукой с отягощением"},{"id":"0846","n":"weighted russian twist","bp":"waist","eq":"weighted","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Сядьте на пол, согните колени и поставьте ступни на пол. Держите гирю или медицинский мяч обеими руками перед грудью. Слегка откиньтесь назад, сохраняя спину прямой и напряженный корпус. Медленно поверните туловище вправо, приближая гирю или медицинский мяч к полу с правой стороны. Сделайте паузу на мгновение, затем поверните туловище влево, перемещая гирю или медицинский мяч к полу с левой стороны. Продолжайте чередовать стороны желаемое количество повторений.","pos":"seated","ax":"none","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Русские скручивания с отягощением"},{"id":"0845","n":"weighted russian twist (legs up)","bp":"waist","eq":"weighted","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Сядьте на землю, согните колени и оторвите ступни от земли, держа ноги вместе. Держите вес обеими руками перед грудью, слегка согнув локти. Слегка откиньтесь назад, чтобы задействовать мышцы корпуса. Поверните туловище вправо, перенося вес тела на землю с правой стороны. Сделайте паузу на мгновение, затем поверните туловище влево, перенося вес тела на землю с левой стороны. Продолжайте чередовать стороны желаемое количество повторений.","pos":"seated","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Русские скручивания с поднятыми ногами и отягощением"},{"id":"2371","n":"weighted russian twist v. 2","bp":"waist","eq":"weighted","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Сядьте на пол, согните колени и поставьте ступни на пол. Держите гирю обеими руками перед грудью. Слегка откиньтесь назад, чтобы задействовать мышцы корпуса. Поверните туловище вправо, перенеся вес на правую сторону тела. Сделайте паузу на мгновение, затем поверните туловище влево, перенеся вес на левую сторону тела. Продолжайте чередовать стороны желаемое количество повторений.","pos":"seated","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Русские скручивания с отягощением"},{"id":"0847","n":"weighted seated bicep curl (on stability ball)","bp":"upper arms","eq":"medicine ball","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на мяч, поставив ноги на землю и выпрямив спину. Держите медицинский мяч хватом снизу ладонями вверх, руки свисают по бокам. Удерживая плечи неподвижно, выдохните и поднимите медицинский мяч к плечам. Задержитесь на мгновение в верхней точке, напрягая бицепсы. Вдохните и медленно опустите медицинский мяч обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс сидя на фитболе с отягощением"},{"id":"0849","n":"weighted seated twist (on stability ball)","bp":"waist","eq":"weighted","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Сядьте на мяч, поставив ступни на землю и согнув колени под углом 90 градусов. Держите блин или гантель обеими руками близко к груди. Напрягите корпус и медленно поверните туловище в сторону, сохраняя бедра устойчивыми. Сделайте небольшую паузу в конце вращения, затем медленно вернитесь в исходное положение. Повторите поворот в другую сторону. Продолжайте чередовать стороны желаемое количество повторений.","pos":"seated","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Повороты корпуса сидя на фитболе с отягощением"},{"id":"0850","n":"weighted side bend (on stability ball)","bp":"waist","eq":"weighted","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Сядьте на мяч, поставив ноги на ширине плеч и прижавшись к земле. Возьмите гирю в одну руку, а другую руку положите на бедро. Напрягите корпус и медленно наклонитесь в сторону отягощенной стороны, сохраняя спину прямой. Задержитесь на мгновение в нижней точке, затем медленно вернитесь в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Наклоны в стороны на фитболе с отягощением"},{"id":"0851","n":"weighted sissy squat","bp":"upper legs","eq":"weighted","tg":"quads","mg":"glutes","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, носки слегка направлены наружу. Держите гирю перед грудью обеими руками или положите штангу на верхнюю часть спины. Удерживая грудь поднятой и напряженным корпус, медленно опустите тело вниз, сгибая колени и бедра. Продолжайте опускаться до тех пор, пока ваши бедра не станут параллельны земле или настолько низко, насколько вам будет удобно. Задержитесь на мгновение внизу, затем оттолкнитесь пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Сисси-приседания с отягощением"},{"id":"0852","n":"weighted squat","bp":"upper legs","eq":"weighted","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, носки слегка направлены наружу. Держите вес перед грудью или на плечах. Напрягите корпус и держите грудь поднятой, опуская бедра вниз и назад, как будто вы садитесь на стул. Опускайтесь до тех пор, пока бедра не станут параллельны земле или настолько низко, насколько вам будет удобно. Оттолкнитесь пятками, чтобы встать, сжимая ягодицы в верхней части. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Приседания с отягощением"},{"id":"0853","n":"weighted standing curl","bp":"upper arms","eq":"weighted","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите в каждую руку по гантели ладонями вперед. Держите локти близко к туловищу и на выдохе поднимайте гири до уровня плеч. Сделайте паузу на мгновение в верхней точке, затем на вдохе медленно опустите гири обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс стоя с отягощением"},{"id":"0854","n":"weighted standing hand squeeze","bp":"lower arms","eq":"weighted","tg":"forearms","mg":"biceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите в каждую руку по гире. Вытяните руки прямо перед собой, ладони обращены друг к другу. Сожмите руки вместе как можно сильнее, задействуя предплечья. Удерживайте сжатие несколько секунд, затем отпустите. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сжимание рук стоя с отягощением"},{"id":"3313","n":"weighted straight bar dip","bp":"chest","eq":"weighted","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Встаньте между параллельными брусьями, полностью вытянув руки и выпрямив тело. Опустите тело, сгибая локти, пока плечи не станут параллельны земле. Сделайте паузу на мгновение, затем вернитесь в исходное положение, выпрямляя руки. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания на прямом грифе с отягощением"},{"id":"3642","n":"weighted stretch lunge","bp":"upper legs","eq":"weighted","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч. Сделайте шаг вперед правой ногой, держа спину прямо. Опустите тело, сгибая колени, пока правое бедро не станет параллельно земле. Оттолкнитесь правой пяткой, чтобы вернуться в исходное положение. Повторите с левой ногой. Продолжайте чередовать ноги желаемое количество повторений.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Выпады с растяжкой и отягощением"},{"id":"0856","n":"weighted svend press","bp":"chest","eq":"weighted","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, обеими руками держите блин перед грудью. Держите локти слегка согнутыми и ладонями друг к другу. Выжмите блин прямо перед собой, полностью выпрямив руки. Сделайте небольшую паузу в конце движения, затем медленно верните блин в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим Свенда с отягощением"},{"id":"1754","n":"weighted three bench dips","bp":"upper arms","eq":"weighted","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Сядьте на край скамьи, взявшись руками за край, пальцами вперед. Пройдите ногами вперед, отрывая ягодицы от скамьи и поддерживая свой вес руками. Опустите корпус, согнув локти, держа спину близко к скамье. Задержитесь на мгновение в нижней точке, затем вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отжимания от трёх скамей с отягощением"},{"id":"1755","n":"weighted tricep dips","bp":"upper arms","eq":"weighted","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Сядьте на край скамьи или стула, взявшись руками за край рядом с бедрами. Сдвиньте ягодицы с передней части скамьи, вытянув ноги перед собой. Держите спину близко к скамье, а локти слегка согнуты. Опустите тело, сгибая локти, пока плечи не станут параллельны полу. Вернитесь в исходное положение, выпрямляя руки. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отжимания на брусьях на трицепс с отягощением"},{"id":"1767","n":"weighted triceps dip on high parallel bars","bp":"upper arms","eq":"weighted","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Встаньте между двумя параллельными брусьями, держась руками за брусья и полностью вытянув руки. Согните локти и опустите тело до тех пор, пока плечи не станут параллельны земле. Сделайте паузу на мгновение, затем оттолкнитесь ладонями, чтобы выпрямить руки и вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания на трицепс на высоких брусьях с отягощением"},{"id":"0857","n":"wheel rollerout","bp":"waist","eq":"wheel roller","tg":"abs","mg":"lower back","img":null,"gif":null,"ru":"Встаньте на колени и поместите ролик перед собой. Положите руки на ручки роликового колеса и вытяните руки прямо перед собой. Задействуйте мышцы корпуса и медленно катите колесо вперед, сохраняя спину прямой и пресс напряженным. Продолжайте перекатываться вперед до тех пор, пока ваше тело не будет полностью выпрямлено, а руки не окажутся над головой. Сделайте паузу на мгновение, затем медленно поверните колесо обратно к коленям, сохраняя контроль и напрягая пресс. Повторите let DB;
function load(){
  try{const raw=localStorage.getItem(KEY); DB=raw?JSON.parse(raw):seedData();}
  catch(e){DB=seedData();}
  if(!DB.settings)DB.settings={rest:90,prep:5};
  if(DB.settings.prep==null)DB.settings.prep=5;
  if(!DB.settings.workBreaksAdded){
    DB.programs.push(...workBreakPrograms());
    DB.settings.workBreaksAdded=true;
    save();
  }
  if(!DB.settings.warmupAdded){
    DB.programs.push(warmupProgram());
    DB.settings.warmupAdded=true;
    save();
  }
  // default known warmup/cooldown/break days to "no history"
  let changed=false;
  DB.programs.forEach(p=>{
    if(p.noLog===undefined){
      if(/заминк|мобилит|перерыв|разминк/i.test(p.name)){p.noLog=true;changed=true;}
      else {p.noLog=false;changed=true;}
    }
  });
  if(changed)save();
}
function save(){localStorage.setItem(KEY,JSON.stringify(DB));}

/* ============ SESSION ============ */
function startSession(p){
  session={programId:p.id,name:p.name,date:todayISO(),entries:p.exercises.map(e=>{
    const sets=[];
    for(let i=0;i<e.sets;i++){
      const prev=e.last&&e.last[i]?e.last[i]:(e.last&&e.last.length?e.last[e.last.length-1]:null);
      sets.push({
        w:prev&&prev.w!=null?prev.w:(e.type==="weighted"?0:null),
        r:prev&&prev.r!=null?prev.r:(e.type!=="time"?e.rmin:null),
        t:prev&&prev.t!=null?prev.t:(e.type==="time"?e.rmin:null),
        done:false
      });
    }
    return {exId:e.id,name:e.name,type:e.type,rmin:e.rmin,rmax:e.rmax,rpe:e.rpe,note:e.note,sets,lib:e.lib||null};
  })};
  go("session");
}

function bestE1RM(exName){
  let best=0;
  DB.history.forEach(s=>s.entries.forEach(en=>{
    if(en.name===exName)en.sets.forEach(st=>{if(st.done){const v=e1rm(st.w||0,st.r||0);if(v>best)best=v;}});
  }));
  return best;
}

function setRow(en,ei,st,si){
  const row=el("div","setrow"+(st.done?" done":""));
  const no=el("div","setno num",si+1);
  row.appendChild(no);
  if(en.type==="weighted"){
    row.appendChild(stepField("кг",st.w,2.5,v=>{st.w=v;},"weight"));
    row.appendChild(el("div","times","×"));
    row.appendChild(stepField("повт",st.r,1,v=>st.r=v,"rep"));
    const chk=el("button","check",st.done?"✓":"○");
    chk.onclick=()=>toggleSet(en,st,row,no,chk);
    row.appendChild(chk);
  }else if(en.type==="reps"){
    row.appendChild(stepField("повторы",st.r,1,v=>st.r=v,"rep"));
    const chk=el("button","check",st.done?"✓":"○");
    chk.onclick=()=>toggleSet(en,st,row,no,chk);
    row.appendChild(chk);
  }else{ // time
    const f=stepField("секунды",st.t,5,v=>st.t=v,"sec");
    row.appendChild(f);
    const play=el("button","check play",st.done?"✓":"▶");
    play.onclick=()=>{
      if(st.done){st.done=false;row.classList.remove("done");play.textContent="▶";renderSetNo(row,st);return;}
      runHoldTimer(en,st,si,()=>{
        st.done=true;row.classList.add("done");play.textContent="✓";renderSetNo(row,st);
        const inp=f.querySelector("input");if(inp)inp.value=st.t;
        startRest();
      });
    };
    row.appendChild(play);
  }
  return row;
}

function toggleSet(en,st,row,no,chk){
  st.done=!st.done;
  row.classList.toggle("done",st.done);
  chk.textContent=st.done?"✓":"○";
  if(st.done){
    vibe(15);
    const pr=checkPR(en,st);
    startRest();
    if(pr)toast("🏆 Личный рекорд!",true);
  }
  renderSetNo(row,st);
}
function renderSetNo(row,st){const n=row.querySelector(".setno");if(n)n.style.color=st.done?"var(--accent)":"";}

function stepField(label,val,step,onCh,kind){
  const f=el("div","field");
  f.appendChild(el("label",null,label));
  const sp=el("div","stepper");
  const minus=el("button",null,"−");
  const inp=el("input","num");inp.type="text";inp.inputMode="decimal";inp.value=val==null?"":val;
  const plus=el("button",null,"+");
  const get=()=>{let v=parseFloat(inp.value.replace(",","."));return isNaN(v)?0:v;};
  const set=v=>{v=Math.max(0,Math.round(v*100)/100);inp.value=v;onCh(v);};
  minus.onclick=()=>set(get()-step);
  plus.onclick=()=>set(get()+step);
  inp.onchange=()=>set(get());
  inp.onfocus=()=>inp.select();
  sp.appendChild(minus);sp.appendChild(inp);sp.appendChild(plus);
  f.appendChild(sp);
  return f;
}

function checkPR(en,st){
  if(en.type!=="weighted")return false;
  const prev=bestE1RM(en.name);
  const now=e1rm(st.w||0,st.r||0);
  return prev>0 && now>prev+0.01;
}

    const p=DB.programs.find(x=>x.id===session.programId);
    if(p){const pe=p.exercises.find(x=>x.id===en.exId);if(pe)pe.note=v;}
    save();closeSheet();render();
    toast(v?"Заметка сохранена":"Заметка очищена");
  };
}

function finishSession(){
  const p=DB.programs.find(x=>x.id===session.programId);
  const noLog=!!(p&&p.noLog);
  // keep only sets that were done
  const entries=session.entries.map(en=>({
    name:en.name,type:en.type,sets:en.sets.filter(s=>s.done).map(s=>({w:s.w,r:s.r,t:s.t,done:true}))
  })).filter(en=>en.sets.length);
  if(noLog){
    // warmups / mobility / breaks: nothing is saved to history or progress
    session=null;stopRest();go("home");toast("Готово 💪");return;
  }
  if(!entries.length){if(!confirm("Не отмечено ни одного подхода. Всё равно выйти?"))return;session=null;go("home");return;}
  const rec={id:uid(),programId:session.programId,name:session.name,date:session.date,entries};
  DB.history.unshift(rec);
  // update "last" on program exercises for autofill next time
  if(p){
    session.entries.forEach(en=>{
      const pe=p.exercises.find(x=>x.id===en.exId);
      if(pe){const done=en.sets.filter(s=>s.done);if(done.length)pe.last=done.map(s=>{
        if(en.type==="weighted")return{w:s.w,r:s.r};if(en.type==="reps")return{r:s.r};return{t:s.t};
      });}
    });
  }
  save();
  const n=entries.reduce((a,e)=>a+e.sets.length,0);
  session=null;
  go("home");
  toast("Сохранено · "+n+" подходов");
}

/* ============ WAKE LOCK (keep screen on during timers) ============ */
let wakeLock=null;
async function requestWake(){
  try{ if("wakeLock" in navigator && !wakeLock){ wakeLock=await navigator.wakeLock.request("screen"); wakeLock.addEventListener("release",()=>{wakeLock=null;}); } }catch(e){}
}
function releaseWake(){ try{ if(wakeLock){wakeLock.release();wakeLock=null;} }catch(e){} }
function timersActive(){ return $("#rest").classList.contains("on")||$("#htimer").classList.contains("on"); }

/* ============ REST TIMER ============ */
let restInt=null,restEndAt=0,restTotal=0;
function restRemaining(){return Math.max(0,Math.round((restEndAt-Date.now())/1000));}
function startRest(){
  restTotal=DB.settings.rest||90;
  if(restTotal<=0){return;}
  restEndAt=Date.now()+restTotal*1000;
  $("#rest").classList.add("on");updateRest();requestWake();
  clearInterval(restInt);
  restInt=setInterval(()=>{
    if(restRemaining()<=0){clearInterval(restInt);restDone();}
    else updateRest();
  },250);
}
function updateRest(){
  const left=restRemaining();
  $("#restT").textContent=fmtTime(left);
  $("#restProg").style.width=(100*(restTotal-left)/restTotal)+"%";
}
function restDone(){vibe([60,40,60]);beep(880,0.2);setTimeout(stopRest,500);}
function stopRest(){clearInterval(restInt);$("#rest").classList.remove("on");if(!timersActive())releaseWake();}
$("#restSkip").onclick=stopRest;
$("#restAdd").onclick=()=>{restEndAt+=15000;restTotal+=15;updateRest();};

/* re-sync when returning to the app (iOS freezes JS in background) */
document.addEventListener("visibilitychange",()=>{
  if(document.visibilityState!=="visible")return;
  if(timersActive())requestWake();
  if($("#rest").classList.contains("on")){
    if(restRemaining()<=0){clearInterval(restInt);restDone();}else updateRest();
  }
});

/* ============ HOLD TIMER (timed exercises) ============ */
let AC=null;
function beep(freq,dur){
  try{
    AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==="suspended")AC.resume();
    const o=AC.createOscillator(),g=AC.createGain(),t=AC.currentTime;
    o.type="sine";o.frequency.value=freq;
    g.gain.setValueAtTime(0.0001,t);o.connect(g);g.connect(AC.destination);
    g.gain.exponentialRampToValueAtTime(0.28,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.start(t);o.stop(t+dur+0.03);
  }catch(e){}
}
let htRAF=null;
function runHoldTimer(en,st,si,onDone){
  try{AC=AC||new (window.AudioContext||window.webkitAudioContext)();if(AC.state==="suspended")AC.resume();}catch(e){}
  const prep=DB.settings.prep==null?5:DB.settings.prep;
  const hold=Math.max(1,st.t||en.rmax||20);
  const ov=$("#htimer"),arc=$("#htArc"),big=$("#htBig"),lbl=$("#htLbl");
  const R=88,C=2*Math.PI*R;
  arc.style.strokeDasharray=C;
  $("#htEx").textContent=en.name;
  $("#htSet").textContent="Подход "+(si+1)+" · цель "+hold+"с";
  ov.classList.add("on");requestWake();
  let phase=prep>0?"prep":"hold";
  let paused=false,pauseStart=0,pausedTotal=0,start=performance.now(),lastBeep=-1;
  const setArc=f=>{arc.style.strokeDashoffset=C*(1-Math.max(0,Math.min(1,f)));};
  function stop(){cancelAnimationFrame(htRAF);htRAF=null;ov.classList.remove("on");if(!timersActive())releaseWake();}
  function finish(secs){stop();st.t=Math.round(secs);vibe([70,50,140]);beep(900,0.22);onDone();}
  function tick(now){
    if(paused){htRAF=requestAnimationFrame(tick);return;}
    const elapsed=(now-start-pausedTotal)/1000;
    if(phase==="prep"){
      const rem=prep-elapsed,rc=Math.ceil(rem);
      big.textContent=Math.max(0,rc);big.style.color="var(--warn)";
      arc.style.stroke="var(--warn)";lbl.textContent="приготовься";
      setArc(rem/prep);
      if(rc!==lastBeep&&rc<=3&&rc>=1){lastBeep=rc;beep(640,0.08);vibe(20);}
      if(rem<=0){phase="hold";start=now;pausedTotal=0;lastBeep=-1;beep(900,0.16);vibe(45);}
    }else{
      const rem=hold-elapsed,rc=Math.ceil(rem);
      big.textContent=Math.max(0,rc);big.style.color="var(--accent)";
      arc.style.stroke="var(--accent)";lbl.textContent=en.name;
      setArc(rem/hold);
      if(rc!==lastBeep&&rc<=3&&rc>=1){lastBeep=rc;beep(640,0.08);vibe(20);}
      if(rem<=0){finish(hold);return;}
    }
    htRAF=requestAnimationFrame(tick);
  }
  $("#htCancel").onclick=stop;
  $("#htPause").textContent="Пауза";
  $("#htPause").onclick=()=>{
    paused=!paused;
    if(paused){pauseStart=performance.now();$("#htPause").textContent="Продолжить";}
    else{pausedTotal+=performance.now()-pauseStart;$("#htPause").textContent="Пауза";}
  };
  $("#htDone").onclick=()=>{
    if(phase==="prep"){phase="hold";start=performance.now();pausedTotal=0;paused=false;$("#htPause").textContent="Пауза";lastBeep=-1;beep(900,0.16);return;}
    const elapsed=(performance.now()-start-pausedTotal)/1000;
    finish(Math.max(1,Math.min(hold,elapsed)));
  };
  paused=false;
  htRAF=requestAnimationFrame(tick);
}

/* ============ PROGRESS ============ */
function allExNames(){
  const set=new Set();
  DB.programs.forEach(p=>{if(p.noLog)return;p.exercises.forEach(e=>{if(e.type!=="time")set.add(e.name);});});
  DB.history.forEach(s=>s.entries.forEach(e=>{if(e.type!=="time")set.add(e.name);}));
  return [...set].sort((a,b)=>a.localeCompare(b,"ru"));
}
function exSeries(name){
  // one point per session: best e1rm (weighted) or max reps
  const pts=[];
  [...DB.history].reverse().forEach(s=>{
    let best=0,type="weighted",vol=0;
    s.entries.forEach(en=>{if(en.name===name){type=en.type;en.sets.forEach(st=>{
      const v=en.type==="weighted"?e1rm(st.w||0,st.r||0):(en.type==="reps"?(st.r||0):(st.t||0));
      if(v>best)best=v; vol+=(en.type==="weighted"?(st.w||0)*(st.r||0):0);
    });}});
    if(best>0)pts.push({date:s.date,val:Math.round(best*10)/10,vol,type});
  });
  return pts;
}
function Progress(){
  const w=el("div");
  const names=allExNames();
  if(!names.length){return emptyState("📈","Пока нет упражнений","Начни тренировку — здесь появятся графики.");}
  if(!progressEx||!names.includes(progressEx))progressEx=names[0];
  const sel=el("select","pick");
  names.forEach(n=>{const o=el("option",null,esc(n));o.value=n;if(n===progressEx)o.selected=true;sel.appendChild(o);});
  sel.onchange=()=>{progressEx=sel.value;render();};
  w.appendChild(sel);
  const pts=exSeries(progressEx);
  if(!pts.length){w.appendChild(emptyState("🗓","Нет записей","Отметь это упражнение на тренировке."));return w;}
  const type=pts[0].type;
  const unit=type==="weighted"?"e1RM":type==="reps"?"повт":"сек";
  const max=Math.max(...pts.map(p=>p.val)), first=pts[0].val, last=pts[pts.length-1].val;
  const delta=last-first;
  const sr=el("div","statrow");
  sr.appendChild(stat(type==="weighted"?Math.round(max)+"<small> кг</small>":max+`<small> ${unit}</small>`,"Лучший "+unit));
  sr.appendChild(stat((delta>=0?"+":"")+Math.round(delta*10)/10,"Динамика"));
  sr.appendChild(stat(pts.length,"Сессий"));
  w.appendChild(sr);
  const cw=el("div","chartwrap");
  cw.appendChild(el("h3",null,(type==="weighted"?"Расчётный 1ПМ":type==="reps"?"Макс. повторы":"Макс. время")+" по тренировкам"));
  cw.appendChild(lineChart(pts));
  w.appendChild(cw);
  const list=el("div","card");
  [...pts].reverse().forEach(p=>{
    const r=el("div","hbar");
    const vtxt=type==="weighted"?Math.round(p.val)+" кг"+(p.vol?` · ${p.vol} кг·повт`:""):p.val+" "+unit;
    r.innerHTML=`<span class="d">${fmtDate(p.date)}</span><span class="val">${vtxt}</span>`;
    list.appendChild(r);
  });
  w.appendChild(list);
  return w;
}
function stat(v,k){return el("div","stat",`<div class="v num">${v}</div><div class="k">${esc(k)}</div>`);}
function lineChart(pts){
  const W=520,H=170,pad=24,padR=10,padT=14,padB=22;
  const xs=pts.map((_,i)=>pts.length>1?pad+i*(W-pad-padR)/(pts.length-1):W/2);
  const vals=pts.map(p=>p.val);
  let mn=Math.min(...vals),mx=Math.max(...vals);if(mn===mx){mn-=1;mx+=1;}
  const Y=v=>padT+(H-padT-padB)*(1-(v-mn)/(mx-mn));
  const pathD=pts.map((p,i)=>(i?"L":"M")+xs[i].toFixed(1)+" "+Y(p.val).toFixed(1)).join(" ");
  const areaD=pathD+` L ${xs[xs.length-1].toFixed(1)} ${H-padB} L ${xs[0].toFixed(1)} ${H-padB} Z`;
  const svg=`<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(182,244,54,.25)"/><stop offset="1" stop-color="rgba(182,244,54,0)"/>
    </linearGradient></defs>
    <line x1="${pad}" y1="${H-padB}" x2="${W-padR}" y2="${H-padB}" stroke="var(--line)"/>
    <path d="${areaD}" fill="url(#g)"/>
    <path d="${pathD}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${pts.map((p,i)=>`<circle cx="${xs[i].toFixed(1)}" cy="${Y(p.val).toFixed(1)}" r="${i===pts.length-1?4:3}" fill="${i===pts.length-1?'var(--accent)':'var(--bg)'}" stroke="var(--accent)" stroke-width="2"/>`).join("")}
    <text x="${pad}" y="11" fill="var(--faint)" font-size="11" font-weight="700">${Math.round(mx)}</text>
    <text x="${pad}" y="${H-padB-2}" fill="var(--faint)" font-size="11" font-weight="700">${Math.round(mn)}</text>
  </svg>`;
  return el("div",null,svg).firstChild;
}

    if(viewOnly){closeSheet();return;}
    if(libPickCb){const cb=libPickCb;libPickCb=null;closeSheet();cb(it);}
    else libAddToDay(it);
  };
}

function libAddToDay(it){
  if(!DB.programs.length){toast("Сначала создай день");return;}
  const opts=DB.programs.map(p=>`<button class="bigbtn ghost" data-id="${p.id}" style="margin-top:8px;text-align:left">${esc(p.name)} <span style="color:var(--faint)">· ${p.exercises.length} упр.</span></button>`).join("");
  sheet(`<h2>В какой день?</h2><div>${opts}</div>`);
  $("#sheet").querySelectorAll("[data-id]").forEach(b=>b.onclick=()=>{
    const p=DB.programs.find(x=>x.id===b.dataset.id);
    p.exercises.push(exFromLib(it));save();closeSheet();
    toast("Добавлено в «"+p.name+"»");
  });
}

// open library as a picker from the exercise form
function libPick(cb){libPickCb=cb;go("library");}

/* ============ modal ============ */
function sheet(html){$("#sheet").innerHTML=html;$("#modal").classList.add("on");}
function closeSheet(){$("#modal").classList.remove("on");}
$("#modal").onclick=e=>{if(e.target.id==="modal")closeSheet();};

/* ============ boot ============ */
load();render();
let pendingUpdate=false,swReloaded=false;
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("sw.js",{updateViaCache:"none"}).then(reg=>{
      reg.update();
      setInterval(()=>reg.update().catch(()=>{}),30*60*1000);
    }).catch(()=>{});
    navigator.serviceWorker.addEventListener("controllerchange",()=>{
      if(swReloaded)return;
      if(session){pendingUpdate=true;}      // не перезагружаем посреди тренировки
      else{swReloaded=true;location.reload();}
    });
  });
  document.addEventListener("visibilitychange",()=>{
    if(document.visibilityState==="visible")navigator.serviceWorker.getRegistration().then(r=>r&&r.update()).catch(()=>{});
  });
}
</script>
