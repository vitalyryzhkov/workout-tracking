 curl","bp":"lower arms","eq":"band","tg":"forearms","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на скамью или стул, поставив ноги на землю. Держите ленту обеими руками ладонями вверх и положите предплечья на бедра. Медленно поднимите запястья вверх, сжимая предплечья. Задержитесь на мгновение в верхней точке, затем медленно опустите запястья обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание запястий с резиной"},{"id":"1017","n":"band y-raise","bp":"shoulders","eq":"band","tg":"delts","mg":"traps","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч, и держите ленту перед бедрами ладонями внутрь. Держите руки прямо и поднимите их вверх и в стороны, образуя своим телом букву «Y». В верхней точке движения сведите лопатки вместе. Медленно опустите руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подъём рук в форме Y с резиной"},{"id":"0023","n":"barbell alternate biceps curl","bp":"upper arms","eq":"barbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, ноги на ширине плеч, возьмите в каждую руку по штанге ладонями вперед. Держите плечи неподвижно и выдыхайте, сгибая штангу и одновременно сокращая бицепсы. Продолжайте поднимать штангу до тех пор, пока ваши бицепсы полностью не сократятся и штанга не окажется на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. На вдохе начните медленно опускать штангу обратно в исходное положение. Повторите желаемое количество повторений, чередуя руки.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Попеременный подъём на бицепс со штангой"},{"id":"0024","n":"barbell bench front squat","bp":"upper legs","eq":"barbell","tg":"quads","mg":"hamstrings","img":null,"gif":null,"ru":"Начните с того, что встаньте, поставив ноги на ширине плеч и положив штангу на верхнюю часть груди, чуть ниже ключиц. Держите штангу хватом сверху, держа локти вверху и плечам параллельно земле. Опустите тело в присед, сгибая колени и бедра, сохраняя спину прямой и грудь вверх. Задержитесь на мгновение в нижней части приседа, затем оттолкнитесь пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Фронтальный присед со штангой на скамью"},{"id":"0025","n":"barbell bench press","bp":"chest","eq":"barbell","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Лягте на скамью, поставьте ступни на землю и прижмите спину к скамье. Возьмите штангу хватом сверху на расстоянии чуть шире плеч. Снимите штангу со стойки и держите ее прямо над грудью, полностью вытянув руки. Медленно опустите штангу к груди, держа локти прижатыми. Сделайте паузу на мгновение, когда штанга коснется вашей груди. Верните штангу в исходное положение, вытянув руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим лёжа со штангой"},{"id":"0026","n":"barbell bench squat","bp":"upper legs","eq":"barbell","tg":"quads","mg":"glutes","img":null,"gif":null,"ru":"Установите штангу на стойке для приседаний на уровне груди. Встаньте лицом от стойки, ноги на ширине плеч. Согните ноги в коленях и опустите тело в положение приседа, держа спину прямо и грудь вверх. Возьмите штангу хватом сверху, на расстоянии чуть шире плеч. Снимите штангу со стойки и отступите назад, убедившись, что ваши ноги по-прежнему находятся на ширине плеч. Опустите тело в присед, удерживая колени на одной линии с пальцами ног. Задержитесь на мгновение внизу, затем оттолкнитесь пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Присед со штангой на скамью"},{"id":"1316","n":"barbell bent arm pullover","bp":"back","eq":"barbell","tg":"lats","mg":"triceps","img":null,"gif":null,"ru":"Лягте на скамью, положив голову на один конец и поставив ноги на пол. Возьмите штангу хватом на ширине плеч и вытяните руки прямо над грудью. Опустите штангу за голову, держа руки слегка согнутыми. Сделайте паузу на мгновение, затем поднимите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Пуловер со штангой на согнутых руках"},{"id":"0027","n":"barbell bent over row","bp":"back","eq":"barbell","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч и слегка согнуты в коленях. Наклонитесь вперед в бедрах, сохраняя спину прямой и грудь вверх. Возьмите штангу хватом сверху, руки на расстоянии чуть шире плеч. Потяните штангу к нижней части груди, сводя лопатки и напрягая мышцы спины. Задержитесь на мгновение в верхней точке, затем медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Тяга штанги в наклоне"},{"id":"2407","n":"barbell biceps curl (with arm blaster)","bp":"upper arms","eq":"barbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, ноги на ширине плеч, возьмите штангу обратным хватом ладонями вверх. Прижмите плечи к армбластеру, держа локти близко к туловищу. Удерживая плечи неподвижно, выдохните и согните гири, одновременно сокращая бицепсы. Продолжайте поднимать штангу до тех пор, пока ваши бицепсы полностью не сократятся и штанга не окажется на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно начните опускать штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс со штангой с изолятором"},{"id":"0028","n":"barbell clean and press","bp":"upper legs","eq":"barbell","tg":"quads","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, положите штангу на пол перед собой. Согните ноги в коленях и наклоните бедра, чтобы опуститься и взять штангу хватом сверху, расставив руки чуть шире плеч. Двигайтесь пятками и выпрямите бедра и колени, чтобы поднять штангу от пола, удерживая ее близко к телу. Когда штанга достигнет бедер, резко разогните бедра, пожмите плечами и подтяните штангу к груди. Когда штанга достигнет уровня груди, быстро опуститесь под нее и поймайте ее на уровне плеч, направив локти вперед и ладони вверх. Из позиции захвата выжмите штангу над головой, вытянув руки и толкнув штангу прямо вверх. Опустите штангу обратно в исходное положение и повторите желаемое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":0,"ru_name":"Взятие штанги на грудь и жим"},{"id":"0029","n":"barbell clean-grip front squat","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Начните с того, что встаньте, поставив ноги на ширине плеч, положив штангу на верхнюю часть груди, локти направлены вперед. Опустите тело, согнув колени и отведя бедра назад, как будто вы садитесь на стул. При опускании держите грудь поднятой, а спину прямой, следя за тем, чтобы колени не выходили за носки ног. Продолжайте опускаться до тех пор, пока ваши бедра не станут параллельны земле или настолько низко, насколько вам будет удобно. Задержитесь на мгновение в нижней точке, затем оттолкнитесь пятками, чтобы снова встать, выпрямляя бедра и колени. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Фронтальный присед со штангой хватом для взятия на грудь"},{"id":"0030","n":"barbell close-grip bench press","bp":"upper arms","eq":"barbell","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Лягте на скамью, поставьте ступни на землю и прижмите спину к скамье. Возьмите штангу узким хватом, на расстоянии чуть уже ширины плеч. Снимите штангу и медленно опустите ее к груди, держа локти близко к телу. Сделайте паузу на мгновение, когда штанга коснется вашей груди. Верните штангу в исходное положение, полностью выпрямив руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим лёжа узким хватом со штангой"},{"id":"0031","n":"barbell curl","bp":"upper arms","eq":"barbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, ноги на ширине плеч, возьмите штангу обратным хватом ладонями вперед. Держите локти близко к туловищу и выдыхайте, сгибая штангу и одновременно сокращая бицепсы. Продолжайте поднимать штангу до тех пор, пока ваши бицепсы полностью не сократятся и штанга не окажется на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. На вдохе начните медленно опускать штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём штанги на бицепс"},{"id":"0032","n":"barbell deadlift","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, положите штангу на землю перед собой. Согните колени и наклоните бедра, чтобы опустить туловище и взять штангу хватом сверху, руки на расстоянии чуть шире плеч. Держите спину прямо, а грудь приподнятой, пока вы двигаетесь пятками, чтобы поднять штангу с земли, вытягивая бедра и колени. Вставая прямо, сожмите ягодицы и держите корпус напряженным. Опустите штангу обратно на землю, сгибая бедра и колени, сохраняя спину прямой. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Становая тяга со штангой"},{"id":"0033","n":"barbell decline bench press","bp":"chest","eq":"barbell","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Лягте на наклонную скамью, зафиксировав ноги и опустив голову ниже бедер. Возьмите штангу хватом сверху на расстоянии чуть шире плеч. Освободите штангу и медленно опустите ее к груди, держа локти прижатыми. Сделайте паузу в нижней точке, затем поднимите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим штанги на наклонной скамье вниз головой"},{"id":"0034","n":"barbell decline bent arm pullover","bp":"back","eq":"barbell","tg":"lats","mg":"triceps","img":null,"gif":null,"ru":"Лягте на наклонную скамью, опустив голову ниже бедер и зафиксировав ступни. Возьмите штангу пронированным хватом (ладонями от себя) и вытяните руки прямо над грудью. Контролируемо опустите штангу за голову, держа руки слегка согнутыми. Сделайте паузу на мгновение, затем поднимите штангу обратно в исходное положение, напрягая широчайшие мышцы. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Пуловер на согнутых руках со штангой на наклонной скамье вниз головой"},{"id":"0035","n":"barbell decline close grip to skull press","bp":"upper arms","eq":"barbell","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Лягте на наклонную скамью, опустив голову ниже ног, и возьмите штангу узким хватом. Опустите штангу ко лбу, согнув локти, сохраняя плечи неподвижными. Сделайте паузу на мгновение, затем вытяните руки, чтобы вернуть штангу в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим узким хватом ко лбу со штангой на наклонной скамье вниз головой"},{"id":"1255","n":"barbell decline pullover","bp":"chest","eq":"barbell","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Лягте на наклонную скамью, опустив голову ниже бедер и зафиксировав ступни. Держите штангу пронированным хватом (ладонями от себя), расставив руки чуть шире плеч. Вытяните руки над грудью, сохраняя небольшой изгиб в локтях. Опустите штангу по дуге за голову, чувствуя растяжение в груди и плечах. Сделайте паузу на мгновение, затем верните штангу в исходное положение, изменив движение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Пуловер со штангой на наклонной скамье вниз головой"},{"id":"0036","n":"barbell decline wide-grip press","bp":"chest","eq":"barbell","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Лягте на наклонную скамью, зафиксировав ноги и опустив голову ниже бедер. Возьмите штангу широким хватом, на расстоянии чуть шире ширины плеч. Опустите штангу к груди, разведя локти в стороны. Верните штангу в исходное положение, полностью выпрямив руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим широким хватом со штангой на наклонной скамье вниз головой"},{"id":"0037","n":"barbell decline wide-grip pullover","bp":"back","eq":"barbell","tg":"lats","mg":"triceps","img":null,"gif":null,"ru":"Лягте на наклонную скамью, опустив голову ниже бедер и зафиксировав ступни. Возьмите штангу широким хватом и вытяните руки прямо над грудью. Контролируемо опустите штангу за голову, держа руки прямыми. Сделайте паузу на мгновение, затем поднимите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Пуловер широким хватом со штангой на наклонной скамье вниз головой"},{"id":"0038","n":"barbell drag curl","bp":"upper arms","eq":"barbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите штангу обратным хватом ладонями вверх. Пусть штанга висит на расстоянии вытянутой руки перед бедрами. Удерживая плечи неподвижно, поднимите штангу к груди, напрягая бицепсы. Задержитесь на мгновение в верхней точке, затем медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс со штангой со скольжением"},{"id":"1370","n":"barbell floor calf raise","bp":"lower legs","eq":"barbell","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Положите штангу на пол перед собой. Встаньте подушечками стоп на край штанги, свесив пятки. При необходимости держитесь за устойчивый предмет для равновесия. Поднимите пятки как можно выше, используя икроножные мышцы для подъема тела. Задержитесь на мгновение в верхней точке, затем медленно опустите пятки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носки со штангой стоя на полу"},{"id":"0039","n":"barbell front chest squat","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Для начала встаньте, поставив ноги на ширине плеч, носки слегка развернуты наружу. Держите штангу перед грудью, руки на ширине плеч, локти направлены вперед. Напрягите корпус и держите грудь поднятой, опуская тело в присед, отводя бедра назад и сгибая колени. Опускайтесь до тех пор, пока бедра не станут параллельны земле или настолько низко, насколько вам будет удобно. Задержитесь на мгновение внизу, затем оттолкнитесь пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Фронтальный присед со штангой на груди"},{"id":"0041","n":"barbell front raise","bp":"shoulders","eq":"barbell","tg":"delts","mg":"biceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, удерживайте штангу перед бедрами хватом сверху. Держите руки прямо и поднимите штангу вперед и вверх, пока она не достигнет уровня плеч. Задержитесь на мгновение в верхней точке, затем медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подъём штанги перед собой"},{"id":"0040","n":"barbell front raise and pullover","bp":"chest","eq":"barbell","tg":"pectorals","mg":"deltoids","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите штангу хватом сверху ладонями вниз. Держите руки прямо и поднимите штангу перед собой до уровня плеч. Задержитесь на мгновение в верхней точке, затем медленно опустите штангу обратно в исходное положение. Затем опустите штангу за голову, держа руки прямыми. Сделайте небольшую паузу в нижней точке, затем поднимите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подъём штанги перед собой и пуловер"},{"id":"0042","n":"barbell front squat","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Для начала встаньте, поставив ноги на ширине плеч, носки слегка развернуты наружу. Держите штангу перед плечами, положив ее на ключицы и плечи. Напрягите корпус и держите грудь поднятой, опуская тело в присед, отводя бедра назад и сгибая колени. Опускайтесь до тех пор, пока бедра не станут параллельны земле или настолько низко, насколько вам будет удобно. Задержитесь на мгновение внизу, затем оттолкнитесь пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Фронтальный присед со штангой"},{"id":"0043","n":"barbell full squat","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, носки слегка развернуты наружу. Держите штангу на верхней части спины, опираясь на трапеции или задние дельты. Напрягите корпус и держите грудь поднятой, когда начинаете опускать тело вниз. Согните колени и бедра, отводя бедра назад и вниз, как будто вы сидите на стуле. Опускайтесь до тех пор, пока бедра не станут параллельны земле или немного ниже. Держите колени на одной линии с пальцами ног, а вес тела перенесите на пятки. Протолкните пятки, чтобы встать обратно, выпрямляя бедра и колени. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Глубокий присед со штангой"},{"id":"1461","n":"barbell full squat (back pov)","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, носки слегка развернуты наружу. Держите штангу на верхней части спины, опираясь на трапеции или задние дельты. Напрягите корпус и держите грудь поднятой, когда начинаете опускать тело вниз. Согните колени и бедра, отводя бедра назад и вниз, как будто вы сидите на стуле. Опускайте тело до тех пор, пока бедра не станут параллельны земле или немного ниже. Держите колени на одной линии с пальцами ног, а вес тела перенесите на пятки. Протолкните пятки, чтобы встать обратно, выпрямляя бедра и колени. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Глубокий присед со штангой вид сзади"},{"id":"1462","n":"barbell full squat (side pov)","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, носки слегка развернуты наружу. Держите штангу на верхней части спины, опираясь на трапеции или задние дельты. Напрягите корпус и держите грудь поднятой, когда начинаете опускать тело вниз. Согните колени и бедра, отводя бедра назад и вниз, как будто вы сидите на стуле. Опускайте тело до тех пор, пока бедра не станут параллельны земле или немного ниже. Держите колени на одной линии с пальцами ног, а вес тела перенесите на пятки. Протолкните пятки, чтобы встать обратно, выпрямляя бедра и колени. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Глубокий присед со штангой вид сбоку"},{"id":"1545","n":"barbell full zercher squat","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч и слегка развернув пальцы ног. Держите штангу на сгибах локтей, удерживая ее руками для устойчивости. Напрягите корпус и держите грудь поднятой, опуская бедра назад и вниз в положение приседа. Держите колени на одной линии с пальцами ног, а вес тела перенесите на пятки. Опускайтесь до тех пор, пока бедра не станут параллельны земле или настолько низко, насколько вам будет удобно. Проведите пятками, чтобы встать обратно, сжимая ягодицы в верхней части движения. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Глубокий присед Зерхера со штангой"},{"id":"1409","n":"barbell glute bridge","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Начните с того, что лягте на спину на землю, согните колени и поставьте ступни на пол. Положите штангу на бедра, крепко удерживая ее обеими руками. Задействуйте ягодицы и мышцы корпуса, затем поднимите бедра от земли, пока ваше тело не образует прямую линию от колен до плеч. Задержитесь на мгновение в верхней точке, напрягая ягодицы. Медленно опустите бедра обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Ягодичный мост со штангой"},{"id":"3562","n":"barbell glute bridge two legs on bench (male)","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Начните с того, что сядьте на край скамьи, прислонившись к ней верхней частью спины, а ступни поставьте на землю, на ширине плеч. Положите штангу на бедра, крепко удерживая ее обеими руками. Задействуйте ягодицы и мышцы корпуса, затем надавите на пятки, чтобы поднять бедра со скамьи, создавая прямую линию от колен до плеч. Задержитесь на мгновение в верхней точке, напрягая ягодицы. Медленно опустите бедра обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Ягодичный мост со штангой с двумя ногами на скамье"},{"id":"0044","n":"barbell good morning","bp":"upper legs","eq":"barbell","tg":"hamstrings","mg":"lower back","img":null,"gif":null,"ru":"Начните с того, что встаньте, поставив ноги на ширине плеч и положив штангу на верхнюю часть спины. Удерживая спину прямой и напряженным корпус, наклонитесь вперед в бедрах, отводя ягодицы назад, как будто вы пытаетесь коснуться ягодицами стены позади себя. Опускайте туловище до тех пор, пока оно не станет параллельно земле, чувствуя растяжение подколенных сухожилий. Сделайте паузу на мгновение, затем вернитесь в исходное положение, сжимая ягодицы и толкая бедра вперед. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Наклоны со штангой доброе утро"},{"id":"0045","n":"barbell guillotine bench press","bp":"chest","eq":"barbell","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Лягте на скамью, поставьте ступни на землю и прижмите спину к скамье. Возьмите штангу хватом сверху, на расстоянии чуть шире плеч. Медленно опустите штангу к шее, держа локти направленными наружу. Сделайте паузу на мгновение, когда штанга окажется чуть выше вашей шеи. Верните штангу в исходное положение, полностью выпрямив руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Жим гильотина со штангой"},{"id":"0046","n":"barbell hack squat","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Начните с того, что встаньте, поставив ноги на ширине плеч и слегка развернув пальцы ног. Держите штангу за ногами, положив ее на верхнюю часть бедер. Опустите тело, согнув колени и бедра, держа спину прямо и грудь вверх. Продолжайте опускаться до тех пор, пока ваши бедра не станут параллельны земле или настолько низко, насколько вам будет удобно. Сделайте паузу на мгновение, затем оттолкнитесь пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Гакк-присед со штангой"},{"id":"1436","n":"barbell high bar squat","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, носки слегка развернуты наружу. Положите штангу на верхнюю часть спины, положив ее на трапеции. Напрягите корпус и держите грудь поднятой, когда начинаете приседать, отводя бедра назад и сгибая колени. Опускайтесь до тех пор, пока бедра не станут параллельны земле или настолько низко, насколько вам будет удобно. Протолкните пятки, чтобы встать обратно, выпрямляя бедра и колени. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Присед со штангой с высоким положением грифа"},{"id":"0047","n":"barbell incline bench press","bp":"chest","eq":"barbell","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Установите наклонную скамью под углом 45 градусов. Лягте на скамью, положив ноги на землю. Возьмите штангу хватом сверху, на расстоянии чуть шире плеч. Снимите штангу и медленно опустите ее к груди, держа локти под углом 45 градусов. Сделайте небольшую паузу в нижней точке, затем верните штангу в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Жим штанги на наклонной скамье"},{"id":"1719","n":"barbell incline close grip bench press","bp":"upper arms","eq":"barbell","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Установите наклонную скамью под углом 45 градусов. Лягте на скамью, положив ноги на землю. Возьмите штангу узким хватом, на расстоянии чуть уже ширины плеч. Снимите штангу и медленно опустите ее к груди, держа локти близко к телу. Сделайте паузу на мгновение, когда штанга коснется вашей груди. Верните штангу в исходное положение, полностью выпрямив руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Жим узким хватом со штангой на наклонной скамье"},{"id":"0048","n":"barbell incline reverse-grip press","bp":"upper arms","eq":"barbell","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Установите наклонную скамью под углом 45 градусов. Лягте на скамью и возьмите штангу обратным хватом, руки чуть шире плеч. Освободите штангу и опустите ее к верхней части груди, сохраняя локти прижатыми. Сделайте паузу в нижней точке, затем поднимите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Жим обратным хватом со штангой на наклонной скамье"},{"id":"0049","n":"barbell incline row","bp":"back","eq":"barbell","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Установите наклонную скамью под углом 45 градусов. Лягте на скамью лицом вниз, прижавшись грудью к подушке, а ступни поставьте на землю. Возьмите штангу хватом сверху, на расстоянии чуть шире плеч. Держите спину прямо, а корпус напряженным. Подтяните штангу к груди, сведя лопатки вместе. Задержитесь на мгновение в верхней точке, затем медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга штанги на наклонной скамье"},{"id":"0050","n":"barbell incline shoulder raise","bp":"chest","eq":"barbell","tg":"serratus anterior","mg":"deltoids","img":null,"gif":null,"ru":"Установите наклонную скамью под углом 45 градусов. Сядьте на скамью, прислонившись спиной к подушке, а ступни поставьте на землю. Возьмите штангу хватом сверху, на расстоянии чуть шире ширины плеч. Поднимите штангу до уровня плеч, слегка согнув локти. Медленно поднимите штангу над головой, полностью выпрямляя руки. Задержитесь на мгновение в верхней точке, затем медленно опустите штангу обратно на высоту плеч. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подъём плеч со штангой на наклонной скамье"},{"id":"0051","n":"barbell jefferson squat","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч и слегка развернув пальцы ног. Держите штангу хватом сверху, положив ее на переднюю часть тела, чуть ниже талии. Сделайте шаг левой ногой вперед, а правой назад, держа ноги на ширине плеч. Согните ноги в коленях и опустите тело в положение приседа, держа спину прямо и грудь вверх. Оттолкнитесь пятками, чтобы вернуться в исходное положение. Повторите движение, чередуя переднюю и заднюю ногу при каждом повторении.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Присед Джефферсона со штангой"},{"id":"0052","n":"barbell jm bench press","bp":"upper arms","eq":"barbell","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Лягте на скамью, поставьте ступни на землю и прижмите спину к скамье. Возьмите штангу хватом сверху, на расстоянии чуть шире плеч. Опустите штангу к груди, держа локти близко к телу. Верните штангу в исходное положение, полностью выпрямив руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Жим лёжа JM со штангой"},{"id":"0053","n":"barbell jump squat","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Начните с того, что встаньте, поставив ноги на ширине плеч, удерживая штангу на верхней части спины. Опустите тело в присед, согнув колени и отведя бедра назад. Как только вы достигнете нижней точки приседа, взорвитесь вверх, отпрыгнув от земли. Во время прыжка вытягивайте бедра, колени и лодыжки, толкая пальцы ног. Мягко приземлитесь обратно в положение приседа и сразу же повторите движение желаемое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"high","sp":0,"kn":0,"sh":1,"ru_name":"Прыжковый присед со штангой"},{"id":"1410","n":"barbell lateral lunge","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, удерживая штангу на верхней части спины. Сделайте большой шаг в сторону правой ногой, удерживая левую ногу на месте. Согните правое колено и опустите тело в положение выпада, сохраняя левую ногу прямой. Оттолкнитесь правой ногой и вернитесь в исходное положение. Повторите то же самое в другую сторону, наступая левой ногой.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Боковой выпад со штангой"},{"id":"1435","n":"barbell low bar squat","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, а штанга положитесь на верхнюю часть спины. Удерживая грудь поднятой и напряженным корпус, медленно опустите тело, сгибая колени и отводя бедра назад. Продолжайте опускаться до тех пор, пока бедра не станут параллельны земле или немного ниже. Сделайте паузу на мгновение, затем оттолкнитесь пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Присед со штангой с низким положением грифа"},{"id":"0054","n":"barbell lunge","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Начните с того, что встаньте, поставив ноги на ширине плеч и положив штангу на верхнюю часть спины. Сделайте шаг вперед правой ногой, удерживая туловище в вертикальном положении. Опустите тело, согнув правое колено, пока бедро не станет параллельно земле. Оттолкнитесь правой пяткой, чтобы вернуться в исходное положение. Повторите то же самое с левой ногой, чередуя ноги необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Выпады со штангой"},{"id":"1720","n":"barbell lying back of the head tricep extension","bp":"upper arms","eq":"barbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Лягте на скамью, положив ноги на землю, а голову на край скамьи. Возьмите штангу хватом сверху, руки на ширине плеч, вытяните руки вверх над грудью. Удерживая плечи неподвижно, медленно опустите штангу за голову, сгибая локти. Сделайте паузу на мгновение, затем вытяните руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание трицепса со штангой лёжа за голову"},{"id":"0055","n":"barbell lying close-grip press","bp":"upper arms","eq":"barbell","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Лягте на скамью, поставьте ступни на землю и прижмите спину к скамье. Возьмите штангу узким хватом, руки на ширине плеч, ладони обращены к ногам. Снимите штангу со стойки и держите ее прямо над грудью, полностью вытянув руки. Медленно опустите штангу к груди, держа локти близко к телу. Сделайте паузу на мгновение, когда штанга коснется груди, затем поднимите ее обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим узким хватом лёжа со штангой"},{"id":"0056","n":"barbell lying close-grip triceps extension","bp":"upper arms","eq":"barbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Лягте на скамью, положив ноги на землю, а голову на край скамьи. Возьмите штангу узким хватом, руки на ширине плеч, ладонями вверх. Полностью выпрямите руки, подняв штангу над грудью. Удерживая плечи неподвижно, медленно опустите штангу ко лбу, сгибая локти. Задержитесь на мгновение в нижней точке, затем вытяните руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание трицепса узким хватом лёжа со штангой"},{"id":"0057","n":"barbell lying extension","bp":"upper arms","eq":"barbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Лягте на скамью, положив ноги на землю, а голову на край скамьи. Возьмите штангу хватом сверху, руки на ширине плеч, вытяните руки вверх над грудью. Удерживая плечи неподвижно, медленно опустите штангу ко лбу, сгибая локти. Сделайте паузу на мгновение, затем вытяните руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание лёжа со штангой"},{"id":"0058","n":"barbell lying lifting (on hip)","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Лягте на спину на скамью, поставьте ступни на землю и согните колени. Возьмите штангу хватом сверху и расположите ее на бедрах. Задействуя ягодицы, поднимите бедра со скамьи, пока ваше тело не образует прямую линию от колен до плеч. Задержитесь на мгновение в верхней точке, затем медленно опустите бедра обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём штанги лёжа на бёдра"},{"id":"0059","n":"barbell lying preacher curl","bp":"upper arms","eq":"barbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на скамью для проповедника, прижав грудь к подушке и вытянув руки через край, держа штангу обратным хватом. Удерживая плечи неподвижно, выдохните и согните гантели, одновременно сокращая бицепсы. Продолжайте поднимать штангу до тех пор, пока ваши бицепсы полностью не сократятся и штанга не окажется на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно начните опускать штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс на скамье Скотта лёжа со штангой"},{"id":"0061","n":"barbell lying triceps extension","bp":"upper arms","eq":"barbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Лягте на скамью, положив ноги на землю, а голову на край скамьи. Возьмите штангу хватом сверху, руки на ширине плеч, вытяните руки вверх над грудью. Удерживая плечи неподвижно, медленно опустите штангу ко лбу, сгибая локти. Задержитесь на мгновение в нижней точке, затем вытяните руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание трицепса лёжа со штангой"},{"id":"0060","n":"barbell lying triceps extension skull crusher","bp":"upper arms","eq":"barbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Лягте на скамью, положив ноги на землю, а голову на край скамьи. Возьмите штангу хватом сверху, руки на ширине плеч, вытяните руки вверх над грудью. Удерживая плечи неподвижно, медленно опустите штангу ко лбу, сгибая локти. Сделайте паузу на мгновение, когда штанга окажется прямо над лбом, затем вытяните руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Французский жим лёжа со штангой"},{"id":"0063","n":"barbell narrow stance squat","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, носки слегка направлены наружу. Держите штангу на верхней части спины, опираясь на трапеции или задние дельты. Напрягите корпус и держите грудь поднятой, медленно опуская тело, сгибая колени и отводя бедра назад. Продолжайте опускаться до тех пор, пока бедра не станут параллельны земле или немного ниже. Сделайте паузу на мгновение, затем оттолкнитесь пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Присед узкой стойкой со штангой"},{"id":"0064","n":"barbell one arm bent over row","bp":"back","eq":"barbell","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, колени слегка согнуты, возьмите штангу одной рукой хватом сверху. Наклонитесь вперед в бедрах, сохраняя спину прямой и голову в нейтральном положении. Подтяните штангу к груди, держа локоть близко к телу и сжимая лопатки вместе. Контролируемым образом опустите штангу обратно в исходное положение. Повторите желаемое количество повторений, затем переключитесь на другую руку.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Тяга штанги одной рукой в наклоне"},{"id":"0065","n":"barbell one arm floor press","bp":"upper arms","eq":"barbell","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Лягте на спину на пол, согните колени и поставьте ступни на землю. Держите штангу одной рукой ладонью вверх и вытяните руку прямо над грудью. Медленно опустите штангу к груди, держа локоть близко к телу. Сделайте небольшую паузу в нижней точке, затем верните штангу в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим с пола одной рукой со штангой"},{"id":"0066","n":"barbell one arm side deadlift","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите штангу в одной руке хватом сверху. Держите спину прямо, а корпус напряженным. Согнитесь в бедрах и опустите штангу к внешней стороне ноги, держа руку прямо и грудь вверх. Опустите штангу как можно ниже, сохраняя при этом хорошую форму. Сделайте паузу на мгновение, затем медленно вернитесь в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Боковая становая тяга одной рукой со штангой"},{"id":"0067","n":"barbell one arm snatch","bp":"shoulders","eq":"barbell","tg":"delts","mg":"traps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, носки слегка направлены наружу. Возьмите штангу хватом сверху, расставив руки чуть шире плеч. Согните ноги в коленях и опустите бедра в положение приседа, держа спину прямо и грудь вверх. Взрывно выпрямите бедра, колени и лодыжки, поднимая штангу вверх. Когда штанга достигнет уровня груди, потяните ее рукой вверх, держа ее близко к телу. Поверните локоть под штангу и вытяните руку полностью над головой, блокируя локоть. Контролируемым образом опустите штангу обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":0,"ru_name":"Рывок одной рукой со штангой"},{"id":"0068","n":"barbell one leg squat","bp":"upper legs","eq":"barbell","tg":"quads","mg":"glutes","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите штангу на верхней части спины. Поднимите одну ногу от земли и вытяните ее вперед, удерживая параллельно земле. Согните стоящую ногу и опустите тело вниз, как будто садитесь на стул, держа грудь поднятой, а спину прямой. Опускайтесь до тех пор, пока бедро не станет параллельно земле, затем оттолкнитесь пяткой, чтобы вернуться в исходное положение. Повторите необходимое количество повторений, затем поменяйте ногу и повторите.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Присед на одной ноге со штангой"},{"id":"0069","n":"barbell overhead squat","bp":"upper legs","eq":"barbell","tg":"quads","mg":"glutes","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч и слегка развернув пальцы ног. Возьмите штангу широким хватом, расположив ее над головой, полностью выпрямив руки. Напрягите корпус и опустите тело в положение приседа, удерживая грудь поднятой, а колени касаясь пальцев ног. Задержитесь на мгновение внизу, затем оттолкнитесь пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":0,"ru_name":"Присед со штангой над головой"},{"id":"1411","n":"barbell palms down wrist curl over a bench","bp":"lower arms","eq":"barbell","tg":"forearms","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на скамью, поставьте ступни на землю, положите предплечья на бедра ладонями вниз. Возьмите штангу хватом сверху, руки на ширине плеч. Опустите штангу к земле, сгибая запястья, сохраняя предплечья неподвижными. Задержитесь на мгновение в нижней точке, затем медленно поднимите штангу вверх, вытягивая запястья. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание запястий ладонями вниз со штангой через скамью"},{"id":"1412","n":"barbell palms up wrist curl over a bench","bp":"lower arms","eq":"barbell","tg":"forearms","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на скамью, поставьте ступни на землю и возьмите штангу обратным хватом ладонями вверх. Положите предплечья на скамью так, чтобы запястья свисали с края. Удерживая предплечья неподвижно, выдохните и согните запястья вверх как можно дальше. Удерживайте сокращенное положение на короткую паузу, затем вдохните и медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание запястий ладонями вверх со штангой через скамью"},{"id":"3017","n":"barbell pendlay row","bp":"back","eq":"barbell","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч и слегка согнув колени. Наклонитесь вперед в бедрах, держа спину прямо и грудь вверх. Возьмите штангу хватом сверху, на расстоянии чуть шире плеч. Потяните штангу к верхней части живота, сжимая лопатки вместе. Опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Тяга Пендли со штангой"},{"id":"1751","n":"barbell pin presses","bp":"upper arms","eq":"barbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Установите штангу на силовую стойку на уровне груди. Встаньте лицом к штанге и расположитесь под ней, поставив ноги на ширине плеч. Возьмите штангу хватом сверху, на расстоянии чуть шире ширины плеч. Снимите штангу со стойки и держите ее прямо над грудью, полностью вытянув руки. Опустите штангу к груди, держа локти прижатыми к телу. Сделайте паузу на мгновение, когда штанга коснется вашей груди. Верните штангу в исходное положение, полностью выпрямив руки. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим со штангой со стоек"},{"id":"0070","n":"barbell preacher curl","bp":"upper arms","eq":"barbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на скамью для проповедника, положив плечи на подушку и грудь на опору. Возьмите штангу хватом снизу, на расстоянии чуть шире ширины плеч. Удерживая плечи неподвижно, выдохните и поднимите штангу к плечам. Задержитесь на мгновение в верхней точке, напрягая бицепсы. Вдохните и медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс на скамье Скотта со штангой"},{"id":"0071","n":"barbell press sit-up","bp":"waist","eq":"barbell","tg":"abs","mg":"shoulders","img":null,"gif":null,"ru":"Лягте на спину на коврик, согните колени и поставьте ступни на землю. Возьмите штангу хватом сверху, положив ее на грудь. Включив пресс, медленно поднимите верхнюю часть тела от земли, наклоняясь вперед, пока туловище не окажется под углом 45 градусов. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Подъём корпуса с жимом штанги"},{"id":"0072","n":"barbell prone incline curl","bp":"upper arms","eq":"barbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Установите наклонную скамью под углом 45 градусов. Лягте лицом вниз на скамью, прижавшись к ней грудью и животом. Возьмите штангу хватом снизу на ширине плеч. Полностью выпрямите руки, позволяя штанге свисать к полу. Удерживая плечи неподвижно, выдохните и согните гири, одновременно сокращая бицепсы. Продолжайте поднимать штангу до тех пор, пока ваши бицепсы полностью не сократятся и штанга не окажется на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно начните опускать штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс лёжа на наклонной скамье со штангой"},{"id":"0073","n":"barbell pullover","bp":"back","eq":"barbell","tg":"lats","mg":"chest","img":null,"gif":null,"ru":"Лягте на скамью, положив голову на один конец и поставив ноги на пол. Возьмите штангу хватом на ширине плеч и вытяните руки прямо над грудью. Держа руки прямыми, контролируемо опустите штангу за голову, пока не почувствуете растяжение в широчайших. Сделайте паузу на мгновение, затем поднимите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Пуловер со штангой"},{"id":"0022","n":"barbell pullover to press","bp":"back","eq":"barbell","tg":"lats","mg":"triceps","img":null,"gif":null,"ru":"Лягте на скамью, положив голову на один конец и поставив ноги на землю. Возьмите штангу пронированным хватом (ладонями от себя) и вытяните руки прямо над грудью. Держа руки прямыми, опустите штангу за голову дугообразными движениями, пока не почувствуете растяжение широчайших мышц. Сделайте паузу на мгновение, затем поменяйте направление движения и верните штангу в исходное положение над грудью. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Пуловер с переходом в жим со штангой"},{"id":"0074","n":"barbell rack pull","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Установите штангу на стойку на уровне колен. Встаньте, ноги на ширине плеч, носки слегка направлены наружу. Согните бедра и колени, чтобы опуститься вниз, и возьмите штангу хватом сверху, руки на ширине плеч. Напрягите корпус и поднимите штангу, вытягивая бедра и колени, отводя плечи назад и сжимая ягодицы в верхней точке. Опустите штангу обратно в исходное положение, сгибая бедра и колени. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Тяга со стоек со штангой"},{"id":"0075","n":"barbell rear delt raise","bp":"shoulders","eq":"barbell","tg":"delts","mg":"traps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите штангу хватом сверху ладонями вниз. Слегка согните колени и наклонитесь вперед в бедрах, сохраняя спину прямой. Поднимите штангу в стороны, держа руки прямыми, пока они не станут параллельны земле. Задержитесь на мгновение в верхней точке, затем медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём рук в стороны на задние дельты со штангой"},{"id":"0076","n":"barbell rear delt row","bp":"shoulders","eq":"barbell","tg":"delts","mg":"trapezius","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч и слегка согнуты в коленях. Возьмите штангу хватом сверху, руки чуть шире плеч. Наклонитесь вперед в бедрах, держа спину прямо и грудь вверх. Подтяните штангу к груди, сведя лопатки вместе. Задержитесь на мгновение в верхней точке, затем медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Тяга штанги в наклоне на задние дельты"},{"id":"0078","n":"barbell rear lunge","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Начните с того, что встаньте, поставив ноги на ширине плеч и положив штангу на верхнюю часть спины. Сделайте шаг назад правой ногой, приземлившись на подушечку стопы. Согните оба колена и опустите тело до тех пор, пока левое бедро не станет параллельно земле. Оттолкнитесь левой пяткой, чтобы вернуться в исходное положение. Повторите с другой ногой.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Обратные выпады со штангой"},{"id":"0077","n":"barbell rear lunge v. 2","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите штангу на верхней части спины. Сделайте шаг назад правой ногой, приземлившись на подушечку стопы. Согните оба колена и опустите тело до тех пор, пока левое бедро не станет параллельно земле. Оттолкнитесь левой пяткой, чтобы вернуться в исходное положение. Повторите с другой ногой.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Обратные выпады со штангой вариант 2"},{"id":"0079","n":"barbell revers wrist curl v. 2","bp":"lower arms","eq":"barbell","tg":"forearms","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на скамью, поставьте ноги на землю и согните колени. Возьмите штангу хватом сверху, ладонями вниз, руки на ширине плеч. Положите предплечья на бедра, позволяя запястьям свисать с края. Удерживая предплечья неподвижно, выдохните и согните запястья вверх как можно дальше. Удерживайте сокращенное положение на короткую паузу, затем вдохните и медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратное сгибание запястий со штангой вариант 2"},{"id":"2187","n":"barbell reverse close-grip bench press","bp":"upper arms","eq":"barbell","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Лягте на скамью, поставьте ступни на землю и прижмите спину к скамье. Возьмите штангу обратным хватом, руки на ширине плеч. Снимите штангу со стойки и держите ее прямо над грудью, полностью вытянув руки. Медленно опустите штангу к груди, держа локти близко к телу. Сделайте паузу на мгновение, когда штанга окажется чуть выше груди. Верните штангу в исходное положение, полностью выпрямив руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим лёжа обратным узким хватом со штангой"},{"id":"0080","n":"barbell reverse curl","bp":"upper arms","eq":"barbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, ноги на ширине плеч, возьмите штангу хватом сверху ладонями вниз. Держите плечи неподвижно и на выдохе поднимайте штангу вверх, сокращая бицепсы. Продолжайте поднимать штангу до тех пор, пока ваши бицепсы полностью не сократятся и штанга не окажется на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. На вдохе медленно опускайте штангу обратно в исходное положение, сохраняя плечи неподвижными. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс обратным хватом со штангой"},{"id":"0118","n":"barbell reverse grip bent over row","bp":"back","eq":"barbell","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч и слегка согнуты в коленях. Держите штангу хватом сверху, ладонями вниз, руки на расстоянии чуть шире плеч. Наклонитесь вперед в бедрах, держа спину прямо и грудь вверх, пока туловище не станет почти параллельно полу. Потяните штангу к нижней части груди, сжимая лопатки вместе. Задержитесь на мгновение в верхней точке, затем медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Тяга штанги в наклоне обратным хватом"},{"id":"1256","n":"barbell reverse grip decline bench press","bp":"chest","eq":"barbell","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Лягте на наклонную скамью, зафиксировав ноги и опустив голову ниже бедер. Возьмите штангу обратным хватом, на расстоянии чуть шире ширины плеч. Освободите штангу и медленно опустите ее к груди, держа локти прижатыми. Сделайте паузу в нижней точке, затем поднимите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим штанги на наклонной скамье вниз головой обратным хватом"},{"id":"1257","n":"barbell reverse grip incline bench press","bp":"chest","eq":"barbell","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Установите наклонную скамью под углом 45 градусов. Лягте на скамью, положив ноги на землю. Возьмите штангу обратным хватом, руки чуть шире плеч. Освободите штангу и медленно опустите ее к груди, держа локти прижатыми. Сделайте паузу на мгновение, когда штанга коснется вашей груди. Верните штангу в исходное положение, полностью выпрямив руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим штанги на наклонной скамье обратным хватом"},{"id":"1317","n":"barbell reverse grip incline bench row","bp":"back","eq":"barbell","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Установите наклонную скамью под углом 45 градусов. Сядьте на скамью лицом к спинке, прижавшись к ней грудью. Возьмите штангу обратным хватом (ладонями вниз) и расставьте руки чуть шире плеч. Держите спину прямо и напрягите корпус. Потяните штангу к верхней части живота, сжимая лопатки вместе. Сделайте паузу на мгновение в верхней точке движения. Медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга штанги лёжа на наклонной скамье обратным хватом"},{"id":"1721","n":"barbell reverse grip skullcrusher","bp":"upper arms","eq":"barbell","tg":"triceps","mg":"forearms","img":null,"gif":null,"ru":"Лягте на скамью, положив ноги на землю, а голову на край скамьи. Держите штангу обратным хватом ладонями к лицу, руки на ширине плеч. Вытяните руки прямо вверх над грудью, сохраняя локти и запястья прямыми. Медленно опустите штангу ко лбу, сгибая локти, сохраняя плечи неподвижными. Задержитесь на мгновение в нижней точке, затем вытяните руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Французский жим со штангой обратным хватом"},{"id":"0081","n":"barbell reverse preacher curl","bp":"upper arms","eq":"barbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на скамью для проповедника, прижав грудь к подушке и вытянув руки вниз, держа штангу хватом сверху. Удерживая плечи неподвижно, выдохните и поднимите штангу вверх, одновременно напрягая бицепсы. Продолжайте поднимать штангу до тех пор, пока ваши бицепсы полностью не сократятся и штанга не окажется на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс на скамье Скотта обратным хватом со штангой"},{"id":"0082","n":"barbell reverse wrist curl","bp":"lower arms","eq":"barbell","tg":"forearms","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на скамью, поставьте ноги на землю и возьмите штангу хватом сверху ладонями вниз. Положите предплечья на бедра, позволяя запястьям свисать с края. Медленно поднимите запястья вверх, приближая штангу к телу. Задержитесь на мгновение в верхней точке, затем медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратное сгибание запястий со штангой"},{"id":"0084","n":"barbell rollerout","bp":"waist","eq":"barbell","tg":"abs","mg":"lower back","img":null,"gif":null,"ru":"Встаньте на колени и возьмите штангу обеими руками на ширине плеч. Перекатите штангу вперед, вытягивая руки и сохраняя корпус напряженным. Продолжайте перекатываться вперед до тех пор, пока ваше тело не будет полностью выпрямлено, а руки не окажутся над головой. Сделайте паузу на мгновение, затем медленно перекатите штангу обратно к коленям, сохраняя контроль. Повторите необходимое количество повторений.","pos":"kneeling","ax":"low","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Раскатка со штангой"},{"id":"0083","n":"barbell rollerout from bench","bp":"waist","eq":"barbell","tg":"abs","mg":"shoulders","img":null,"gif":null,"ru":"Начните с того, что встанете на колени на пол, положив штангу на скамью перед собой. Возьмите штангу хватом сверху, на расстоянии чуть шире плеч. Удерживая корпус напряженным и спину прямой, медленно перекатывайте штангу вперед, вытягивая руки перед собой. Продолжайте перекатывать штангу вперед до тех пор, пока ваше тело не будет полностью выпрямлено, а руки не окажутся над головой. Задержитесь на мгновение в полностью выпрямленном положении, затем медленно перекатите штангу обратно к телу, возвращаясь в исходное положение. Повторите необходимое количество повторений.","pos":"kneeling","ax":"low","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Раскатка со штангой с упором на скамью"},{"id":"0085","n":"barbell romanian deadlift","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч, носки ног направлены вперед. Возьмите штангу хватом сверху, руки чуть шире плеч. Согните бедра, сохраняя спину прямой и слегка согнутыми в коленях. Опустите штангу к земле, держа ее близко к телу. Почувствуйте растяжение подколенных сухожилий, когда опускаете штангу. Как только вы почувствуете растяжение подколенных сухожилий, выдвиньте бедра вперед и встаньте прямо. Напрягите ягодицы в верхней точке движения. Опустите штангу обратно в исходное положение и повторите желаемое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Румынская становая тяга со штангой"},{"id":"0086","n":"barbell seated behind head military press","bp":"shoulders","eq":"barbell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Сядьте на скамью, выпрямив спину и поставив ноги на землю. Возьмите штангу хватом сверху, на расстоянии чуть шире плеч. Снимите штангу со стойки и опустите ее на уровень плеч за голову. Нажмите штангу вверх, пока руки полностью не выпрямятся. Опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Жим штанги из-за головы сидя"},{"id":"0087","n":"barbell seated bradford rocky press","bp":"shoulders","eq":"barbell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Сядьте на скамью, выпрямив спину и поставив ноги на землю. Возьмите штангу хватом сверху, на расстоянии чуть шире плеч. Поднимите штангу на высоту плеч, держа локти слегка согнутыми и направленными вперед. Жмите штангу над головой, полностью выпрямляя руки. Опустите штангу обратно на высоту плеч и повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Жим Брэдфорда со штангой сидя"},{"id":"0088","n":"barbell seated calf raise","bp":"lower legs","eq":"barbell","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Сядьте на скамью, поставьте ступни на пол и положите штангу на бедра. Поставьте подушечки стоп на приподнятую платформу, например, на блок или ступеньку. Расположите штангу на бедрах и надежно удерживайте ее руками. Удерживая спину прямой и напрягая корпус, поднимите пятки от земли, вытянув лодыжки. Задержитесь на мгновение в верхней точке, затем медленно опустите пятки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носки сидя со штангой"},{"id":"1371","n":"barbell seated calf raise","bp":"lower legs","eq":"barbell","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Сядьте на скамью, поставьте ступни на пол и положите штангу на бедра. Поставьте подушечки стоп на приподнятую платформу, например, на блок или ступеньку. Опустите пятки как можно ниже, чувствуя растяжение в икрах. Поднимите пятки как можно выше, напрягая икроножные мышцы. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носки сидя со штангой"},{"id":"1718","n":"barbell seated close grip behind neck triceps extension","bp":"upper arms","eq":"barbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на скамью, выпрямив спину и поставив ноги на землю. Держите штангу узким хватом за шеей ладонями вперед. Держите локти близко к голове и медленно опустите штангу к затылку. Сделайте паузу на мгновение, затем вытяните руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Разгибание рук на трицепс из-за головы узким хватом со штангой сидя"},{"id":"0089","n":"barbell seated close-grip concentration curl","bp":"upper arms","eq":"barbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на скамью, поставьте ноги на пол и возьмите штангу обратным хватом, руки на ширине плеч. Положите плечи на внутреннюю поверхность бедер, чуть выше колен, и позвольте штанге свисать перед вами. Удерживая плечи неподвижно, выдохните и поднимите штангу к плечам, напрягая бицепсы. Удерживайте сокращенное положение на короткую паузу, затем вдохните и медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Концентрированный подъём на бицепс узким хватом со штангой сидя"},{"id":"0090","n":"barbell seated good morning","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Сядьте на скамью, поставив ноги на землю, а штангу положите на верхнюю часть спины. Держите спину прямо и грудь вверх. Медленно наклонитесь вперед в бедрах, опуская туловище к земле. Задержитесь на мгновение внизу, затем оттолкнитесь пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Наклоны со штангой сидя"},{"id":"0091","n":"barbell seated overhead press","bp":"shoulders","eq":"barbell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Сядьте на скамью, выпрямив спину и поставив ноги на землю. Возьмите штангу хватом сверху, на расстоянии чуть шире плеч. Снимите штангу со стойки и поднимите ее на уровень плеч, согнув локти и повернув ладони вперед. Выжмите штангу над головой, полностью выпрямив руки. Задержитесь на мгновение в верхней точке, затем медленно опустите штангу обратно на уровень плеч. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Жим штанги над головой сидя"},{"id":"0092","n":"barbell seated overhead triceps extension","bp":"upper arms","eq":"barbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на скамью, выпрямив спину и поставив ноги на землю. Возьмите штангу хватом сверху, руки на ширине плеч, и поднимите ее над головой. Опустите штангу за голову, согнув локти и держа плечи близко к голове. Сделайте паузу на мгновение, затем вытяните руки и поднимите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Разгибание рук на трицепс из-за головы со штангой сидя"},{"id":"0094","n":"barbell seated twist","bp":"waist","eq":"barbell","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Сядьте на плоскую скамью, поставьте ступни на землю и согните колени. Держите штангу обеими руками перед грудью, слегка согнув локти. Напрягите корпус и медленно поверните туловище в сторону, сохраняя спину прямой. Сделайте паузу на мгновение в конце поворота, затем медленно поверните обратно в исходное положение. Повторите поворот в другую сторону. Продолжайте чередовать стороны желаемое количество повторений.","pos":"seated","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Скручивания со штангой сидя"},{"id":"0095","n":"barbell shrug","bp":"back","eq":"barbell","tg":"traps","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, и держите штангу перед собой хватом сверху. На протяжении всего упражнения держите руки прямыми и спину прямой. Поднимите плечи к ушам как можно выше, сжимая трапеции вверху. Задержитесь на мгновение, затем медленно опустите плечи обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Шраги со штангой"},{"id":"0096","n":"barbell side bent v. 2","bp":"waist","eq":"barbell","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите штангу обеими руками ладонями вниз. На протяжении всего упражнения держите спину прямой и напряженным корпус. Медленно наклоните туловище в правую сторону, опуская штангу к правому колену. Сделайте паузу на мгновение, затем вернитесь в исходное положение. Повторите движение с левой стороны. Продолжайте чередовать стороны желаемое количество повторений.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Наклоны в сторону со штангой вариант 2"},{"id":"0098","n":"barbell side split squat","bp":"upper legs","eq":"barbell","tg":"quads","mg":"glutes","img":null,"gif":null,"ru":"Встаньте, поставив ноги шире плеч, носки слегка направлены наружу. Держите штангу на верхней части спины, положив ее на трапеции. Напрягите корпус и держите грудь поднятой, опуская тело в присед, сгибая колени и бедра. Опускаясь, разведите колени в стороны и перенесите вес тела на пятки. Опускайтесь до тех пор, пока бедра не станут параллельны земле, затем оттолкнитесь пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Боковые сплит-приседания со штангой"},{"id":"0097","n":"barbell side split squat v. 2","bp":"upper legs","eq":"barbell","tg":"quads","mg":"glutes","img":null,"gif":null,"ru":"Встаньте, поставив ноги шире плеч, носки слегка направлены наружу. Держите штангу через верхнюю часть спины, положив ее на плечи. Сделайте большой шаг в сторону правой ногой, удерживая левую ногу на месте. Согните правое колено и опустите тело в положение приседа, удерживая грудь поднятой, а спину прямой. Оттолкнитесь правой пяткой, чтобы вернуться в исходное положение. Повторите то же самое с другой стороны, выставив левую ногу. Продолжайте чередовать стороны желаемое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Боковые сплит-приседания со штангой вариант 2"},{"id":"1756","n":"barbell single leg deadlift","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, удерживая штангу перед бедрами хватом сверху. Перенесите вес тела на левую ногу и слегка поднимите правую ногу от земли. Наклонитесь вперед в бедрах, сохраняя спину прямой и вытянув правую ногу позади себя для равновесия. Опустите штангу к земле, держа ее близко к телу и слегка согнув левую ногу. Задержитесь на мгновение в нижней точке, затем задействуйте ягодицы и мышцы задней поверхности бедра, чтобы поднять туловище обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Становая тяга на одной ноге со штангой"},{"id":"0099","n":"barbell single leg split squat","bp":"upper legs","eq":"barbell","tg":"quads","mg":"glutes","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, удерживая штангу на верхней части спины. Сделайте большой шаг вперед одной ногой, сохраняя туловище в вертикальном положении. Опустите тело, согнув переднее колено и бедро, сохраняя при этом заднюю ногу прямой. Продолжайте опускаться до тех пор, пока переднее бедро не станет параллельно земле. Сделайте паузу на мгновение, затем оттолкнитесь передней пяткой, чтобы вернуться в исходное положение. Повторите необходимое количество повторений, затем поменяйте ногу.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Сплит-приседания на одной ноге со штангой"},{"id":"2799","n":"barbell sitted alternate leg raise","bp":"waist","eq":"barbell","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Сядьте на скамью с прямой спиной и держите штангу на бедрах. Держа ноги прямыми, поднимите одну ногу как можно выше, удерживая другую ногу на земле. Опустите поднятую ногу обратно вниз и повторите то же самое с другой ногой. Продолжайте чередовать ноги желаемое количество повторений.","pos":"seated","ax":"low","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Попеременный подъём ног сидя со штангой"},{"id":"2800","n":"barbell sitted alternate leg raise (female)","bp":"waist","eq":"barbell","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Сядьте на скамью с прямой спиной и держите штангу на бедрах. Положите руки по бокам скамьи для поддержки. Держа ноги прямыми, поднимите одну ногу как можно выше, удерживая ее параллельно земле. Опустите ногу обратно и повторите то же самое с другой ногой. Продолжайте чередовать ноги желаемое количество повторений.","pos":"seated","ax":"low","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Попеременный подъём ног сидя со штангой женский вариант"},{"id":"0100","n":"barbell skier","bp":"shoulders","eq":"barbell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, удерживайте штангу перед бедрами хватом сверху. Слегка согните колени и наклонитесь вперед в бедрах, держа спину прямо и грудь вверх. Одновременно поднимите штангу к плечам, слегка подпрыгнув от земли. Достигнув верхней точки движения, быстро поменяйте направление движения и опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"low","sp":1,"kn":1,"sh":0,"ru_name":"Лыжник со штангой"},{"id":"0101","n":"barbell speed squat","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, носки слегка развернуты наружу. Держите штангу на верхней части спины, опираясь на трапеции или задние дельты. Напрягите корпус и держите грудь поднятой, опуская бедра назад и вниз, как будто вы садитесь на стул. Опускайтесь до тех пор, пока бедра не станут параллельны земле или настолько низко, насколько вам будет удобно. Протолкните пятки, чтобы встать, сжимая ягодицы вверху. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Скоростные приседания со штангой"},{"id":"2810","n":"barbell split squat v. 2","bp":"upper legs","eq":"barbell","tg":"quads","mg":"glutes","img":null,"gif":null,"ru":"Начните с того, что встаньте, поставив ноги на ширине плеч, удерживая штангу на верхней части спины. Сделайте большой шаг вперед правой ногой, сохраняя туловище в вертикальном положении. Опустите тело, сгибая колени и бедра, пока правое бедро не станет параллельно земле. Сделайте паузу на мгновение, затем оттолкнитесь правой пяткой, чтобы вернуться в исходное положение. Повторите, выставив левую ногу вперед, необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Сплит-приседания со штангой вариант 2"},{"id":"0102","n":"barbell squat (on knees)","bp":"upper legs","eq":"barbell","tg":"quads","mg":"glutes","img":null,"gif":null,"ru":"Начните с того, что встаньте на колени на землю, расставив колени на ширине бедер и направив пальцы ног вперед. Положите штангу на плечи, возьмите ее хватом сверху и расставьте руки чуть шире плеч. Напрягите корпус и держите грудь поднятой, медленно опуская тело вниз, сгибая колени, сохраняя спину прямой. Продолжайте опускаться до тех пор, пока ваши бедра не станут параллельны земле или настолько низко, насколько вам будет удобно. Задержитесь на мгновение внизу, затем оттолкнитесь пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"kneeling","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Приседания со штангой на коленях"},{"id":"2798","n":"barbell squat jump step rear lunge","bp":"upper legs","eq":"barbell","tg":"quads","mg":"glutes","img":null,"gif":null,"ru":"Начните с того, что встаньте, поставив ноги на ширине плеч, удерживая штангу на верхней части спины. Опустите тело в присед, согнув колени и отведя бедра назад. Взрывайтесь вверх, отпрыгивая от земли как можно выше. Мягко приземлитесь на ноги и сразу же сделайте шаг назад одной ногой в обратный выпад. Опускайте тело вниз, пока переднее бедро не станет параллельно земле, сохраняя спину прямой. Оттолкнитесь передней пяткой, чтобы вернуться в исходное положение. Повторите последовательность прыжков и выпадов на другую ногу. Продолжайте чередовать ноги желаемое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"high","sp":0,"kn":0,"sh":1,"ru_name":"Приседания со штангой с выпрыгиванием и обратным выпадом"},{"id":"0103","n":"barbell standing ab rollerout","bp":"waist","eq":"barbell","tg":"abs","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте прямо, ноги на ширине плеч и держите штангу обеими руками перед бедрами. Напрягите корпус и медленно катите штангу вниз к земле, держа спину прямо и руки вытянутыми. Продолжайте катить штангу вперед до тех пор, пока ваше тело не будет полностью выпрямлено, а руки не окажутся прямо над головой. Сделайте паузу на мгновение, затем медленно перекатите штангу обратно к бедрам, сохраняя контроль и напрягая корпус. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Раскатка для пресса со штангой стоя"},{"id":"0104","n":"barbell standing back wrist curl","bp":"lower arms","eq":"barbell","tg":"forearms","mg":"biceps","img":null,"gif":null,"ru":"Встаньте прямо, ноги на ширине плеч, возьмите штангу хватом сверху. Положите штангу на тыльную сторону рук ладонями вниз и пальцами к телу. Удерживая плечи неподвижно, выдохните и согните запястья вверх как можно дальше. Удерживайте сокращенное положение на короткую паузу, затем вдохните и медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратное сгибание запястий со штангой стоя"},{"id":"0105","n":"barbell standing bradford press","bp":"shoulders","eq":"barbell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, и держите штангу перед плечами хватом сверху. Жмите штангу над головой, полностью выпрямляя руки. Опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Жим Брэдфорда со штангой стоя"},{"id":"1372","n":"barbell standing calf raise","bp":"lower legs","eq":"barbell","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, положите штангу на верхнюю часть спины. Поднимите пятки от земли как можно выше, используя только пальцы ног. Задержитесь на мгновение в верхней точке, затем медленно опустите пятки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носки со штангой стоя"},{"id":"0106","n":"barbell standing close grip curl","bp":"upper arms","eq":"barbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, ноги на ширине плеч, возьмите штангу обратным хватом, руки близко друг к другу. Держите локти близ
