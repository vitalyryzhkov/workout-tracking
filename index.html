плеч и слегка согнув колени. Возьмитесь за перекладину хватом сверху, на расстоянии чуть шире ширины плеч. Повисните на перекладине, полностью вытянув руки и повернув ладони от себя. Напрягите корпус и подтяните тело к перекладине, поднимая подбородок над перекладиной. Задержитесь на мгновение в верхней точке, затем медленно опустите тело обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Подтягивания гориллы"},{"id":"0469","n":"groin crunch","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Положите руки за голову локтями наружу. Включив пресс, поднимите ноги от земли, подтянув колени к груди. Задержитесь на мгновение в верхней точке, затем медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Скручивания на приводящие мышцы"},{"id":"1383","n":"hack calf raise","bp":"lower legs","eq":"sled machine","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Отрегулируйте сани до удобного веса. Встаньте на санки, положив пальцы ног на платформу и свесив пятки. Держитесь за ручки для устойчивости. Поднимите пятки как можно выше, толкая подушечки стоп. Задержитесь на мгновение в верхней точке, затем медленно опустите пятки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носки в тренажёре для гакк-приседаний"},{"id":"1384","n":"hack one leg calf raise","bp":"lower legs","eq":"sled machine","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Отрегулируйте салазки до подходящего веса. Встаньте на салазки одной ногой, не отрывая другую от земли. Держитесь за ручки для устойчивости. Поднимите пятку как можно выше, поднимая тело на подушечку стопы. Задержитесь на мгновение в верхней точке, затем медленно опустите пятку обратно в исходное положение. Повторите необходимое количество повторений. Поменяйте ноги и повторите упражнение.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носок одной ноги в тренажёре для гакк-приседаний"},{"id":"3221","n":"half knee bends (male)","bp":"cardio","eq":"body weight","tg":"cardiovascular system","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч. Согните колени и опустите тело вниз, как будто вы сидите на стуле. Держите грудь поднятой, а вес тела переносите на пятки. Задержитесь на мгновение внизу, затем оттолкнитесь пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Полуприседания"},{"id":"3202","n":"half sit-up (male)","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Положите руки за голову локтями наружу. Включив пресс, медленно поднимите верхнюю часть тела от земли, наклоняясь вперед, пока туловище не окажется под углом 45 градусов. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Неполный подъём корпуса"},{"id":"1511","n":"hamstring stretch","bp":"upper legs","eq":"body weight","tg":"hamstrings","mg":"glutes","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч. Сделайте шаг вперед правой ногой и перенесите вес тела на правую ногу. Сохраняя спину прямой, медленно наклонитесь вперед в бедрах, потянув обе руки к правой ступне. Удерживайте растяжку 20–30 секунд, затем вернитесь в исходное положение. Повторите с другой стороны.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка бицепса бедра"},{"id":"2139","n":"hands bike","bp":"chest","eq":"upper body ergometer","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и положение руля до удобного уровня. Сядьте на эргометр, спина прямая, ноги на педалях. Возьмитесь за ручки руками и расположите руки под углом 90 градусов. Начните крутить педали руками, толкая и тянув ручки контролируемым движением. Продолжайте крутить педали желаемую продолжительность или количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Велотренажёр для рук"},{"id":"3218","n":"hands clasped circular toe touch (male)","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, руки сомкнуты перед грудью. Слегка согните колени и наклонитесь вперед в бедрах, сохраняя спину прямой. Опустите руки к пальцам ног круговыми движениями, дотягиваясь как можно дальше, не напрягаясь. Задержитесь на мгновение в нижней точке, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Касание носков по кругу со сцепленными руками"},{"id":"3215","n":"hands reversed clasped circular toe touch (male)","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, руки вытянуты в стороны. Наклонитесь вперед в талии, сохраняя спину прямой и слегка согнутыми в коленях. Потяните руки вниз и соедините их за ногами. Медленно поднимите руки вверх и над головой круговыми движениями, держа ноги прямыми. Продолжайте круговые движения, пока руки не коснутся пальцев ног. Сделайте обратное движение и верните руки в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Касание носков по кругу с обратно сцепленными руками"},{"id":"3302","n":"handstand","bp":"upper arms","eq":"body weight","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Найдите открытое пространство, в котором достаточно места для стойки на руках. Положите руки на пол на ширине плеч, пальцы направлены вперед. Поднимите ноги к стене, используя корпус и плечи для поддержания равновесия. В стойке на руках задействуйте трицепсы, чтобы поддерживать вес тела. Удерживайте стойку на руках столько, сколько сможете сохранить равновесие. Чтобы опуститься, медленно опустите ноги обратно на землю. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Стойка на руках"},{"id":"0471","n":"handstand push-up","bp":"upper arms","eq":"body weight","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Найдите стену и отвернитесь от нее, стоя на расстоянии нескольких футов. Поставьте руки на пол на ширине плеч и поднимите ноги к стене, приняв положение стойки на руках. Согните локти и опустите голову к земле, сохраняя тело прямой. Оттолкнитесь руками и вытяните руки, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"high","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания в стойке на руках"},{"id":"1764","n":"hanging leg hip raise","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Повисните на перекладине, полностью вытянув руки и повернув ладони от себя. Напрягите корпус и поднимите ноги вверх, сгибая бедра и колени, пока бедра не станут параллельны земле. Задержитесь на мгновение в верхней точке, затем медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём ног и таза в висе"},{"id":"0472","n":"hanging leg raise","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Повисните на перекладине, полностью вытянув руки и повернув ладони от себя. Напрягите корпус и поднимите ноги перед собой, сохраняя их прямыми. Продолжайте поднимать до тех пор, пока ваши ноги не станут параллельны земле или не станут настолько высоко, насколько вы сможете комфортно подняться. Задержитесь на мгновение в верхней точке, затем медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём ног в висе"},{"id":"1761","n":"hanging oblique knee raise","bp":"waist","eq":"body weight","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Повисните на перекладине, полностью вытянув руки и повернув ладони от себя. Напрягите корпус и поднимите колени к груди, поворачивая при этом туловище в сторону. Задержитесь на мгновение в верхней точке, затем медленно опустите ноги обратно в исходное положение. Повторите то же самое с другой стороны, поворачивая туловище в противоположном направлении. Продолжайте чередовать стороны желаемое количество повторений.","pos":"standing","ax":"none","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём колен в висе боковой"},{"id":"0473","n":"hanging pike","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Повисните на перекладине, полностью вытянув руки и повернув ладони от себя. Напрягите корпус и поднимите ноги к перекладине, сохраняя их прямыми. Продолжайте поднимать, пока ваше тело не примет V-образную форму, а ноги параллельны земле. Задержитесь на мгновение в этом положении, затем медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Складка в висе"},{"id":"0474","n":"hanging straight leg hip raise","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Повисните на перекладине, полностью вытянув руки и повернув ладони от себя. Напрягите корпус и поднимите ноги перед собой, пока они не станут параллельны земле. Задержитесь на мгновение в верхней точке, затем медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём прямых ног и таза в висе"},{"id":"0475","n":"hanging straight leg raise","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Повисните на перекладине, полностью вытянув руки и повернув ладони от себя. Напрягите корпус и поднимите ноги перед собой, сохраняя их прямыми. Продолжайте поднимать до тех пор, пока ваши ноги не станут параллельны земле или не станут настолько высоко, насколько вы сможете комфортно подняться. Задержитесь на мгновение в верхней точке, затем медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём прямых ног в висе"},{"id":"0476","n":"hanging straight twisting leg hip raise","bp":"waist","eq":"body weight","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Повисните на перекладине, полностью вытянув руки и выпрямив ноги. Напрягите корпус и поднимите ноги к груди, сохраняя их прямыми. Как только ваши ноги станут параллельны земле, поверните бедра в одну сторону, перемещая ноги в эту сторону. Сделайте паузу на мгновение, затем вернитесь в исходное положение. Повторите движение, но на этот раз поверните бедра в противоположную сторону. Продолжайте чередовать стороны желаемое количество повторений.","pos":"standing","ax":"none","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём прямых ног и таза в висе со скручиванием"},{"id":"3636","n":"high knee against wall","bp":"cardio","eq":"body weight","tg":"cardiovascular system","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте лицом к стене, поставив ноги на ширине плеч. Положите руки на стену для поддержки. Напрягите корпус и поднимите правое колено к груди, удерживая левую ногу на земле. Быстро поменяйте ноги, поднеся левое колено к груди и опустив правую ногу обратно вниз. Продолжайте чередовать ноги бегущим движением, поднимая колени как можно выше. Поддерживайте быстрый темп и сохраняйте устойчивость верхней части тела на протяжении всего упражнения. Повторяйте желаемую продолжительность или количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Высокий подъём колена у стены"},{"id":"0484","n":"hip raise (bent knee)","bp":"waist","eq":"body weight","tg":"abs","mg":"glutes","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Положите руки по бокам ладонями вниз. Задействуйте корпус и ягодицы, затем поднимите бедра от земли, пока ваше тело не образует прямую линию от колен до плеч. Задержитесь на мгновение в верхней точке, затем медленно опустите бедра обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём таза с согнутыми коленями"},{"id":"1418","n":"hug keens to chest","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Начните с того, что встаньте, поставив ноги на ширине плеч. Согните колени и опустите тело в присед. Приседая, подтяните колени к груди и обхватите их руками. Задержитесь на мгновение в этом положении, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подтягивание коленей к груди"},{"id":"3234","n":"hyght dumbbell fly","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Лягте на скамью, взяв в каждую руку по гантели, ладони обращены друг к другу. Вытяните руки прямо вверх над грудью, слегка согнув их в локтях. Сохраняя небольшой изгиб в локтях, опустите гантели в стороны по широкой дуге, пока не почувствуете растяжение в груди. Сделайте паузу на мгновение, затем поменяйте направление движения и верните гантели в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разведение гантелей лёжа"},{"id":"0489","n":"hyperextension","bp":"back","eq":"body weight","tg":"spine","mg":"glutes","img":null,"gif":null,"ru":"Отрегулируйте скамью для гиперэкстензии так, чтобы верхняя часть бедер опиралась на подушку, а ступни были зафиксированы. Скрестите руки на груди или заведите руки за голову. Опустите верхнюю часть тела к земле, сохраняя спину прямой. Задержитесь на мгновение в нижней точке, затем снова поднимите верхнюю часть тела вверх, пока она не окажется на одной линии с ногами. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Гиперэкстензия"},{"id":"0488","n":"hyperextension (on bench)","bp":"back","eq":"body weight","tg":"spine","mg":"glutes","img":null,"gif":null,"ru":"Отрегулируйте скамью для гиперэкстензии так, чтобы ваши бедра удобно лежали на подушке, а ступни были зафиксированы. Скрестите руки на груди или заведите руки за голову. Медленно опустите верхнюю часть тела к земле, сохраняя спину прямой. Задержитесь на мгновение в нижней точке, затем снова поднимите верхнюю часть тела вверх, пока она не окажется на одной линии с ногами. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Гиперэкстензия на скамье"},{"id":"3289","n":"impossible dips","bp":"upper arms","eq":"body weight","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Встаньте между двумя параллельными брусьями, полностью вытянув руки и подвешивая тело в воздухе. Согните колени и скрестите лодыжки. Опустите тело, сгибая локти, пока плечи не станут параллельны земле. Сделайте паузу на мгновение, затем вернитесь в исходное положение, выпрямляя руки. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Невозможные отжимания на брусьях"},{"id":"1471","n":"inchworm","bp":"waist","eq":"body weight","tg":"abs","mg":"shoulders","img":null,"gif":null,"ru":"Начните с положения стоя, поставив ноги на ширине плеч. Наклонитесь вперед в талии и положите руки на пол перед собой. Вытяните руки вперед, пока не окажетесь в положении высокой планки, при этом тело будет составлять прямую линию от головы до пят. Сделайте паузу на мгновение, затем верните руки назад к ногам, сохраняя ноги как можно более прямыми. Как только ваши руки достигнут ног, вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Гусеница"},{"id":"3698","n":"inchworm v. 2","bp":"waist","eq":"body weight","tg":"abs","mg":"shoulders","img":null,"gif":null,"ru":"Начните с положения стоя, поставив ноги на ширине плеч. Наклонитесь вперед в талии и положите руки на пол перед собой. Вытяните руки вперед, пока не окажетесь в положении высокой планки, при этом тело будет составлять прямую линию от головы до пят. Держа ноги прямыми, подтяните ступни к рукам, подтягивая бедра к потолку. Продолжайте шагать руками вперед, повторяя движение желаемое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Гусеница вариант 2"},{"id":"0490","n":"incline close-grip push-up","bp":"upper arms","eq":"body weight","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Положите руки на возвышенную поверхность, например на скамью или ступеньку, на расстоянии чуть шире ширины плеч. Вытяните ноги позади себя, опираясь на подушечки стоп, при этом тело образует прямую линию от головы до пяток. Опустите грудь к возвышенной поверхности, согнув локти и держа их близко к бокам. Задержитесь на мгновение в нижней точке, затем вернитесь в исходное положение, выпрямляя руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отжимания узким хватом на наклонной"},{"id":"0491","n":"incline leg hip raise (leg straight)","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на наклонную скамью, прижав спину к скамье и вытянув ноги прямо перед собой. Положите руки по бокам скамьи для поддержки. Включив пресс, поднимите ноги со скамьи, подняв их как можно выше, сохраняя при этом прямыми. Задержитесь на мгновение в верхней точке, затем медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём прямой ноги и таза на наклонной"},{"id":"0492","n":"incline push up depth jump","bp":"chest","eq":"body weight","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Найдите возвышенную поверхность, например скамью или ступеньку, и поставьте на край руки на ширине плеч. Отведите ноги назад, удерживая тело от головы до пяток на прямой линии. Опустите грудь к краю поверхности, сгибая локти и удерживая тело ровным. Оттолкнитесь ладонями, чтобы вытянуть руки и вернуться в исходное положение. Спрыгните с края поверхности, мягко приземлившись, слегка согнув колени. Повторите отжимание и прыжок в глубину необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"high","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания на наклонной с прыжком в глубину"},{"id":"0493","n":"incline push-up","bp":"chest","eq":"body weight","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Положите руки на возвышенную поверхность, например на скамью или ступеньку, на расстоянии чуть шире ширины плеч. Вытяните ноги позади себя, опираясь на подушечки стоп, создавая прямую линию от головы до пяток. Опустите грудь к возвышению, сгибая локти, сохраняя тело прямой линией. Задержитесь на мгновение в нижней точке, затем вернитесь в исходное положение, выпрямляя руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отжимания на наклонной"},{"id":"3785","n":"incline push-up (on box)","bp":"chest","eq":"body weight","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Положите руки на край коробки или возвышенной поверхности, на расстоянии чуть шире плеч. Вытяните ноги позади себя, опираясь на подушечки стоп, создавая прямую линию от головы до пяток. Опустите грудь к ящику, согнув локти, сохраняя тело прямой. Задержитесь на мгновение в нижней точке, затем вернитесь в исходное положение, выпрямляя руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отжимания на наклонной от коробки"},{"id":"0494","n":"incline reverse grip push-up","bp":"chest","eq":"body weight","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Положите руки на край скамьи или возвышенной поверхности, на расстоянии чуть шире плеч. Вытяните ноги позади себя, опираясь на подушечки стоп, создавая прямую линию от головы до пяток. Опустите грудь к скамье, согнув локти и держа их близко к бокам. Задержитесь на мгновение в нижней точке, затем вернитесь в исходное положение, вытянув руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отжимания на наклонной обратным хватом"},{"id":"3011","n":"incline scapula push up","bp":"chest","eq":"body weight","tg":"serratus anterior","mg":"triceps","img":null,"gif":null,"ru":"Установите наклонную скамью под углом 45 градусов. Положите руки на скамью чуть шире ширины плеч. Поставьте ноги на землю, на ширине плеч. Опустите грудь к скамье, держа локти прижатыми друг к другу. При опускании сведите лопатки, сжимая лопатки вместе. Оттолкнитесь ладонями, чтобы вытянуть руки и вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отжимания на наклонной для лопаток"},{"id":"0495","n":"incline twisting sit-up","bp":"waist","eq":"body weight","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Установите наклонную скамью под углом 45 градусов. Лягте на скамью, зафиксировав ноги под подушечками для ног. Положите руки за голову или на грудь. Напрягите пресс и поднимите верхнюю часть тела со скамьи, наклонившись вперед. Сгибаясь, поверните туловище в одну сторону, поднося локоть к противоположному колену. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела обратно в исходное положение. Повторите движение, на этот раз повернув туловище в другую сторону. Продолжайте чередовать стороны желаемое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Скручивания на наклонной с поворотом"},{"id":"1564","n":"intermediate hip flexor and quad stretch","bp":"upper legs","eq":"rope","tg":"quads","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте прямо, ноги на ширине плеч. Держитесь за устойчивый объект для поддержки. Согните правое колено и поднесите правую ногу к ягодицам, захватив веревку правой рукой. Медленно подтяните правую ногу к ягодицам, чувствуя растяжение правого квадрицепса. Удерживайте растяжку 20–30 секунд. Освободите растяжку и повторите с левой стороны.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка сгибателей бедра и квадрицепса средней сложности"},{"id":"0496","n":"inverse leg curl (bench support)","bp":"upper legs","eq":"body weight","tg":"hamstrings","mg":"glutes","img":null,"gif":null,"ru":"Лягте лицом вниз на скамью, прижав бедра к краю и вытянув ноги прямо позади себя. Держитесь за скамью для поддержки. Удерживая верхнюю часть тела неподвижно, согните колени и согните ноги к ягодицам. Задержитесь на мгновение в верхней точке, затем медленно вытяните ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратное сгибание ног с опорой на скамью"},{"id":"2400","n":"inverse leg curl (on pull-up cable machine)","bp":"upper legs","eq":"body weight","tg":"hamstrings","mg":"glutes","img":null,"gif":null,"ru":"Отрегулируйте блочный тренажер так, чтобы ремни на щиколотках находились в самом нижнем положении. Лягте лицом вниз на скамью, вытянув ноги и прикрепив к ступням ремни на щиколотках. Держитесь за ручки скамьи для устойчивости. Согните колени и согните ноги к ягодицам, сжимая мышцы задней поверхности бедра. Задержитесь на мгновение в верхней точке движения, затем медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратное сгибание ног на тренажёре для подтягиваний"},{"id":"0499","n":"inverted row","bp":"back","eq":"body weight","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Установите перекладину на уровне талии или используйте тренажер для подвешивания. Встаньте лицом к штанге или тренажеру для отягощения, поставив ноги на ширине плеч. Возьмитесь за перекладину или ручки хватом сверху, на расстоянии чуть шире ширины плеч. Откиньтесь назад, держа тело прямо, а пятки на земле. Подтяните грудь к перекладине или ручкам, сведя лопатки вместе. Задержитесь на мгновение в верхней точке, затем медленно опуститесь обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Австралийские подтягивания"},{"id":"2300","n":"inverted row bent knees","bp":"back","eq":"body weight","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Установите перекладину на уровне талии и лягте под нее. Возьмите штангу хватом сверху, на расстоянии чуть шире ширины плеч. Расположите свое тело так, чтобы пятки стояли на земле, а тело было прямым. Подтяните грудь к перекладине, сведя лопатки вместе. Задержитесь на мгновение в верхней точке, затем медленно опустите тело обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Австралийские подтягивания с согнутыми коленями"},{"id":"2298","n":"inverted row on bench","bp":"back","eq":"body weight","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Установите скамью на высоте, позволяющей вашему телу свободно висеть под ней. Лягте на землю лицом вверх, головой к скамье. Потянитесь и возьмитесь за скамью хватом сверху, на расстоянии чуть шире плеч. Расположите свое тело так, чтобы пятки были на земле, а руки полностью выпрямлены. Напрягите корпус и сведите лопатки вместе, одновременно подтягивая грудь к скамье. Сделайте паузу на мгновение в верхней точке движения, затем медленно опустите тело обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Австралийские подтягивания со скамьи"},{"id":"0497","n":"inverted row v. 2","bp":"back","eq":"body weight","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Установите штангу на уровне талии на тренажере Смита или используйте тренажер с подвеской. Встаньте лицом к штанге или тренажеру для отягощения и возьмитесь за нее хватом сверху, руки на ширине плеч. Пройдите ногами вперед, отклоняясь назад, пока ваше тело не окажется под небольшим углом. Держите тело прямо и подтяните грудь к перекладине или ручкам, сжимая лопатки вместе. Задержитесь на мгновение в верхней точке, затем медленно опуститесь обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Австралийские подтягивания вариант 2"},{"id":"0498","n":"inverted row with straps","bp":"back","eq":"body weight","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Установите тренажер для подвешивания или ремни на уровне груди. Встаньте лицом к точке крепления и возьмитесь за ручки хватом сверху. Пройдите ногами вперед, отклоняясь назад, пока ваше тело не окажется под углом. Держите тело прямо и задействуйте корпус. Подтяните грудь к ручкам, сведя лопатки вместе. Задержитесь на мгновение в верхней точке, затем медленно опуститесь обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Австралийские подтягивания с петлями"},{"id":"1419","n":"iron cross stretch","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Лягте на спину, вытянув руки в стороны. Поднимите ноги к потолку, сохраняя их прямыми. Медленно опустите ноги в сторону, стараясь коснуться ступнями пола. Удерживайте растяжку несколько секунд, затем верните ноги в исходное положение. Повторите растяжку с другой стороны. Продолжайте чередовать стороны желаемое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка железный крест"},{"id":"1297","n":"isometric chest squeeze","bp":"chest","eq":"body weight","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч и слегка согнув колени. Вытяните руки прямо перед собой, параллельно земле, ладонями друг к другу. Сожмите мышцы груди как можно сильнее, сохраняя при этом руки прямыми. Удерживайте это положение несколько секунд, сосредоточив внимание на сокращении мышц груди. Ослабьте сжатие и расслабьте мышцы груди. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Изометрическое сжатие груди"},{"id":"0500","n":"isometric wipers","bp":"chest","eq":"body weight","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Начните с того, что лягте на спину на коврик или скамью. Вытяните руки прямо в стороны, перпендикулярно телу. Напрягите корпус и поднимите обе ноги от земли, держа их вместе и прямо. Медленно опустите ноги в сторону, стараясь коснуться ступнями земли, сохраняя при этом контроль. Сделайте паузу на мгновение, затем с помощью корпуса поднимите ноги обратно в исходное положение. Повторите движение, на этот раз опуская ноги в противоположную сторону. Продолжайте чередовать стороны желаемое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Изометрические дворники"},{"id":"0501","n":"jack burpee","bp":"cardio","eq":"body weight","tg":"cardiovascular system","mg":"quadriceps","img":null,"gif":null,"ru":"Начните с положения стоя, поставив ноги на ширине плеч. Опустите тело в присед, положив руки на пол перед собой. Отведите ноги назад, приземлившись в положение для отжимания. Выполните отжимание, опуская грудь на землю, а затем снова поднимаясь вверх. Прыгните ногами вперед и приземлитесь в приседе. Резко подпрыгните вверх, вытянув руки над головой. Мягко приземлитесь и сразу же опуститесь обратно в положение приседа, чтобы начать следующее повторение.","pos":"standing","ax":"high","iap":"high","imp":"high","sp":0,"kn":0,"sh":1,"ru_name":"Берпи с прыжком ноги врозь"},{"id":"3224","n":"jack jump (male)","bp":"cardio","eq":"body weight","tg":"cardiovascular system","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги вместе, руки по бокам. Подпрыгните вверх, разведя ноги в стороны и подняв руки над головой. Приземлившись, быстро вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"high","sp":1,"kn":0,"sh":1,"ru_name":"Прыжок ноги врозь"},{"id":"0507","n":"jackknife sit-up","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, вытянув ноги и подняв руки над головой. Напрягите корпус и одновременно поднимите ноги и верхнюю часть тела, дотягиваясь руками до пальцев ног. Задержитесь на мгновение в верхней точке, затем медленно опустите ноги и верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Складной нож сидя"},{"id":"0508","n":"janda sit-up","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Положите руки за голову локтями наружу. Включив пресс, медленно поднимите верхнюю часть тела от земли, наклоняясь вперед, пока туловище не окажется под углом 45 градусов. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Подъём корпуса по Янде"},{"id":"2612","n":"jump rope","bp":"cardio","eq":"rope","tg":"cardiovascular system","mg":"calves","img":null,"gif":null,"ru":"Возьмитесь руками за ручки скакалки ладонями внутрь. Встаньте, ноги на ширине плеч и слегка согнуты в коленях. Перекиньте веревку над головой и перепрыгните через нее, когда она приблизится к вашим ногам. Мягко приземлитесь на подушечки ног и повторите прыжок, когда веревка снова закрутится. Продолжайте прыгать желаемую продолжительность или количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"low","sp":1,"kn":1,"sh":1,"ru_name":"Прыжки на скакалке"},{"id":"0514","n":"jump squat","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч. Опустите тело в присед, согнув колени и отведя бедра назад. Резко подпрыгните от земли, выпрямляя бедра, колени и лодыжки. Находясь в воздухе, быстро вытяните руки вперед для равновесия. Мягко приземлитесь на подушечки стоп и сразу же переходите к следующему повторению. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"high","sp":0,"kn":0,"sh":1,"ru_name":"Прыжковые приседания"},{"id":"0513","n":"jump squat v. 2","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч. Опустите тело в присед, согнув колени и отведя бедра назад. Прыгайте взрывно, полностью выпрямляя бедра и колени. Мягко приземлитесь на подушечки стоп и сразу же опустите тело обратно в присед. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"high","sp":0,"kn":0,"sh":1,"ru_name":"Прыжковые приседания вариант 2"},{"id":"0517","n":"kettlebell advanced windmill","bp":"waist","eq":"kettlebell","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Встаньте, поставив ноги шире ширины плеч, носки слегка направлены наружу. Возьмите гирю в правую руку, вытянув руку над головой и ладонью вперед. Слегка поверните левую ногу вправо и перенесите вес тела на левую ногу. Согните левое колено и согнитесь в бедре, опуская туловище влево. Держите правую руку вытянутой над головой и смотрите на гирю. Опуская туловище, позвольте правой ноге выпрямиться, а правой ступне слегка повернуться. Опускайте туловище до тех пор, пока не почувствуете растяжение левого задней поверхности бедра и правую руку, направленную к земле. Сделайте паузу на мгновение, затем задействуйте корпус и толкните левую пятку, чтобы вернуться в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Продвинутая мельница с гирей"},{"id":"0518","n":"kettlebell alternating hang clean","bp":"lower arms","eq":"kettlebell","tg":"forearms","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите в каждую руку по гире хватом сверху. Слегка согните колени и наклонитесь вперед в бедрах, держа спину прямо и грудь вверх. Позвольте гирям висеть перед вашим телом, полностью вытянув руки. Одним плавным движением резко выпрямите бедра, пожмите плечами и подтяните гири к плечам. Когда гири достигнут высоты плеч, поверните запястья и поймайте гири в положении стойки, ладонями внутрь, а гирями — на внешней стороне предплечий. Опустите гири обратно в исходное положение и повторите движение противоположной рукой. Продолжайте чередовать руки желаемое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Попеременный взятие гири на грудь из виса"},{"id":"0520","n":"kettlebell alternating press","bp":"shoulders","eq":"kettlebell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держа в каждой руке по гире на уровне плеч. Выжмите одну гирю над головой, полностью выпрямляя руку. Опустите гирю обратно на высоту плеч. Повторите с другой рукой. Продолжайте чередовать руки желаемое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Попеременный жим гирь"},{"id":"0519","n":"kettlebell alternating press on floor","bp":"chest","eq":"kettlebell","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Начните с того, что лягте на спину на пол, согните колени и поставьте ступни на землю. Возьмите в каждую руку по гире, ладонями к ногам, а руками вытянутыми вверх к потолку. Опустите одну гирю вниз к плечу, удерживая другую гирю вытянутой прямо вверх. Верните опущенную гирю в исходное положение, одновременно опуская другую гирю вниз к плечу. Продолжайте чередовать движения жима каждой гири желаемое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Попеременный жим гирь лёжа на полу"},{"id":"0521","n":"kettlebell alternating renegade row","bp":"back","eq":"kettlebell","tg":"upper back","mg":"core","img":null,"gif":null,"ru":"Начните с позиции высокой планки, держа руками гири и расставив ноги на ширине плеч. Напрягите корпус и держите тело на прямой линии от головы до пяток. Подтяните одну гирю к груди, держа локоть близко к телу. Опустите гирю обратно в исходное положение и повторите то же самое с другой рукой. Продолжайте чередовать руки желаемое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Попеременная тяга гирь в планке"},{"id":"0522","n":"kettlebell alternating row","bp":"back","eq":"kettlebell","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, колени слегка согнуты, в каждой руке держите по гире ладонями к телу. Наклонитесь вперед в бедрах, сохраняя спину прямой и напряженный корпус. Подтяните одну гирю к груди, держа локоть близко к телу и сжимая лопатки вместе. Опустите гирю обратно в исходное положение и повторите то же самое с другой рукой. Продолжайте чередовать руки желаемое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Попеременная тяга гирь"},{"id":"0523","n":"kettlebell arnold press","bp":"shoulders","eq":"kettlebell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч, держа в каждой руке по гире на уровне плеч ладонями к себе. Напрягите корпус и выжмите гири над головой, поворачивая ладони лицом вперед и вытягивая руки. Сделайте паузу в верхней точке движения, затем медленно опустите гири обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Жим Арнольда с гирей"},{"id":"0524","n":"kettlebell bent press","bp":"waist","eq":"kettlebell","tg":"abs","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, в правой руке держите гирю. Слегка согните колени и нажмите гирю над головой правой рукой, держа локоть зафиксированным. Поверните туловище влево, перенеся вес тела на левую ногу. Согните левое колено и опустите туловище к земле, держа правую руку вытянутой над головой. Опускаясь, следите за гирей, а грудь приподнимайте. Как только ваша левая рука коснется земли, оттолкнитесь левой ступней и выпрямите левую ногу, направляя бедра вперед. Когда вы двигаете бедрами вперед, используйте корпус и правую руку, чтобы вернуть гирю в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Жим гири в наклоне"},{"id":"0525","n":"kettlebell bottoms up clean from the hang position","bp":"upper arms","eq":"kettlebell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите гирю в одной руке хватом сверху. Слегка согните колени и наклонитесь вперед в бедрах, держа спину прямо и грудь вверх. Позвольте гире свисать между ног, полностью вытянув руку. Одним плавным движением резко выпрямите бедра и колени, одновременно подтягивая гирю к плечу. Когда гиря достигнет уровня плеч, поверните запястье так, чтобы нижняя часть гири была обращена вверх. Возьмите гирю на уровне плеч, согнув локоть и повернув ладонь вверх. Опустите гирю обратно в исходное положение, выполняя движение в обратном направлении. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Взятие гири на грудь донышком вверх из виса"},{"id":"0526","n":"kettlebell double alternating hang clean","bp":"upper arms","eq":"kettlebell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите в каждую руку по гире хватом сверху. Слегка согните колени и наклонитесь вперед в бедрах, держа спину прямо и грудь вверх. Позвольте гирям свисать прямо перед вашим телом. Одним плавным движением резко выпрямите бедра и колени, одновременно пожимая плечами. Когда гири поднимутся, подтяните их к плечам, держа локти высоко и в стороны. Возьмите гири на уровне плеч, ладонями внутрь, а локтями вперед. Опустите гири обратно в исходное положение и повторите желаемое количество повторений.","pos":"standing","ax":"low","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Попеременное взятие двух гирь на грудь из виса"},{"id":"0527","n":"kettlebell double jerk","bp":"shoulders","eq":"kettlebell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держа в каждой руке по гире на уровне плеч. Слегка согните колени и задействуйте корпус. Жмите гири над головой, полностью выпрямляя руки. Согните колени и быстро опуститесь в частичное приседание. Резко выпрямите бедра и колени, поднимая гири над головой. Выпрямите руки и поймайте гири над головой, слегка согнув колени. Встаньте прямо и вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Двойной толчок гирь"},{"id":"0528","n":"kettlebell double push press","bp":"shoulders","eq":"kettlebell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Начните с того, что встаньте, поставив ноги на ширине плеч, держа в каждой руке по гире на уровне плеч. Слегка согните колени и задействуйте корпус. Начните движение, резко выпрямляя бедра, колени и лодыжки, поднимая гири над головой. Когда гири достигнут верха, полностью выжмите их над головой, заблокировав руки. Опустите гири обратно в исходное положение, согнув локти и вернув их на высоту плеч. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Двойной швунг гирь"},{"id":"0529","n":"kettlebell double snatch","bp":"shoulders","eq":"kettlebell","tg":"delts","mg":"trapezius","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держа гирю в каждой руке на расстоянии вытянутой руки перед бедрами. Слегка согните колени и наклонитесь вперед в бедрах, сохраняя спину ровной и грудь поднятой. Одним взрывным движением вытяните бедра, колени и лодыжки и одновременно подтяните гири к плечам. Когда гири достигнут уровня плеч, поверните запястья и ударьте гирями над головой, полностью выпрямляя руки. Опустите гири обратно в исходное положение и повторите желаемое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Двойной рывок гирь"},{"id":"0530","n":"kettlebell double windmill","bp":"waist","eq":"kettlebell","tg":"abs","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, в правой руке держите гирю. Вытяните правую руку над головой, не отрывая глаз от гири. Поверните левую ногу на 45 градусов влево, а правую — на 90 градусов вправо. Согнитесь в талии влево, удерживая правую руку вытянутой над головой. Опустите гирю к земле, дотягиваясь до левой ноги. Сделайте паузу на мгновение, затем задействуйте корпус и толкните правую ногу, чтобы вернуться в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Двойная мельница с гирями"},{"id":"0531","n":"kettlebell extended range one arm press on floor","bp":"chest","eq":"kettlebell","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Начните с того, что лягте на спину на пол, согните колени и поставьте ступни на землю. Возьмите гирю в одну руку ладонью к ногам. Вытяните руку прямо вверх к потолку, сохраняя локоть зафиксированным, а запястье прямым. Медленно опустите гирю обратно в исходное положение, сохраняя контроль на протяжении всего движения. Повторите желаемое количество повторений, затем переключитесь на другую руку.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим гири одной рукой с увеличенной амплитудой лёжа на полу"},{"id":"0532","n":"kettlebell figure 8","bp":"waist","eq":"kettlebell","tg":"abs","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, в одной руке держите гирю. Слегка согните колени и наклонитесь вперед в бедрах, сохраняя спину прямой. Пропустите гирю между ног, меняя руки, когда она достигает задней части ног. Когда гиря выйдет вперед, передайте ее в другую руку между ног. Продолжайте передавать гирю между ног, совершая движения в форме восьмерки. Поддерживайте устойчивый темп и задействуйте мышцы корпуса на протяжении всего упражнения. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Восьмёрка с гирей"},{"id":"0533","n":"kettlebell front squat","bp":"upper legs","eq":"kettlebell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, носки слегка развернуты наружу. Держите гирю обеими руками перед грудью, близко к телу. Напрягите корпус и держите грудь поднятой, опуская бедра вниз и назад, как будто вы садитесь на стул. Опускайтесь до тех пор, пока бедра не станут параллельны земле или настолько низко, насколько вам будет удобно. Протолкните пятки, чтобы встать, сжимая ягодицы вверху. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Фронтальные приседания с гирей"},{"id":"0534","n":"kettlebell goblet squat","bp":"upper legs","eq":"kettlebell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите гирю обеими руками близко к груди. Удерживая грудь поднятой и напряженным корпус, опустите тело в присед, сгибая колени и бедра. Продолжайте опускаться до тех пор, пока ваши бедра не станут параллельны земле или настолько низко, насколько вам будет удобно. Задержитесь на мгновение внизу, затем оттолкнитесь пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Приседания с гирей у груди"},{"id":"0535","n":"kettlebell hang clean","bp":"upper legs","eq":"kettlebell","tg":"hamstrings","mg":"glutes","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держа гирю перед бедрами. Слегка согните колени и наклонитесь вперед в бедрах, сохраняя спину прямой. Опустите гирю к земле, позволяя ей покачиваться между ног. Быстро выпрямите бедра и колени, используя инерцию, чтобы поднять гирю на высоту плеч. Когда гиря достигнет уровня плеч, поверните запястья и поймайте гирю в положении стойки, прижав локоть к себе и положив гирю на предплечье. Опустите гирю обратно в исходное положение между ног и повторите желаемое количество повторений.","pos":"standing","ax":"low","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Взятие гири на грудь из виса"},{"id":"0536","n":"kettlebell lunge pass through","bp":"upper legs","eq":"kettlebell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, удерживая гирю перед грудью обеими руками. Сделайте шаг вперед правой ногой, опуская тело в положение выпада. Делая выпад вперед, пропустите гирю под правое бедро и перенесите ее в левую руку. Оттолкнитесь правой ногой, чтобы вернуться в исходное положение, одновременно передавая гирю обратно в правую руку. Повторите выпад на противоположную сторону, проведя гирю под левым бедром. Продолжайте чередовать выпады и передавать гирю между руками желаемое количество повторений.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Выпады с передачей гири"},{"id":"0537","n":"kettlebell one arm clean and jerk","bp":"shoulders","eq":"kettlebell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите гирю в одной руке хватом сверху. Слегка согните колени и наклонитесь в бедрах, опуская гирю между ног. Резко выпрямите бедра, колени и лодыжки, используя инерцию, чтобы поднять гирю на высоту плеч. Когда гиря достигнет уровня плеч, поверните запястье и поднимите руку прямо вверх, зафиксировав руку над головой. Опустите гирю обратно в исходное положение и повторите желаемое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Толчок гири одной рукой"},{"id":"1298","n":"kettlebell one arm floor press","bp":"chest","eq":"kettlebell","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Лягте на спину на пол, согните колени и поставьте ступни на землю. Держите гирю в одной руке ладонью к ногам, а руку вытяните прямо к потолку. Медленно опустите гирю к груди, согнув локоть, держа плечо близко к телу. Сделайте паузу на мгновение, когда гиря окажется чуть выше груди, затем поднимите ее обратно в исходное положение, вытянув локоть. Повторите желаемое количество повторений, затем переключитесь на другую руку.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим гири одной рукой лёжа на полу"},{"id":"0538","n":"kettlebell one arm jerk","bp":"shoulders","eq":"kettlebell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держа гирю в одной руке на уровне плеч. Слегка согните колени и задействуйте корпус. Выжмите гирю над головой по прямой линии, полностью выпрямляя руку. Жмя гирю над головой, одновременно опускайте колени и быстро выпрямляйте их, чтобы создать импульс. Когда гиря достигнет высшей точки, быстро опуститесь под нее, согнув колени и бедра. Возьмите гирю, слегка согнув колени и бедра и полностью вытянув руку над головой. Встаньте прямо, полностью выпрямив колени и бедра, и зафиксируйте гирю над головой. Опустите гирю обратно в исходное положение, сгибая колени и бедра, и повторите желаемое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Толчок гири одной рукой"},{"id":"0539","n":"kettlebell one arm military press to the side","bp":"shoulders","eq":"kettlebell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держа гирю в одной руке на уровне плеч. Напрягите корпус и держите спину прямо. Жмите гирю над головой, полностью выпрямляя руку. Задержитесь на мгновение в верхней точке, затем медленно опустите гирю обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Армейский жим гири одной рукой в сторону"},{"id":"0540","n":"kettlebell one arm push press","bp":"shoulders","eq":"kettlebell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держа гирю в одной руке на уровне плеч. Слегка согните колени и задействуйте корпус. Нажмите гирю над головой, вытянув руку и полностью вытянув ноги. Опустите гирю обратно в исходное положение, согнув колени и вернув гирю на плечо. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Швунг гири одной рукой"},{"id":"0541","n":"kettlebell one arm row","bp":"back","eq":"kettlebell","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите гирю в одной руке хватом сверху. Слегка согните колени и наклонитесь вперед в бедрах, сохраняя спину прямой и напряженный корпус. Подтяните гирю к груди, держа локоть близко к телу и сжимая лопатки вместе. Задержитесь на мгновение в верхней точке, затем медленно опустите гирю обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону и повторите с другой рукой.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга гири одной рукой"},{"id":"0542","n":"kettlebell one arm snatch","bp":"shoulders","eq":"kettlebell","tg":"delts","mg":"trapezius","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держа гирю в одной руке между ног. Слегка согните колени и наклонитесь в бедрах, опуская гирю к земле. Резко выпрямите бедра и колени, используя инерцию, чтобы подвести гирю к плечу. Когда гиря достигнет уровня плеч, поверните руку и ударьте ее прямо над головой, полностью выпрямляя руку. Опустите гирю обратно между ног и повторите желаемое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Рывок гири одной рукой"},{"id":"0543","n":"kettlebell pirate supper legs","bp":"shoulders","eq":"kettlebell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, в одной руке держите гирю. Слегка согните колени и наклонитесь вперед в бедрах, сохраняя спину прямой. Поднимите гирю до уровня плеч, держа локоть близко к телу. Вытяните руку полностью над головой, выпрямляя локоть. Опустите гирю обратно на высоту плеч, затем вернитесь в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Приседания с гирей"},{"id":"0544","n":"kettlebell pistol squat","bp":"upper legs","eq":"kettlebell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, удерживая гирю перед грудью обеими руками. Поднимите левую ногу от земли и вытяните ее вперед, удерживая параллельно земле. Медленно опустите тело в положение приседа, удерживая правую ногу на земле, а левую ногу вытянув. Задержитесь на мгновение в нижней части приседа, затем оттолкнитесь правой пяткой, чтобы вернуться в исходное положение. Повторите необходимое количество повторений, затем поменяйте ногу.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Пистолетик с гирей"},{"id":"0545","n":"kettlebell plyo push-up","bp":"chest","eq":"kettlebell","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Начните с позиции высокой планки, положив руки на гири на ширине плеч. Опустите грудь к земле, держа локти близко к телу. Резко оттолкнитесь руками, отрывая руки от гири и полностью выпрямляя руки. Мягко приземлитесь на гири и сразу же опустите грудь вниз для следующего повторения. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"low","sp":1,"kn":1,"sh":0,"ru_name":"Плиометрические отжимания с гирями"},{"id":"0546","n":"kettlebell seated press","bp":"shoulders","eq":"kettlebell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Сядьте на скамью, выпрямив спину и поставив ноги на землю. Держите гирю в каждой руке на уровне плеч, ладонями вперед. Жмите гири над головой, полностью выпрямляя руки. Опустите гири обратно на высоту плеч. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Жим гири сидя"},{"id":"1438","n":"kettlebell seated two arm military press","bp":"shoulders","eq":"kettlebell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Сядьте на скамью, выпрямив спину и поставив ноги на землю. Держите гирю в каждой руке на уровне плеч ладонями вперед. Выжмите гири над головой, полностью выпрямив руки. Задержитесь на мгновение в верхней точке, затем медленно опустите гири обратно на уровень плеч. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Армейский жим двух гирь сидя"},{"id":"0547","n":"kettlebell seesaw press","bp":"shoulders","eq":"kettlebell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держа в каждой руке по гире на уровне плеч. Выжмите одну гирю над головой, удерживая другую гирю на уровне плеч. Опустите отжатую гирю обратно на высоту плеч, одновременно выжимая другую гирю над головой. Продолжайте чередовать нажимающие движения, создавая движение, напоминающее качели. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Попеременный жим гирь сидя"},{"id":"0548","n":"kettlebell sumo high pull","bp":"back","eq":"kettlebell","tg":"traps","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, расставив ноги шире плеч, носки наружу. Держите гирю обеими руками перед телом, руки вытянуты вниз. Согните ноги в коленях и опустите бедра в положение приседа, сохраняя спину прямой. Проведите пятками и резко выпрямите бедра и колени, подтягивая гирю к подбородку. Подтягивая гирю вверх, держите локти высоко и широко, а лопатки сведите вместе. Опустите гирю обратно в исходное положение и повторите желаемое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":0,"ru_name":"Высокая тяга гири в стиле сумо"},{"id":"0549","n":"kettlebell swing","bp":"upper legs","eq":"kettlebell","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, носки слегка направлены наружу. Держите гирю обеими руками перед телом, руки вытянуты. Слегка согните колени и наклонитесь в бедрах, отводя ягодицы назад. Поверните гирю назад между ног, держа руки прямыми и сохраняя ровную спину. Поднимите бедра вперед и поднимите гирю на высоту плеч, используя инерцию, создаваемую бедрами. Позвольте гире опуститься между ног и повторите движение желаемое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Махи гирей"},{"id":"0550","n":"kettlebell thruster","bp":"shoulders","eq":"kettlebell","tg":"delts","mg":"quadriceps","img":null,"gif":null,"ru":"Начните с того, что встаньте, поставив ноги на ширине плеч, держа гирю перед грудью обеими руками, ладони обращены друг к другу. Опуститесь в присед, согнув колени и отведя бедра назад, сохраняя грудь поднятой, а спину прямой. Достигнув нижней точки приседа, резко поднимите пятки, чтобы встать, одновременно нажимая гирю над головой. Зафиксируйте руки в верхней точке движения, полностью разгибая локти. Опустите гирю обратно в исходное положение, изменив движение, согнув локти и опустив вес обратно на грудь. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":0,"ru_name":"Трастер с гирей"},{"id":"0551","n":"kettlebell turkish get up (squat style)","bp":"upper legs","eq":"kettlebell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Начните с того, что лягте на спину, вытянув ноги и держа гирю в правой руке, рука полностью вытянута над плечом. Согните правое колено и поставьте правую ступню на землю, сохраняя левую ногу вытянутой. Нажимая правой ногой, поднимите бедра от земли, приняв положение мостика. Подведите левую ногу под тело, согнув левое колено и поставив левую ступню на землю. Поверните туловище влево, опустив левую руку на землю для поддержки. Опираясь на правую ногу и левую руку, поднимите туловище от земли и встаньте на колени. Из положения стоя на коленях встаньте, держа гирю вытянутой над головой. Выполните обратное движение, чтобы вернуться в исходное положение. Повторите упражнение в другую сторону, начиная с гири в левой руке.","pos":"lying","ax":"low","iap":"med","imp":"none","sp":1,"kn":0,"sh":0,"ru_name":"Турецкий подъём с гирей через присед"},{"id":"0552","n":"kettlebell two arm clean","bp":"shoulders","eq":"kettlebell","tg":"delts","mg":"traps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите гирю перед бедрами обеими руками, ладонями к себе. Слегка согните колени и наклонитесь в бедрах, опуская гирю к земле. Резко выпрямите бедра и колени, используя инерцию, чтобы подтянуть гирю к плечам. Когда гиря достигнет уровня плеч, поверните запястья и поймайте гирю в стойке, согнув локти и положив гирю на тыльную сторону предплечья. Опустите гирю обратно в исходное положение и повторите желаемое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Взятие двух гирь на грудь"},{"id":"0553","n":"kettlebell two arm military press","bp":"shoulders","eq":"kettlebell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч, держа в каждой руке по гире на уровне плеч ладонями вперед. Напрягите корпус и выжмите гири над головой, полностью выпрямляя руки. Задержитесь на мгновение в верхней точке, затем медленно опустите гири обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Армейский жим двух гирь"},{"id":"1345","n":"kettlebell two arm row","bp":"back","eq":"kettlebell","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, колени слегка согнуты, в каждой руке держите по гире ладонями к телу. Наклонитесь вперед в бедрах, сохраняя спину прямой и напряженный корпус. Подтяните гири к груди, сведя лопатки вместе. Задержитесь на мгновение в верхней точке, затем медленно опустите гири обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Тяга двух гирь"},{"id":"0554","n":"kettlebell windmill","bp":"waist","eq":"kettlebell","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держа гирю в правой руке над головой. Поверните левую ногу наружу примерно на 45 градусов и держите правую ногу направленной вперед. Наклоните туловище в левую сторону, держа правую руку вытянутой над головой и глядя на гирю. Опустите туловище как можно ниже, сохраняя правую руку прямой, а левую — вытянутой в сторону. Сделайте паузу на мгновение, затем вернитесь в исходное положение, отталкивая правую ногу и задействуя косые мышцы живота. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Мельница с гирей"},{"id":"0555","n":"kick out sit","bp":"upper legs","eq":"body weight","tg":"hamstrings","mg":"quadriceps","img":null,"gif":null,"ru":"Сядьте на край скамьи или стула, поставьте ступни на землю и согните колени под углом 90 градусов. Слегка откиньтесь назад и положите руки на край скамьи или стула для поддержки. Задействуя мышцы задней поверхности бедра, оторвите ступни от земли и вытяните ноги прямо перед собой. Задержитесь на мгновение в верхней точке, затем медленно согните колени и верните ступни назад к телу. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Выброс ног сидя"},{"id":"0558","n":"kipping muscle up","bp":"back","eq":"body weight","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Начните с подвешивания на перекладине хватом сверху, руки чуть шире плеч. напрягите мышцы кора ​​и используйте раскачивающие движения, чтобы создать импульс. Делая поворот вперед, подтяните грудь к перекладине, используя широчайшие и бицепсы, чтобы начать движение. Продолжайте движение вверх, пока ваша грудь не достигнет перекладины, затем перейдите в положение для отжиманий, надавив на перекладину вниз и вытянув руки. Опуститесь обратно в исходное положение, сгибая руки и контролируя опускание. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"high","imp":"low","sp":1,"kn":1,"sh":0,"ru_name":"Выход силой с раскачкой"},{"id":"3640","n":"knee touch crunch","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Положите руки за голову локтями наружу. Включив пресс, поднимите лопатки от земли и протяните правую руку к левому колену. Вернитесь в исходное положение и повторите, на этот раз дотянув левую руку до правого колена. Продолжайте чередовать стороны желаемое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Скручивания с касанием колена"},{"id":"1420","n":"kneeling jump squat","bp":"upper legs","eq":"barbell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Начните с того, что встаньте на колени на землю, поставив ноги на ширине плеч и направив пальцы ног вперед. Держите штангу через верхнюю часть спины, положив ее на плечи. Задействуйте корпус и ягодицы, затем резко подпрыгните в воздух, выпрямляя бедра и колени. Во время прыжка надавите на пальцы ног и полностью выпрямите лодыжки, колени и бедра. Мягко приземлитесь на землю, согнув колени, чтобы поглотить удар. Сразу же переходите к следующему повторению, повторяя движение приседа с выпрыгиванием.","pos":"kneeling","ax":"low","iap":"high","imp":"high","sp":1,"kn":0,"sh":1,"ru_name":"Прыжковые приседания с колен"},{"id":"1346","n":"kneeling lat stretch","bp":"back","eq":"body weight","tg":"lats","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте на колени, расставив колени на ширине плеч и носки ног назад. Вытяните руки над головой и переплетите пальцы. Держа спину прямо, медленно наклонитесь в правую сторону, чувствуя растяжение левой широчайшей мышцы. Удерживайте растяжку 20–30 секунд, затем вернитесь в исходное положение. Повторите растяжку с левой стороны, наклоняясь влево и чувствуя растяжение правой широчайшей мышцы. Продолжайте чередовать стороны желаемое количество повторений.","pos":"kneeling","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка широчайших с колен"},{"id":"3239","n":"kneeling plank tap shoulder (male)","bp":"waist","eq":"body weight","tg":"abs","mg":"shoulders","img":null,"gif":null,"ru":"Начните в положении стоя на коленях, положив руки на землю на ширине плеч. Вытяните ноги позади себя, опираясь на носки, и поднимите тело в положение планки. Сохраняя корпус напряженным, а бедра устойчивыми, поднимите одну руку от земли и коснитесь противоположного плеча. Верните руку на землю и повторите то же самое с другой рукой. Продолжайте чередовать стороны желаемое количество повторений.","pos":"kneeling","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Планка с касанием плеча с колен"},{"id":"3211","n":"kneeling push-up (male)","bp":"chest","eq":"body weight","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Начните с того, что встаньте на колени на землю, поставив руки на ширине плеч, пальцы направлены вперед. Вытяните ноги позади себя, опираясь на подушечки стоп так, чтобы ваше тело образовывало прямую линию от головы до пяток. Напрягите корпус и опустите тело к земле, сгибая локти и держа их близко к бокам. Продолжайте опускаться до тех пор, пока ваша грудь не окажется чуть выше земли, затем вернитесь в исходное положение, выпрямляя руки. Повторите необходимое количество повторений.","pos":"kneeling","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отжимания с колен"},{"id":"3288","n":"korean dips","bp":"chest","eq":"body weight","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Встаньте между двумя параллельными брусьями, вытянув руки и поддерживая вес своего тела. Опустите тело, сгибая локти, пока плечи не станут параллельны земле. Сделайте паузу на мгновение, затем вернитесь в исходное положение, выпрямляя руки. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Корейские отжимания на брусьях"},{"id":"3418","n":"l-pull-up","bp":"back","eq":"body weight","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Возьмитесь за перекладину хватом сверху, на расстоянии чуть шире плеч. Висите, полностью вытянув руки и выпрямив тело. Задействуйте широчайшие и бицепсы, чтобы подтянуть тело к перекладине, держа локти близко к телу. Продолжайте тянуть, пока подбородок не окажется над перекладиной. Задержитесь на мгновение в верхней точке, затем медленно опустите тело обратно в исходное положение. Повторите необходимое количество повторений.","pos":"hanging","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подтягивания с уголком"},{"id":"3419","n":"l-sit on floor","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Сядьте на пол, вытянув ноги перед собой. Положите руки на пол рядом с бедрами, пальцы направлены вперед. Напрягите корпус и поднимите ноги от земли, сохраняя их прямыми. Постарайтесь поставить ноги параллельно полу, образуя своим телом букву «L». Удерживайте это положение столько, сколько сможете. Медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Уголок на полу"},{"id":"0562","n":"landmine 180","bp":"waist","eq":"barbell","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, и держите штангу обеими руками перед грудью. Слегка согните ноги в коленях и поверните туловище вправо, перемещая штангу вниз к правому бедру. Достигнув нижней точки движения, быстро поменяйте направление движения и поверните туловище влево, поднимая штангу вверх и поперек тела к левому плечу. Продолжайте это скручивающее движение, чередуя стороны, необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Поворот 180 с грифом в упоре"},{"id":"3237","n":"landmine lateral raise","bp":"shoulders","eq":"barbell","tg":"delts","mg":"traps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч и слегка согнуты в коленях. Возьмите штангу хватом сверху, положив ее на переднюю часть плеч. Удерживая корпус напряженным и спину прямой, поднимите штангу вверх и в сторону от тела, подняв ее до уровня плеч. Задержитесь на мгновение в верхней точке, затем медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Разведение рук в стороны с грифом в упоре"},{"id":"3300","n":"lean planche","bp":"waist","eq":"body weight","tg":"abs","mg":"shoulders","img":null,"gif":null,"ru":"Начните с позиции для отжиманий, поставив руки на ширине плеч и выпрямив тело. Напрягите корпус и медленно перенесите вес вперед, выводя плечи за руки. Держите локти слегка согнутыми, а тело прямым, наклоняясь вперед. Удерживайте это положение несколько секунд, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Планш с наклоном"},{"id":"2271","n":"left hook. boxing","bp":"shoulders","eq":"body weight","tg":"delts","mg":"biceps","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч и слегка согнув колени. Держите левую руку вверх, чтобы защитить лицо, а правую руку — под подбородок. Вращайте бедра и поворачивайтесь на левой ноге, одновременно вытягивая левую руку вперед для ударного движения. Поверните туловище и задействуйте мышцы корпуса, чтобы генерировать силу удара. Верните руку в исходное положение и повторите желаемое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Левый хук бокс"},{"id":"0570","n":"leg pull in flat bench","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Сядьте на ровную скамью, вытянув ноги прямо перед собой. Положите руки на скамью рядом с бедрами для поддержки. Напрягите пресс и поднимите ноги от земли, подтягивая колени к груди. Задержитесь на мгновение в верхней точке, затем медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Подтягивание ног к себе на скамье"},{"id":"1576","n":"leg up hamstring stretch","bp":"upper legs","eq":"body weight","tg":"hamstrings","mg":"glutes","img":null,"gif":null,"ru":"Лягте на спину, вытянув ноги. Согните одно колено и поднесите его к груди, держась за бедро или голень. Максимально выпрямите ногу, удерживая ее в приподнятом положении. Удерживайте растяжку 20–30 секунд. Повторите с другой ногой.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка задней поверхности бедра с поднятой ногой"},{"id":"2287","n":"lever alternate leg press","bp":"upper legs","eq":"leverage machine","tg":"quads","mg":"hamstrings","img":null,"gif":null,"ru":"Отрегулируйте сиденье и платформу для ног рычажной машины в желаемое положение. Сядьте на тренажер, прислонившись спиной к спинке и поставив ноги на платформу для ног. Положите руки на ручки или по бокам машины для устойчивости. Упритесь одной ногой в платформу для ног, вытягивая ногу до тех пор, пока она не станет почти полностью прямой. Сделайте паузу на мгновение, затем медленно согните ногу и вернитесь в исходное положение. Повторите с другой ногой. Продолжайте чередовать ноги желаемое количество повторений.","pos":"seated","ax":"none","iap":"med","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Попеременный жим ногами в тренажёре"},{"id":"0571","n":"lever alternating narrow grip seated row","bp":"back","eq":"leverage machine","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и положение подножки, чтобы обеспечить правильное выравнивание. Сядьте на тренажер, выпрямив спину и положив ступни на подножку. Возьмитесь за ручки узким хватом, ладони обращены друг к другу. На протяжении всего упражнения держите грудь поднятой, а плечи отведенными назад. Потяните одну ручку к туловищу, удерживая другую ручку неподвижной. В конце движения сведите лопатки вместе. Медленно верните ручку в исходное положение и повторите то же самое с другой стороны. Продолжайте чередовать стороны желаемое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Попеременная тяга узким хватом сидя в рычажном тренажёре"},{"id":"0572","n":"lever assisted chin-up","bp":"back","eq":"leverage machine","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Отрегулируйте рычаг тренажера до желаемого уровня сопротивления. Встаньте на платформу для ног и возьмитесь за рукоятки хватом сверху, на расстоянии чуть шире плеч. Висите, полностью вытянув руки, сохраняя тело прямым. Задействуйте мышцы спины и подтяните тело вверх к ручкам, ведя грудью. Продолжайте тянуть, пока подбородок не окажется над ручками. Задержитесь на мгновение в верхней точке, затем медленно опустите тело обратно в исходное положение. Повторите необходимое количество повторений.","pos":"hanging","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подтягивания обратным хватом с поддержкой в рычажном тренажёре"},{"id":"0573","n":"lever back extension","bp":"back","eq":"leverage machine","tg":"spine","mg":"glutes","img":null,"gif":null,"ru":"Отрегулируйте тренажер в соответствии с размером вашего тела и диапазоном движений. Сядьте на тренажер, прислонившись спиной к подушке и зафиксировав ноги. Положите руки на ручки или поручни. Напрягите корпус и медленно наклонитесь вперед, позволяя спине слегка округлиться. Задержитесь на мгновение в нижнем положении, чувствуя растяжение в пояснице. Используя мышцы спины, медленно поднимите туловище обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Разгибание спины в рычажном тренажёре"},{"id":"0574","n":"lever bent over row","bp":"back","eq":"barbell","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч и слегка согнуты в коленях. Возьмите штангу хватом сверху, руки чуть шире плеч. Наклонитесь вперед в бедрах, держа спину прямо и грудь вверх. Потяните штангу к нижней части груди, сжимая лопатки вместе. Задержитесь на мгновение в верхней точке, затем медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Тяга в наклоне в рычажном тренажёре"},{"id":"3200","n":"lever bent-over row with v-bar","bp":"back","eq":"leverage machine","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь лицом к машине. Возьмитесь за V-образную перекладину хватом сверху, сохраняя спину прямой и слегка согнутыми в коленях. Потяните V-образную перекладину к животу, сжимая лопатки вместе. Сделайте паузу на мгновение в верхней точке движения, затем медленно опустите вес обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга в наклоне с V-рукоятью в рычажном тренажёре"},{"id":"0575","n":"lever bicep curl","bp":"upper arms","eq":"leverage machine","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь на тренажере спиной к подушке. Возьмитесь за рукоятки обратным хватом ладонями вверх и держите локти близко к бокам. Выдохните и поднимите ручки вверх, напрягая бицепсы. Задержитесь на мгновение в верхней точке движения, напрягая бицепсы. Вдохните и медленно опустите рукоятки обратно в исходное положение, полностью выпрямляя руки. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание на бицепс в рычажном тренажёре"},{"id":"2289","n":"lever calf press","bp":"lower legs","eq":"leverage machine","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Отрегулируйте сиденье тренажера так, чтобы ваши плечи находились на одной линии с подушечкой рычага. Поместите пальцы ног на подушечку рычага так, чтобы пятки свисали с края. Возьмитесь за ручки или боковые опоры для устойчивости. Нажмите на подушечку рычага вниз, вытянув лодыжки и напрягая икроножные мышцы. Сделайте паузу на мгновение в нижней части движения. Медленно вернитесь в исходное положение, позволяя пяткам снова подняться. Повторите необходимое количество повторений.","pos":"seated","ax
