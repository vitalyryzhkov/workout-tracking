<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0E0F12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Тренировки</title>
<link rel="manifest" href="manifest.json">
<style>
:root{
  --bg:#0E0F12; --surface:#181A1F; --surface2:#23262D; --line:#2C3038;
  --text:#F2F4F6; --muted:#8B919B; --faint:#5A606A;
  --accent:#B6F436; --accent-dim:#7d9e2b; --accent-ink:#0E0F12;
  --blue:#5FB0FF; --danger:#FF5C5C; --warn:#FFB23E;
  --r:14px; --safe-b:env(safe-area-inset-bottom,0px); --safe-t:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{overscroll-behavior:none}
html,body{margin:0}
body{
  background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  font-size:16px; line-height:1.4; overscroll-behavior-y:none;
  -webkit-font-smoothing:antialiased;
}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
button{font-family:inherit;color:inherit;border:none;background:none;cursor:pointer}
input,select{font-family:inherit;font-size:16px}
h1,h2,h3{margin:0;font-weight:800;letter-spacing:-.01em}
.app{max-width:560px;margin:0 auto;min-height:100vh;min-height:100dvh;padding-bottom:calc(74px + var(--safe-b))}

/* Top bar */
.top{position:sticky;top:0;z-index:20;background:rgba(14,15,18,.86);backdrop-filter:blur(12px);
  padding:calc(12px + var(--safe-t)) 16px 10px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.top h1{font-size:20px}
.top .sub{color:var(--muted);font-size:13px;font-weight:600}
.top .spacer{flex:1}
.iconbtn{width:40px;height:40px;border-radius:11px;background:var(--surface);display:flex;
  align-items:center;justify-content:center;font-size:18px;border:1px solid var(--line)}
.iconbtn:active{background:var(--surface2)}

.wrap{padding:14px 16px 24px}

/* Cards */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.daycard{margin-bottom:12px}
.daycard .body{padding:16px}
.daycard h2{font-size:18px;margin-bottom:4px}
.daycard .meta{color:var(--muted);font-size:13px;font-weight:600;display:flex;gap:6px;flex-wrap:wrap}
.daycard .tag{background:var(--surface2);padding:2px 8px;border-radius:7px;font-size:12px;color:var(--text)}
.daycard .exlist{margin-top:10px;color:var(--faint);font-size:13px;line-height:1.5}
.daycard .row{display:flex;align-items:stretch;gap:0}
.daycard .start{flex:0 0 116px;background:var(--accent);color:var(--accent-ink);
  display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;
  font-size:15px;gap:2px;border-left:1px solid var(--line)}
.daycard .start:active{background:var(--accent-dim)}
.daycard .start .sub{font-size:11px;font-weight:700;opacity:.7}

.eyebrow{color:var(--accent);font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin:18px 2px 8px}
.eyebrow:first-child{margin-top:4px}

/* Session */
.ex{margin-bottom:14px}
.ex .head{padding:13px 14px 11px;border-bottom:1px solid var(--line);position:relative}
.ex .head h3{font-size:16px;line-height:1.25;padding-right:30px}
.ex .head .target{color:var(--muted);font-size:12.5px;font-weight:600;margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
.ex .head .target b{color:var(--text);font-weight:700}
.ex .menu{position:absolute;top:10px;right:8px;width:30px;height:30px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:18px}
.ex .menu:active{background:var(--surface2)}
.ex .note{padding:0 14px 10px;color:var(--muted);font-size:13px;line-height:1.5;white-space:pre-line;border-bottom:1px solid var(--line)}

/* set row */
.setrow{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid var(--line)}
.setrow:last-child{border-bottom:none}
.setrow.done{background:linear-gradient(90deg,rgba(182,244,54,.10),rgba(182,244,54,.02))}
.setno{flex:0 0 26px;text-align:center;color:var(--faint);font-weight:800;font-size:14px}
.setrow.done .setno{color:var(--accent)}
.field{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.field label{font-size:10px;color:var(--faint);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.stepper{display:flex;align-items:center;background:var(--surface2);border-radius:10px;overflow:hidden;width:100%}
.stepper button{width:30px;height:38px;font-size:19px;font-weight:700;color:var(--muted);flex:0 0 auto}
.stepper button:active{background:var(--line)}
.stepper input{flex:1;width:100%;min-width:0;text-align:center;background:none;border:none;color:var(--text);
  font-size:17px;font-weight:800;padding:0;outline:none}
.times{flex:0 0 14px;text-align:center;color:var(--faint);font-weight:800;align-self:flex-end;padding-bottom:9px}
.check{flex:0 0 40px;height:40px;border-radius:11px;background:var(--surface2);display:flex;
  align-items:center;justify-content:center;font-size:19px;color:var(--faint);border:1px solid var(--line)}
.check:active{transform:scale(.94)}
.setrow.done .check{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
.pr{position:absolute;display:none}
.prbadge{flex:0 0 auto;font-size:10px;font-weight:800;color:var(--accent-ink);background:var(--accent);
  padding:2px 6px;border-radius:6px;letter-spacing:.03em}

.exfoot{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--line)}
.minibtn{flex:1;text-align:center;background:var(--surface2);border-radius:9px;padding:8px;font-size:13px;
  font-weight:700;color:var(--muted)}
.minibtn:active{background:var(--line)}

.bigbtn{display:block;width:100%;text-align:center;background:var(--accent);color:var(--accent-ink);
  font-weight:800;font-size:16px;padding:15px;border-radius:13px;margin-top:6px}
.bigbtn:active{background:var(--accent-dim)}
.bigbtn.ghost{background:var(--surface);color:var(--text);border:1px solid var(--line)}
.bigbtn.ghost:active{background:var(--surface2)}
.bigbtn.danger{background:transparent;color:var(--danger);border:1px solid var(--line)}
.addex{display:block;width:100%;text-align:center;padding:13px;border:1px dashed var(--line);
  border-radius:13px;color:var(--muted);font-weight:700;font-size:14px;background:transparent;margin-top:4px}
.addex:active{background:var(--surface)}

/* rest timer */
.rest{position:fixed;left:0;right:0;bottom:calc(74px + var(--safe-b));z-index:30;display:none}
.rest.on{display:block}
.rest .inner{max-width:560px;margin:0 auto;padding:0 12px 8px}
.rest .bar{background:var(--surface);border:1px solid var(--accent);border-radius:13px;
  display:flex;align-items:center;gap:12px;padding:10px 12px;overflow:hidden;position:relative}
.rest .prog{position:absolute;left:0;top:0;bottom:0;background:rgba(182,244,54,.14);transition:width 1s linear}
.rest .t{position:relative;font-size:24px;font-weight:800;color:var(--accent)}
.rest .lbl{position:relative;flex:1;font-size:13px;color:var(--muted);font-weight:600}
.rest .rb{position:relative;background:var(--surface2);padding:8px 12px;border-radius:9px;font-weight:700;font-size:13px}
.rest .rb:active{background:var(--line)}

/* bottom nav */
.nav{position:fixed;left:0;right:0;bottom:0;z-index:40;background:rgba(20,22,26,.95);
  backdrop-filter:blur(12px);border-top:1px solid var(--line);
  padding-bottom:var(--safe-b);display:flex}
.nav a{flex:1;text-align:center;padding:9px 0 8px;color:var(--faint);font-size:11px;font-weight:700;
  display:flex;flex-direction:column;align-items:center;gap:3px}
.nav a .ic{font-size:21px;line-height:1}
.nav a.on{color:var(--accent)}

/* progress */
.pick{width:100%;background:var(--surface);border:1px solid var(--line);color:var(--text);
  padding:13px 14px;border-radius:12px;font-weight:700;-webkit-appearance:none;appearance:none;margin-bottom:14px}
.statrow{display:flex;gap:10px;margin-bottom:14px}
.stat{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 10px;text-align:center}
.stat .v{font-size:22px;font-weight:800}
.stat .v small{font-size:13px;color:var(--muted);font-weight:700}
.stat .k{font-size:11px;color:var(--muted);font-weight:700;margin-top:2px;text-transform:uppercase;letter-spacing:.03em}
.chartwrap{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px 10px 8px;margin-bottom:14px}
.chartwrap h3{font-size:13px;color:var(--muted);padding:0 6px 8px;font-weight:700}
svg.chart{width:100%;height:170px;display:block}
.hbar{display:flex;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--line);font-size:14px}
.hbar:last-child{border-bottom:none}
.hbar .d{color:var(--muted);font-weight:600}
.hbar .val{font-weight:800}

/* history */
.hsession{margin-bottom:12px}
.hsession .h{display:flex;justify-content:space-between;align-items:center;padding:13px 14px;border-bottom:1px solid var(--line)}
.hsession .h .n{font-weight:800;font-size:15px}
.hsession .h .d{color:var(--muted);font-size:12.5px;font-weight:600}
.hsession .e{padding:9px 14px;border-bottom:1px solid var(--line);font-size:13.5px;display:flex;justify-content:space-between;gap:10px}
.hsession .e:last-child{border-bottom:none}
.hsession .e .nm{color:var(--muted);font-weight:600;flex:1}
.hsession .e .s{font-weight:700;text-align:right;white-space:nowrap}
.del{color:var(--danger);font-size:13px;font-weight:700;padding:10px 14px}

/* empty */
.empty{text-align:center;color:var(--muted);padding:50px 20px}
.empty .em{font-size:40px;margin-bottom:10px}
.empty p{margin:6px 0;font-size:14px}

/* editor list */
.edit-ex{display:flex;align-items:center;gap:10px;padding:11px 12px;border-bottom:1px solid var(--line)}
.edit-ex:last-child{border-bottom:none}
.edit-ex .nm{flex:1;font-weight:600;font-size:14px}
.edit-ex .ty{font-size:11px;color:var(--muted);font-weight:700}
.edit-ex .x{color:var(--danger);font-size:18px;padding:4px 8px}
.handle{color:var(--faint);font-size:18px}

/* modal */
.modal{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.6);display:none;align-items:flex-end}
.modal.on{display:flex}
.sheet{background:var(--surface);width:100%;max-width:560px;margin:0 auto;border-radius:18px 18px 0 0;
  padding:18px 16px calc(20px + var(--safe-b));max-height:90vh;overflow:auto;border-top:1px solid var(--line)}
.sheet h2{font-size:18px;margin-bottom:14px}
.fl{margin-bottom:12px}
.fl label{display:block;font-size:12px;color:var(--muted);font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.03em}
.fl input,.fl select,.fl textarea{width:100%;background:var(--surface2);border:1px solid var(--line);color:var(--text);
  padding:12px;border-radius:11px;outline:none}
.fl textarea{min-height:64px;resize:vertical}
.fl .two{display:flex;gap:10px}
.fl .two>div{flex:1}
.seg{display:flex;background:var(--surface2);border-radius:11px;padding:3px;gap:3px}
.seg button{flex:1;padding:9px;border-radius:9px;font-weight:700;font-size:13px;color:var(--muted)}
.seg button.on{background:var(--accent);color:var(--accent-ink)}
.toast{position:fixed;bottom:calc(86px + var(--safe-b));left:50%;transform:translateX(-50%);
  background:var(--surface2);border:1px solid var(--line);color:var(--text);padding:11px 18px;border-radius:12px;
  font-size:14px;font-weight:700;z-index:80;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}
.toast.pr{border-color:var(--accent);color:var(--accent)}

/* hold timer overlay */
.htimer{position:fixed;inset:0;z-index:90;background:rgba(10,11,13,.97);display:none;
  align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.htimer.on{display:flex}
.ht-inner{text-align:center;padding:20px;width:100%;max-width:420px}
.ht-ex{font-size:20px;font-weight:800;margin-bottom:3px;padding:0 10px;line-height:1.25}
.ht-set{color:var(--muted);font-weight:700;font-size:13px;margin-bottom:26px}
.ht-ring{position:relative;width:min(72vw,260px);aspect-ratio:1;margin:0 auto}
.ht-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.ht-track{fill:none;stroke:var(--surface2);stroke-width:9}
.ht-arc{fill:none;stroke:var(--accent);stroke-width:9;stroke-linecap:round}
.ht-time{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ht-big{font-size:74px;font-weight:800;line-height:1;color:var(--accent)}
.ht-lbl{color:var(--muted);font-weight:700;font-size:13px;margin-top:6px;max-width:78%;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ht-controls{display:flex;gap:10px;margin-top:34px}
.ht-controls button{flex:1;padding:15px 8px;border-radius:13px;font-weight:800;font-size:15px;
  background:var(--surface);border:1px solid var(--line);color:var(--text)}
.ht-controls button:active{background:var(--surface2)}
.ht-controls #htDone{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
.ht-controls #htCancel{color:var(--muted)}
.check.play{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);font-size:16px}
.setrow.done .check.play{font-size:19px}
/* ============ LIBRARY ============ */
.libsearch{position:sticky;top:calc(56px + var(--safe-t));z-index:10;background:var(--bg);padding:2px 0 8px;margin-bottom:2px}
.libsearch input{width:100%;background:var(--surface);border:1px solid var(--line);color:var(--text);
  padding:12px 14px;border-radius:12px;font-weight:600;outline:none}
.libsearch input:focus{border-color:var(--accent-dim)}
.chips{display:flex;gap:7px;overflow-x:auto;padding:9px 0 2px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;background:var(--surface);border:1px solid var(--line);color:var(--muted);
  padding:7px 12px;border-radius:999px;font-size:13px;font-weight:700;white-space:nowrap}
.chip.on{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
.ennm{color:var(--faint);font-size:12px;font-weight:600;margin-top:2px}
.libcount{color:var(--faint);font-size:12px;font-weight:700;margin:8px 2px 6px}
.libitem{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);
  border-radius:13px;padding:9px 11px;margin-bottom:9px}
.libitem:active{background:var(--surface2)}
.libthumb{flex:0 0 54px;width:54px;height:54px;border-radius:10px;background:var(--surface2);
  object-fit:cover;border:1px solid var(--line)}
.libitem .lt{flex:1;min-width:0}
.libitem .lt .nm{font-weight:700;font-size:14.5px;line-height:1.25}
.libitem .lt .mt{color:var(--muted);font-size:12px;font-weight:600;margin-top:3px;display:flex;gap:6px;flex-wrap:wrap}
.libitem .lt .mt span{background:var(--surface2);padding:1px 7px;border-radius:6px}
.libitem .chev{flex:0 0 auto;color:var(--faint);font-size:18px}
.libmore{display:block;width:100%;text-align:center;padding:12px;border:1px dashed var(--line);
  border-radius:12px;color:var(--muted);font-weight:700;font-size:14px;background:transparent;margin:2px 0 10px}
.libmore:active{background:var(--surface)}
/* detail */
.libgif{width:100%;aspect-ratio:1/1;border-radius:14px;background:var(--surface2);object-fit:cover;
  border:1px solid var(--line);display:block}
.libmeta{display:flex;gap:7px;flex-wrap:wrap;margin:12px 0 4px}
.libmeta span{background:var(--surface2);border:1px solid var(--line);padding:4px 10px;border-radius:8px;
  font-size:12.5px;font-weight:700;color:var(--text)}
.libmeta span small{color:var(--muted);font-weight:600}
.libru{color:var(--muted);font-size:14px;line-height:1.55;margin:12px 0 4px;white-space:pre-line}
.exhowto{position:absolute;top:10px;right:42px;width:30px;height:30px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;color:var(--blue);font-size:16px}
.exhowto:active{background:var(--surface2)}
.edit-ex .libthumb{flex:0 0 40px;width:40px;height:40px;border-radius:8px;margin-right:2px}

</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div id="topTitle"><h1>Тренировки</h1></div>
    <div class="spacer"></div>
    <div id="topAction"></div>
  </div>
  <div id="root" class="wrap"></div>
</div>

<div class="rest" id="rest">
  <div class="inner"><div class="bar">
    <div class="prog" id="restProg"></div>
    <div class="t num" id="restT">1:30</div>
    <div class="lbl">Отдых</div>
    <button class="rb" id="restAdd">+15с</button>
    <button class="rb" id="restSkip">Пропустить</button>
  </div></div>
</div>

<div class="nav" id="nav"></div>
<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>

<div class="htimer" id="htimer">
  <div class="ht-inner">
    <div class="ht-ex" id="htEx">Упражнение</div>
    <div class="ht-set" id="htSet">Подход 1</div>
    <div class="ht-ring">
      <svg viewBox="0 0 200 200">
        <circle class="ht-track" cx="100" cy="100" r="88"></circle>
        <circle class="ht-arc" id="htArc" cx="100" cy="100" r="88"></circle>
      </svg>
      <div class="ht-time">
        <div class="ht-big num" id="htBig">5</div>
        <div class="ht-lbl" id="htLbl">приготовься</div>
      </div>
    </div>
    <div class="ht-controls">
      <button id="htCancel">Отмена</button>
      <button id="htPause">Пауза</button>
      <button id="htDone">Готово</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";

const LIB=[{"id":"0001","n":"3/4 sit-up","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Положите руки за голову локтями наружу. Включив пресс, медленно поднимите верхнюю часть тела от земли, наклоняясь вперед, пока туловище не окажется под углом 45 градусов. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Подъём корпуса на 3/4"},{"id":"0002","n":"45° side bend","bp":"waist","eq":"body weight","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч и вытянув руки по бокам. Удерживая спину прямой и напрягая корпус, медленно наклоните туловище в сторону, опуская руку к колену. Задержитесь на мгновение внизу, затем медленно вернитесь в исходное положение. Повторите с другой стороны. Продолжайте чередовать стороны желаемое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Наклоны в сторону под углом 45°"},{"id":"0003","n":"air bike","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, положив руки за голову. Поднимите ноги от земли и согните колени под углом 90 градусов. Поднесите правый локоть к левому колену, одновременно выпрямляя правую ногу. Вернитесь в исходное положение и повторите движение в противоположную сторону, приближая левый локоть к правому колену и выпрямляя левую ногу. Продолжайте чередовать стороны, вращая педали, необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Велосипед лёжа"},{"id":"1512","n":"all fours squad stretch","bp":"upper legs","eq":"body weight","tg":"quads","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте на четвереньки, положив руки прямо под плечи и колени прямо под бедрами. Вытяните одну ногу прямо назад, сохраняя колено согнутым и ступню согнутой. Медленно опустите бедра к земле, чувствуя растяжение квадрицепсов. Удерживайте это положение 20–30 секунд. Поменяйте ноги и повторите растяжку с другой стороны.","pos":"kneeling","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка квадрицепса на четвереньках"},{"id":"0006","n":"alternate heel touchers","bp":"waist","eq":"body weight","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Вытяните руки прямо в стороны, параллельно земле. Включив пресс, оторвите плечи от земли и протяните правую руку к правой пятке. Вернитесь в исходное положение и повторите то же самое с левой стороны, потянув левую руку к левой пятке. Продолжайте чередовать стороны желаемое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Попеременное касание пяток"},{"id":"0007","n":"alternate lateral pulldown","bp":"back","eq":"cable","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на канатный тренажер, выпрямив спину и поставив ноги на землю. Возьмитесь за ручки хватом сверху, на расстоянии чуть шире плеч. Слегка откиньтесь назад и потяните ручки к груди, сжимая лопатки вместе. Задержитесь на мгновение на пике движения, затем медленно отпустите ручки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Попеременная тяга верхнего блока"},{"id":"1368","n":"ankle circles","bp":"lower legs","eq":"body weight","tg":"calves","mg":"ankle stabilizers","img":null,"gif":null,"ru":"Сядьте на пол, вытянув ноги перед собой. Поднимите одну ногу с земли и сделайте круговые движения лодыжкой. Выполните нужное количество кругов в одну сторону, затем переключитесь на другую сторону. Повторите с другой ногой.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Круговые вращения голеностопом"},{"id":"3293","n":"archer pull up","bp":"back","eq":"body weight","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Начните с подвешивания на перекладине хватом сверху, на расстоянии чуть шире плеч. Напрягите корпус и потяните лопатки вниз и назад. Подтягиваясь, согните одну руку и отведите локоть в сторону, сохраняя при этом другую руку прямой. Продолжайте тянуть до тех пор, пока подбородок не окажется над перекладиной, а согнутая рука полностью не согнется. Контролируемое опускание вниз, выпрямляя согнутую руку и повторяя движение на другую сторону. Меняйте стороны при каждом повторении.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подтягивания лучника"},{"id":"3294","n":"archer push up","bp":"chest","eq":"body weight","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Начните с позиции отжимания, поставив руки чуть шире ширины плеч. Вытяните одну руку прямо в сторону, параллельно земле. Опустите тело, согнув локти, сохраняя спину прямой и напряженным корпусом. Вернитесь в исходное положение. Повторите то же самое с другой стороны, вытягивая противоположную руку в сторону. Продолжайте чередовать стороны желаемое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания лучника"},{"id":"2355","n":"arm slingers hanging bent knee legs","bp":"waist","eq":"body weight","tg":"abs","mg":"shoulders","img":null,"gif":null,"ru":"Повисните на перекладине, полностью выпрямив руки и согнув колени под углом 90 градусов. Напрягите корпус и поднимите колени к груди, приближая их как можно ближе к локтям. Медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"high","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подъём ног в висе с согнутыми коленями и махом"},{"id":"2333","n":"arm slingers hanging straight legs","bp":"waist","eq":"body weight","tg":"abs","mg":"shoulders","img":null,"gif":null,"ru":"Повисните на перекладине, полностью вытянув руки и опустив ноги вниз. Напрягите корпус и поднимите ноги перед собой, пока они не станут параллельны земле. Задержитесь на мгновение в верхней точке, затем медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"high","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подъём прямых ног в висе с махом"},{"id":"3214","n":"arms apart circular toe touch (male)","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, руки вытянуты в стороны. Держа ноги прямыми, наклонитесь вперед в талии и дотянитесь правой рукой до пальцев ног. Наклоняясь вниз, одновременно поднимите левую ногу прямо позади себя, сохраняя равновесие. Вернитесь в исходное положение и повторите движение, потянув левую руку к пальцам ног и подняв правую ногу позади себя. Продолжайте чередовать стороны желаемое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Касание носков по кругу с разведёнными руками"},{"id":"3204","n":"arms overhead full sit-up (male)","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Вытяните руки над головой, сохраняя их прямыми. Включив пресс, медленно поднимите верхнюю часть тела от земли, наклоняясь вперед, пока туловище не окажется в вертикальном положении. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Полный подъём корпуса с руками над головой"},{"id":"0009","n":"assisted chest dip (kneeling)","bp":"chest","eq":"leverage machine","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Отрегулируйте машину на желаемую высоту и зафиксируйте колени на подставке. Возьмитесь за ручки ладонями вниз и полностью выпрямите руки. Опустите тело, сгибая локти, пока плечи не станут параллельны полу. Сделайте паузу на мгновение, затем вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"kneeling","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания на брусьях для груди с поддержкой с колен"},{"id":"0011","n":"assisted hanging knee raise","bp":"waist","eq":"assisted","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Повисните на перекладине, полностью вытянув руки и повернув ладони от себя. Задействуйте мышцы корпуса и поднимите колени к груди, сгибая бедра и колени. Задержитесь на мгновение в верхней точке движения, напрягая пресс. Медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"high","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подъём коленей в висе с поддержкой"},{"id":"0010","n":"assisted hanging knee raise with throw down","bp":"waist","eq":"assisted","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Повисните на перекладине, полностью вытянув руки и повернув ладони от себя. Напрягите корпус и поднимите колени к груди, держа ноги вместе. Как только ваши колени окажутся на уровне груди, резко бросьте ноги вниз к земле, полностью выпрямляя их. Позвольте ногам подняться и повторите движение желаемое количество повторений.","pos":"standing","ax":"none","iap":"high","imp":"low","sp":1,"kn":1,"sh":0,"ru_name":"Подъём коленей в висе с поддержкой и сбросом"},{"id":"1708","n":"assisted lying calves stretch","bp":"lower legs","eq":"assisted","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Лягте на спину, вытянув ноги. Согните одно колено и поставьте стопу на землю. Руками или полотенцем осторожно потяните пальцы ног к телу, чувствуя растяжение в икрах. Удерживайте растяжку 20–30 секунд. Освободите растяжку и повторите на другую ногу.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка икр лёжа с поддержкой"},{"id":"1709","n":"assisted lying glutes stretch","bp":"upper legs","eq":"assisted","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Лягте на спину, вытянув ноги. Согните правое колено и положите правую лодыжку на левое бедро, чуть выше колена. Возьмите левое бедро обеими руками и осторожно потяните его к груди. Удерживайте растяжку 20–30 секунд. Отпустите и повторите с другой стороны.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка ягодиц лёжа с поддержкой"},{"id":"1710","n":"assisted lying gluteus and piriformis stretch","bp":"upper legs","eq":"assisted","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Лягте на спину, вытянув ноги. Согните правое колено и положите правую лодыжку на левое бедро, чуть выше колена. Возьмите левое бедро обеими руками и осторожно потяните его к груди. Удерживайте растяжку 20–30 секунд. Освободите растяжку и повторите с другой стороны.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка ягодичных и грушевидной мышцы лёжа с поддержкой"},{"id":"0012","n":"assisted lying leg raise with lateral throw down","bp":"waist","eq":"assisted","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, вытянув ноги и положив руки по бокам. Положите руки под ягодицы для поддержки. Напрягите пресс и поднимите ноги от земли, сохраняя их прямыми. Держа ноги вместе, опустите их в сторону, пока они не окажутся на несколько дюймов над землей. Сделайте паузу на мгновение, затем поднимите ноги обратно в исходное положение. Повторите движение в другую сторону. Продолжайте чередовать стороны желаемое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Подъём ног лёжа с поддержкой и боковым сбросом"},{"id":"0013","n":"assisted lying leg raise with throw down","bp":"waist","eq":"assisted","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, вытянув ноги и положив руки по бокам. Положите руки под ягодицы для поддержки. Напрягите корпус и поднимите ноги от земли, сохраняя их прямыми. Поднимайте ноги до тех пор, пока они не станут перпендикулярно земле. Опустите ноги обратно в исходное положение. Одновременно опустите ноги на землю, сохраняя их прямыми. Поднимите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Подъём ног лёжа с поддержкой и сбросом"},{"id":"0014","n":"assisted motion russian twist","bp":"waist","eq":"medicine ball","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Сядьте на пол, согните колени и поставьте ступни на пол. Держите медицинский мяч обеими руками перед грудью. Слегка откиньтесь назад, напрягая пресс и держа спину прямо. Медленно поверните туловище вправо, направляя медицинский мяч к правой стороне тела. Сделайте паузу на мгновение, затем поверните туловище влево, направляя медицинский мяч к левой стороне тела. Продолжайте чередовать стороны желаемое количество повторений.","pos":"seated","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Русский поворот с поддержкой"},{"id":"0015","n":"assisted parallel close grip pull-up","bp":"back","eq":"leverage machine","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Настройте машину на желаемый вес и рост. Положите руки на параллельные брусья узким хватом, ладонями друг к другу. Повисните на перекладинах, полностью вытянув руки и оторвав ноги от земли. Напрягите мышцы спины и подтяните тело к перекладинам, держа локти близко к телу. Продолжайте тянуть, пока подбородок не окажется над перекладинами. Задержитесь на мгновение в верхней точке, затем медленно опустите тело обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подтягивания узким параллельным хватом с поддержкой"},{"id":"0016","n":"assisted prone hamstring","bp":"upper legs","eq":"assisted","tg":"hamstrings","mg":"glutes","img":null,"gif":null,"ru":"Лягте лицом вниз на коврик или скамью, полностью вытянув ноги. Попросите партнера или используйте эспандер, чтобы зафиксировать лодыжки. Напрягите мышцы задней поверхности бедра и поднимите ноги к ягодицам, держа колени прямо. Задержитесь на мгновение в верхней точке, затем медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка задней поверхности бедра лёжа на животе с поддержкой"},{"id":"1713","n":"assisted prone lying quads stretch","bp":"upper legs","eq":"assisted","tg":"quads","mg":"hamstrings","img":null,"gif":null,"ru":"Лягте лицом вниз на землю, вытянув ноги. Согните левое колено и потянитесь левой рукой назад, чтобы схватить левую ступню или лодыжку. Аккуратно подтяните левую ногу к ягодицам, чувствуя растяжение в левом квадрицепсе. Удерживайте растяжку 20–30 секунд, затем расслабьтесь. Повторите с правой ногой.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка квадрицепсов лёжа на животе с поддержкой"},{"id":"1714","n":"assisted prone rectus femoris stretch","bp":"waist","eq":"assisted","tg":"abs","mg":"quadriceps","img":null,"gif":null,"ru":"Лягте лицом вниз на землю, выпрямив ноги. Согните правое колено и протяните правую руку назад, чтобы схватить правую ступню или лодыжку. Аккуратно потяните правую ступню или лодыжку к ягодицам, ощущая растяжение в передней части правого бедра. Удерживайте растяжку 20–30 секунд. Отпустите и повторите с другой стороны.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка прямой мышцы бедра лёжа на животе с поддержкой"},{"id":"0017","n":"assisted pull-up","bp":"back","eq":"leverage machine","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Настройте машину на желаемые параметры веса и роста. Возьмитесь за ручки хватом сверху, на расстоянии чуть шире плеч. Висите, полностью вытянув руки и оторвав ноги от земли. Задействуйте мышцы спины и подтяните тело к ручкам, держа локти близко к телу. Продолжайте тянуть, пока подбородок не окажется над ручками. Задержитесь на мгновение в верхней точке, затем медленно опустите тело обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подтягивания с поддержкой"},{"id":"1716","n":"assisted seated pectoralis major stretch with stability ball","bp":"chest","eq":"assisted","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на мяч, поставив ноги на землю и выпрямив спину. Возьмите мяч для стабилизации обеими руками и вытяните руки прямо перед собой. Медленно опустите мяч-стабилизатор к груди, чувствуя растяжение грудных мышц. Удерживайте растяжку несколько секунд, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка большой грудной мышцы сидя на фитболе с поддержкой"},{"id":"1712","n":"assisted side lying adductor stretch","bp":"upper legs","eq":"assisted","tg":"adductors","mg":"hamstrings","img":null,"gif":null,"ru":"Лягте на бок, выпрямив ноги и положив их друг на друга. Слегка согните нижнюю ногу для устойчивости. Поставьте верхнюю ногу на устойчивую поверхность, например на скамью или ступеньку. Удерживая верхнюю ногу прямой, медленно опустите ее к земле, чувствуя растяжение внутренней части бедра. Удерживайте растяжку 20–30 секунд. Вернитесь в исходное положение и повторите то же самое в другую сторону.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка приводящих мышц лёжа на боку с поддержкой"},{"id":"1758","n":"assisted sit-up","bp":"waist","eq":"assisted","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Сядьте на край скамьи или попросите кого-нибудь держать вас за ноги. Лягте на спину, согните колени и поставьте ступни на землю. Положите руки за голову локтями наружу. Включив пресс, медленно поднимите верхнюю часть тела от земли, наклоняясь вперед, пока туловище не окажется под углом 45 градусов. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Подъём корпуса с поддержкой"},{"id":"1431","n":"assisted standing chin-up","bp":"back","eq":"leverage machine","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Настройте машину на желаемый уровень помощи. Встаньте на платформу для ног и возьмитесь за рукоятки хватом сверху, на расстоянии чуть шире плеч. Держите грудь поднятой, а плечи отведенными назад, задействуйте корпус и слегка согните колени. Поднимите тело вверх, сгибая локти и направляя локти вниз в стороны. Продолжайте тянуть, пока подбородок не окажется над перекладиной. Задержитесь на мгновение в верхней точке, затем медленно опустите тело обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подтягивания обратным хватом стоя с поддержкой"},{"id":"1432","n":"assisted standing pull-up","bp":"back","eq":"leverage machine","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Настройте машину на желаемые параметры веса и роста. Встаньте лицом к тренажеру, поставив ноги на ширине плеч. Возьмитесь за ручки хватом сверху, на расстоянии чуть шире плеч. Задействуйте широчайшие и бицепсы и подтяните себя к ручкам. Задержитесь на мгновение в верхней точке, напрягая мышцы спины. Медленно опуститесь обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подтягивания стоя с поддержкой"},{"id":"0018","n":"assisted standing triceps extension (with towel)","bp":"upper arms","eq":"assisted","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите полотенце обеими руками за головой. Держите локти близко к ушам, а плечи неподвижно. Медленно вытяните предплечья вверх, сжимая трицепсы вверху. Сделайте паузу на мгновение, затем медленно опустите полотенце обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание трицепса стоя с поддержкой с полотенцем"},{"id":"0019","n":"assisted triceps dip (kneeling)","bp":"upper arms","eq":"leverage machine","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Настройте машину на желаемый вес и рост. Встаньте на колени лицом к тренажеру, взявшись руками за ручки. Опустите тело, согнув локти, держа спину прямо и близко к тренажеру. Задержитесь на мгновение в нижней точке, затем вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"kneeling","ax":"none","iap":"low","imp":"none","sp":1,"kn":0,"sh":0,"ru_name":"Отжимания на брусьях на трицепс с поддержкой с колен"},{"id":"2364","n":"assisted wide-grip chest dip (kneeling)","bp":"chest","eq":"leverage machine","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Отрегулируйте машину на желаемую высоту и зафиксируйте колени на подставке. Возьмитесь за рукоятки широким хватом и держите локти слегка согнутыми. Опустите тело, сгибая локти, пока плечи не станут параллельны полу. Вернитесь в исходное положение, вытянув руки. Повторите необходимое количество повторений.","pos":"kneeling","ax":"none","iap":"low","imp":"none","sp":1,"kn":0,"sh":0,"ru_name":"Отжимания на брусьях широким хватом для груди с поддержкой с колен"},{"id":"3220","n":"astride jumps (male)","bp":"cardio","eq":"body weight","tg":"cardiovascular system","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч. Согните колени и опустите тело в присед. Резко прыгните вверх, вытягивая ноги и руки. Находясь в воздухе, разведите ноги в стороны и разведите руки в стороны. Мягко приземлитесь, поставив ноги на ширине плеч, согнув колени, чтобы поглотить удар. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"high","sp":0,"kn":0,"sh":1,"ru_name":"Прыжки ноги врозь"},{"id":"3672","n":"back and forth step","bp":"cardio","eq":"body weight","tg":"cardiovascular system","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч. Сделайте шаг вперед правой ногой, согнув колено и опустив тело в положение выпада. Оттолкнитесь правой ногой и вернитесь в исходное положение. Повторите движение левой ногой, чередуя ноги при каждом шаге. Продолжайте шагать вперед и назад, сохраняя устойчивый темп. Повторяйте желаемую продолжительность или количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"low","sp":1,"kn":0,"sh":1,"ru_name":"Шаги вперёд-назад"},{"id":"1314","n":"back extension on exercise ball","bp":"back","eq":"stability ball","tg":"spine","mg":"glutes","img":null,"gif":null,"ru":"Положите мяч на землю и лягте на него лицом вниз, положив бедра на мяч, а ступни упираясь в стену или другую устойчивую поверхность. Положите руки за голову или скрестите на груди. Напрягите корпус и медленно поднимите верхнюю часть тела с мяча, вытягивая спину до тех пор, пока тело не образует прямую линию от головы до пяток. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Гиперэкстензия на фитболе"},{"id":"3297","n":"back lever","bp":"back","eq":"body weight","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Начните с подвешивания на перекладине хватом сверху, руки чуть шире плеч. Напрягите корпус и потяните лопатки вниз и назад. Согните колени и подтяните их к груди. Медленно поднимите ноги вверх, удерживая их прямыми, пока тело не станет параллельно земле. Удерживайте это положение несколько секунд, затем медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Задний вис горизонтально"},{"id":"1405","n":"back pec stretch","bp":"back","eq":"body weight","tg":"lats","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте прямо, ноги на ширине плеч. Вытяните руки прямо перед собой, параллельно земле. Скрестите руки перед телом, положив правую руку на левую. Сцепите пальцы и поверните ладони от тела. Медленно поднимите руки вверх и от тела, чувствуя растяжение в спине и груди. Удерживайте растяжку 15–30 секунд, затем расслабьтесь. Повторите на противоположной стороне.","pos":"standing","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка грудных мышц со спины"},{"id":"1473","n":"backward jump","bp":"upper legs","eq":"body weight","tg":"quads","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч. Слегка согните колени и подпрыгните назад, отталкиваясь обеими ногами. Мягко приземлитесь на подушечки стоп, согнув колени, чтобы поглотить удар. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"high","sp":0,"kn":0,"sh":1,"ru_name":"Прыжок назад"},{"id":"0020","n":"balance board","bp":"upper legs","eq":"body weight","tg":"quads","mg":"calves","img":null,"gif":null,"ru":"Поместите балансборд на ровную поверхность. Встаньте на балансборд одной ногой, убедившись, что он находится по центру. Медленно перенесите вес тела на ногу на балансборде, сохраняя при этом корпус напряженным. Сохраняйте баланс и стабильность, удерживая позицию в течение желаемого периода времени. Повторите упражнение другой ногой.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Балансировочная платформа"},{"id":"0968","n":"band alternating biceps curl","bp":"upper arms","eq":"band","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмитесь за ленту обратным хватом ладонями вверх. Держите локти близко к бокам и медленно поднимите одну руку к плечу, сжимая бицепс вверху. Опустите руку обратно в исходное положение и повторите то же самое с другой рукой. Продолжайте чередовать руки желаемое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Попеременный подъём на бицепс с резиной"},{"id":"0969","n":"band alternating v-up","bp":"waist","eq":"band","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, выпрямите ноги и вытяните руки над головой, удерживая ленту. Напрягите пресс и одновременно поднимите ноги и верхнюю часть тела от земли, дотягиваясь руками до пальцев ног. Опуская ноги и верхнюю часть тела обратно вниз, поменяйте положение ног, скрещивая одну над другой. Повторите движение, меняя положение ног при каждом повторении. Продолжайте необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Попеременный складной нож с резиной"},{"id":"0970","n":"band assisted pull-up","bp":"back","eq":"band","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Прикрепите ленту к перекладине или прочной точке крепления. Встаньте на ленту и возьмитесь за перекладину ладонями от себя, руки расставлены чуть шире плеч. Висите, полностью вытянув руки, удерживая корпус напряженным, а плечи опущенными и отведенными назад. Подтяните тело к перекладине, сжимая лопатки вместе и направляя локти вниз к бедрам. Продолжайте тянуть, пока подбородок не окажется над перекладиной, затем медленно опуститесь обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подтягивания с резиной"},{"id":"0971","n":"band assisted wheel rollerout","bp":"waist","eq":"band","tg":"abs","mg":"lower back","img":null,"gif":null,"ru":"Встаньте на колени и возьмитесь за ручки ремня обеими руками ладонями вниз. Положите ленту на пол перед собой и поставьте руки на ширине плеч. Включите корпус и медленно катите колесо вперед, вытягивая тело как можно дальше, сохраняя при этом контроль. Сделайте паузу на мгновение в самой дальней точке, затем медленно перекатите колесо обратно к коленям, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"kneeling","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Раскат ролика с резиной"},{"id":"1254","n":"band bench press","bp":"chest","eq":"band","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Лягте на скамью, поставьте ступни на землю и прижмите спину к скамье. Возьмитесь за рукоятки ленты верхним хватом, на расстоянии чуть шире плеч. Полностью выпрямите руки, отталкивая ленты от груди. Медленно опустите ленты обратно к груди, держа локти под углом 90 градусов. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим лёжа с резиной"},{"id":"0980","n":"band bent-over hip extension","bp":"upper legs","eq":"band","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Прикрепите ремешок к прочной точке крепления на высоте лодыжки. Встаньте лицом от точки крепления, поставив ноги на ширине плеч. Сделайте шаг назад, чтобы создать напряжение в ленте, держа колени слегка согнутыми. Наклонитесь вперед и наклонитесь вперед, сохраняя нейтральное положение позвоночника. Вытяните правую ногу прямо назад, сжимая ягодицы вверху. Опустите правую ногу обратно и повторите то же самое с левой ногой. Продолжайте чередовать ноги желаемое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание бедра в наклоне с резиной"},{"id":"0972","n":"band bicycle crunch","bp":"waist","eq":"band","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, заведите руки за голову и согните колени. Поднимите ноги от земли и поднесите правое колено к груди, одновременно поворачивая туловище, чтобы поднести левый локоть к правому колену. Выпрямите правую ногу, одновременно подтягивая левое колено к груди и поворачивая туловище так, чтобы правый локоть приблизился к левому колену. Продолжайте чередовать скручивающие движения, как если бы вы крутили педали на велосипеде, сохраняя при этом корпус задействованным на протяжении всего движения. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Велосипедные скручивания с резиной"},{"id":"0974","n":"band close-grip pulldown","bp":"back","eq":"band","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Прикрепите ленту к высокой точке крепления, например к перекладине или прочной балке. Встаньте лицом к точке крепления и возьмитесь за ленту хватом снизу, руки на ширине плеч. Сделайте шаг назад, чтобы создать натяжение ленты, держа ноги на ширине плеч. Напрягите корпус и держите спину прямо, тянув ленту к груди, сжимая лопатки вместе. Сделайте паузу на мгновение в нижней части движения, затем медленно отпустите ленту обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга верхнего блока узким хватом с резиной"},{"id":"0975","n":"band close-grip push-up","bp":"upper arms","eq":"band","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Наденьте ленту на плечи чуть выше локтей. Примите позу для отжимания, положив руки прямо под плечи, а тело образуя прямую линию от головы до пяток. Согните локти и опустите грудь к земле, держа локти близко к бокам. Оттолкнитесь ладонями, чтобы вытянуть руки и вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отжимания узким хватом с резиной"},{"id":"0976","n":"band concentration curl","bp":"upper arms","eq":"band","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на скамью или стул, раздвинув ноги и поставив ступни на землю. Возьмите один конец ленты в руку и наступите на другой конец ногой с той же стороны. Слегка наклонитесь вперед и положите локоть на внутреннюю часть бедра, чуть выше колена. Повернув ладонь вверх, медленно согните руку к плечу, сохраняя плечо неподвижным. Задержитесь на мгновение в верхней точке, затем медленно опустите руку обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Концентрированный подъём на бицепс с резиной"},{"id":"3117","n":"band fixed back close grip pulldown","bp":"back","eq":"band","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Прикрепите ленту к фиксированной точке над вами, например, к перекладине или прочной балке. Сядьте на скамью или стул лицом к ленте, поставьте ступни на землю и согните колени. Возьмитесь за ленту крепким хватом ладонями к себе. Держите спину прямо и задействуйте корпус. Потяните ленту вниз к груди, сжимая лопатки вместе. Сделайте паузу на мгновение в нижней части движения, чувствуя сокращение широчайших мышц. Медленно отпустите ленту обратно в исходное положение, сохраняя контроль на протяжении всего движения. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга узким хватом с резиной и фиксированной спиной"},{"id":"3116","n":"band fixed back underhand pulldown","bp":"back","eq":"band","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Прикрепите ремешок к прочной точке крепления над головой. Встаньте лицом к точке крепления, поставив ноги на ширине плеч. Возьмите ленту обратным хватом снизу, руки на расстоянии чуть шире плеч. Сделайте шаг назад, чтобы создать напряжение в ленте, держа руки полностью выпрямленными. Напрягите корпус и сведите лопатки вместе. Потяните ленту вниз к груди, ведя локтями. Сделайте паузу на мгновение в нижней части движения, чувствуя сокращение широчайших мышц. Медленно ослабьте натяжение ленты и вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга обратным хватом с резиной и фиксированной спиной"},{"id":"0977","n":"band front lateral raise","bp":"shoulders","eq":"band","tg":"delts","mg":"traps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите ленту перед бедрами ладонями вниз. Держите руки прямо и поднимите ленту перед собой, пока руки не станут параллельны земле. Задержитесь на мгновение в верхней точке, затем медленно опустите ленту обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подъём рук перед собой в сторону с резиной"},{"id":"0978","n":"band front raise","bp":"shoulders","eq":"band","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите ленту перед бедрами ладонями вниз. Держите руки прямо и медленно поднимите их вперед, пока они не станут параллельны земле. Задержитесь на мгновение в верхней точке, затем медленно опустите руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подъём рук перед собой с резиной"},{"id":"1408","n":"band hip lift","bp":"upper legs","eq":"band","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Поместите ленту сопротивления чуть выше колен. Задействуйте ягодицы и мышцы корпуса. Прижмите пятки к земле и поднимите бедра от пола, сжимая ягодицы в верхней части. Задержитесь на мгновение в верхней точке, затем медленно опустите бедра обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём таза с резиной"},{"id":"0979","n":"band horizontal pallof press","bp":"waist","eq":"band","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Прикрепите ремешок к прочной точке крепления на высоте талии. Встаньте перпендикулярно точке крепления, поставив ноги на ширине плеч. Возьмитесь за ручку ленты обеими руками и отойдите от точки крепления, чтобы создать натяжение ленты. Поднесите руки к груди, держа локти согнутыми и близко к телу. напрягите мышцы кора ​​и сохраняйте устойчивую позицию. Вытяните руки прямо перед собой, отталкивая ленту от тела. Удерживайте вытянутое положение в течение нескольких секунд, сосредотачиваясь на поддержании напряжения в корпусе. Медленно верните руки к груди, сопротивляясь натяжению ленты. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Горизонтальный жим Паллофа с резиной"},{"id":"0981","n":"band jack knife sit-up","bp":"waist","eq":"band","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, выпрямите ноги и вытяните руки над головой, удерживая ленту. Напрягите пресс и одновременно поднимите ноги и верхнюю часть тела, поднеся руки к ногам. Задержитесь на мгновение в верхней точке, затем медленно опустите ноги и верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Складной нож с резиной"},{"id":"0983","n":"band kneeling one arm pulldown","bp":"back","eq":"band","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Прикрепите ремешок к прочной точке крепления над головой. Встаньте на колени и возьмите ленту одной рукой ладонью вниз. Вытяните руку полностью над головой, слегка согнув локоть. Задействуйте широчайшие мышцы и потяните ленту вниз в сторону, приближая локоть к грудной клетке. Задержитесь на мгновение в нижней точке, затем медленно ослабьте напряжение и вернитесь в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"kneeling","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга одной рукой с колен с резиной"},{"id":"0985","n":"band kneeling twisting crunch","bp":"waist","eq":"band","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Прикрепите ремешок к прочной точке крепления на высоте талии. Встаньте на колени лицом от точки крепления и возьмитесь за ленту обеими руками, держа локти согнутыми и прижатыми к бокам. Напрягите пресс и медленно поверните туловище в одну сторону, приближая руки к противоположному бедру. Сделайте паузу на мгновение, затем медленно вернитесь в исходное положение. Повторите с другой стороны. Продолжайте чередовать стороны желаемое количество повторений.","pos":"kneeling","ax":"low","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Скручивания с поворотом с колен с резиной"},{"id":"0984","n":"band lying hip internal rotation","bp":"upper legs","eq":"band","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Лягте на спину, выпрямите ноги и обвяжите ступни эластичной лентой. Согните колени и подтяните их к груди, держа стопы вместе. Медленно разверните колени наружу, друг от друга, сохраняя при этом стопы вместе. Сделайте небольшую паузу в конце вращения, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Внутреннее вращение бедра лёжа с резиной"},{"id":"1002","n":"band lying straight leg raise","bp":"waist","eq":"band","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, ноги прямые, ступни вместе. Оберните ленту вокруг сводов стоп и возьмитесь за концы ленты руками. Включив пресс, поднимите обе ноги от земли, пока они не станут перпендикулярны полу. Задержитесь на мгновение в верхней точке, затем медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём прямых ног лёжа с резиной"},{"id":"0986","n":"band one arm overhead biceps curl","bp":"upper arms","eq":"band","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, и поместите один конец ленты под ногу. Держите другой конец ленты, полностью вытянув руку над головой ладонью вперед. Удерживая плечо неподвижно, согните предплечье к плечу, сжимая бицепс. Задержитесь на мгновение в верхней точке, затем медленно опустите предплечье обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подъём на бицепс одной рукой над головой с резиной"},{"id":"0987","n":"band one arm single leg split squat","bp":"upper legs","eq":"band","tg":"quads","mg":"glutes","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, и наденьте эластичную ленту на лодыжки. Вытяните одну ногу вперед и положите верхнюю часть стопы на скамью или сделайте шаг позади себя. Держитесь за опору одной рукой для равновесия. Согните стоящую ногу и опустите тело в положение приседа, удерживая колено на одной линии с пальцами ног. Оттолкнитесь пяткой, чтобы вернуться в исходное положение. Повторите необходимое количество повторений, затем поменяйте ногу.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Сплит-присед на одной ноге одной рукой с резиной"},{"id":"0988","n":"band one arm standing low row","bp":"back","eq":"band","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Прикрепите ремешок к устойчивой точке крепления на высоте талии. Встаньте лицом к точке крепления, поставив ноги на ширине плеч. Держите ленту одной рукой ладонью внутрь и отступите назад, чтобы создать натяжение ленты. Слегка согните колени и наклонитесь вперед в бедрах, сохраняя спину прямой. Потяните ленту к талии, сжимая лопатки вместе. Сделайте паузу на мгновение в верхней точке движения, затем медленно отпустите ленту обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Нижняя тяга одной рукой стоя с резиной"},{"id":"0989","n":"band one arm twisting chest press","bp":"chest","eq":"band","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Прикрепите ремешок к прочной точке крепления на уровне груди. Встаньте боком к точке крепления и возьмитесь за ленту одной рукой. Отойдите от точки крепления, чтобы создать напряжение в ленте. Поставьте ноги на ширине плеч и слегка согните колени. Проведите руку, удерживающую ленту, через тело к противоположному плечу. Сохраняя натяжение ленты, толкните руку вперед и в сторону от тела, вытягивая руку. Медленно вернитесь в исходное положение и повторите необходимое количество повторений. Поменяйте сторону и повторите упражнение другой рукой.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим от груди одной рукой с поворотом с резиной"},{"id":"0990","n":"band one arm twisting seated row","bp":"back","eq":"band","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на скамью или стул, поставив ноги на землю и выпрямив спину. Держите ленту одной рукой и вытяните руку полностью перед собой. Сохраняя спину прямой, потяните ленту к себе, сгибая локоть и сводя лопатки вместе. В то же время поверните туловище в сторону тянущей руки. Задержитесь на мгновение в верхней точке, затем медленно ослабьте натяжение ленты и вернитесь в исходное положение. Повторите желаемое количество повторений, затем переключитесь на другую руку.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга сидя одной рукой с поворотом с резиной"},{"id":"0991","n":"band pull through","bp":"upper legs","eq":"band","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Прикрепите ленту сопротивления к прочной точке крепления на уровне земли. Встаньте лицом от точки крепления, поставив ноги на ширине плеч. Сделайте шаг вперед, чтобы создать напряжение в ленте, держа колени слегка согнутыми. Наклонитесь в бедрах и отведите ягодицы назад, сохраняя небольшой изгиб в коленях. Опускайте туловище до тех пор, пока оно не станет параллельно земле, чувствуя растяжение подколенных сухожилий. Поднимите бедра вперед и сожмите ягодицы, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Протяжка между ног с резиной"},{"id":"0992","n":"band push sit-up","bp":"waist","eq":"band","tg":"abs","mg":"shoulders","img":null,"gif":null,"ru":"Надежно прикрепите ремешок к устойчивой точке крепления. Лягте на спину, согните колени и поставьте ступни на землю. Возьмите ленту обеими руками и вытяните руки прямо вверх к потолку. Включив пресс, медленно поднимите верхнюю часть тела от земли, наклоняясь вперед, пока туловище не окажется под углом 45 градусов. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Подъём корпуса с толчком с резиной"},{"id":"0993","n":"band reverse fly","bp":"shoulders","eq":"band","tg":"delts","mg":"upper back","img":null,"gif":null,"ru":"Прикрепите ремешок к неподвижному объекту на уровне груди. Встаньте, ноги на ширине плеч, держите ленту обеими руками перед собой. Держите руки прямо и поднимите их в стороны, пока они не станут параллельны земле. В верхней точке движения сведите лопатки вместе. Медленно опустите руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратное разведение с резиной"},{"id":"0994","n":"band reverse wrist curl","bp":"lower arms","eq":"band","tg":"forearms","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на скамью или стул, поставив ноги на землю. Возьмите ремешок сверху ладонями вниз и оберните его вокруг пальцев. Положите предплечья на бедра так, чтобы запястья свисали с краев. Медленно поднимите запястья вверх, сжимая предплечья. Задержитесь на мгновение в верхней точке, затем медленно опустите запястья обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратное сгибание запястий с резиной"},{"id":"0996","n":"band seated hip internal rotation","bp":"upper legs","eq":"band","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Сядьте на стул или скамью, выпрямив спину и поставив ступни на землю. Оберните ленту сопротивления вокруг бедер, чуть выше колен. Держите колени согнутыми под углом 90 градусов, а ноги на ширине плеч. Напрягите ягодицы и медленно разверните колени наружу, преодолевая сопротивление ленты. Сделайте небольшую паузу в конце движения, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Внутреннее вращение бедра сидя с резиной"},{"id":"1011","n":"band seated twist","bp":"waist","eq":"band","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Сядьте на пол, вытянув ноги перед собой и выпрямив спину. Оберните ленту вокруг талии и возьмитесь за концы обеими руками. Напрягите пресс и медленно поверните туловище в сторону, сохраняя спину прямой и ноги на земле. Сделайте небольшую паузу в конце поворота, затем медленно вернитесь в исходное положение. Повторите поворот в другую сторону. Продолжайте чередовать стороны желаемое количество повторений.","pos":"seated","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Повороты сидя с резиной"},{"id":"0997","n":"band shoulder press","bp":"shoulders","eq":"band","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, и поместите ленту под ноги. Держите ленту ладонями вперед и поднимите руки на высоту плеч, локти согнуты. Нажмите на ленту над головой, полностью выпрямив руки. Задержитесь на мгновение в верхней точке, затем медленно опустите ленту обратно на высоту плеч. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Жим от плеч с резиной"},{"id":"1018","n":"band shrug","bp":"back","eq":"band","tg":"traps","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, расставив ноги на ширине плеч, и поместите ленту под ноги, держа концы руками. Держите руки прямыми и расслабленными, позвольте ленте свисать перед бедрами. Задействуйте трапеции, пожимая плечами вверх и поднимая ленту как можно выше. Удерживайте напряжение на мгновение, затем медленно опустите плечи обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Шраги с резиной"},{"id":"0998","n":"band side triceps extension","bp":"upper arms","eq":"band","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмитесь за ленту обеими руками ладонями вниз. Вытяните руки прямо в стороны, держа их параллельно земле. Медленно согните локти и поднесите руки к плечам, сохраняя плечи неподвижными. Сделайте паузу на мгновение, затем медленно вытяните руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Боковое разгибание трицепса с резиной"},{"id":"0999","n":"band single leg calf raise","bp":"lower legs","eq":"band","tg":"calves","mg":"ankles","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, и наденьте ленту на подушечку левой стопы. При необходимости держитесь за устойчивый предмет для равновесия. Медленно поднимите левую пятку от земли, перенеся вес тела на подушечки стопы. Задержитесь на мгновение в верхней точке, затем медленно опустите левую пятку обратно в исходное положение. Повторите необходимое количество повторений, затем переключитесь на правую ногу.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носок на одной ноге с резиной"},{"id":"1000","n":"band single leg reverse calf raise","bp":"lower legs","eq":"band","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, и наденьте ленту на подушечку стопы. Держитесь за устойчивый предмет для равновесия. Медленно поднимите пятку от земли, перенеся вес тела на подушечки стопы. Задержитесь на мгновение в верхней точке, затем медленно опустите пятку обратно в исходное положение. Повторите желаемое количество повторений, затем переключитесь на другую ногу.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратный подъём на носок на одной ноге с резиной"},{"id":"1001","n":"band single leg split squat","bp":"upper legs","eq":"band","tg":"quads","mg":"glutes","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, и наденьте эластичную ленту на лодыжки. Сделайте большой шаг вперед правой ногой и маленький шаг назад левой ногой. Согните колени и опустите тело до тех пор, пока правое бедро не станет параллельно земле, сохраняя левое колено немного выше земли. Оттолкнитесь правой пяткой, чтобы вернуться в исходное положение. Повторите с другой стороны.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Сплит-присед на одной ноге с резиной"},{"id":"1004","n":"band squat","bp":"upper legs","eq":"band","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч, расположив ленту чуть выше колен. Удерживая грудь поднятой и напряженным корпус, отведите бедра назад и согните колени, чтобы опуститься в присед. Убедитесь, что ваши колени касаются пальцев ног, а ваш вес приходится на пятки. Задержитесь на мгновение внизу, затем оттолкнитесь пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Приседания с резиной"},{"id":"1003","n":"band squat row","bp":"upper legs","eq":"band","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Прикрепите ремешок к прочной точке крепления на высоте талии. Встаньте лицом к точке крепления, поставив ноги на ширине плеч. Держите ручки лент ладонями друг к другу, а руки вытянуты перед собой. Согните колени и опуститесь в присед, сохраняя спину прямой и грудь поднятой. Из положения приседа потяните ручки лент к себе, сжимая лопатки вместе. Задержитесь на мгновение в верхней точке, затем медленно ослабьте напряжение и вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Приседания с тягой с резиной"},{"id":"1005","n":"band standing crunch","bp":"waist","eq":"band","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Прикрепите ремешок к прочной точке крепления на высоте талии. Встаньте лицом от точки крепления, поставив ноги на ширине плеч. Возьмите ленту обеими руками и поднесите ее к груди, держа локти согнутыми и близко к телу. Напрягите пресс и медленно наклонитесь вперед, приближая грудь к коленям. Сделайте паузу на мгновение в верхней точке скручивания, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Скручивания стоя с резиной"},{"id":"1022","n":"band standing rear delt row","bp":"shoulders","eq":"band","tg":"delts","mg":"trapezius","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, и поместите ленту под ноги. Держите ручки лент ладонями друг к другу, а руки вытянуты перед собой. Слегка согните колени и наклонитесь вперед в бедрах, сохраняя спину прямой. Потяните ленту к груди, сжимая лопатки вместе. Задержитесь на мгновение в верхней точке, затем медленно ослабьте напряжение и вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга на задние дельты стоя с резиной"},{"id":"1007","n":"band standing twisting crunch","bp":"waist","eq":"band","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Встаньте, расставив ноги на ширине плеч, и оберните ленту вокруг верхней части спины, пересекая ее перед грудью. Возьмите концы ленты руками, держа локти согнутыми и прижатыми к бокам. Напрягите пресс и поверните туловище в одну сторону, приближая локоть к противоположному колену. Сделайте паузу на мгновение, затем вернитесь в исходное положение. Повторите с другой стороны. Продолжайте чередовать стороны желаемое количество повторений.","pos":"standing","ax":"low","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Скручивания с поворотом стоя с резиной"},{"id":"1008","n":"band step-up","bp":"upper legs","eq":"band","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Наденьте резинку на бедра, чуть выше колен. Встаньте лицом к ступеньке или платформе, поставив ноги на ширине плеч. Встаньте на платформу правой ногой, отталкиваясь пяткой. Вытяните левую ногу позади себя, сохраняя ее прямой. Опустите левую ногу обратно на землю. Повторите то же самое, вставив левую ногу на платформу. Продолжайте чередовать ноги желаемое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Зашагивания на платформу с резиной"},{"id":"1009","n":"band stiff leg deadlift","bp":"upper legs","eq":"band","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, и наденьте ленту на лодыжки. Держите ленту обеими руками перед бедрами, ладонями к телу. Удерживая спину прямой и корпус напряженным, наклонитесь в бедрах и медленно опустите верхнюю часть тела к земле. Опускаясь, отведите бедра назад и позвольте коленям слегка согнуться. Опустите ленту к земле, чувствуя растяжение подколенных сухожилий. Задержитесь на мгновение в нижней точке, затем задействуйте ягодицы и мышцы задней поверхности бедра, чтобы поднять верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Становая тяга на прямых ногах с резиной"},{"id":"1023","n":"band straight back stiff leg deadlift","bp":"upper legs","eq":"band","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, и наденьте ленту на верхнюю часть ног. Держите ленту обеими руками перед бедрами, ладонями к телу. Держа спину прямой и слегка согнутыми в коленях, наклонитесь в бедрах и опустите ленту к земле. Почувствуйте растяжение подколенных сухожилий, когда опускаете ленту. Задействуйте ягодицы и мышцы задней поверхности бедра, чтобы поднять тело обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Становая тяга на прямых ногах с прямой спиной с резиной"},{"id":"1010","n":"band straight leg deadlift","bp":"back","eq":"band","tg":"spine","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, и наденьте ленту на ступни. Держите ленту обеими руками ладонями к телу и держите руки прямыми. Напрягите корпус и сохраняйте небольшой изгиб в коленях. Медленно наклонитесь вперед в бедрах, сохраняя спину прямой и грудь поднятой. Опустите ленту к земле, сохраняя ноги прямыми. Задержитесь на мгновение в нижней точке, затем сожмите ягодицы и мышцы задней поверхности бедра, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Становая тяга на прямых ногах с резиной"},{"id":"1012","n":"band twisting overhead press","bp":"shoulders","eq":"band","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, и поместите ленту под ноги. Держите ручки лент на уровне плеч ладонями вперед. Напрягите корпус и нажмите на ленту над головой, полностью выпрямляя руки. При нажатии поворачивайте туловище в сторону, сохраняя бедра устойчивыми. Задержитесь на мгновение в верхней точке, затем вернитесь в исходное положение. Повторите нажатие и поверните на противоположную сторону. Продолжайте чередовать стороны желаемое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Жим над головой с поворотом с резиной"},{"id":"1369","n":"band two legs calf raise - (band under both legs) v. 2","bp":"lower legs","eq":"band","tg":"calves","mg":"ankles","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч, и поместите эспандер под обе ноги. Для устойчивости удерживайте концы ленты руками. Поднимите пятки от земли как можно выше, используя икроножные мышцы. Задержитесь на мгновение в верхней точке, затем медленно опустите пятки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носки на двух ногах с резиной под обеими ногами в. 2"},{"id":"1013","n":"band underhand pulldown","bp":"back","eq":"band","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Прикрепите ленту к высокой точке крепления, например к перекладине или прочной балке. Встаньте лицом к точке крепления, поставив ноги на ширине плеч. Возьмите ленту обратным хватом снизу, руки на расстоянии чуть шире плеч. Вытяните руки полностью над головой, слегка согнув локти. Напрягите широчайшие и потяните ленту вниз к груди, сжимая лопатки вместе. Сделайте паузу на мгновение в нижней части движения, затем медленно ослабьте напряжение и вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга обратным хватом с резиной"},{"id":"1014","n":"band v-up","bp":"waist","eq":"band","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, выпрямите ноги и вытяните руки над головой, удерживая ленту. Включив пресс, одновременно поднимите ноги и верхнюю часть тела от земли, потянув руки к пальцам ног. Задержитесь на мгновение в верхней точке, затем медленно опустите ноги и верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Складной нож с резиной"},{"id":"1015","n":"band vertical pallof press","bp":"waist","eq":"band","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, и оберните ленту вокруг прочного предмета на уровне груди. Возьмите ленту обеими руками и отойдите от точки крепления, создавая напряжение в ленте. Встаньте перпендикулярно точке крепления, боком к ленте. Вытяните руки прямо перед собой, держа ладони на уровне груди. Напрягите корпус и отведите ленту от груди, полностью выпрямляя руки. Удерживайте это положение несколько секунд, затем медленно верните ленту обратно к груди. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Вертикальный жим Паллофа с резиной"},{"id":"1016","n":"band wrist
