рните ладони вверх, держа локти близко к бокам. Медленно поднимите гантели к плечам, сжимая предплечья. Задержитесь на мгновение в верхней точке, затем медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Супинация с гантелей лёжа на полу"},{"id":"1661","n":"dumbbell lying supine biceps curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Лягте на скамью, поддерживая спину и голову, а ноги поставьте на землю. Возьмите по гантели в каждую руку ладонями вверх и полностью выпрямите руки. Удерживая плечи неподвижно, выдохните и согните гантели, одновременно сокращая бицепсы. Продолжайте поднимать гири до тех пор, пока ваши бицепсы полностью не сократятся и гантели не окажутся на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно начните опускать гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание на бицепс с гантелями лёжа на спине"},{"id":"0350","n":"dumbbell lying supine curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Лягте на скамью, взяв в каждую руку по гантели, ладонями вверх и полностью выпрямив руки. Удерживая плечи неподвижно, выдохните и согните гантели, одновременно сокращая бицепсы. Продолжайте поднимать гантели до тех пор, пока ваши бицепсы полностью не сократятся и гантели не окажутся на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно начните опускать гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание на бицепс с гантелями лёжа на спине"},{"id":"0351","n":"dumbbell lying triceps extension","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Лягте на скамью, взяв в каждую руку по гантели, ладони обращены друг к другу. Вытяните руки прямо вверх над грудью, держа локти близко к телу. Опустите гантели ко лбу, сгибая локти. Сделайте паузу на мгновение, затем вытяните руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание на трицепс с гантелями лёжа"},{"id":"1662","n":"dumbbell lying wide curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Лягте на скамью, взяв в каждую руку по гантели, ладонями вверх и полностью выпрямив руки. Удерживая плечи неподвижно, выдохните и согните гири, одновременно сокращая бицепсы. Продолжайте поднимать гири до тех пор, пока ваши бицепсы полностью не сократятся и гантели не окажутся на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно начните опускать гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Широкое сгибание на бицепс с гантелями лёжа"},{"id":"0352","n":"dumbbell neutral grip bench press","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Лягте на скамью, поставьте ступни на землю и прижмите спину к скамье. Возьмите по гантели в каждую руку нейтральным хватом (ладони обращены друг к другу), вытянув руки прямо вверх над грудью. Медленно опустите гантели вниз к груди, держа локти близко к телу. Задержитесь на мгновение в нижней точке, затем верните гантели в исходное положение, полностью выпрямляя руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим гантелей нейтральным хватом лёжа"},{"id":"1285","n":"dumbbell one arm bench fly","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на ровную скамью с гантелью в одной руке, положив ее на бедро. Лягте на скамью, прижав гантель к бедру. Свободной рукой помогите поднять гантель в исходное положение. Держите гантель прямо над плечом, вытянув руку ладонью внутрь. Опустите гантель в сторону по широкой дуге, сохраняя небольшой изгиб в локте. Сделайте паузу, когда ваша рука окажется параллельна земле, затем поменяйте направление движения и верните гантель в исходное положение. Повторите необходимое количество повторений, затем поменяйте руки и повторите.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разведение одной гантели лёжа на скамье"},{"id":"0292","n":"dumbbell one arm bent-over row","bp":"back","eq":"dumbbell","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите гантель в одной руке ладонью к телу. Слегка согните колени и наклонитесь вперед в бедрах, сохраняя спину прямой и напряженный корпус. Пусть гантель свисает прямо к полу, полностью выпрямив руку. Подтяните гантель к груди, держа локоть близко к телу и сжимая лопатки вместе. Задержитесь на мгновение в верхней точке, затем медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Тяга одной гантели в наклоне"},{"id":"1286","n":"dumbbell one arm chest fly on exercise ball","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на мяч для упражнений, возьмите в одну руку гантель, поставьте ноги на землю. Идите ногами вперед, катя мяч до тех пор, пока верхняя часть спины не окажется на мяче, а голова, шея и плечи не оторвутся от мяча. Вытяните руку с гантелью прямо над грудью, ладонью внутрь. Медленно опустите гантель в сторону, сохраняя небольшой изгиб в локте. Сделайте паузу на мгновение, когда ваша рука будет параллельна земле. Задействуйте мышцы груди, чтобы вернуть гантель в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разведение одной гантели на грудь на фитболе"},{"id":"0353","n":"dumbbell one arm concentration curl (on stability ball)","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на мяч, поставив ступни на землю и согнув колени под углом 90 градусов. Возьмите гантель в одну руку ладонью вверх и вытяните руку вниз к полу. Положите локоть на внутреннюю часть бедра, чуть выше колена. Удерживая плечо неподвижно, выдохните и поднимите гантель к плечу, одновременно напрягая бицепс. Сделайте паузу на мгновение в верхней точке движения, затем вдохните и медленно опустите гантель обратно в исходное положение. Повторите необходимое количество повторений, затем поменяйте руки и повторите.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Концентрированное сгибание одной рукой с гантелей на фитболе"},{"id":"1287","n":"dumbbell one arm decline chest press","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Лягте на наклонную скамью с гантелью в одной руке, положив ее на грудь. Поставьте ноги на землю и прижмите спину к скамье. Вытяните руку и поднимите гантель вверх к потолку, полностью выпрямляя локоть. Задержитесь на мгновение в верхней точке, затем медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем переключитесь на другую руку.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим одной гантели на грудь на наклонной скамье вниз головой"},{"id":"1288","n":"dumbbell one arm fly on exercise ball","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на мяч для упражнений, возьмите в одну руку гантель, поставьте ноги на землю. Пройдите ногами вперед и перекатывайтесь вниз, пока верхняя часть спины не окажется на мяче для упражнений. Вытяните руку с гантелью прямо над грудью ладонью внутрь. Медленно опустите гантель в сторону, сохраняя небольшой изгиб в локте. Сделайте паузу на мгновение, затем сожмите мышцы груди, чтобы вернуть гантель в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разведение одной гантели на фитболе"},{"id":"1736","n":"dumbbell one arm french press on exercise ball","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на гимнастический мяч, поставив ноги на землю и выпрямив спину. Возьмите гантель в одну руку ладонью вверх и согните локоть под углом 90 градусов. Вытяните руку прямо вверх к потолку, сохраняя локоть неподвижным. Медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Французский жим одной рукой с гантелей на фитболе"},{"id":"1663","n":"dumbbell one arm hammer preacher curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на скамью для проповедника с гантелью в одной руке и положите плечо на подушечку. Держите гантель нейтральным хватом (ладони обращены к телу). Удерживая плечо неподвижно, выдохните и поднимите гантель к плечу. Задержитесь на мгновение в верхней точке, напрягая бицепсы. Вдохните и медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Молотковое сгибание одной рукой с гантелей на скамье Скотта"},{"id":"1621","n":"dumbbell one arm hammer press on exercise ball","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на гимнастический мяч, поставив ноги на землю и выпрямив спину. Возьмите гантель в одну руку ладонью внутрь и согните локоть под углом 90 градусов. Вторую руку положите на бедро для устойчивости. Выжмите гантель вверх, полностью выпрямляя руку. Задержитесь на мгновение в верхней точке, затем медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Жим одной гантели молотковым хватом на фитболе"},{"id":"1289","n":"dumbbell one arm incline chest press","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Отрегулируйте наклон скамьи под углом 45 градусов. Сядьте на скамью, прислонившись спиной к подушке, а ступни поставьте на землю. Возьмите гантель в одну руку верхним хватом, положив ее на плечо. Поднимите гантель вверх и от тела, полностью выпрямляя руку. Задержитесь на мгновение в верхней точке, затем медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем переключитесь на другую руку.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим одной гантели на грудь на наклонной скамье"},{"id":"0354","n":"dumbbell one arm kickback","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите в правую руку гантель. Слегка согните колени и наклонитесь вперед в бедрах, сохраняя спину прямой. Поднимите правый локоть в сторону, сохраняя его согнутым под углом 90 градусов. Вытяните правую руку прямо назад, сжимая трицепс в верхней точке движения. Медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание одной гантели в наклоне на трицепс"},{"id":"0355","n":"dumbbell one arm lateral raise","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"trapezius","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите гантель в одной руке ладонью к телу. На протяжении всего упражнения держите спину прямой и напряженным корпус. Поднимите гантель в сторону, держа руку прямой ладонью вниз. Продолжайте поднимать, пока ваша рука не станет параллельна земле. Задержитесь на мгновение в верхней точке, затем медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем переключитесь на другую руку.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём одной гантели в сторону"},{"id":"0356","n":"dumbbell one arm lateral raise with support","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"trapezius","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите в одну руку гантель ладонью к телу. Другую руку положите на устойчивую поверхность, например на скамью или стену, для поддержки. Держите спину прямо и задействуйте корпус. Поднимите гантель в сторону, держа руку прямой ладонью вниз. Продолжайте поднимать, пока ваша рука не станет параллельна земле. Задержитесь на мгновение в верхней точке, затем медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём одной гантели в сторону с опорой"},{"id":"1290","n":"dumbbell one arm press on exercise ball","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на гимнастический мяч, поставьте ступни на землю и согните колени под углом 90 градусов. Возьмите гантель в одну руку и расположите ее на уровне плеч, согнув локоть и ладонь вперед. Медленно поднимите гантель вверх, пока рука не будет полностью выпрямлена, сохраняя при этом корпус напряженным и сохраняя баланс на мяче для упражнений. Задержитесь на мгновение в верхней точке, затем медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем переключитесь на другую руку.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Жим одной гантели на фитболе"},{"id":"1665","n":"dumbbell one arm prone curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Лягте лицом вниз на плоскую скамью с гантелью в одной руке ладонью вниз. Полностью вытяните руку, позволяя ей свисать прямо к полу. Удерживая плечо неподвижно, поднимите гантель к плечу, напрягая бицепс. Задержитесь на мгновение в верхней точке, затем медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание одной рукой с гантелей лёжа на животе"},{"id":"1666","n":"dumbbell one arm prone hammer curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Лягте лицом вниз на плоскую скамью с гантелью в одной руке, ладонью к телу и полностью выпрямленной рукой. Держите плечо неподвижно и поднимите гантель к плечу, напрягая бицепс. Задержитесь на мгновение в верхней точке, затем медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Молотковое сгибание одной рукой с гантелей лёжа на животе"},{"id":"1291","n":"dumbbell one arm pullover on exercise ball","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Сядьте на гимнастический мяч, поставьте ступни на землю и согните колени под углом 90 градусов. Возьмите гантель одной рукой и вытяните руку прямо над грудью. Медленно опустите гантель за голову, сохраняя руку прямой. Сделайте паузу на мгновение, затем поднимите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Пуловер одной рукой с гантелей на фитболе"},{"id":"0358","n":"dumbbell one arm reverse wrist curl","bp":"lower arms","eq":"dumbbell","tg":"forearms","mg":"wrist extensors","img":null,"gif":null,"ru":"Сядьте на скамью или стул, поставив ноги на землю. Возьмите гантель в одну руку хватом сверху ладонью вниз. Положите предплечье на бедро так, чтобы запястье свисало с края. Медленно опустите гантель на землю, сгибая запястье. Задержитесь на мгновение в нижней точке, затем медленно согните запястье обратно к телу. Повторите желаемое количество повторений, затем переключитесь на другую руку.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратное сгибание запястья одной рукой с гантелей"},{"id":"0359","n":"dumbbell one arm reverse fly (with support)","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"trapezius","img":null,"gif":null,"ru":"Сядьте на скамью, поставив ноги на землю и выпрямив спину. Возьмите гантель в одну руку ладонью внутрь. Наклонитесь вперед и положите свободную руку на скамью для поддержки. Держите руку слегка согнутой и поднимите ее в сторону, пока она не станет параллельна земле. Задержитесь на мгновение в верхней точке, затем медленно опустите руку обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратное разведение одной гантели с опорой"},{"id":"1622","n":"dumbbell one arm reverse grip press","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Сядьте на ровную скамью с гантелью в одной руке ладонью к телу. Поставьте ноги на землю и держите спину прямо. Поднимите гантель на высоту плеч, держа локоть близко к телу. Нажмите гантель вверх, пока рука полностью не выпрямится. Задержитесь на мгновение в верхней точке, затем медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем переключитесь на другую руку.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим одной гантели обратным хватом"},{"id":"1414","n":"dumbbell one arm reverse preacher curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на скамью для проповедника, прижав грудь к подушке и вытянув руку через край скамьи, держа гантель обратным хватом снизу. Медленно опускайте гантель, пока рука полностью не выпрямится. Поднимите гантель обратно к плечу, сохраняя плечо неподвижным. Напрягите бицепсы в верхней точке движения, затем медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратное сгибание на бицепс одной рукой с гантелей на скамье Скотта"},{"id":"1667","n":"dumbbell one arm reverse spider curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, возьмите гантель в одну руку ладонью вниз и полностью выпрямите руку. Удерживая плечо неподвижно, поднимите гантель к плечу, сгибая локоть. Задержитесь на мгновение в верхней точке, затем медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратное паучье сгибание одной рукой с гантелей"},{"id":"1668","n":"dumbbell one arm seated bicep curl on exercise ball","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на гимнастический мяч, поставив ноги на землю и выпрямив спину. Возьмите гантель в одну руку ладонью вверх и полностью выпрямите руку. Удерживая плечо неподвижно, поднимите гантель к плечу, напрягая бицепс. Задержитесь на мгновение в верхней точке, затем медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание на бицепс одной рукой с гантелей сидя на фитболе"},{"id":"1669","n":"dumbbell one arm seated hammer curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на скамью, выпрямив спину и поставив ноги на землю. Возьмите гантель в одну руку нейтральным хватом (ладони обращены друг к другу). Положите локоть на внутреннюю часть бедра, чуть выше колена. Удерживая плечо неподвижно, выдохните и поднимите гантель к плечу. Задержитесь на мгновение в верхней точке, напрягая бицепсы. Вдохните и медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Молотковое сгибание одной рукой с гантелей сидя"},{"id":"1415","n":"dumbbell one arm seated neutral wrist curl","bp":"lower arms","eq":"dumbbell","tg":"forearms","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на скамью, поставьте ноги на землю и возьмите в одну руку гантель ладонью вверх. Положите предплечье на бедро, позволяя запястью свисать с края. Удерживая предплечье неподвижно, согните запястье вверх как можно дальше. Pause for a moment at the top, then slowly lower your wrist back down to the starting position. Повторите необходимое количество повторений, затем переключитесь на другую руку.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание запястья нейтральным хватом одной рукой с гантелей сидя"},{"id":"0361","n":"dumbbell one arm shoulder press","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, в одной руке держите гантель на уровне плеч ладонью вперед. Нажмите гантель вверх, пока ваша рука полностью не выпрямится над головой. Задержитесь на мгновение в верхней точке, затем медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем переключитесь на другую руку.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Жим гантели одной рукой над головой"},{"id":"0360","n":"dumbbell one arm shoulder press v. 2","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, в одной руке держите гантель на уровне плеч ладонью вперед. Напрягите корпус и поднимите гантель прямо над головой, полностью выпрямляя руку. Задержитесь на мгновение в верхней точке, затем медленно опустите гантель обратно на уровень плеч. Повторите желаемое количество повторений, затем переключитесь на другую руку.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Жим гантели одной рукой над головой вариант 2"},{"id":"3888","n":"dumbbell one arm snatch","bp":"upper legs","eq":"dumbbell","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите гантель в одной руке хватом сверху. Слегка согните колени и наклонитесь вперед в бедрах, держа спину прямо и грудь вверх. Опустите гантель к земле, держа ее близко к телу. Взрывно выпрямите бедра, колени и лодыжки, поднимая гантель вверх по прямой линии. Когда гантель достигнет высоты плеч, быстро поверните руку и ударьте ею над головой, полностью выпрямляя руку. Возьмите гантель над головой, слегка согнув колени и бедра. Контролируемым образом опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем переключитесь на другую руку.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":0,"ru_name":"Рывок одной гантели"},{"id":"1670","n":"dumbbell one arm standing curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, возьмите гантель в одну руку, ладонь вперед и полностью выпрямите руку. Удерживая плечо неподвижно, выдохните и поднимите вес вверх, одновременно сокращая бицепсы. Продолжайте поднимать гантель до тех пор, пока ваши бицепсы полностью не сократятся и гантель не окажется на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание на бицепс одной рукой с гантелей стоя"},{"id":"1671","n":"dumbbell one arm standing hammer curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, возьмите в каждую руку по гантели, ладони обращены к туловищу. Держите локти близко к туловищу, а плечи неподвижны. Выдохните и согните штангу, одновременно сокращая бицепсы. Продолжайте поднимать гири до тех пор, пока ваши бицепсы полностью не сократятся и гантели не окажутся на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно начните опускать гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Молотковое сгибание одной рукой с гантелей стоя"},{"id":"0362","n":"dumbbell one arm triceps extension (on bench)","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на скамью, выпрямив спину и поставив ноги на землю. Возьмите гантель в одну руку, а другую руку положите на скамью для поддержки. Поднимите гантель над головой, держа плечо близко к голове и локоть направленным вперед. Опустите гантель за голову, согнув локоть, сохраняя плечо неподвижным. Вытяните руку обратно в исходное положение, полностью выпрямляя локоть. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание одной рукой на трицепс с гантелей на скамье"},{"id":"0363","n":"dumbbell one arm upright row","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"traps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите гантель в одной руке хватом сверху. Пусть гантель висит на расстоянии вытянутой руки перед бедрами, ладонью к телу. Удерживая спину прямой и напрягая корпус, выдохните и поднимите гантель прямо вверх к подбородку, ведя локтем. Задержитесь на мгновение в верхней точке, затем вдохните и медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем переключитесь на другую руку.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Тяга одной гантели к подбородку"},{"id":"0364","n":"dumbbell one arm wrist curl","bp":"lower arms","eq":"dumbbell","tg":"forearms","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на скамью или стул, поставив ноги на землю. Возьмите гантель в одну руку обратным хватом, положив предплечье на бедро. Позвольте запястью выпрямиться, позволяя гантеле скатиться вниз к вашим пальцам. Медленно согните запястье вверх, поднося гантель к предплечью. Повторите необходимое количество повторений, затем переключитесь на другую руку.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание запястья одной рукой с гантелей"},{"id":"1672","n":"dumbbell one arm zottman preacher curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на скамью для сгибаний рук и возьмите гантель в одну руку обратным хватом. Положите плечо на подушку скамьи проповедника, позволяя руке полностью выпрямиться. Поднимите гантель к плечу, сохраняя плечо неподвижным. В верхней части сгиба поверните запястье ладонью вверх. Медленно опустите гантель обратно в исходное положение, поворачивая запястье обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание Зоттмана одной рукой с гантелей на скамье Скотта"},{"id":"1292","n":"dumbbell one leg fly on exercise ball","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на гимнастический мяч, взяв в каждую руку по гантели, ладонями друг к другу. Поставьте одну ногу на землю и вытяните другую ногу прямо перед собой. Слегка наклонитесь вперед и разведите руки в стороны, сохраняя небольшой изгиб в локтях. Медленно опустите гантели вниз и в стороны, чувствуя растяжение в груди. Задержитесь на мгновение в нижней точке, затем сожмите мышцы груди, чтобы вернуть гантели в исходное положение. Повторите необходимое количество повторений, затем поменяйте ногу и повторите.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разведение гантелей на одной ноге на фитболе"},{"id":"0365","n":"dumbbell over bench neutral wrist curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на скамью, поставьте ноги на землю и возьмите в каждую руку по гантели ладонями вверх. Положите предплечья на скамью так, чтобы запястья свисали с края. Удерживая плечи неподвижно, выдохните и поднимите гантели к плечам. Задержитесь на мгновение в верхней точке, затем вдохните и медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание запястий нейтральным хватом с гантелями на скамье"},{"id":"0366","n":"dumbbell over bench one arm neutral wrist curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на скамью, взяв в одну руку гантель, вытянув руку над скамьей ладонью вверх. Держите плечо неподвижно и согните гантель к плечу, сохраняя запястье в нейтральном положении. Задержитесь на мгновение в верхней точке, затем медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание запястья нейтральным хватом одной рукой с гантелей на скамье"},{"id":"1441","n":"dumbbell over bench one arm reverse wrist curl","bp":"lower arms","eq":"dumbbell","tg":"forearms","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на скамью, поставьте ноги на землю и держите гантель в одной руке ладонью вниз. Положите предплечье на скамью так, чтобы запястье свисало с края. Медленно согните запястье вверх, поднося гантель к предплечью. Задержитесь на мгновение в верхней точке, затем медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем переключитесь на другую руку.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратное сгибание запястья одной рукой с гантелей на скамье"},{"id":"0367","n":"dumbbell over bench one arm wrist curl","bp":"lower arms","eq":"dumbbell","tg":"forearms","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на скамью, поставьте ноги на землю и держите гантель в одной руке ладонью вниз. Положите предплечье на скамью так, чтобы запястье свисало с края. Медленно согните запястье вверх, поднося гантель к предплечью. Задержитесь на мгновение в верхней точке, затем медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем переключитесь на другую руку.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание запястья одной рукой с гантелей на скамье"},{"id":"0368","n":"dumbbell over bench revers wrist curl","bp":"lower arms","eq":"dumbbell","tg":"forearms","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на скамью, поставьте ноги на землю и возьмите в каждую руку по гантели ладонями вниз. Положите предплечья на скамью так, чтобы запястья свисали с края. Медленно поднимите запястья вверх, приближая гантели к телу. Задержитесь на мгновение в верхней точке, затем медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратное сгибание запястий с гантелями на скамье"},{"id":"0369","n":"dumbbell over bench wrist curl","bp":"lower arms","eq":"dumbbell","tg":"forearms","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на скамью, положив предплечья на скамью ладонями вверх, держа в каждой руке по гантели. Пусть ваши запястья свисают с края скамьи. Медленно поднимите запястья вверх, сжимая предплечья в верхней точке движения. Сделайте паузу на мгновение, затем медленно опустите запястья обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание запястий с гантелями на скамье"},{"id":"1329","n":"dumbbell palm rotational bent over row","bp":"back","eq":"dumbbell","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите по гантели в каждой руке хватом сверху. Наклонитесь вперед в бедрах, сохраняя спину прямой и слегка согнутыми в коленях. Пусть ваши руки свисают прямо вниз, ладони обращены к телу. Напрягите корпус и подтяните гантели к груди, держа локти близко к телу. Подтягивая гантели вверх, поверните ладони так, чтобы они были направлены от тела. В верхней точке движения сведите лопатки вместе. Медленно опустите гантели обратно в исходное положение, поворачивая ладони обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Тяга гантелей в наклоне с поворотом ладоней"},{"id":"1623","n":"dumbbell palms in incline bench press","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Установите наклонную скамью под углом 45 градусов. Сядьте на скамью, прислонившись спиной к спинке и поставив ступни на землю. Возьмите по гантели в каждую руку хватом сверху, ладонями внутрь. Вытяните руки прямо над грудью, сохраняя небольшой изгиб в локтях. Медленно опустите гантели к плечам, держа локти близко к телу. Задержитесь на мгновение в нижней точке, затем верните гантели в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим гантелей нейтральным хватом на наклонной скамье"},{"id":"0370","n":"dumbbell peacher hammer curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, возьмите в каждую руку по гантели, ладони обращены к туловищу. Держите локти близко к туловищу и поворачивайте ладони рук так, чтобы они смотрели вперед. Это будет ваша исходная позиция. Теперь, удерживая плечи неподвижно, выдохните и согните гантели, одновременно сокращая бицепсы. Продолжайте поднимать гири до тех пор, пока ваши бицепсы полностью не сократятся и гантели не окажутся на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Затем вдохните и медленно начните опускать гантели обратно в исходное положение. Повторите рекомендованное количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Молотковое сгибание с гантелями на скамье Скотта"},{"id":"0371","n":"dumbbell plyo squat","bp":"upper legs","eq":"dumbbell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держа по гантели в каждой руке по бокам. Опустите тело в присед, согнув колени и отведя бедра назад. Достигнув нижней точки приседа, резко взлетайте вверх, отпрыгивая от земли. Находясь в воздухе, быстро поменяйте положение ног, приземлившись противоположной ногой вперед. Немедленно опустите тело обратно в положение приседа и повторите прыжок, снова поменяв ноги. Продолжайте менять положение ног при каждом прыжке желаемое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"high","sp":0,"kn":0,"sh":1,"ru_name":"Плиометрические приседания с гантелями"},{"id":"0372","n":"dumbbell preacher curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на скамью для сгибаний рук для проповедника, положив плечи на подушечку и прижавшись к ней грудью. Возьмите по гантели в каждую руку ладонями вверх и полностью выпрямите руки. Удерживая плечи неподвижно, выдохните и согните гантели, одновременно сокращая бицепсы. Продолжайте поднимать гантели до тех пор, пока ваши бицепсы полностью не сократятся и гантели не окажутся на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно начните опускать гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание на бицепс с гантелями на скамье Скотта"},{"id":"1673","n":"dumbbell preacher curl over exercise ball","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на гимнастический мяч, поставив ноги на землю и выпрямив спину. Возьмите гантель в одну руку обратным хватом, положив локоть на мяч для упражнений. Удерживая плечо неподвижно, выдохните и поднимите гантель к плечу. Задержитесь на мгновение в верхней точке, затем вдохните и медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание на бицепс с гантелями на скамье Скотта на фитболе"},{"id":"1293","n":"dumbbell press on exercise ball","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на гимнастический мяч, поставьте ноги на землю и возьмите в каждую руку по гантели, положив их на бедра. Медленно пройдите ногами вперед, перекатывая мяч для упражнений до тех пор, пока нижняя часть спины не окажется на мяче, а колени не окажутся под углом 90 градусов. Поднимите гантели на высоту плеч, ладони смотрят вперед. Выжмите гантели вверх, пока руки полностью не выпрямятся. Задержитесь на мгновение в верхней точке, затем медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим гантелей на фитболе"},{"id":"0373","n":"dumbbell pronate-grip triceps extension","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на скамью или стул, выпрямив спину и поставив ступни на землю. Возьмите гантель обеими руками ладонями вниз и вытяните руки вверх. Держа плечи близко к голове и локти направленными вперед, медленно опустите гантель за голову, сгибая локти. Сделайте паузу на мгновение, затем вытяните руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Разгибание на трицепс пронированным хватом с гантелями"},{"id":"0374","n":"dumbbell prone incline curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Отрегулируйте скамью под углом 45 градусов. Лягте лицом вниз на скамью, прижавшись к ней грудью и животом. Возьмите по гантели в каждую руку ладонями вниз и полностью выпрямите руки. Удерживая плечи неподвижно, выдохните и согните гантели, одновременно сокращая бицепсы. Продолжайте поднимать гири до тех пор, пока ваши бицепсы полностью не сократятся и гантели не окажутся на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно начните опускать гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание на бицепс с гантелями лёжа на животе на наклонной скамье"},{"id":"1674","n":"dumbbell prone incline hammer curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Отрегулируйте скамью под углом 45 градусов. Лягте лицом вниз на скамью, взяв в каждую руку по гантели, ладони обращены друг к другу. Позвольте рукам свисать прямо к полу, слегка согнутыми в локтях. Удерживая плечи неподвижно, выдохните и согните гантели, одновременно сокращая бицепсы. Продолжайте поднимать гантели до тех пор, пока ваши бицепсы полностью не сократятся и гантели не окажутся на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно начните опускать гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Молотковое сгибание с гантелями лёжа на животе на наклонной скамье"},{"id":"0375","n":"dumbbell pullover","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"latissimus dorsi","img":null,"gif":null,"ru":"Лягте на скамью, положив голову на один конец и поставив ноги на пол. Возьмите гантель обеими руками и вытяните руки прямо над грудью. Сохраняя небольшой изгиб в локтях, медленно опускайте гантель за голову, пока не почувствуете растяжение в груди и плечах. Сделайте паузу на мгновение, затем поднимите гантель обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Пуловер с гантелей"},{"id":"1294","n":"dumbbell pullover hip extension on exercise ball","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Сядьте на мяч для упражнений, поставьте ноги на землю, а гантель положите на бедра. Медленно пройдите ногами вперед, катя мяч для упражнений вниз по спине, пока ваша голова, шея и верхняя часть спины не окажутся на мяче. Возьмите гантель обеими руками и вытяните руки прямо вверх над грудью, сохраняя небольшой изгиб в локтях. Опустите гантель за голову, держа руки прямыми и сохраняя контроль. Сделайте паузу на мгновение, затем поднимите гантель обратно в исходное положение. Держа руки вытянутыми, поднимите бедра от земли, сжимая ягодицы и задействуя корпус. Опустите бедра обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Пуловер с гантелей с разгибанием бёдер на фитболе"},{"id":"1295","n":"dumbbell pullover on exercise ball","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Сядьте на гимнастический мяч и держите гантель обеими руками над грудью, вытянув руки. Медленно опустите гантель за голову, сохраняя руки прямыми. Сделайте паузу на мгновение, затем поднимите гантель обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Пуловер с гантелей на фитболе"},{"id":"1700","n":"dumbbell push press","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держа в каждой руке по гантели на уровне плеч. Слегка согните ноги в коленях и опустите тело вниз, затем резко выпрямите ноги и выжмите гантели над головой. Зафиксируйте руки в верхней точке движения, затем опустите гантели обратно на уровень плеч. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Швунг гантелей"},{"id":"0376","n":"dumbbell raise","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"traps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите в каждую руку по гантели ладонями к телу. Держите спину прямо и задействуйте корпус. Поднимите руки в стороны до тех пор, пока они не станут параллельны полу, сохраняя небольшой изгиб в локтях. Задержитесь на мгновение в верхней точке, затем медленно опустите руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём гантелей"},{"id":"2292","n":"dumbbell rear delt raise","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"trapezius","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите в каждую руку по гантели ладонями к телу. Слегка согните колени и наклонитесь вперед в бедрах, сохраняя спину прямой. Поднимите руки в стороны, сохраняя небольшой изгиб в локтях, пока они не станут параллельны полу. Задержитесь на мгновение в верхней точке, затем медленно опустите руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём гантелей на задние дельты"},{"id":"0377","n":"dumbbell rear delt row_shoulder","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"trapezius","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч и слегка согнуты в коленях. Возьмите по гантели в каждую руку ладонями к телу. Наклонитесь вперед в талии, сохраняя спину прямой и напрягая корпус. Вытяните руки прямо вниз к полу, слегка согнув их в локтях. Поднимите гантели в стороны, сведя лопатки вместе. Задержитесь на мгновение в верхней точке, затем медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга гантелей на задние дельты"},{"id":"0378","n":"dumbbell rear fly","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"trapezius","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите в каждую руку по гантели. Слегка согните колени и наклонитесь вперед в бедрах, сохраняя спину прямой. Вытяните руки прямо вниз к земле, ладони обращены друг к другу. Сохраняя небольшой изгиб в локтях, поднимите руки в стороны и сведите лопатки вместе. Задержитесь на мгновение в верхней точке, затем медленно опустите руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разведение гантелей на задние дельты"},{"id":"0380","n":"dumbbell rear lateral raise","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"traps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите в каждую руку по гантели ладонями к телу. Слегка согните колени и наклонитесь вперед в бедрах, сохраняя спину прямой и напряженным корпусом. Поднимите руки в стороны, сохраняя небольшой изгиб в локтях, пока они не станут параллельны полу. Задержитесь на мгновение в верхней точке, затем медленно опустите руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём гантелей в стороны в наклоне"},{"id":"0379","n":"dumbbell rear lateral raise (support head)","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"traps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите в каждую руку по гантели. Слегка согните колени и наклонитесь вперед в бедрах, сохраняя спину прямой. Поднимите руки в стороны, сохраняя небольшой изгиб в локтях, пока они не станут параллельны земле. Задержитесь на мгновение в верхней точке, затем медленно опустите руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём гантелей в стороны в наклоне с опорой головой"},{"id":"0381","n":"dumbbell rear lunge","bp":"upper legs","eq":"dumbbell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держа в каждой руке по гантели. Сделайте шаг назад правой ногой, опуская тело в положение выпада. Согните левое колено и опустите тело до тех пор, пока левое бедро не станет параллельно земле. Сделайте паузу на мгновение, затем оттолкнитесь левой пяткой, чтобы вернуться в исходное положение. Повторите то же самое в другую сторону, отступив левой ногой назад.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Выпад назад с гантелями"},{"id":"0382","n":"dumbbell revers grip biceps curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, взяв в каждую руку по гантели, ладонями вниз и полностью выпрямленными руками. Удерживая плечи неподвижно, выдохните и согните гантели, одновременно сокращая бицепсы. Продолжайте поднимать гири до тех пор, пока ваши бицепсы полностью не сократятся и гантели не окажутся на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно начните опускать гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс обратным хватом с гантелями"},{"id":"1624","n":"dumbbell reverse bench press","bp":"chest","eq":"dumbbell","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Лягте на скамью, поставьте ступни на землю и согните колени. Возьмите по гантели в каждую руку хватом сверху, ладонями к ногам. Вытяните руки прямо вверх к потолку, сохраняя небольшой изгиб в локтях. Медленно опустите гантели к груди, позволяя локтям развестися в стороны. Задержитесь на мгновение в нижней точке, затем верните гантели в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим гантелей обратным хватом лёжа"},{"id":"0383","n":"dumbbell reverse fly","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"trapezius","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите в каждую руку по гантели. Слегка согните колени и наклонитесь вперед в бедрах, сохраняя спину прямой. Вытяните руки прямо перед собой, ладони обращены друг к другу. Сохраняя небольшой изгиб в локтях, поднимите руки в стороны, пока они не станут параллельны земле. Задержитесь на мгновение в верхней точке, затем медленно опустите руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратное разведение гантелей"},{"id":"1330","n":"dumbbell reverse grip incline bench one arm row","bp":"back","eq":"dumbbell","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Установите наклонную скамью под углом 45 градусов. Положите гантель на пол рядом со скамейкой. Встаньте лицом к скамье, поставив ноги на ширине плеч. Согнитесь в талии и положите левое колено и левую руку на скамью для поддержки. Возьмите гантель правой рукой обратным хватом (ладонью вниз). Держите спину прямо, а корпус напряженным. Подтяните гантель к груди, держа локоть близко к телу. Напрягите мышцы спины в верхней точке движения. Контролируемым образом опустите гантель обратно в исходное положение. Повторите необходимое количество повторений. Поменяйте сторону и повторите упражнение левой рукой.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга одной гантели обратным хватом на наклонной скамье"},{"id":"1331","n":"dumbbell reverse grip incline bench two arm row","bp":"back","eq":"dumbbell","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Установите наклонную скамью под углом 45 градусов. Сядьте на скамью, прижав грудь к спинке, а ноги поставьте на землю. Возьмите в каждую руку по гантели обратным хватом. Наклонитесь вперед и позвольте рукам свисать прямо вниз, полностью выпрямившись. Подтяните гантели к груди, сведя лопатки вместе. Задержитесь на мгновение в верхней точке, затем медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга двух гантелей обратным хватом на наклонной скамье"},{"id":"2327","n":"dumbbell reverse grip row (female)","bp":"back","eq":"dumbbell","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч и слегка согнуты в коленях. Возьмите по гантели в каждую руку хватом сверху, ладонями к телу. Наклонитесь вперед в талии, сохраняя спину прямой и напрягая корпус. Пусть ваши руки свисают прямо вниз, полностью выпрямлены, слегка согнуты в локтях. Подтяните гантели к груди, сведя лопатки вместе. Задержитесь на мгновение в верхней точке, затем медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга гантелей обратным хватом"},{"id":"0384","n":"dumbbell reverse preacher curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на скамью для проповедника, положив плечи на подушку и грудь на опору. Возьмите в каждую руку по гантели обратным хватом ладонями вверх. Удерживая плечи неподвижно, выдохните и согните гантели, сокращая бицепсы. Продолжайте сгибать гантели до тех пор, пока ваши бицепсы полностью не сократятся и гантели не окажутся на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратное сгибание на бицепс с гантелями на скамье Скотта"},{"id":"1675","n":"dumbbell reverse spider curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, взяв в каждую руку по гантели, ладони обращены к телу, руки полностью выпрямлены. Удерживая плечи неподвижно, выдохните и согните гантели, одновременно сокращая бицепсы. Продолжайте поднимать гантели до тех пор, пока ваши бицепсы полностью не сократятся и гантели не окажутся на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно начните опускать гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратное паучье сгибание с гантелями"},{"id":"0385","n":"dumbbell reverse wrist curl","bp":"lower arms","eq":"dumbbell","tg":"forearms","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на скамью или стул, поставив ноги на землю. Возьмите по гантели в каждую руку хватом сверху, ладонями вниз. Положите предплечья на бедра, позволяя запястьям свисать с края. Медленно поднимите запястья вверх, приближая гантели к телу. Задержитесь на мгновение в верхней точке, затем медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратное сгибание запястий с гантелями"},{"id":"1459","n":"dumbbell romanian deadlift","bp":"upper legs","eq":"dumbbell","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите по гантели в каждой руке хватом сверху. Удерживая спину прямой, а корпус напряженным, наклонитесь в бедрах и опустите гантели к земле, слегка согнув колени. Опускайте гантели до тех пор, пока не почувствуете растяжение подколенных сухожилий, затем надавите на пятки и задействуйте ягодицы, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Румынская становая тяга с гантелями"},{"id":"0386","n":"dumbbell rotation reverse fly","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"trapezius","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите в каждую руку по гантели ладонями внутрь. Слегка согните колени и наклонитесь вперед в бедрах, держа спину прямо и грудь вверх. Поднимите руки в стороны, сохраняя небольшой изгиб в локтях, пока они не станут параллельны полу. Поверните руки так, чтобы ладони были направлены вниз. Медленно опустите руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратное разведение гантелей с поворотом"},{"id":"2397","n":"dumbbell scott press","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Сядьте на скамью, взяв в каждую руку по гантели ладонями вперед. Поднимите гантели на высоту плеч, согнув локти и повернув ладони вперед. Выжмите гантели вверх, пока руки полностью не выпрямятся. Задержитесь на мгновение в верхней точке, затем медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Жим Скотта с гантелями"},{"id":"0387","n":"dumbbell seated alternate front raise","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"trapezius","img":null,"gif":null,"ru":"Сядьте на скамью, выпрямив спину и поставив ноги на землю. Возьмите по гантели в каждую руку ладонями к телу, а руки вытяните вниз по бокам. Держа руки прямыми, поднимите одну гантель перед собой до тех пор, пока она не станет параллельна земле. Задержитесь на мгновение в верхней точке, затем медленно опустите гантель обратно в исходное положение. Повторите с другой рукой. Чередуйте руки, выполняя желаемое количество повторений.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Попеременный подъём гантелей перед собой сидя"},{"id":"1676","n":"dumbbell seated alternate hammer curl on exercise ball","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на гимнастический мяч, поставив ноги на землю и выпрямив спину. Возьмите по гантели в каждую руку ладонями к телу и полностью выпрямленными руками. Удерживая плечи неподвижно, выдохните и согните одну гантель к плечу, держа ладонь к телу. Продолжайте поднимать гантель до тех пор, пока ваши бицепсы полностью не сократятся и гантель не окажется на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно опустите гантель обратно в исходное положение. Повторите движение противоположной рукой. Продолжайте чередовать руки желаемое количество повторений.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Попеременное молотковое сгибание с гантелями сидя на фитболе"},{"id":"0388","n":"dumbbell seated alternate press","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Сядьте на скамью, взяв в каждую руку по гантели ладонями вперед. Поднимите гантели на высоту плеч, согнув локти и повернув ладони вперед. Выжмите одну гантель над головой, полностью выпрямляя руку. Опустите гантель обратно на высоту плеч. Повторите с другой рукой. Продолжайте чередовать руки желаемое количество повторений.","pos":"seated","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Попеременный жим гантелей сидя"},{"id":"3546","n":"dumbbell seated alternate shoulder","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Сядьте на скамью, выпрямив спину и поставив ноги на землю. Возьмите по гантели в каждую руку ладонями внутрь и поднимите их на высоту плеч. Поднимите одну гантель над головой, удерживая другую на уровне плеч. Опустите поднятую гантель обратно на высоту плеч, одновременно поднимая другую гантель над головой. Продолжайте чередовать руки необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Попеременный жим гантелей на плечи сидя"},{"id":"0389","n":"dumbbell seated bench extension","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на скамью, выпрямив спину и поставив ноги на землю. Возьмите гантель обеими руками и вытяните руки прямо над головой. Медленно опустите гантель за голову, держа локти близко к ушам. Сделайте паузу на мгновение, затем поднимите гантель обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Разгибание на трицепс с гантелями сидя на скамье"},{"id":"2317","n":"dumbbell seated bent arm lateral raise","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"trapezius","img":null,"gif":null,"ru":"Сядьте на скамью, выпрямив спину и поставив ноги на землю. Возьмите по гантели в каждую руку ладонями к телу, руки согнуты под углом 90 градусов. Сохраняя локти согнутыми, поднимите руки в стороны, пока они не станут параллельны земле. Задержитесь на мгновение в верхней точке, затем медленно опустите руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём гантелей в стороны с согнутыми руками сидя"},{"id":"1730","n":"dumbbell seated bent over alternate kickback","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на скамью, взяв в каждую руку по гантели ладонями внутрь. Наклонитесь вперед в талии, сохраняя спину прямой и параллельной земле. Вытяните одну руку прямо назад, держа ее близко к телу, пока рука не выпрямится полностью. Сделайте паузу на мгновение, затем медленно опустите гантель обратно в исходное положение. Повторите с другой рукой. Продолжайте чередовать руки желаемое количество повторений.","pos":"seated те спину прямо и напрягите корпус. Поднимите гантели в стороны, слегка согнув локти, пока руки не станут параллельны земле. Задержитесь на мгновение в верхней точке, затем медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разведение гантелей в стороны сидя вариант 2"},{"id":"0397","n":"dumbbell seated neutral wrist curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на скамью, поставьте ноги на землю и возьмите в каждую руку по гантели, ладони обращены друг к другу. Положите предплечья на бедра, позволяя гантелям свисать. Удерживая запястья в нейтральном положении, поднимите гантели к плечам. Задержитесь на мгновение в верхней точке, затем медленно опустите гантели обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание запястий с гантелями нейтральным хватом сидя"},{"id":"1679","n":"dumbbell seated one arm bicep curl on exercise ball with leg raised","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на гимнастический мяч, поставив ноги на землю и выпрямив спину. Возьмите гантель в одну руку ладонью вверх и полностью выпрямите руку. Вторую руку положите на бедро для устойчивости. Медленно поднимите гантель к плечу, сохраняя плечо неподвижным. Задержитесь на мгновение в верхней точке движения, сжимая бицепс. Медленно опустите гантель обратно в исходное положение. Повторите необходимое количество повторений. Поменяйте руки и повторите упражнение.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс одной рукой с гантелью на фитболе с поднятой ногой"},{"id":"0398","n":"dumbbell seated one arm kickback","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на скамью, поставьте ноги на землю и возьмите в одну руку гантель. Наклоните туловище вперед в талии, сохраняя спину прямой и параллельной земле. Вытяните руку прямо назад, держа локоть близко к телу. Задержитесь на мгновение в верхней точке, затем медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание руки с гантелью назад одной рукой сидя"},{"id":"0399","n":"dumbbell seated one arm rotate","bp":"lower arms","eq":"dumbbell","tg":"forearms","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на скамью с прямой спиной и возьмите в одну руку гантель, положив ее на бедро. Поднимите гантель до уровня плеч, держа локоть близко к телу. Поверните предплечье наружу, от тела, сохраняя при этом плечо неподвижным. Задержитесь на мгновение в верхней точке, затем медленно поверните предплечье обратно в исходное положение. Повторите желаемое количество повторений, затем переключитесь на другую руку.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Поворот руки с гантелью сидя одной рукой"},{"id":"0400","n":"dumbbell seated one leg calf raise","bp":"lower legs","eq":"dumbbell","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Сядьте на скамью или стул, поставьте ступни на землю и положите гантель на правое бедро. Вытяните левую ногу прямо перед собой, сохраняя ступню согнутой. Поставьте подушечку правой стопы на возвышенную поверхность, например на ступеньку или блин. Используя икроножные мышцы, поднимите правую пятку как можно выше. Задержитесь на мгновение в верхней точке, затем медленно опустите пятку обратно в исходное положение. Повторите необходимое количество повторений, затем поменяйте ногу.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носок одной ноги с гантелью сидя"},{"id":"1380","n":"dumbbell seated one leg calf raise - hammer grip","bp":"lower legs","eq":"dumbbell","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Сядьте на скамью или стул, поставьте ступни на землю и положите гантель на бедра. Поставьте одну ногу на возвышение, например на ступеньку или блок, свесив пятку с края. Держите гантель молоткообразным хватом, то есть ладони обращены друг к другу, а пальцы обхватывают рукоятку. Удерживая корпус напряженным, а спину прямой, медленно поднимите пятку как можно выше, толкая подушечки стопы. Задержитесь на мгновение в верхней точке, затем медленно опустите пятку обратно в исходное положение. Повторите желаемое количество повторений, затем переключитесь на другую ногу.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носок одной ноги с гантелью сидя молотковым хватом"},{"id":"1381","n":"dumbbell seated one leg calf raise - palm up","bp":"lower legs","eq":"dumbbell","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Сядьте на скамью или стул, выпрямив спину и поставив ноги на землю. Возьмите гантель в одну руку и положите ее на бедро ладонью вверх. Поднимите одну ногу от земли и вытяните ее перед собой, слегка согнув колено. Поднимите пятку как можно выше, толкая подушечку стопы. Задержитесь на мгновение в верхней точке, затем медленно опустите пятку обратно вниз. Повторите необходимое количество повторений, затем поменяйте ногу и повторите.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носок одной ноги с гантелью сидя ладонью вверх"},{"id":"0401","n":"dumbbell seated palms up wrist curl","bp":"lower arms","eq":"dumbbell","tg":"forearms","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на скамью, поставьте ноги на землю и возьмите в каждую руку по гантели ладонями вверх. Положите предплечья на бедра, позволяя запястьям свисать с края. Медленно поднимите запястья вверх, сжимая предплечья в верхней точке движения. Сделайте паузу на мгновение, затем опустите запястья обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание запястий с гантелями ладонями вверх сидя"},{"id":"0402","n":"dumbbell seated preacher curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на скамью для проповедника, поставив ноги на пол. Держите гантель в одной руке обратным хватом, опираясь плечом на коврик для проповедника. Удерживая плечо неподвижно, выдохните и поднимите гантель к плечу. Задержитесь на мгновение в верхней точке, затем вдохните и медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс с гантелями на скамье Скотта сидя"},{"id":"0403","n":"dumbbell seated revers grip concentration curl","bp":"upper arms","eq":"dumbbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на скамью, поставьте ноги на землю и возьмите в одну руку гантель ладонью вверх. Положите локоть на внутреннюю часть бедра, чуть выше колена. Удерживая плечо неподвижно, выдохните и согните гантель к плечу. Задержитесь на мгновение в верхней точке, напрягая бицепсы. Вдохните и медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Концентрированный подъём на бицепс с гантелью обратным хватом сидя"},{"id":"1738","n":"dumbbell seated reverse grip one arm overhead tricep extension","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на скамью, выпрямив спину и поставив ноги на землю. Возьмите гантель обратным хватом и вытяните руку прямо над головой. Опустите гантель за голову, согнув локоть, сохраняя плечо неподвижным. Сделайте паузу на мгновение, затем вытяните руку обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Разгибание на трицепс из-за головы одной рукой обратным хватом сидя"},{"id":"0405","n":"dumbbell seated shoulder press","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Сядьте на скамью, взяв в каждую руку по гантели, положив их на бедра. Поднимите гантели на высоту плеч, ладони смотрят вперед. Выжмите гантели вверх, пока руки полностью не выпрямятся над головой. Задержитесь на мгновение в верхней точке, затем медленно опустите гантели обратно на высоту плеч. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Жим гантелей сидя"},{"id":"0404","n":"dumbbell seated shoulder press (parallel grip)","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Сядьте на скамью, взяв в каждую руку по гантели ладонями внутрь. Поднимите гантели на высоту плеч, локти согнуты, ладони обращены вперед. Выжмите гантели вверх, пока руки полностью не выпрямятся над головой. Задержитесь на мгновение в верхней точке, затем медленно опустите гантели обратно на высоту плеч. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Жим гантелей сидя параллельным хватом"},{"id":"2188","n":"dumbbell seated triceps extension","bp":"upper arms","eq":"dumbbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на скамью, выпрямив спину и поставив ноги на землю. Возьмите гантель обеими руками и вытяните руки прямо над головой. Согните руки в локтях и опустите гантель за голову, держа плечи близко к ушам. Сделайте паузу на мгновение, затем выпрямите руки и вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Разгибание на трицепс с гантелями сидя"},{"id":"0406","n":"dumbbell shrug","bp":"back","eq":"dumbbell","tg":"traps","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, возьмите в каждую руку по гантели ладонями к телу. Держите руки прямо и позвольте гантелям висеть по бокам. Поднимите плечи как можно выше, как будто пытаетесь коснуться плечами ушей. Удерживайте напряжение в течение секунды, затем медленно опустите плечи обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Шраги с гантелями"},{"id":"0407","n":"dumbbell side bend","bp":"waist","eq":"dumbbell","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Встаньте прямо, ноги на ширине плеч, возьмите в одну руку гантель и позвольте ей свисать сбоку. Удерживая спину прямой и напрягая корпус, медленно согнитесь в талии в сторону противоположной стороны гантели, опуская вес настолько, насколько вам удобно. Сделайте паузу на мгновение, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений, затем поменяйте сторону и повторите.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Наклоны в стороны с гантелью"},{"id":"0408","n":"dumbbell side lying one hand raise","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"trapezius","img":null,"gif":null,"ru":"Лягте на бок, вытянув ноги и подперев голову рукой. Держите гантель в верхней руке ладонью вниз. Держа руку прямой, поднимите гантель до уровня плеч. Задержитесь на мгновение в верхней точке, затем медленно опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём гантели одной рукой лёжа на боку"},{"id":"3664","n":"dumbbell side plank with rear fly","bp":"back","eq":"dumbbell","tg":"upper back","mg":"shoulders","img":null,"gif":null,"ru":"Начните с того, что лягте на бок, вытянув ноги и положив их друг на друга. Положите предплечье на землю прямо под плечом, держа локоть согнутым под углом 90 градусов. Держите гантель в верхней руке, вытянув руку прямо вниз к земле. Напрягите корпус и поднимите бедра от земли, создавая прямую линию от головы до пяток. Сохраняя положение боковой планки, поднимите гантель к потолку, сведя лопатки вместе. Опустите гантель обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Боковая планка с разведением гантели назад"},{"id":"3548","n":"dumbbell single arm overhead carry","bp":"shoulders","eq":"dumbbell","tg":"delts","mg":"traps","img":null,"gif":null,"ru":"Встаньте прямо, ноги на ширине плеч, в одной руке держите гантель. Поднимите гантель над головой, полностью выпрямляя руку. Напрягите корпус и держите спину прямо, когда идете вперед, удерживая гантель над головой. Продолжайте идти желаемое расстояние или время. Поменяйте руки и повторите упражнение.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Ходьба с гантелью над головой одной рукой"},{"id":"0409","n":"dumbbell single leg calf raise","bp":"lower legs","eq":"dumbbell","tg":"calves","mg":"ankles","img":null,"gif":null,"ru":"Встаньте на край ступеньки или платформы, свесив пятки и положив пальцы ног на ступеньку. Возьмите гантель в одну руку, а другую руку положите на стену или перила для поддержки. Поднимите пятку как можно выше, поднимая тело на носки. Задержитесь на мгновение в верхней точке, затем медленно опустите пятку обратно под ступеньку. Повторите желаемое количество повторений, затем переключитесь на другую ногу.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носок одной ноги с гантелью"},{"id":"1757","n":"dumbbell single leg deadlift","bp":"upper legs","eq":"dumbbell","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, в правой руке держите гантель. Перенесите вес тела на левую ногу и слегка поднимите правую ногу от земли. Сохраняя спину прямой, наклонитесь вперед в бедрах и опустите гантель к земле. В то же время вытяните правую ногу прямо позади себя, сохраняя небольшой изгиб в левом колене. Опускайте гантель до тех пор, пока туловище и правая нога не станут параллельны земле. Сделайте паузу на мгновение, затем напрягите ягодицы и мышцы задней поверхности бедра, чтобы вернуться в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Становая тяга с гантелями на одной ноге"},{"id":"2805","n":"dumbbell single leg deadlift with stepbox support","bp":"upper legs","eq":"dumbbell","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, в правой руке держите гантель. Поставьте левую ногу на ступеньку или возвышенную поверхность позади себя. Удерживая спину прямой и напряженным корпус, наклонитесь вперед в бедрах, опуская гантель к земле. Опуская гантель, одновременно поднимите левую ногу позади себя, сохраняя прямую линию от головы до пятки. Опускайте гантель до тех пор, пока не почувствуете растяжение правого задней поверхности бедра, затем вернитесь в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Становая тяга с гантелями на одной ноге с опорой на степ"},{"id":"0410","n":"dumbbell single leg split squat","bp":"upper legs","eq":"dumbbell","tg":"quads","mg":"glutes","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держа в каждой руке по гантели. Сделайте шаг вперед одной ногой и расположите ступни так, чтобы передняя ступня стояла ровно на земле, а задняя нога была приподнята на скамье или ступеньке. Опустите тело, согнув переднее колено и бедро, сохраняя слегка согнутым заднее колено и заднюю пятку над землей. Продолжайте опускаться до тех пор, пока переднее бедро не станет параллельно земле, затем оттолкнитесь передней пяткой, чтобы вернуться в исходное положение. Повторите необходимое количество повторений, затем поменяйте ногу и повторите.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Сплит-присед с гантелями на одной ноге"},{"id":"0411","n":"dumbbell single leg squat","bp":"upper legs","eq":"dumbbell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держа в каждой руке по гантели. Вытяните одну ногу вперед и держите ее над землей на протяжении всего упражнения. Согните стоящую ногу и опустите тело вниз, как будто садитесь на стул. Держите грудь поднятой, а спину прямой. Задержитесь на мгновение в нижней точке, затем оттолкнитесь пяткой, чтобы вернуться в исходное положение. Повторите необходимое количество повторений, затем поменяйте ногу.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Присед с гантелями на одной ноге"},{"id":"0413","n":"dumbbell squat","bp":"upper legs","eq":"dumbbell","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держа по гантели в каждой руке по бокам. Удерживая грудь поднятой и напряженным корпусом, опустите тело вниз, сгибая колени и бедра, как будто садитесь на стул. Продолжайте опускаться до тех пор, пока ваши бедра не станут параллельны земле или настолько низко, насколько вам будет удобно. Задержитесь на мгновение внизу, затем оттолкнитесь пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Приседания с гантелями"},{"id":"3560","n":"dumbbell standing alternate hammer curl and pres
