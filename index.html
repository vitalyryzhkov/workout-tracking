араллельно земле, слегка согнув ее в локте. Медленно верните руку в исходное положение, сохраняя контроль на протяжении всего движения. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Тяга одной рукой в сторону в наклоне на блоке"},{"id":"0192","n":"cable one arm lateral raise","bp":"shoulders","eq":"cable","tg":"delts","mg":"traps","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч, лицом к канатному тренажеру. Держите рукоятку троса одной рукой ладонью вниз и стойте на достаточном расстоянии от машины, чтобы трос был натянут. Держите руку прямо и медленно поднимите ее в сторону, пока она не станет параллельна земле. Задержитесь на мгновение в верхней точке, затем медленно опустите руку обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём одной рукой в сторону на блоке"},{"id":"1633","n":"cable one arm preacher curl","bp":"upper arms","eq":"cable","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Отрегулируйте блочный тренажер так, чтобы подушечка для сгибаний проповедника находилась на уровне груди. Встаньте лицом к канатному тренажеру, поставив ноги на ширине плеч. Возьмите рукоятку троса обратным хватом снизу и прижмите плечо к подушечке для сгибаний проповедника. Держите спину прямо, а корпус напряженным. Медленно поверните рукоятку троса к плечу, прижимая плечо к подушке. Задержитесь на мгновение в верхней точке движения, напрягая бицепсы. Медленно опустите рукоятку троса обратно в исходное положение. Повторите необходимое количество повторений. Поменяйте руки и повторите упражнение.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс одной рукой на скамье Скотта на блоке"},{"id":"1267","n":"cable one arm press on exercise ball","bp":"chest","eq":"cable","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на гимнастический мяч, поставив ноги на землю и выпрямив спину. Возьмите рукоятку троса в одну руку и поместите руку на уровне груди, согнутую в локте. Вторую руку положите на бедро для устойчивости. Нажмите рукоятку троса вперед, полностью вытянув руку. Сделайте паузу на мгновение, затем медленно вернитесь в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим одной рукой на фитболе на блоке"},{"id":"3563","n":"cable one arm pulldown","bp":"back","eq":"cable","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Прикрепите одну ручку к канатной машине с высоким шкивом. Встаньте лицом к тренажеру, поставив ноги на ширине плеч. Возьмитесь за рукоятку верхним хватом и полностью вытяните руку. Держите спину прямо, а корпус напряженным. Потяните ручку вниз в сторону, удерживая локоть близко к телу. Задержитесь на мгновение в нижней части движения, сжимая широчайшие мышцы. Медленно отпустите ручку обратно в исходное положение. Повторите необходимое количество повторений. Поменяйте сторону и повторите упражнение другой рукой.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга одной рукой на верхнем блоке"},{"id":"1635","n":"cable one arm reverse preacher curl","bp":"upper arms","eq":"cable","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Отрегулируйте тросовую машину так, чтобы шкив находился в самом нижнем положении. Встаньте лицом к канатному тренажеру, поставив ноги на ширине плеч. Возьмитесь за рукоятку троса обратным хватом снизу и прижмите плечо к подушке скамьи проповедника. На протяжении всего упражнения держите спину прямой и напряженным корпус. Медленно согните предплечье к бицепсу, удерживая плечо неподвижно на подушечке. Задержитесь на мгновение в верхней точке движения, сжимая бицепс. Медленно опустите рукоятку троса обратно в исходное положение. Повторите необходимое количество повторений. Поменяйте руки и повторите упражнение.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на бицепс одной рукой обратным хватом на скамье Скотта на блоке"},{"id":"0193","n":"cable one arm straight back high row (kneeling)","bp":"back","eq":"cable","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Прикрепите ручку к канатной машине на уровне талии. Встаньте на колени лицом к канатной машине и возьмитесь за ручку одной рукой. Держите спину прямо, а корпус напряженным. Потяните рукоятку к груди, сжимая лопатки вместе. Сделайте паузу на мгновение в верхней точке движения. Медленно отпустите ручку обратно в исходное положение. Повторите необходимое количество повторений. Поменяйте сторону и повторите упражнение другой рукой.","pos":"kneeling","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга одной рукой на верхнем блоке с прямой спиной с колен"},{"id":"1723","n":"cable one arm tricep pushdown","bp":"upper arms","eq":"cable","tg":"triceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте лицом к канатному тренажеру с прямым грифом на уровне груди. Возьмите штангу хватом сверху и отступите назад, чтобы создать натяжение троса. Поставьте ноги на ширине плеч и слегка согните колени. На протяжении всего упражнения держите спину прямой и напряженным корпус. Начните с полностью выпрямленной руки, перпендикулярной полу. Удерживая плечо неподвижно, выдохните и толкните штангу вниз, пока рука полностью не выпрямится. Сделайте паузу на мгновение, затем вдохните и медленно вернитесь в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание одной руки на блоке на трицепс"},{"id":"1636","n":"cable overhead curl","bp":"upper arms","eq":"cable","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Прикрепите прямую штангу к канатной машине с высоким шкивом. Встаньте лицом к тренажеру, поставив ноги на ширине плеч. Возьмитесь за перекладину хватом снизу, руки на ширине плеч. Держите локти близко к бокам, а плечи неподвижно. Выдохните и согните штангу ко лбу, сохраняя плечи неподвижными. Задержитесь на мгновение в нижней части движения, напрягая бицепсы. Вдохните и медленно верните штангу в исходное положение, полностью выпрямляя руки. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание рук на бицепс из-за головы на блоке"},{"id":"1637","n":"cable overhead curl on exercise ball","bp":"upper arms","eq":"cable","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на мяч для упражнений и возьмитесь за рукоятку троса хватом снизу. Вытяните руки полностью над головой, держа локти близко к ушам. Медленно скрутите трос ко лбу, сохраняя плечи неподвижными. Сделайте паузу на мгновение в нижней части движения, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание рук на бицепс из-за головы на блоке на фитболе"},{"id":"0194","n":"cable overhead triceps extension (rope attachment)","bp":"upper arms","eq":"cable","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Прикрепите веревку к канатной машине в высоком положении. Встаньте лицом к тренажеру, поставив ноги на ширине плеч. Возьмите веревку обеими руками, ладонями друг к другу, и поднимите руки над головой. Держите плечи близко к голове, а локти направлены вперед. Медленно опустите веревку за голову, сгибая локти. Сделайте паузу на мгновение, затем вытяните руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Французский жим из-за головы на блоке с канатом"},{"id":"1319","n":"cable palm rotational row","bp":"back","eq":"cable","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Прикрепите ручку к канатной машине на уровне талии. Встаньте лицом к тренажеру, поставив ноги на ширине плеч. Возьмитесь за рукоятку прямым хватом ладонями вниз. Сделайте шаг назад, чтобы создать натяжение троса, сохраняя спину прямой и слегка согнутыми в коленях. Потяните ручку к себе, поворачивая при этом ладони вверх. В конце движения сведите лопатки вместе. Медленно отпустите ручку обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга на блоке с ротацией ладоней"},{"id":"0195","n":"cable preacher curl","bp":"upper arms","eq":"cable","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Отрегулируйте блочный тренажер так, чтобы подушечка для сгибаний проповедника находилась на уровне груди. Сядьте на скамью для сгибаний рук и положите плечи на подушечку, взявшись за блочное крепление обратным хватом снизу. Держите спину прямо, а локти прижатыми к бокам. Медленно согните трос к плечам, сжимая бицепсы в верхней части движения. Сделайте паузу на мгновение, затем медленно опустите крепление троса обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание рук на скамье Скотта на блоке"},{"id":"1268","n":"cable press on exercise ball","bp":"chest","eq":"cable","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на мяч для упражнений, поставьте ступни на землю и составьте колени под углом 90 градусов. Держите рукоятки троса на уровне груди ладонями вниз и согнутыми в локтях. Напрягите корпус и нажмите рукоятки троса вперед, пока руки полностью не выпрямятся. Сделайте паузу на мгновение, затем медленно ослабьте натяжение и верните рукоятки троса в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим на блоке на фитболе"},{"id":"0196","n":"cable pull through (with rope)","bp":"upper legs","eq":"cable","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте лицом от блочного тренажера, поставив ноги на ширине плеч. Возьмите веревку обеими руками и сделайте шаг вперед, создавая натяжение троса. Согнитесь в бедрах и опустите верхнюю часть тела до тех пор, пока она не станет параллельной земле, сохраняя спину прямой. Задействуйте ягодицы и мышцы задней поверхности бедра, чтобы вернуть тело в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Протяжка между ног на блоке с канатом"},{"id":"0198","n":"cable pulldown","bp":"back","eq":"cable","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Отрегулируйте механизм протягивания троса так, чтобы сиденье находилось на удобной высоте, а наколенник был зафиксирован. Сядьте на сиденье, выпрямив спину и поставив ноги на землю. Возьмитесь за перекладину хватом сверху, на расстоянии чуть шире ширины плеч. Слегка откиньтесь назад и задействуйте корпус. Потяните перекладину вниз к груди, сжимая лопатки вместе. Сделайте паузу на мгновение в нижней части движения, затем медленно отпустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга верхнего блока"},{"id":"0197","n":"cable pulldown (pro lat bar)","bp":"back","eq":"cable","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья так, чтобы бедра были параллельны земле, а ступни стояли на полу. Возьмитесь за перекладину хватом сверху, на расстоянии чуть шире ширины плеч. Сядьте и слегка откиньтесь назад, держа грудь вверх и спину прямо. Потяните штангу вниз к груди, сведя лопатки вместе. Сделайте паузу на мгновение в нижней части движения, затем медленно отпустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга верхнего блока с прямым грифом"},{"id":"1638","n":"cable pulldown bicep curl","bp":"upper arms","eq":"cable","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Прикрепите прямую штангу к канатному станку на самом высоком уровне. Встаньте лицом к тренажеру, поставив ноги на ширине плеч. Возьмитесь за перекладину хватом снизу, руки на ширине плеч. Держите локти близко к бокам, а плечи неподвижно. Выдохните и медленно согните штангу к бедрам, сохраняя запястья прямыми. Задержитесь на мгновение в нижней части движения, напрягая бицепсы. Вдохните и медленно верните штангу в исходное положение, полностью выпрямляя руки. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание рук на бицепс на нижнем блоке"},{"id":"0201","n":"cable pushdown","bp":"upper arms","eq":"cable","tg":"triceps","mg":"forearms","img":null,"gif":null,"ru":"Прикрепите прямую штангу к канатной машине с высоким шкивом. Встаньте лицом к тренажеру, ноги на ширине плеч и слегка согните колени. Возьмите штангу хватом сверху, руки на ширине плеч. Держите локти близко к бокам, а плечи неподвижно. Выдохните и опустите штангу вниз, пока локти полностью не выпрямятся. Сделайте паузу на мгновение, затем вдохните и медленно верните штангу в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание на блоке на трицепс"},{"id":"0199","n":"cable pushdown (straight arm) v. 2","bp":"back","eq":"cable","tg":"lats","mg":"triceps","img":null,"gif":null,"ru":"Прикрепите прямую штангу к канатной машине с высоким шкивом. Встаньте лицом к тренажеру, ноги на ширине плеч и слегка согните колени. Возьмите перекладину хватом сверху, держа руки прямыми и ладонями вниз. Напрягите корпус и держите спину прямо, на выдохе толкайте штангу вниз к бедрам. Задержитесь на мгновение в нижней точке, затем медленно верните штангу в исходное положение на вдохе. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание прямыми руками на блоке версия 2"},{"id":"0200","n":"cable pushdown (with rope attachment)","bp":"upper arms","eq":"cable","tg":"triceps","mg":"forearms","img":null,"gif":null,"ru":"Прикрепите веревку к высокому блоку канатной машины. Встаньте лицом к тренажеру, ноги на ширине плеч и слегка согните колени. Возьмите веревку хватом сверху, ладони обращены друг к другу. На протяжении всего упражнения держите локти близко к бокам, а плечи неподвижными. Выдохните и толкните веревку вниз, разгибая локти до тех пор, пока руки полностью не выпрямятся. Сделайте паузу на мгновение, затем вдохните и медленно вернитесь в исходное положение, сгибая локти. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание на блоке на трицепс с канатом"},{"id":"0202","n":"cable rear delt row (stirrups)","bp":"shoulders","eq":"cable","tg":"delts","mg":"trapezius","img":null,"gif":null,"ru":"Прикрепите ручку стремени к низкому шкиву троса и встаньте лицом к машине. Возьмитесь за рукоятку левой рукой и сделайте шаг назад правой ногой, расположив тело под небольшим углом. Слегка согните колени и наклонитесь вперед в бедрах, сохраняя спину прямой и напряженный корпус. Вытянув левую руку ладонью вниз, потяните рукоятку к груди, втягивая лопатку. Задержитесь на мгновение в верхней точке движения, сжимая лопатку. Медленно отпустите ручку обратно в исходное положение и повторите необходимое количество повторений. Поменяйте сторону и повторите упражнение правой рукой.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга на задние дельты на блоке с рукоятками"},{"id":"0203","n":"cable rear delt row (with rope)","bp":"shoulders","eq":"cable","tg":"delts","mg":"trapezius","img":null,"gif":null,"ru":"Прикрепите веревочную ручку к канатной машине с низким шкивом. Встаньте лицом к тренажеру, поставив ноги на ширине плеч. Возьмитесь за ручку веревки верхним хватом, ладони обращены друг к другу. Слегка согните колени и наклонитесь вперед в бедрах, сохраняя спину прямой. Держите локти слегка согнутыми и тяните веревку к груди, сжимая лопатки вместе. Сделайте паузу на мгновение в верхней точке движения, затем медленно ослабьте напряжение и вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга на задние дельты на блоке с канатом"},{"id":"0204","n":"cable rear drive","bp":"upper arms","eq":"cable","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Прикрепите ручку к машине с тросом с низким шкивом и встаньте лицом в сторону от машины. Возьмитесь за рукоятку верхним хватом и вытяните руки прямо перед собой. Удерживая локти неподвижными, потяните рукоятку назад к телу, сжимая трицепсы в конце движения. Медленно верните рукоятку в исходное положение и повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отведение рук назад на блоке"},{"id":"0205","n":"cable rear pulldown","bp":"back","eq":"cable","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Отрегулируйте тросовую машину так, чтобы шкив находился в самом высоком положении. Сядьте лицом к машине, поставьте ступни на землю и слегка согните колени. Возьмитесь за блочное крепление верхним хватом, расставив руки чуть шире плеч. Слегка откиньтесь назад, держа спину прямо и грудь вверх. Потяните крепление троса вниз к груди, сжимая лопатки вместе. Сделайте паузу на мгновение в нижней части движения, затем медленно отпустите трос обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга верхнего блока за голову"},{"id":"0873","n":"cable reverse crunch","bp":"waist","eq":"cable","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Прикрепите трос к низкому блоку и лягте на коврик лицом вверх. Возьмите трос обеими руками и вытяните руки прямо вверх к потолку. Согните колени и поднимите ноги вверх, приближая бедра к груди. Сохраняя устойчивость верхней части тела, поднимите таз к груди, отрывая бедра от коврика. Задержитесь на мгновение в верхней точке, затем медленно опустите бедра обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратные скручивания на блоке"},{"id":"0206","n":"cable reverse curl","bp":"upper arms","eq":"cable","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Прикрепите прямую штангу к канатной машине с низким шкивом. Встаньте лицом к тренажеру, ноги на ширине плеч и слегка согнуты в коленях. Возьмитесь за перекладину хватом снизу, руки на ширине плеч. На протяжении всего упражнения держите локти близко к бокам, а плечи неподвижными. Выдохните и поднимите штангу к плечам, напрягая бицепсы. Задержитесь на мгновение в верхней точке, напрягая бицепсы. Вдохните и медленно опустите штангу обратно в исходное положение, полностью выпрямляя руки. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание рук обратным хватом на блоке"},{"id":"2406","n":"cable reverse grip triceps pushdown (sz-bar) (with arm blaster)","bp":"upper arms","eq":"cable","tg":"triceps","mg":"forearms","img":null,"gif":null,"ru":"Прикрепите прямую штангу к канатному станку на самом высоком уровне. Встаньте лицом к канатному тренажеру, поставив ноги на ширине плеч. Возьмите перекладину хватом снизу, ладони вверх, руки на ширине плеч. На протяжении всего упражнения держите локти близко к бокам, а плечи неподвижными. Задействуйте трицепсы и медленно толкайте штангу вниз, пока руки полностью не выпрямятся. Задержитесь на мгновение в нижней точке, затем медленно верните штангу в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание обратным хватом на блоке на трицепс с SZ-грифом и фиксатором локтей"},{"id":"1413","n":"cable reverse one arm curl","bp":"upper arms","eq":"cable","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте лицом к канатному тренажеру, поставив ноги на ширине плеч. Возьмитесь за рукоятку троса снизу ладонью вниз. Держите локоть близко к боку и медленно согните предплечье к плечу. Задержитесь на мгновение в верхней точке, затем медленно опустите предплечье обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание одной руки обратным хватом на блоке"},{"id":"0209","n":"cable reverse preacher curl","bp":"upper arms","eq":"cable","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Отрегулируйте блочный тренажер так, чтобы подушечка для сгибаний проповедника находилась на уровне груди. Сядьте на скамью для сгибаний рук и положите плечи на подушечку ладонями вниз и полностью выпрямите локти. Возьмитесь за рукоятки троса обратным хватом на ширине плеч. Удерживая плечи неподвижно, выдохните и согните рукоятки к плечам, напрягая бицепсы. Задержитесь на мгновение в верхней точке движения, напрягая бицепсы. Вдохните и медленно опустите ручки обратно в исходное положение, полностью разгибая локти. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание рук обратным хватом на скамье Скотта на блоке"},{"id":"0210","n":"cable reverse wrist curl","bp":"lower arms","eq":"cable","tg":"forearms","mg":"forearms","img":null,"gif":null,"ru":"Прикрепите трос к низкому шкиву и сядьте на скамью лицом к канатной машине. Возьмитесь за рукоятку троса сверху, ладонями вниз. Положите предплечья на бедра так, чтобы запястья свисали с краев. Удерживая предплечья неподвижно, выдохните и согните запястья вверх как можно дальше. Задержитесь на мгновение в верхней точке, затем вдохните и медленно опустите запястья обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание запястий обратным хватом на блоке"},{"id":"0207","n":"cable reverse-grip pushdown","bp":"upper arms","eq":"cable","tg":"triceps","mg":"forearms","img":null,"gif":null,"ru":"Прикрепите прямую штангу к канатной машине с высоким шкивом. Встаньте лицом к тренажеру, поставив ноги на ширине плеч. Возьмите перекладину хватом снизу, ладони вверх, руки на ширине плеч. На протяжении всего упражнения держите локти близко к бокам, а плечи неподвижными. Используя трицепсы, толкайте штангу вниз до тех пор, пока руки полностью не выпрямятся, а трицепсы не сократятся. Сделайте паузу на мгновение, затем медленно верните штангу в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание обратным хватом на блоке"},{"id":"0208","n":"cable reverse-grip straight back seated high row","bp":"back","eq":"cable","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на сиденье лицом к блочному тренажеру, поставив ноги на пол. Возьмитесь за блочное крепление обратным хватом, ладонями вверх, руки на ширине плеч. Держите спину прямо и слегка наклонитесь вперед от бедер. Потяните трос к туловищу, сводя лопатки и напрягая мышцы спины. Сделайте паузу на мгновение на пике сокращения, затем медленно отпустите трос обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга высокого блока сидя обратным хватом с прямой спиной"},{"id":"1320","n":"cable rope crossover seated row","bp":"back","eq":"cable","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на гребной тренажер, поставьте ноги на подножки и слегка согните колени. Возьмитесь за канаты верхним хватом, ладони обращены друг к другу. Слегка откиньтесь назад, сохраняя спину прямой и напряженный корпус. Потяните тросы к груди, сжимая лопатки вместе. Задержитесь на мгновение на пике движения, затем медленно ослабьте напряжение и вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга на блоке сидя с канатом крест-накрест"},{"id":"1321","n":"cable rope elevated seated row","bp":"back","eq":"cable","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на возвышение лицом к канатной машине. Возьмитесь за рукоятки каната верхним хватом, ладони обращены друг к другу. Держите спину прямо и слегка откиньтесь назад, сохраняя небольшой изгиб в коленях. Потяните трос к себе, сводя лопатки и напрягая мышцы спины. Сделайте паузу на мгновение в полностью сокращенном положении. Медленно ослабьте напряжение и вытяните руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга на блоке сидя с канатом на возвышении"},{"id":"1322","n":"cable rope extension incline bench row","bp":"back","eq":"cable","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Установите наклонную скамью под углом 45 градусов и прикрепите тросовую машину к нижнему шкиву. Прикрепите веревочную ручку к канатному тренажеру и сядьте на наклонную скамью лицом к тренажеру. Возьмитесь за рукоятку веревки верхним хватом и наклонитесь вперед, держа спину прямо. Полностью выпрямите руки, потянув веревку к верхней части груди, сохраняя при этом локти близко к телу. В конце движения сведите лопатки вместе. Медленно ослабьте напряжение и вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга на блоке с канатом на наклонной скамье"},{"id":"1639","n":"cable rope hammer preacher curl","bp":"upper arms","eq":"cable","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Прикрепите веревку к канатной машине с низким шкивом. Встаньте лицом к тренажеру, поставив ноги на ширине плеч. Возьмите веревку нейтральным хватом (ладони обращены друг к другу). Положите плечи на подставку для скамьи проповедника, слегка согнув локти. Удерживая плечи неподвижно, выдохните и согните скакалку к плечам, напрягая бицепсы. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно опустите веревку обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Молотковое сгибание рук на скамье Скотта на блоке с канатом"},{"id":"1724","n":"cable rope high pulley overhead tricep extension","bp":"upper arms","eq":"cable","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Прикрепите веревку к высокому блоку и соответствующим образом отрегулируйте вес. Встаньте лицом от шкива, поставив ноги на ширине плеч. Возьмите веревку обеими руками ладонями вниз и поднимите руки над головой. Держите плечи близко к голове и перпендикулярно полу. Медленно опустите веревку за голову, сгибая локти. Сделайте паузу на мгновение, затем вытяните руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Французский жим из-за головы на верхнем блоке с канатом"},{"id":"1725","n":"cable rope incline tricep extension","bp":"upper arms","eq":"cable","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Прикрепите веревку к высокому блоку и отрегулируйте наклон скамьи под удобным углом. Встаньте лицом от шкива, поставив ноги на ширине плеч. Возьмите веревку хватом сверху и вытяните руки прямо над головой. На протяжении всего упражнения держите локти близко к голове, а плечи неподвижно. Опустите скакалку за голову, сгибая локти, пока предплечья не коснутся бицепсов. Сделайте паузу на мгновение, затем вытяните руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Разгибание на трицепс на блоке с канатом на наклонной скамье"},{"id":"1726","n":"cable rope lying on floor tricep extension","bp":"upper arms","eq":"cable","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Прикрепите веревку к канатной машине и установите ее в самое нижнее положение. Лягте на пол лицом вверх, головой в сторону канатной машины. Возьмите веревку обеими руками, ладонями друг к другу, и вытяните руки прямо вверх к потолку. Держите плечи неподвижно и медленно опустите веревку ко лбу, сгибая локти. Сделайте паузу на мгновение, затем вытяните руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание на трицепс на блоке с канатом лёжа на полу"},{"id":"1640","n":"cable rope one arm hammer preacher curl","bp":"upper arms","eq":"cable","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Прикрепите веревочную ручку к канатной машине с низким шкивом. Встаньте лицом к тренажеру, поставив ноги на ширине плеч. Возьмитесь за рукоятку веревки обратным хватом ладонями вверх. Положите плечо на подушку скамьи проповедника, слегка согнув локоть. На протяжении всего упражнения держите спину прямой и напряженным корпус. Медленно согните рукоятку веревки к плечу, сохраняя плечо неподвижным. Напрягите бицепсы в верхней точке движения, затем медленно опустите рукоятку веревки обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Молотковое сгибание одной руки на скамье Скотта на блоке с канатом"},{"id":"1323","n":"cable rope seated row","bp":"back","eq":"cable","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на гребной тренажер, поставьте ноги на подножки и слегка согните колени. Возьмитесь за канаты верхним хватом, ладони обращены друг к другу. Держите спину прямо и слегка наклонитесь вперед, сохраняя небольшой изгиб в локтях. Потяните тросы к себе, сжимая лопатки вместе. Задержитесь на мгновение на пике движения, затем медленно ослабьте напряжение и вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга на блоке сидя с канатом"},{"id":"0211","n":"cable russian twists (on stability ball)","bp":"waist","eq":"cable","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Сядьте на мяч, поставив ступни на землю и согнув колени под углом 90 градусов. Возьмите рукоятку троса обеими руками и вытяните руки прямо перед собой. Слегка откиньтесь назад, сохраняя спину прямой и напряженный корпус. Поверните туловище вправо, поднеся рукоятку троса к правому бедру. Сделайте паузу на мгновение, затем поверните туловище влево, приближая рукоятку троса к левому бедру. Продолжайте чередовать скручивания желаемое количество повторений.","pos":"seated","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Русские скручивания на блоке на фитболе"},{"id":"2144","n":"cable seated chest press","bp":"chest","eq":"cable","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и ручки троса в удобное положение. Сядьте на скамью, выпрямив спину и поставив ступни на пол. Возьмитесь за рукоятки троса верхним хватом на уровне плеч. Толкайте рукоятки вперед и в сторону от тела, полностью выпрямляя руки. Сделайте паузу на мгновение, затем медленно верните ручки в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим от груди на блоке сидя"},{"id":"0212","n":"cable seated crunch","bp":"waist","eq":"cable","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Сядьте на канатный тренажер, поставив ноги на землю и согнув колени. Возьмите рукоятку троса обеими руками и поместите ее за голову. Напрягите пресс и медленно наклоните верхнюю часть тела вперед, приближая грудь к коленям. Задержитесь на мгновение в верхней точке, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Скручивания на блоке сидя"},{"id":"1641","n":"cable seated curl","bp":"upper arms","eq":"cable","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на канатный тренажер, поставив ноги на землю и выпрямив спину. Возьмитесь за блочное крепление обратным хватом, ладонями вверх и полностью выпрямленными руками. Удерживая плечи неподвижно, выдохните и согните трос к плечам, сокращая бицепсы. Задержитесь на мгновение в верхней точке движения, напрягая бицепсы. Вдохните и медленно опустите трос обратно в исходное положение, полностью выпрямив руки. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание рук на бицепс на блоке сидя"},{"id":"0213","n":"cable seated high row (v-bar)","bp":"back","eq":"cable","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на канатный тренажер, поставьте ступни на пол и слегка согните колени. Возьмитесь за насадку V-образной перекладины хватом сверху, ладони обращены друг к другу, руки на ширине плеч. Держите спину прямо и слегка наклонитесь вперед от бедер. Потяните V-образную планку к туловищу, сводя лопатки и напрягая мышцы спины. Сделайте паузу на мгновение на пике сокращения, затем медленно ослабьте напряжение и вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга высокого блока сидя с V-рукояткой"},{"id":"0214","n":"cable seated one arm alternate row","bp":"back","eq":"cable","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на скамью лицом к канатной машине, поставьте ступни на землю и слегка согните колени. Возьмитесь за рукоятку одной рукой и держите руку полностью вытянутой перед собой. Потяните рукоятку к себе, втягивая лопатку и держа локоть близко к боку. Задержитесь на мгновение в верхней точке движения, напрягая мышцы спины. Медленно отпустите ручку обратно в исходное положение. Повторите с другой рукой. Чередуйте руки, выполняя желаемое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Попеременная тяга одной рукой на блоке сидя"},{"id":"1642","n":"cable seated one arm concentration curl","bp":"upper arms","eq":"cable","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на скамью, поставив ноги на пол и выпрямив спину. Возьмите рукоятку троса одной рукой и поместите локоть на внутреннюю часть бедра, чуть выше колена. Держите плечо неподвижно и на выдохе согните рукоятку троса к плечу. Задержитесь на мгновение в верхней точке движения, напрягая бицепсы. Медленно опустите рукоятку троса обратно в исходное положение, одновременно вдыхая. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Концентрированное сгибание одной руки на блоке сидя"},{"id":"1643","n":"cable seated overhead curl","bp":"upper arms","eq":"cable","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на скамью лицом к канатной машине, поставив ноги на землю. Возьмитесь за блочное крепление обратным хватом, ладонями вверх, руки на ширине плеч. Держите плечи неподвижно, а локти близко к бокам. Выдохните и согните трос к плечам, напрягая бицепсы. Задержитесь на мгновение в верхней точке движения, напрягая бицепсы. Вдохните и медленно опустите трос обратно в исходное положение, полностью выпрямив руки. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание рук из-за головы на блоке сидя"},{"id":"0215","n":"cable seated rear lateral raise","bp":"shoulders","eq":"cable","tg":"delts","mg":"traps","img":null,"gif":null,"ru":"Сядьте на скамью лицом к канатной машине, поставив ноги на землю. Возьмитесь за рукоятки троса верхним хватом и вытяните руки прямо перед собой. Держа руки прямыми, медленно поднимите их в стороны, пока они не станут параллельны полу. Задержитесь на мгновение в верхней точке, затем медленно опустите руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разведение рук в стороны на задние дельты на блоке сидя"},{"id":"0861","n":"cable seated row","bp":"back","eq":"cable","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на тренажер для тяги тросов, поставьте ноги на подножки и слегка согните колени. Возьмитесь за рукоятки верхним хватом, сохраняя спину прямой, а плечи расслабленными. Потяните ручки к телу, сведя лопатки вместе. Задержитесь на мгновение на пике движения, затем медленно отпустите ручки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга на блоке сидя"},{"id":"0216","n":"cable seated shoulder internal rotation","bp":"shoulders","eq":"cable","tg":"delts","mg":"rotator cuff","img":null,"gif":null,"ru":"Сядьте на скамью или стул лицом к канатной машине, поставив ноги на землю. Держите рукоятку троса, вытянув руку прямо перед собой, параллельно земле. Держите локоть слегка согнутым, а лопатки отведенными назад и вниз. Медленно поверните руку внутрь, приближая рукоятку троса к центру тела. В конце движения сделайте паузу на мгновение, затем медленно вернитесь в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Внутренняя ротация плеча на блоке сидя"},{"id":"2399","n":"cable seated twist","bp":"waist","eq":"cable","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Сядьте на канатный тренажер, поставьте ступни на землю и слегка согните колени. Возьмите рукоятку троса обеими руками и вытяните руки прямо перед собой. Удерживая корпус в напряжении, медленно поверните туловище в сторону, протягивая трос через тело. Сделайте паузу на мгновение в конце диапазона движения, затем медленно поверните обратно в исходное положение. Повторите с другой стороны. Продолжайте чередовать стороны желаемое количество повторений.","pos":"seated","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Скручивания на блоке сидя"},{"id":"0218","n":"cable seated wide-grip row","bp":"back","eq":"cable","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на тренажер для тяги тросов, поставьте ноги на подножки и слегка согните колени. Возьмитесь за рукоятку широким хватом сверху ладонями вниз. Держите спину прямо и слегка наклонитесь вперед от бедер. Потяните ручку к нижней части груди, сжимая лопатки вместе. Сделайте паузу на момент пика сокращения. Медленно отпустите рукоятку обратно в исходное положение, полностью выпрямив руки. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга широким хватом на блоке сидя"},{"id":"0219","n":"cable shoulder press","bp":"shoulders","eq":"cable","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Отрегулируйте канатную машину так, чтобы ручки находились на высоте плеч. Встаньте лицом к тренажеру, поставив ноги на ширине плеч. Возьмитесь за рукоятки хватом сверху и поднимите их до уровня плеч, согнув локти и направив их наружу. Нажимайте рукоятки вверх, пока руки полностью не выпрямятся над головой. Задержитесь на мгновение в верхней точке, затем медленно опустите ручки обратно до уровня плеч. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"med","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Жим на плечи на блоке"},{"id":"0220","n":"cable shrug","bp":"back","eq":"cable","tg":"traps","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте лицом к канатному тренажеру, поставив ноги на ширине плеч. Возьмитесь за рукоятки троса верхним хватом и опустите руки перед собой. Держа руки прямыми, поднимите плечи к ушам. Удерживайте напряжение на мгновение, затем медленно опустите плечи обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Шраги на блоке"},{"id":"0222","n":"cable side bend","bp":"waist","eq":"cable","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, и возьмитесь за рукоятку троса одной рукой. Держите спину прямо, а корпус напряженным. Медленно наклонитесь в сторону в талии, опуская рукоятку троса к колену. Сделайте паузу на мгновение, затем вернитесь в исходное положение. Повторите с другой стороны. Чередуйте стороны желаемое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Наклоны в сторону на блоке"},{"id":"0221","n":"cable side bend crunch (bosu ball)","bp":"waist","eq":"cable","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, в одной руке возьмитесь за рукоятку троса. Вторую руку положите на бедро. Напрягите корпус и медленно наклонитесь в сторону руки, держащей трос, сохраняя спину прямой. Сделайте паузу на мгновение в нижней части движения, затем медленно вернитесь в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Боковые скручивания на блоке на полусфере босу"},{"id":"0223","n":"cable side crunch","bp":"waist","eq":"cable","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Прикрепите тросовую рукоятку к низкому шкиву и встаньте боком к машине. Возьмитесь за рукоятку рукой, которая находится дальше всего от тренажера, а другую руку положите на бедро. Держите ноги на ширине плеч, а колени слегка согнуты. Задействовав пресс, согнитесь в талии в сторону, опустив локоть к бедру. Задержитесь на мгновение внизу, затем медленно вернитесь в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Боковые скручивания на блоке"},{"id":"1717","n":"cable squat row (with rope attachment)","bp":"back","eq":"cable","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Прикрепите веревку к канатному тренажеру на уровне талии. Встаньте лицом к канатному тренажеру, поставив ноги на ширине плеч. Согните ноги в коленях и опустите тело в положение приседа, держа спину прямо и грудь вверх. Возьмите веревку хватом сверху, руки на ширине плеч. Напрягите корпус и потяните веревку к себе, сжимая лопатки вместе. Держите локти близко к телу и продолжайте тянуть, пока руки не достигнут груди. Сделайте паузу на мгновение в верхней точке движения, затем медленно отпустите веревку и вытяните руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Тяга на блоке в приседе с канатом"},{"id":"1644","n":"cable squatting curl","bp":"upper arms","eq":"cable","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Прикрепите тросовую рукоятку к самой низкой позиции на тросовой машине. Встаньте лицом к тренажеру, поставив ноги на ширине плеч. Держите рукоятку троса обратным хватом ладонями вверх и полностью выпрямленными руками. Опустите тело в присед, сохраняя спину прямой и колени за носками ног. Приседая, согните рукоятку троса к плечам, держа локти близко к бокам. Задержитесь на мгновение в верхней части сгибания, сжимая бицепсы. Медленно опустите рукоятку троса обратно в исходное положение, полностью выпрямив руки. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Сгибание рук на бицепс на блоке в приседе"},{"id":"0224","n":"cable standing back wrist curl","bp":"lower arms","eq":"cable","tg":"forearms","mg":"biceps","img":null,"gif":null,"ru":"Встаньте лицом к канатному тренажеру, поставив ноги на ширине плеч. Возьмите рукоятку троса верхним хватом ладонями вниз. Держите руки прямо, локти близко к бокам. Медленно согните запястья вверх, приближая рукоятку троса к телу. Задержитесь на мгновение в верхней точке, затем медленно опустите рукоятку троса обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание запястий за спиной на блоке стоя"},{"id":"1375","n":"cable standing calf raise","bp":"lower legs","eq":"cable","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте лицом к канатному тренажеру, поставив ноги на ширине плеч. Держитесь за ручки канатного тренажера или прикрепите к лодыжкам ремешок с тросом. Поднимите пятки от земли, вытянув лодыжки как можно выше. Задержитесь на мгновение в верхней точке, затем медленно опустите пятки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носки стоя на блоке"},{"id":"0225","n":"cable standing cross-over high reverse fly","bp":"shoulders","eq":"cable","tg":"delts","mg":"trapezius","img":null,"gif":null,"ru":"Прикрепите D-образную рукоятку к каждой стороне канатной машины на высоте плеч. Встаньте посередине канатной машины, поставив ноги на ширине плеч. Возьмитесь за рукоятки хватом сверху и вытяните руки в стороны ладонями вперед. Сохраняйте небольшой изгиб в локтях и сохраняйте прямую спину на протяжении всего упражнения. Напрягите мышцы плеч и сведите лопатки вместе, потянув рукоятки к передней части тела. Задержитесь на мгновение на пике движения, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратное разведение рук вверх на блоке стоя в кроссовере"},{"id":"0226","n":"cable standing crunch","bp":"waist","eq":"cable","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Прикрепите тросовую рукоятку к высокому шкиву и встаньте лицом от машины. Возьмите рукоятку обеими руками и поместите ее за голову, держа локти согнутыми. Встаньте, поставив ноги на ширине плеч и слегка согнув колени. Удерживая пресс в напряжении, выдохните и опустите туловище к коленям, подтягивая локти к бедрам. Сделайте паузу на мгновение в нижней части движения, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Скручивания на блоке стоя"},{"id":"0874","n":"cable standing crunch (with rope attachment)","bp":"waist","eq":"cable","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Прикрепите веревку к канатному тренажеру на уровне груди. Встаньте лицом к тренажеру, поставив ноги на ширине плеч. Возьмите веревку обеими руками и заведите ее за голову, держа локти согнутыми. Напрягите пресс и медленно наклоните туловище вперед, приближая локти к коленям. Сделайте паузу на мгновение в верхней точке скручивания, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Скручивания на блоке стоя с канатом"},{"id":"0227","n":"cable standing fly","bp":"chest","eq":"cable","tg":"pectorals","mg":"deltoids","img":null,"gif":null,"ru":"Прикрепите ручки к тросам на уровне груди. Встаньте, поставив ноги на ширине плеч, лицом в сторону от блочного тренажера. Возьмитесь за рукоятки хватом сверху, ладонями вперед. Слегка шагните вперед, чтобы создать натяжение тросов. На протяжении всего упражнения держите корпус напряженным, а спину прямой. Слегка согнув локти, медленно сведите руки вперед и вместе перед грудью. Напрягите мышцы груди на пике движения. Медленно выполните обратное движение, возвращая руки в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сведение рук на блоке стоя"},{"id":"0228","n":"cable standing hip extension","bp":"upper legs","eq":"cable","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Прикрепите трос к нижнему шкиву и встаньте лицом от машины. Оберните трос вокруг лодыжки и встаньте, поставив ноги на ширине плеч. На протяжении всего упражнения держите корпус напряженным, а спину прямой. Медленно вытяните ногу прямо назад, сжимая ягодицы в верхней части движения. Сделайте паузу на мгновение, затем вернитесь в исходное положение. Повторите необходимое количество повторений. Поменяйте сторону и повторите с другой ногой.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отведение бедра назад на блоке стоя"},{"id":"0229","n":"cable standing inner curl","bp":"upper arms","eq":"cable","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте лицом к канатному тренажеру, поставив ноги на ширине плеч. Возьмитесь за рукоятку троса обратным хватом ладонями вверх. Держите локти близко к бокам, а плечи неподвижно. Выдохните и согните рукоятку троса к плечам, напрягая бицепсы. Задержитесь на мгновение в верхней точке движения, напрягая бицепсы. Вдохните и медленно опустите рукоятку троса обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание рук внутренним хватом на блоке стоя"},{"id":"0230","n":"cable standing lift","bp":"waist","eq":"cable","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Встаньте лицом к канатному тренажеру, поставив ноги на ширине плеч. Возьмите рукоятку троса обеими руками и расположите ее на уровне талии. Задействуйте корпус и сохраняйте прямую спину на протяжении всего упражнения. Удерживая руки прямыми, выдохните и поднимите рукоятку троса вверх к противоположному плечу, вращая туловище. Задержитесь на мгновение в верхней точке, затем вдохните и медленно опустите рукоятку троса обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на блоке стоя"},{"id":"0231","n":"cable standing one arm triceps extension","bp":"upper arms","eq":"cable","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч, лицом к канатному тренажеру. Возьмите рукоятку троса правой рукой ладонью вниз и расположите руку так, чтобы она была полностью выпрямлена и параллельна земле. Держите локоть неподвижно и близко к телу. Медленно согните локоть, опуская рукоятку троса к затылку. Сделайте паузу на мгновение в нижней части движения, затем вытяните руку обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону и выполните упражнение левой рукой.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание одной руки на трицепс на блоке стоя"},{"id":"1376","n":"cable standing one leg calf raise","bp":"lower legs","eq":"cable","tg":"calves","mg":"ankles","img":null,"gif":null,"ru":"Встаньте лицом к канатному тренажеру, поставив ноги на ширине плеч. Держитесь за тросовую машину для поддержки. Поднимите одну ногу от земли и балансируйте на другой ноге. Медленно поднимите пятку от земли, поднимая тело на носки. Задержитесь на мгновение в верхней точке, затем медленно опустите пятку обратно в исходное положение. Повторите необходимое количество повторений, затем поменяйте ногу.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носок одной ноги стоя на блоке"},{"id":"0232","n":"cable standing pulldown (with rope)","bp":"upper arms","eq":"cable","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Прикрепите веревку к канатному станку на самом высоком уровне. Встаньте лицом к тренажеру, поставив ноги на ширине плеч. Возьмите веревку прямым хватом ладонями вниз. На протяжении всего упражнения держите спину прямой и напряженным корпус. Потяните веревку вниз к бедрам, сжимая бицепсы. Задержитесь на мгновение внизу, затем медленно отпустите веревку обратно вверх. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга на блоке стоя с канатом"},{"id":"0233","n":"cable standing rear delt row (with rope)","bp":"shoulders","eq":"cable","tg":"delts","mg":"trapezius","img":null,"gif":null,"ru":"Встаньте лицом к канатному тренажеру, поставив ноги на ширине плеч. Удерживая трос обеими руками, ладонями друг к другу, отступите назад, чтобы создать натяжение троса. Держите спину прямо, а корпус напряженным. Потяните трос к себе, сжимая лопатки вместе. Сделайте паузу на мгновение на пике движения, затем медленно отпустите трос обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга на задние дельты на блоке стоя с канатом"},{"id":"1727","n":"cable standing reverse grip one arm overhead tricep extension","bp":"upper arms","eq":"cable","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте лицом от блочного тренажера, поставив ноги на ширине плеч. Возьмите рукоятку троса хватом снизу и вытяните руку над головой, держа локоть близко к голове. Держите плечо неподвижно и медленно опустите рукоятку троса за голову, сгибая локоть. Задержитесь на мгновение в нижней точке, затем вытяните руку обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Французский жим одной рукой из-за головы обратным хватом на блоке стоя"},{"id":"0234","n":"cable standing row (v-bar)","bp":"back","eq":"cable","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Встаньте лицом к канатному тренажеру, поставив ноги на ширине плеч. Возьмитесь за насадку V-образной рукоятки сверху, ладонями вниз. Держите спину прямо, а корпус напряженным. Потяните V-образную штангу к себе, сжимая лопатки вместе. Задержитесь на мгновение на пике движения, затем медленно ослабьте напряжение и вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга на блоке стоя с V-рукояткой"},{"id":"0235","n":"cable standing shoulder external rotation","bp":"shoulders","eq":"cable","tg":"delts","mg":"rotator cuff","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч и слегка согнув колени. Держите рукоятку троса, вытянув руку перед собой параллельно земле. Держите локоть слегка согнутым, а лопатки отведенными назад. Медленно поверните руку наружу, от тела, сохраняя локоть в том же положении. В конце движения сделайте паузу на мгновение, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Внешняя ротация плеча на блоке стоя"},{"id":"0236","n":"cable standing twist row (v-bar)","bp":"back","eq":"cable","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Прикрепите V-образную перекладину к канатному тренажеру на уровне груди. Встаньте лицом к канатному тренажеру, поставив ноги на ширине плеч. Возьмите V-образную перекладину хватом сверху, ладонями вниз. Сделайте шаг назад, чтобы создать натяжение троса. На протяжении всего упражнения держите спину прямой и напряженным корпус. Потяните V-образную перекладину к туловищу, сводя лопатки и сгибая локти. Во время тяги поверните туловище в сторону, сжимая лопатки вместе. Сделайте паузу на мгновение в верхней точке движения, почувствовав напряжение в верхней части спины. Медленно ослабьте напряжение и вернитесь в исходное положение, раскручивая туловище. Повторите движение желаемое количество повторений, чередуя направление скручивания при каждом повторении.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга с поворотом на блоке стоя с V-рукояткой"},{"id":"1269","n":"cable standing up straight crossovers","bp":"chest","eq":"cable","tg":"pectorals","mg":"deltoids","img":null,"gif":null,"ru":"Встаньте в центр канатной машины, поставив ноги на ширине плеч. Держите ручки тросов ладонями вниз и вытяните руки в стороны. Держа руки прямыми, сведите ладони перед собой, скрестив их друг с другом. Сделайте паузу на мгновение, затем медленно вернитесь в исходное положение, держа руки вытянутыми. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сведение рук в кроссовере стоя прямо"},{"id":"0238","n":"cable straight arm pulldown","bp":"back","eq":"cable","tg":"lats","mg":"shoulders","img":null,"gif":null,"ru":"Прикрепите прямую штангу к высокому шкиву канатной машины. Встаньте лицом к тренажеру, поставив ноги на ширине плеч. Возьмите перекладину хватом сверху, держа руки прямыми и ладонями вниз. Напрягите широчайшие и потяните штангу вниз к бедрам, сохраняя руки прямыми на протяжении всего движения. Задержитесь на мгновение в нижней точке, затем медленно верните штангу в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга прямыми руками на верхнем блоке"},{"id":"0237","n":"cable straight arm pulldown (with rope)","bp":"back","eq":"cable","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Прикрепите веревку к канатному станку на самом высоком уровне. Встаньте лицом к тренажеру, поставив ноги на ширине плеч. Возьмите веревку обеими руками ладонями вниз. Вытяните руки полностью перед собой, держа локти слегка согнутыми. Напрягите широчайшие и медленно потяните веревку вниз к бедрам, держа руки прямыми. Задержитесь на мгновение в нижней точке, затем медленно ослабьте напряжение и вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга прямыми руками на блоке с канатом"},{"id":"0239","n":"cable straight back seated row","bp":"back","eq":"cable","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Сядьте на тренажер для тяги тросов, поставьте ноги на подножки и слегка согните колени. Возьмитесь за рукоятки троса верхним хватом ладонями вниз. Держите спину прямо и слегка наклонитесь вперед от бедер. Потяните рукоятки троса к себе, сжимая лопатки вместе. Задержитесь на мгновение на пике движения, затем медленно отпустите ручки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга на блоке сидя с прямой спиной"},{"id":"0240","n":"cable supine reverse fly","bp":"shoulders","eq":"cable","tg":"delts","mg":"trapezius","img":null,"gif":null,"ru":"Прикрепите D-образную рукоятку к тренажеру с низким шкивом и лягте лицом вниз на ровную скамью. Возьмите D-образную рукоятку каждой рукой ладонями вниз и вытяните руки прямо перед собой. Держа руки прямыми, поднимите их в стороны, пока они не станут параллельны полу. Задержитесь на мгновение в верхней точке, затем медленно опустите руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратное разведение рук на блоке лёжа на спине"},{"id":"2464","n":"cable thibaudeau kayak row","bp":"back","eq":"cable","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Прикрепите тросовую рукоятку к низкому шкиву и сядьте лицом к машине, поставив ноги на пол. Возьмитесь за рукоятку правой рукой и полностью вытяните руку, сохраняя небольшой изгиб в локте. Наклонитесь вперед от бедер, сохраняя спину прямой и напряженный пресс. Потяните рукоятку к туловищу, втягивая лопатку и сгибая локоть, удерживая руку близко к телу. Напрягите мышцы спины в верхней точке движения, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений, затем поменяйте сторону и выполните упражнение левой рукой.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга Тибодо на блоке"},{"id":"0241","n":"cable triceps pushdown (v-bar)","bp":"upper arms","eq":"cable","tg":"triceps","mg":"forearms","img":null,"gif":null,"ru":"Прикрепите V-образную насадку к тросовому станку на самой высокой скорости. Встаньте лицом к канатному тренажеру, поставив ноги на ширине плеч. Возьмитесь за V-образную перекладину хватом сверху, ладонями вниз, руки на ширине плеч. На протяжении всего упражнения держите локти близко к бокам, а плечи неподвижными. Задействуйте трицепсы и на выдохе опускайте V-образную планку вниз, пока руки полностью не выпрямятся. Задержитесь на мгновение в нижней части движения, напрягая трицепсы. На вдохе медленно возвращайте V-образную планку в исходное положение, сохраняя контроль. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание на блоке на трицепс с V-рукояткой"},{"id":"2405","n":"cable triceps pushdown (v-bar) (with arm blaster)","bp":"upper arms","eq":"cable","tg":"triceps","mg":"forearms","img":null,"gif":null,"ru":"Прикрепите V-образную насадку к тросовому станку на самой высокой скорости. Встаньте лицом к канатному тренажеру, поставив ноги на ширине плеч. Возьмитесь за V-образную перекладину хватом сверху, ладонями вниз, руки на ширине плеч. На протяжении всего упражнения держите локти близко к бокам, а плечи неподвижными. Задействуйте трицепсы и на выдохе опускайте V-образную планку вниз, пока руки полностью не выпрямятся. Задержитесь на мгновение в нижней части движения, напрягая трицепсы. На вдохе медленно возвращайте V-образную планку в исходное положение, сохраняя контроль. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание на блоке на трицепс с V-рукояткой и фиксатором локтей"},{"id":"0242","n":"cable tuck reverse crunch","bp":"waist","eq":"cable","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Прикрепите трос к низкому блоку и лягте на коврик лицом вверх. Возьмите трос обеими руками и вытяните руки прямо над грудью. Согните ноги в коленях и поднимите ноги вверх, подтягивая колени к груди. В то же время поднимите таз к груди, отрывая бедра от земли. Задержитесь на мгновение в верхней точке, затем медленно опустите ноги и бедра обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Обратные скручивания с подтягиванием коленей на блоке"},{"id":"0243","n":"cable twist","bp":"waist","eq":"cable","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч, лицом к канатному тренажеру. Держите рукоятку троса обеими руками перед грудью, держа руки слегка согнутыми. Напрягите корпус и поверните туловище вправо, протягивая трос через тело. Сделайте паузу на мгновение в конце движения, чувствуя сокращение мышц пресса и косых мышц живота. Медленно вернитесь в исходное положение, сопротивляясь натяжению троса. Повторите движение в левую сторону. Продолжайте чередовать стороны желаемое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Скручивания на блоке"},{"id":"0862","n":"cable twist (up-down)","bp":"waist","eq":"cable","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Встаньте, поставив ноги на ширине плеч, лицом к канатному тренажеру. Держите рукоятку троса обеими руками перед грудью, держа руки слегка согнутыми. Напрягите корпус и медленно поверните туловище в сторону, сохраняя бедра и ноги устойчивыми. Сделайте небольшую паузу в конце вращения, затем медленно вернитесь в исходное положение. Повторите поворот в противоположную сторону. Продолжайте чередовать стороны желаемое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Скручивания на блоке снизу вверх"},{"id":"0244","n":"cable twisting pull","bp":"back","eq":"cable","tg":"lats","mg":"shoulders","img":null,"gif":null,"ru":"Прикрепите тросовую ручку к низкому шкиву и встаньте лицом к машине. Возьмитесь за рукоятку левой рукой и отойдите от тренажера, полностью вытянув руку. Поставьте ноги на ширине плеч, слегка согнув колени. На протяжении всего упражнения держите спину прямой и напряженным корпус. Потяните ручку к себе, поворачивая при этом туловище вправо. В конце движения напрягите мышцы спины. Медленно вернитесь в исходное положение, сохраняя натяжение троса. Повторите необходимое количество повторений, затем поменяйте сторону и выполните упражнение правой рукой.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга с поворотом на блоке"},{"id":"1645","n":"cable two arm curl on incline bench","bp":"upper arms","eq":"cable","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Сядьте на наклонную скамью, прислонившись спиной к подушке, а ступни поставьте на землю. Возьмитесь за рукоятки троса обратным хватом ладонями вверх и полностью выпрямите руки. Удерживая плечи неподвижно, выдохните и согните рукоятки к плечам, одновременно напрягая бицепсы. Задержитесь на мгновение в верхней точке движения, напрягая бицепсы. Вдохните и медленно опустите рукоятки обратно в исходное положение, полностью выпрямляя руки. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание рук двумя руками на наклонной скамье на блоке"},{"id":"1728","n":"cable two arm tricep kickback","bp":"upper arms","eq":"cable","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч и слегка согнуты в коленях. Возьмите рукоятку троса в каждую руку ладонями внутрь и согните руки под углом 90 градусов. Удерживая плечи неподвижно, вытяните предплечья назад до полного выпрямления рук. Сделайте паузу на мгновение, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание двумя руками на трицепс в наклоне на блоке"},{"id":"0245","n":"cable underhand pulldown","bp":"back","eq":"cable","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Отрегулируйте канатную машину так, чтобы тяговая перекладина находилась на высоте над вашей головой. Сядьте на сиденье и возьмитесь за перекладину хватом снизу, руки чуть шире плеч. Держите спину прямо и слегка откиньтесь назад. Потяните штангу вниз к груди, сведя лопатки вместе. Сделайте паузу на мгновение в нижней части движения, затем медленно отпустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга верхнего блока обратным хватом"},{"id":"1270","n":"cable upper chest crossovers","bp":"chest","eq":"cable","tg":"pectorals","mg":"deltoids","img":null,"gif":null,"ru":"Прикрепите ручки к тросам на уровне груди. Встаньте в центр канатной машины, поставив одну ногу немного впереди другой. Возьмитесь за ручки ладонями вниз и вытяните руки в стороны. Сохраняйте небольшой изгиб в локтях и задействуйте корпус. Стяните тросы вместе перед грудью, пересекая их друг над другом. Напрягите мышцы груди на пике движения. Медленно отпустите тросы обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сведение рук на верх груди в кроссовере"},{"id":"1324","n":"cable upper row","bp":"back","eq":"cable","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Прикрепите прямую штангу к канатному тренажеру на уровне груди. Встаньте лицом к тренажеру, поставив ноги на ширине плеч. Возьмите перекладину хватом сверху, руки на расстоянии чуть шире плеч. Держите спину прямо, а корпус напряженным. Потяните штангу к верхней части груди, сжимая лопатки вместе. Сделайте паузу на мгновение в верхней точке движения. Медленно отпустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга верхнего блока"},{"id":"0246","n":"cable upright row","bp":"shoulders","eq":"cable","tg":"delts","mg":"traps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, слегка согните колени и возьмитесь за крепление троса хватом сверху. На протяжении всего упражнения держите спину прямой и напряженным корпус. Потяните блочное крепление прямо вверх к подбородку, ведя локтями. В верхней точке задержитесь на мгновение, сведя лопатки вместе. Медленно опустите крепление троса обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Тяга к подбородку на блоке"},{"id":"1325","n":"cable wide grip rear pulldown behind neck","bp":"back","eq":"cable","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Отрегулируйте канатную машину так, чтобы тяговая перекладина находилась на высоте над вашей головой. Сядьте на сиденье и возьмитесь за перекладину широким хватом сверху. Держите спину прямо и грудь вверх, слегка отклоняясь назад. Потяните штангу вниз к верхней части груди, сжимая лопатки вместе. Сделайте паузу на мгновение в нижней части движения, затем медленно отпустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Тяга верхнего блока за голову широким хватом"},{"id":"0247","n":"cable wrist curl","bp":"lower arms","eq":"cable","tg":"forearms","mg":"biceps","img":null,"gif":null,"ru":"Прикрепите прямую штангу к канатной машине с низким шкивом. Встаньте лицом к тренажеру, поставив ноги на ширине плеч. Возьмите перекладину хватом снизу, ладони вверх, руки на ширине плеч. Положите предплечья на скамью или подушку так, чтобы запястья свисали с края. Удерживая предплечья неподвижно, выдохните и согните запястья вверх как можно дальше. Задержитесь на мгновение в верхней точке, затем вдохните и медленно опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание запястий на блоке"},{"id":"1407","n":"calf push stretch with hands against wall","bp":"lower legs","eq":"body weight","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте лицом к стене, поставив ноги на ширине плеч. Положите руки на стену на уровне плеч. Сделайте шаг назад одной ногой, удерживая пятку на земле, а ногу прямой. Слегка согните переднее колено и наклонитесь вперед, чувствуя растяжение в икрах. Удерживайте растяжку 20–30 секунд. Поменяйте ноги и повторите растяжку.","pos":"standing","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка икр с упором руками в стену"},{"id":"1377","n":"calf stretch with hands against wall","bp":"lower legs","eq":"body weight","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте лицом к стене, поставив ноги на ширине плеч. Положите руки на стену на уровне плеч. Сделайте шаг правой ногой назад, удерживая пятку на земле, а ногу прямо. Согните левое колено и наклонитесь вперед, сохраняя заднюю ногу прямой, а пятку на земле. Удерживайте растяжку 20–30 секунд. Поменяйте ноги и повторите растяжку.","pos":"standing","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка икр с упором руками в стену"},{"id":"1378","n":"calf stretch with rope","bp":"lower legs","eq":"rope","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте лицом к стене или прочному предмету, поставив ноги на ширине плеч. Возьмите концы веревки в каждую руку и оберните середину веревки вокруг подушечки правой стопы. Сделайте шаг назад левой ногой, удерживая пятку на земле, а ногу прямой. Наклонитесь вперед, держа спину прямо, и осторожно потяните за веревку, чтобы растянуть икроножные мышцы. Удерживайте растяжку 20–30 секунд, затем расслабьтесь. Повторите на другой ноге.","pos":"standing","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка икр с верёвкой"},{"id":"0248","n":"cambered bar lying row","bp":"back","eq":"barbell","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Поставьте штангу на пол и лягте лицом вниз на скамью так, чтобы грудь находилась рядом с краем. Наклонитесь вниз и возьмите штангу хватом сверху, на расстоянии чуть шире плеч. Поставив ноги прямо и поставив ступни на землю, поднимите штангу от пола, вытянув руки. Подтяните штангу к груди, сведя лопатки вместе. Опустите штангу обратно в исходное положение и повторите желаемое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга изогнутого грифа в наклоне лёжа"},{"id":"2963","n":"captains chair straight leg raise","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Сядьте на капитанское кресло, прислонившись спиной к спинке и положив предплечья на подлокотники. Держите верхнюю часть тела устойчивой, а спину прямой. Напрягите пресс и поднимите ноги перед собой, сохраняя их прямыми. Продолжайте поднимать до тех пор, пока ваши ноги не станут параллельны земле или не станут настолько высоко, насколько вы сможете комфортно подняться. Задержитесь на мгновение в верхней точке, затем медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём прямых ног в упоре на брусьях"},{"id":"1548","n":"chair leg extended stretch","bp":"upper legs","eq":"body weight","tg":"quads","mg":"hamstrings","img":null,"gif":null,"ru":"Сядьте на край стула, выпрямите спину и поставьте ступни на землю. Вытяните одну ногу прямо перед собой, удерживая пятку на земле. Слегка наклонитесь вперед, чувствуя растяжение квадрицепсов. Удерживайте это положение 20–30 секунд. Поменяйте ноги и повторите растяжку.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка с выпрямленной ногой на стуле"},{"id":"1271","n":"chest and front of shoulder stretch","bp":"chest","eq":"body weight","tg":"pectorals","mg":"deltoids","img":null,"gif":null,"ru":"Встаньте прямо, ноги на ширине плеч. Вытяните руки прямо перед собой на уровне плеч. Скрестите руки перед телом, положив правую руку поверх левой. Переплетите пальцы и сожмите ладони вместе. Аккуратно сведите лопатки вместе и выдвиньте руки вперед, чувствуя растяжение в груди и передней части плеч. Удерживайте растяжку 20–30 секунд, затем расслабьтесь. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка груди и передней части плеча"},{"id":"0251","n":"chest dip","bp":"chest","eq":"body weight","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Встаньте на параллельные брусья, полностью вытянув руки и выпрямив тело. Опускайте корпус, сгибая локти, пока плечи не окажутся ниже локтей. Вернитесь в исходное положение, выпрямляя руки. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания на брусьях на грудь"},{"id":"1430","n":"chest dip (on dip-pull-up cage)","bp":"chest","eq":"body weight","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Отрегулируйте поручни на такую ​​высоту, чтобы вам было удобно их держать. Встаньте между перекладинами и положите руки на каждую перекладину на расстоянии чуть шире ширины плеч. Подпрыгните и выпрямите руки, удерживая вес тела на перекладинах. Согните колени и скрестите лодыжки позади себя. Опустите тело, согнув локти, удерживая грудь вверху, а плечи опущенными. Продолжайте опускаться до тех пор, пока ваши плечи не окажутся ниже локтей или пока вы не почувствуете растяжение в груди. Оттолкнитесь ладонями и выпрямите локти, чтобы поднять тело обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания на брусьях на грудь в гравитроне"},{"id":"2462","n":"chest dip on straight bar","bp":"chest","eq":"body weight","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Возьмитесь за параллельные брусья ладонями вниз и полностью выпрямите руки. Согните колени и скрестите лодыжки. Опускайте тело, сгибая руки, пока плечи не окажутся ниже локтей. Вернитесь в исходное положение, выпрямляя руки. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания на грудь на прямой перекладине"},{"id":"1272","n":"chest stretch with exercise ball","bp":"chest","eq":"stability ball","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Сядьте на мяч, поставив ноги на землю и выпрямив спину. Возьмите мяч для упражнений обеими руками и вытяните руки прямо перед собой. Медленно поднесите мяч к груди, чувствуя растяжение мышц груди. Удерживайте растяжку несколько секунд, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка груди с фитболом"},{"id":"3216","n":"chest tap push-up (male)","bp":"chest","eq":"body weight","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Начните с положения высокой планки, расставив руки чуть шире плеч, а тело образуя прямую линию. Опустите тело к земле, согнув локти и держа их близко к бокам. Опускаясь, постучите правой рукой по груди. Вернитесь в исходное положение. Повторите движение, на этот раз постукивая левой рукой по груди. Продолжайте чередовать стороны желаемое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"low","sp":1,"kn":1,"sh":1,"ru_name":"Отжимания с касанием груди"},{"id":"1326","n":"chin-up","bp":"back","eq":"body weight","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Повисните на перекладине, повернув ладонями к себе и расставив руки на ширине плеч. Напрягите корпус и подтяните тело к перекладине, ведя грудью. Продолжайте тянуть, пока подбородок не окажется над перекладиной. Задержитесь на мгновение в верхней точке, затем медленно опустите тело обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подтягивания обратным хватом"},{"id":"0253","n":"chin-ups (narrow parallel grip)","bp":"back","eq":"body weight","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Повисните на перекладине узким параллельным хватом, ладонями к себе. Напрягите мышцы спины и подтяните тело к перекладине, держа локти б
