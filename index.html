":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим носками в рычажном тренажёре"},{"id":"0577","n":"lever chest press","bp":"chest","eq":"leverage machine","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь на тренажере, прижавшись спиной к подушке. Возьмитесь за рукоятки хватом сверху и расположите локти под углом 90 градусов. Толкайте ручки вперед до полного выпрямления рук, выдыхая во время движения. Сделайте короткую паузу в конце движения, затем медленно вернитесь в исходное положение, вдыхая при этом. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим от груди в рычажном тренажёре"},{"id":"0576","n":"lever chest press","bp":"chest","eq":"leverage machine","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь на тренажере, прижавшись спиной к подушке. Возьмитесь за рукоятки хватом сверху и расположите локти под углом 90 градусов. Толкайте ручки вперед до полного выпрямления рук, выдыхая во время движения. Сделайте короткую паузу в конце движения, затем медленно вернитесь в исходное положение, вдыхая при этом. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим от груди в рычажном тренажёре"},{"id":"0578","n":"lever deadlift","bp":"upper legs","eq":"leverage machine","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и платформу для ног в желаемое положение. Сядьте на тренажер, прислонившись спиной к подушке, а ноги поставьте на платформу для ног. Возьмитесь за ручки или боковые стороны сиденья для устойчивости. Задействуйте ягодицы и мышцы задней поверхности бедра и толкните пятки, чтобы поднять вес. Держите спину прямо и не округляйте плечи. Полностью выпрямите бедра в верхней точке движения, сжимая ягодицы. Опустите вес обратно контролируемым образом, сохраняя напряжение в ягодицах и подколенных сухожилиях. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"med","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Становая тяга в рычажном тренажёре"},{"id":"1300","n":"lever decline chest press","bp":"chest","eq":"leverage machine","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и спинку рычажной машины в удобное положение. Сядьте на тренажер, прислонившись спиной к спинке, а ноги поставьте на пол. Возьмитесь за рукоятки хватом сверху и поставьте руки чуть шире плеч. Толкайте рукоятки вперед и в сторону от тела, пока руки полностью не выпрямятся. Медленно опустите рукоятки обратно к груди, слегка согнув локти. Задержитесь на мгновение внизу, затем верните ручки в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим от груди вниз в рычажном тренажёре"},{"id":"1253","n":"lever donkey calf raise","bp":"lower legs","eq":"leverage machine","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Отрегулируйте рычаг тренажера на высоту, соответствующую вашему телу. Встаньте лицом к тренажеру, положив пальцы ног на платформу для ног, а пятки свисая с края. Для устойчивости положите руки на ручки или опорные перекладины. Напрягите икроножные мышцы и поднимите пятки как можно выше, используя подушечки стоп. Задержитесь на мгновение в верхней точке, затем медленно опустите пятки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носки ослик в рычажном тренажёре"},{"id":"0579","n":"lever front pulldown","bp":"back","eq":"leverage machine","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь на машине так, чтобы колени находились под подушками, а ступни стояли на земле. Возьмитесь за ручки хватом сверху, на расстоянии чуть шире плеч. Сядьте прямо, подняв грудь и отведя плечи назад, сохраняя небольшой изгиб в пояснице. Напрягите широчайшие и потяните рукоятки вниз к груди, сжимая лопатки вместе. Сделайте паузу на мгновение в нижней части движения, затем медленно отпустите ручки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга верхнего блока к груди в рычажном тренажёре"},{"id":"0580","n":"lever gripless shrug","bp":"back","eq":"leverage machine","tg":"traps","mg":"shoulders","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь на рычаге машины. Возьмитесь за ручки ладонями внутрь и полностью выпрямите руки. Сохраняя спину прямой, выдохните и поднимите плечи как можно выше. Задержите сокращение на короткое время, затем вдохните и медленно опустите плечи обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Шраги без захвата в рычажном тренажёре"},{"id":"1439","n":"lever gripless shrug v. 2","bp":"back","eq":"leverage machine","tg":"traps","mg":"shoulders","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь на тренажере спиной к подушке. Возьмитесь за ручки или перекладины верхним хватом, держа руки прямыми. Сохраняя спину прямой, поднимите плечи как можно выше к ушам. Удерживайте напряжение на мгновение, затем медленно опустите плечи обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Шраги без захвата в рычажном тренажёре вариант 2"},{"id":"2288","n":"lever gripper hands","bp":"lower arms","eq":"leverage machine","tg":"forearms","mg":"biceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и возьмитесь за ручки рычага машины. Держите спину прямо, а ноги на земле. Выдохните и сожмите ручки, напрягая предплечья. Удерживайте напряжение в течение секунды, затем медленно расслабьтесь и вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сжатие рукоятей в рычажном тренажёре"},{"id":"1615","n":"lever hammer grip preacher curl","bp":"upper arms","eq":"leverage machine","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь на рычаге машины. Положите плечи на коврик для проповедника так, чтобы грудь прижималась к нему. Возьмитесь за ручки молотковым хватом (ладони обращены друг к другу). Удерживая плечи неподвижно, выдохните и согните ручки к плечам. Задержитесь на мгновение в верхней точке, напрягая бицепсы. Вдохните и медленно опустите ручки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание на бицепс на скамье Скотта молотковым хватом в рычажном тренажёре"},{"id":"0581","n":"lever high row","bp":"back","eq":"leverage machine","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и платформу для ног в удобное положение. Сядьте на тренажер, прижав грудь к подушке, а ступни поставив на платформу для ног. Возьмитесь за ручки хватом сверху, на расстоянии чуть шире плеч. Держите спину прямо и задействуйте корпус. Потяните ручки к телу, сведя лопатки вместе. Задержитесь на мгновение на пике движения, затем медленно отпустите ручки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Высокая тяга в рычажном тренажёре"},{"id":"2286","n":"lever hip extension v. 2","bp":"upper legs","eq":"leverage machine","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Отрегулируйте машину по размеру вашего тела и сядьте на нее, прижавшись спиной к спинке сиденья. Поставьте ноги на подножки и возьмитесь за ручки для устойчивости. Задействуйте ягодицы и мышцы задней поверхности бедра, затем оттолкнитесь от подножек, чтобы разогнуть бедра и поднять ноги назад. Задержитесь на мгновение в верхней точке, затем медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание бедра в рычажном тренажёре вариант 2"},{"id":"2611","n":"lever horizontal one leg press","bp":"upper legs","eq":"leverage machine","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Отрегулируйте сиденье тренажера так, чтобы колени находились под углом 90 градусов, когда ступни стоят на подножке. Сядьте на тренажер спиной к спинке и поставьте ноги на подножку на ширине плеч. Положите руки на ручки или по бокам машины для устойчивости. Отодвиньте подножку от тела, вытянув ногу и прижав спину к спинке. Задержитесь на мгновение в полностью выпрямленном положении, затем медленно согните ногу, чтобы вернуться в исходное положение. Повторите необходимое количество повторений, затем поменяйте ногу.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Горизонтальный жим одной ногой в рычажном тренажёре"},{"id":"1299","n":"lever incline chest press","bp":"chest","eq":"leverage machine","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Отрегулируйте сиденье и спинку рычажной машины в удобное положение. Сядьте на тренажер, прислонившись спиной к спинке, а ноги поставьте на пол. Возьмитесь за рукоятки хватом сверху и поставьте руки чуть шире плеч. Толкайте рукоятки вперед и в сторону от тела, пока руки полностью не выпрямятся. Сделайте паузу на мгновение, затем медленно согните локти и опустите рукоятки обратно к груди. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим от груди на наклонной в рычажном тренажёре"},{"id":"1479","n":"lever incline chest press v. 2","bp":"chest","eq":"leverage machine","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и угол наклона спинки на рычаге машины до удобного положения. Сядьте на тренажер, прислонившись спиной к спинке, а ноги поставьте на пол. Возьмитесь за рукоятки хватом сверху и поставьте руки чуть шире плеч. Толкайте рукоятки вперед и в сторону от тела до тех пор, пока руки полностью не выпрямятся, но не сгибайте локти. Задержитесь на мгновение в полностью выпрямленном положении, затем медленно согните локти и опустите рукоятки обратно к груди. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим от груди на наклонной в рычажном тренажёре вариант 2"},{"id":"0582","n":"lever kneeling leg curl","bp":"upper legs","eq":"leverage machine","tg":"hamstrings","mg":"glutes","img":null,"gif":null,"ru":"Отрегулируйте тренажер под свое тело и выберите желаемый вес. Встаньте на колени на тренажере лицом вниз, положив колени на подушку, а ступни зафиксировав под подушечками. Возьмитесь за ручки или боковые стороны машины для устойчивости. Удерживая верхнюю часть тела неподвижно, выдохните и согните ноги к ягодицам, согнув колени. Задержитесь на мгновение в верхней точке движения, сжимая мышцы задней поверхности бедра. Вдохните и медленно опустите ноги обратно в исходное положение, полностью выпрямляя колени. Повторите необходимое количество повторений.","pos":"kneeling","ax":"none","iap":"low","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Сгибание ног с колен в рычажном тренажёре"},{"id":"0583","n":"lever kneeling twist","bp":"waist","eq":"leverage machine","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь на тренажере так, чтобы колени лежали на подушках, а верхняя часть тела была обращена вперед. Возьмитесь за ручки или боковые стороны машины для устойчивости. Удерживая корпус в напряжении, поверните туловище в сторону, насколько это возможно. Сделайте паузу на мгновение, затем медленно вернитесь в исходное положение. Повторите поворот в противоположную сторону. Продолжайте чередовать стороны желаемое количество повторений.","pos":"kneeling","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Скручивание с колен в рычажном тренажёре"},{"id":"0584","n":"lever lateral raise","bp":"shoulders","eq":"leverage machine","tg":"delts","mg":"traps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь на тренажере спиной к подушке. Возьмитесь за рукоятки прямым хватом и держите руки прямыми. Выдохните и поднимите руки в стороны, пока они не станут параллельны полу. Задержитесь на мгновение в верхней точке, затем вдохните и медленно опустите руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Разведение рук в стороны в рычажном тренажёре"},{"id":"0585","n":"lever leg extension","bp":"upper legs","eq":"leverage machine","tg":"quads","mg":"hamstrings","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и спинки машины в соответствии с вашим телом. Сядьте на тренажер, прислонившись спиной к спинке сиденья и положив ноги на подножку. Возьмитесь за ручки или боковые перекладины для устойчивости. Вытяните ноги вперед, выпрямив колени и подняв вес. Задержитесь на мгновение в верхней точке, затем медленно опустите вес обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Разгибание ног в рычажном тренажёре"},{"id":"0586","n":"lever lying leg curl","bp":"upper legs","eq":"leverage machine","tg":"hamstrings","mg":"calves","img":null,"gif":null,"ru":"Отрегулируйте тренажер под свое тело и выберите желаемый вес. Лягте на тренажер лицом вниз, выпрямив ноги и упираясь пятками в мягкий рычаг. Возьмитесь за ручки или боковые стороны машины для устойчивости. Удерживая верхнюю часть тела неподвижно, выдохните и согните ноги как можно выше, не отрывая бедра от подушки. Задержитесь в сокращенном положении на короткую паузу, сжимая мышцы задней поверхности бедра. Вдохните и медленно опустите рычаг обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание ног лёжа в рычажном тренажёре"},{"id":"3195","n":"lever lying two-one leg curl","bp":"upper legs","eq":"leverage machine","tg":"hamstrings","mg":"glutes","img":null,"gif":null,"ru":"Отрегулируйте машину по размеру вашего тела и сядьте на нее, прижавшись спиной к спинке сиденья. Поместите ноги на подушечку рычага, чуть выше лодыжек. Возьмитесь за ручки по бокам машины для поддержки. Удерживая верхнюю часть тела неподвижно, выдохните и согните ноги к ягодицам. Задержитесь на мгновение в верхней точке, затем вдохните и медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание ног лёжа два к одному в рычажном тренажёре"},{"id":"0587","n":"lever military press","bp":"shoulders","eq":"leverage machine","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь на машине спиной к спинке сиденья. Возьмитесь за рукоятки хватом сверху и поставьте руки чуть шире плеч. Толкайте ручки вверх до тех пор, пока руки полностью не выпрямятся, но не сгибайте локти. Задержитесь на мгновение в верхней точке, затем медленно опустите ручки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Армейский жим в рычажном тренажёре"},{"id":"0588","n":"lever narrow grip seated row","bp":"back","eq":"leverage machine","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и подножек, чтобы обеспечить правильную форму. Сядьте на тренажер, поставьте ноги на подножки и слегка согните колени. Возьмитесь за ручки узким хватом, ладони обращены друг к другу. Держите спину прямо и слегка наклонитесь вперед. Потяните ручки к туловищу, сжимая лопатки вместе. Сделайте паузу на мгновение в пике движения. Медленно отпустите ручки и вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга узким хватом сидя в рычажном тренажёре"},{"id":"0589","n":"lever one arm bent over row","bp":"back","eq":"barbell","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, слегка согнуты в коленях, возьмите штангу хватом сверху. Наклонитесь вперед в бедрах, держа спину прямо и голову вверх. Пусть штанга висит перед вами, руки полностью вытянуты. Подтяните штангу к груди, держа локти близко к телу. В верхней точке движения сведите лопатки вместе. Опустите штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Тяга одной рукой в наклоне в рычажном тренажёре"},{"id":"1356","n":"lever one arm lateral high row","bp":"back","eq":"leverage machine","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь лицом к машине. Возьмитесь за рукоятку одной рукой и держите спину прямо. Потяните рукоятку к себе, держа локоть близко к боку. Напрягите мышцы спины в верхней точке движения. Медленно отпустите ручку обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Боковая высокая тяга одной рукой в рычажном тренажёре"},{"id":"1347","n":"lever one arm lateral wide pulldown","bp":"back","eq":"leverage machine","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь на тренажере так, чтобы грудь опиралась на подушку, а ступни стояли на полу. Возьмитесь за рукоятку хватом сверху и полностью выпрямите руку, сохраняя небольшой изгиб в локте. Потяните рукоятку вниз и поперек тела к противоположному бедру, сжимая широчайшие мышцы в нижней части движения. Медленно верните рукоятку в исходное положение, полностью выпрямляя руку. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Боковая тяга верхнего блока одной рукой широким хватом в рычажном тренажёре"},{"id":"0590","n":"lever one arm shoulder press","bp":"shoulders","eq":"leverage machine","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь на тренажере спиной к подушке. Возьмитесь за рукоятку рычага одной рукой и расположите локоть под углом 90 градусов. Нажмите рычаг вверх, пока ваша рука полностью не выпрямится над головой. Задержитесь на мгновение в верхней точке, затем медленно опустите рычаг обратно в исходное положение. Повторите желаемое количество повторений, затем переключитесь на другую руку.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Жим над головой одной рукой в рычажном тренажёре"},{"id":"0591","n":"lever overhand triceps dip","bp":"upper arms","eq":"leverage machine","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Отрегулируйте машину на нужную высоту и зафиксируйте свое тело в нужном положении. Возьмитесь за рукоятки хватом сверху и расположите тело так, чтобы руки были полностью выпрямлены. Опустите тело, согнув локти, держа плечи близко к бокам. Продолжайте опускаться до тех пор, пока плечи не станут параллельны полу. Сделайте паузу на мгновение, затем вернитесь в исходное положение, разгибая локти. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания на трицепс верхним хватом в рычажном тренажёре"},{"id":"0592","n":"lever preacher curl","bp":"upper arms","eq":"leverage machine","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь на рычаге машины. Положите плечи на подушку и возьмитесь за рукоятки хватом снизу. Держите спину прямо, а локти положите на подушку. Выдохните и согните предплечья к плечам, напрягая бицепсы. Задержитесь на мгновение в верхней точке движения, напрягая бицепсы. Вдохните и медленно опустите ручки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание на бицепс на скамье Скотта в рычажном тренажёре"},{"id":"1614","n":"lever preacher curl v. 2","bp":"upper arms","eq":"leverage machine","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь на тренажере так, чтобы плечи лежали на подушке, а грудь – на опоре. Возьмитесь за ручки хватом снизу, на расстоянии чуть шире ширины плеч. Держите плечи неподвижно и на выдохе подтягивайте рукоятки к плечам, сокращая бицепсы. Задержитесь на мгновение в верхней точке движения, напрягая бицепсы. На вдохе медленно опускайте рукоятки обратно в исходное положение, полностью выпрямляя руки. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание на бицепс на скамье Скотта в рычажном тренажёре вариант 2"},{"id":"2285","n":"lever pullover","bp":"back","eq":"leverage machine","tg":"lats","mg":"triceps","img":null,"gif":null,"ru":"Отрегулируйте сиденье и ручки рычага машины в удобное положение. Сядьте на тренажер, прислонившись спиной к подушке, и возьмитесь за рукоятки верхним хватом. Держите руки слегка согнутыми, а корпус напряженным. Медленно потяните ручки к груди, сжимая широчайшие мышцы. Сделайте паузу на мгновение в момент максимального сокращения, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Пуловер в рычажном тренажёре"},{"id":"2736","n":"lever reverse grip lateral pulldown","bp":"back","eq":"leverage machine","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь на машине так, чтобы колени находились под подушками, а ступни стояли на земле. Возьмитесь за ручки хватом сверху, на расстоянии чуть шире плеч. Сядьте прямо, вытянув грудь и отведя плечи назад, сохраняя небольшой изгиб в пояснице. Потяните ручки вниз к груди, ведя локти и сжимая лопатки вместе. Сделайте паузу на мгновение в нижней части движения, затем медленно отпустите ручки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга верхнего блока обратным хватом в рычажном тренажёре"},{"id":"1616","n":"lever reverse grip preacher curl","bp":"upper arms","eq":"leverage machine","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь на рычаге машины. Возьмитесь за ручки хватом снизу ладонями вверх. Положите плечи на коврик для проповедника, убедившись, что локти полностью выпрямлены. Удерживая плечи неподвижно, выдохните и согните ручки к плечам. Задержитесь на мгновение в верхней точке движения, напрягая бицепсы. Вдохните и медленно опустите ручки обратно в исходное положение, полностью разгибая локти. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание на бицепс на скамье Скотта обратным хватом в рычажном тренажёре"},{"id":"1348","n":"lever reverse grip vertical row","bp":"back","eq":"leverage machine","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и положение подножки, чтобы обеспечить правильное выравнивание. Сядьте на тренажер, прижав грудь к подушке и положив ноги на подножку. Возьмитесь за ручки хватом снизу ладонями вверх. Держите спину прямо и задействуйте корпус. Потяните ручки к груди, сведя лопатки вместе. Сделайте паузу на мгновение в верхней точке движения, затем медленно расслабьтесь и вытяните руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Вертикальная тяга обратным хватом в рычажном тренажёре"},{"id":"0593","n":"lever reverse hyperextension","bp":"upper legs","eq":"leverage machine","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Отрегулируйте рычаг тренажера так, чтобы он соответствовал вашему телу, и зафиксируйте ноги в подушечках для ног. Лягте лицом вниз на тренажер, свесив верхнюю часть тела с края и положив бедра на подушку. Скрестите руки на груди или заведите их за голову. Задействуйте ягодицы и мышцы задней поверхности бедра, чтобы поднять ноги вверх, пока они не станут параллельны земле. Задержитесь на мгновение в верхней точке, затем медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратная гиперэкстензия в рычажном тренажёре"},{"id":"1349","n":"lever reverse t-bar row","bp":"back","eq":"leverage machine","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и положение подножки на рычаге машины. Сядьте на тренажер, прижав грудь к подушке и положив ноги на подножку. Возьмитесь за ручки хватом сверху, на расстоянии чуть шире плеч. Держите спину прямо и задействуйте корпус. Потяните ручки к груди, сведя лопатки вместе. Сделайте паузу на мгновение в верхней точке движения, затем медленно расслабьтесь и вытяните руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратная Т-тяга в рычажном тренажёре"},{"id":"2315","n":"lever rotary calf","bp":"lower legs","eq":"leverage machine","tg":"calves","mg":"soleus","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья так, чтобы ваши колени были слегка согнуты, а ступни лежали на подножке. Поставьте пальцы ног на подножку так, чтобы пятки свисали с края. Возьмитесь за ручки или боковые стороны машины для устойчивости. Оттолкнитесь подушечками стоп, поднимая пятки как можно выше. Задержитесь на мгновение в верхней точке, затем медленно опустите пятки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носки с поворотом в рычажном тренажёре"},{"id":"2335","n":"lever seated calf press","bp":"lower legs","eq":"leverage machine","tg":"calves","mg":"soleus","img":null,"gif":null,"ru":"Отрегулируйте сиденье тренажера так, чтобы ваши плечи находились на одной линии с подушечкой рычага. Поместите пальцы ног на нижнюю часть платформы и расположите колени под накладкой рычага. Возьмитесь за ручки по бокам сиденья для устойчивости. Нажмите на подушечку рычага вниз, вытянув лодыжки и подняв пятки как можно выше. Сделайте паузу на мгновение в верхней точке движения, затем медленно опустите пятки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим носками сидя в рычажном тренажёре"},{"id":"0594","n":"lever seated calf raise","bp":"lower legs","eq":"leverage machine","tg":"calves","mg":"soleus","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья так, чтобы ваши колени были слегка согнуты, а ступни лежали на подножке. Поместите пальцы ног на подножку так, чтобы пятки свисали с края. Возьмитесь за ручки или боковые стороны сиденья для устойчивости. Оттолкнитесь подушечками стоп, чтобы поднять пятки как можно выше. Задержитесь на мгновение в верхней точке, затем медленно опустите пятки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носки сидя в рычажном тренажёре"},{"id":"1452","n":"lever seated crunch","bp":"waist","eq":"leverage machine","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Сядьте на тренажер, прислонившись спиной к подушке, а ступни поставьте на пол. Возьмитесь за ручки или положите руки на боковые подушечки для поддержки. Напрягите пресс и медленно откиньтесь назад, позволяя подушечке двигаться вместе с вами. Как только верхняя часть тела окажется под углом 45 градусов, напрягите пресс и наклонитесь вперед, приближая грудь к коленям. Задержитесь на мгновение в верхней точке, затем медленно расслабьтесь и вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Скручивания сидя в рычажном тренажёре"},{"id":"0595","n":"lever seated crunch (chest pad)","bp":"waist","eq":"leverage machine","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и положение подкладки для груди в соответствии с вашим комфортом. Сядьте на тренажер, прислонившись спиной к нагруднику, а ступни поставьте на пол. Возьмитесь за ручки или боковые перекладины для устойчивости. Напрягите пресс и медленно откиньтесь назад, позволяя подушечке для груди двигаться вместе с вами. Сделайте паузу на мгновение при максимальном сокращении, чувствуя напряжение в прессе. Медленно вернитесь в исходное положение, напрягая пресс и подтягиваясь обратно вверх. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Скручивания сидя с упором в грудь в рычажном тренажёре"},{"id":"3760","n":"lever seated crunch v. 2","bp":"waist","eq":"leverage machine","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Сядьте на тренажер, прислонившись спиной к подушке и зафиксировав ноги под подушечками. Положите руки на ручки или по бокам сиденья для поддержки. Напрягите пресс и медленно наклонитесь вперед, приближая грудь к коленям. Задержитесь на мгновение в верхней точке движения, напрягая пресс. Медленно вернитесь в исходное положение, слегка округляя спину. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Скручивания сидя в рычажном тренажёре вариант 2"},{"id":"1451","n":"lever seated dip","bp":"upper arms","eq":"leverage machine","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья так, чтобы ваши ступни стояли ровно на земле, а колени находились под углом 90 градусов. Возьмитесь за рукоятки тренажера ладонями вниз и полностью выпрямите руки. Медленно опустите тело, сгибая локти, пока плечи не станут параллельны земле. Сделайте паузу на мгновение, затем вернитесь в исходное положение, выпрямляя руки. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания на брусьях сидя в рычажном тренажёре"},{"id":"0596","n":"lever seated fly","bp":"chest","eq":"leverage machine","tg":"pectorals","mg":"deltoids","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь на тренажере спиной к подушке. Возьмитесь за рукоятки пронированным хватом и держите локти слегка согнутыми. Выдохните и вытолкните ручки вперед, соединив их перед грудью. Сделайте паузу на мгновение, напрягая мышцы груди. Вдохните и медленно вернитесь в исходное положение, позволяя мышцам груди растягиваться. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сведение рук сидя в рычажном тренажёре"},{"id":"3759","n":"lever seated good morning","bp":"upper legs","eq":"leverage machine","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья так, чтобы бедра были немного выше колен. Сядьте на тренажер, прислонившись спиной к подушке, а ноги поставьте на подножки. Возьмитесь за ручки или боковые стороны сиденья для устойчивости. Удерживая спину прямо, медленно наклонитесь вперед от бедер, пока верхняя часть тела не станет параллельна земле. Сделайте паузу на мгновение, затем медленно вернитесь в исходное положение, напрягая ягодицы и мышцы задней поверхности бедра. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Гуд морнинг сидя в рычажном тренажёре"},{"id":"0597","n":"lever seated hip abduction","bp":"upper legs","eq":"leverage machine","tg":"abductors","mg":"glutes","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья так, чтобы колени находились под углом 90 градусов. Сядьте на тренажер, прислонившись спиной к спинке сиденья и положив ноги на подножки. Положите руки на боковые ручки для устойчивости. Включите похитители и медленно разведите ноги в стороны от средней линии тела. В конце движения сделайте паузу на мгновение, затем медленно верните ноги вместе в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отведение бедра сидя в рычажном тренажёре"},{"id":"0598","n":"lever seated hip adduction","bp":"upper legs","eq":"leverage machine","tg":"adductors","mg":"hamstrings","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь на машине спиной к спинке сиденья. Поставьте ноги на подножки и возьмитесь за ручки для устойчивости. Напрягите приводящие мышцы и медленно сведите ноги вместе, сжимая внутреннюю поверхность бедер. Сделайте паузу на мгновение в момент максимального сокращения, затем медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сведение бедра сидя в рычажном тренажёре"},{"id":"0599","n":"lever seated leg curl","bp":"upper legs","eq":"leverage machine","tg":"hamstrings","mg":"calves","img":null,"gif":null,"ru":"Отрегулируйте машину по размеру вашего тела и сядьте на нее, прижавшись спиной к спинке сиденья. Поместите голени под мягкий рычаг, чуть выше лодыжек. Возьмитесь за ручки по бокам машины для поддержки. Удерживая верхнюю часть ног неподвижно, выдохните и согните ноги как можно сильнее. Задержитесь в сокращенном положении на короткую паузу, сжимая мышцы задней поверхности бедра. Вдохните и медленно опустите рычаг обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Сгибание ног сидя в рычажном тренажёре"},{"id":"0600","n":"lever seated leg raise crunch","bp":"waist","eq":"leverage machine","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Сядьте на тренажер, прислонившись спиной к спинке и поставив ноги на подножки. Возьмитесь за ручки или боковые перекладины для устойчивости. Напрягите пресс и медленно поднимите ноги к груди, одновременно наклоняя туловище вперед. Задержитесь на мгновение в верхней точке, затем медленно опустите ноги и туловище обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Подъём ног со скручиванием сидя в рычажном тренажёре"},{"id":"0602","n":"lever seated reverse fly","bp":"shoulders","eq":"leverage machine","tg":"delts","mg":"trapezius","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь на тренажере так, чтобы грудь опиралась на подушку, а ступни стояли на полу. Возьмитесь за рукоятки верхним хватом и держите руки слегка согнутыми. Выдохните и сведите лопатки вместе, потянув рукоятки назад и наружу, от тела. Сделайте паузу на мгновение в момент максимального сокращения, затем вдохните и медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратное разведение рук сидя в рычажном тренажёре"},{"id":"0601","n":"lever seated reverse fly (parallel grip)","bp":"shoulders","eq":"leverage machine","tg":"delts","mg":"trapezius","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь на тренажере так, чтобы грудь опиралась на подушку, а ступни стояли на полу. Возьмитесь за рукоятки параллельным хватом, ладони обращены друг к другу, руки держите слегка согнутыми. Выдохните и сведите лопатки вместе, потянув рукоятки назад и наружу, от тела. Сделайте паузу на мгновение в момент максимального сокращения, затем вдохните и медленно вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Обратное разведение рук сидя параллельным хватом в рычажном тренажёре"},{"id":"1350","n":"lever seated row","bp":"back","eq":"leverage machine","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и подножки в удобное положение. Сядьте на тренажер, прижав грудь к подушке, а ноги поставив на подножки. Возьмитесь за ручки хватом сверху на ширине плеч. Держите спину прямо, а корпус напряженным. Потяните ручки к телу, сведя лопатки вместе. Сделайте паузу на мгновение в пике движения. Медленно отпустите ручки и вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга сидя в рычажном тренажёре"},{"id":"1385","n":"lever seated squat calf raise on leg press machine","bp":"lower legs","eq":"leverage machine","tg":"calves","mg":"quadriceps","img":null,"gif":null,"ru":"Отрегулируйте сиденье тренажера для жима ногами так, чтобы колени были слегка согнуты, когда ступни стоят на подножке. Сядьте на тренажер, прислонившись спиной к спинке, поставив ноги на подножку на ширине плеч. Поместите пальцы ног и подушечки стоп на подножку, не отрывая пятки от края. Отпустите защитные ручки и отодвиньте подножку от себя, вытянув колени. Как только ваши колени полностью выпрямятся, медленно опустите пятки, сгибая икроножные мышцы. Задержитесь на мгновение в нижней точке, затем поднимите подножку обратно вверх, вытянув икроножные мышцы. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носки в приседе сидя в тренажёре для жима ногами"},{"id":"0603","n":"lever shoulder press","bp":"shoulders","eq":"leverage machine","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь на машине спиной к спинке сиденья. Возьмитесь за рукоятки верхним хватом и расположите руки на уровне плеч. Толкайте ручки вверх до тех пор, пока руки полностью не выпрямятся, но не сгибайте локти. Задержитесь на мгновение в верхней точке, затем медленно опустите ручки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Жим от плеч в рычажном тренажёре"},{"id":"0869","n":"lever shoulder press v. 2","bp":"shoulders","eq":"leverage machine","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и спинку рычажной машины в удобное положение. Сядьте на тренажер, прислонившись спиной к спинке, а ноги поставьте на пол. Возьмитесь за рукоятки тренажера хватом сверху, на расстоянии чуть шире ширины плеч. Толкайте ручки вверх и вперед, пока руки не будут полностью выпрямлены, но не зафиксированы. Задержитесь на мгновение в верхней точке, затем медленно опустите ручки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Жим от плеч в рычажном тренажёре вариант 2"},{"id":"2318","n":"lever shoulder press v. 3","bp":"shoulders","eq":"leverage machine","tg":"delts","mg":"triceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и спинку рычажной машины в удобное положение. Сядьте на тренажер, прислонившись спиной к спинке, а ноги поставьте на пол. Возьмитесь за рукоятки тренажера хватом сверху, на расстоянии чуть шире ширины плеч. Толкайте ручки вверх и вперед, пока руки не будут полностью выпрямлены, но не зафиксированы. Задержитесь на мгновение в верхней точке, затем медленно опустите ручки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Жим от плеч в рычажном тренажёре вариант 3"},{"id":"0604","n":"lever shrug","bp":"back","eq":"leverage machine","tg":"traps","mg":"shoulders","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь на тренажере спиной к подушке. Возьмитесь за рукоятки прямым хватом и держите руки прямыми. Сохраняя спину прямой, поднимите плечи как можно выше к ушам. Удерживайте напряжение на мгновение, затем медленно опустите плечи обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Шраги в рычажном тренажёре"},{"id":"0605","n":"lever standing calf raise","bp":"lower legs","eq":"leverage machine","tg":"calves","mg":"soleus","img":null,"gif":null,"ru":"Отрегулируйте тренажер по своему росту и встаньте, поставив ноги на ширине плеч. Поместите плечи под подушечки и держитесь за ручки для устойчивости. Поднимите пятки как можно выше, вытянув лодыжки. Задержитесь на мгновение в верхней точке, затем медленно опустите пятки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"high","iap":"low","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Подъём на носки стоя в рычажном тренажёре"},{"id":"3758","n":"lever standing chest press","bp":"chest","eq":"leverage machine","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь на машине, поставив ноги на землю. Возьмитесь за рукоятки верхним хватом и расположите руки на уровне груди. Толкайте ручки вперед до тех пор, пока руки полностью не выпрямятся, сохраняя локти слегка согнутыми. Сделайте паузу на мгновение, затем медленно верните ручки обратно к груди, сохраняя контроль на протяжении всего движения. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим от груди стоя в рычажном тренажёре"},{"id":"0606","n":"lever t bar row","bp":"back","eq":"leverage machine","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и положение подножки, чтобы обеспечить правильное выравнивание. Сядьте на тренажер, прижав грудь к подушке и положив ноги на подножку. Возьмитесь за ручки хватом сверху, на расстоянии чуть шире плеч. Держите спину прямо и задействуйте корпус. Потяните ручки к туловищу, сжимая лопатки вместе. Сделайте паузу на мгновение в момент максимального сокращения, затем медленно отпустите рукоятки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Т-тяга в рычажном тренажёре"},{"id":"1351","n":"lever t-bar reverse grip row","bp":"back","eq":"leverage machine","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь на тренажере так, чтобы грудь опиралась на подушку, а ступни стояли на полу. Возьмитесь за ручки хватом сверху, на расстоянии чуть шире плеч. Держите спину прямо и задействуйте корпус. Потяните ручки к груди, сведя лопатки вместе. Сделайте паузу на мгновение в верхней точке движения, затем медленно расслабьтесь и вытяните руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга Т-грифа обратным хватом в рычажном тренажёре"},{"id":"0607","n":"lever triceps extension","bp":"upper arms","eq":"leverage machine","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь на тренажере спиной к подушке. Возьмитесь за рукоятки верхним хватом и полностью вытяните руки перед собой. Удерживая плечи неподвижно, медленно опустите рукоятки ко лбу, сгибая локти. Задержитесь на мгновение в нижней точке, затем верните рукоятки в исходное положение, вытянув руки. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Разгибание на трицепс в рычажном тренажёре"},{"id":"1313","n":"lever unilateral row","bp":"back","eq":"leverage machine","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь лицом к машине. Возьмитесь за рукоятки верхним хватом и держите спину прямо. Потяните ручки к телу, сведя лопатки вместе. Задержитесь на мгновение на пике движения, затем медленно расслабьтесь и вытяните руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Тяга одной рукой в рычажном тренажёре"},{"id":"0609","n":"london bridge","bp":"back","eq":"rope","tg":"upper back","mg":"shoulders","img":null,"gif":null,"ru":"Прикрепите веревку к высокой точке крепления. Встаньте лицом от точки крепления, поставив ноги на ширине плеч. Возьмите веревку прямым хватом ладонями вниз. Слегка наклонитесь вперед, сохраняя спину прямой и напряженным корпусом. Потяните веревку к себе, сжимая лопатки вместе. Задержитесь на мгновение на пике движения, затем медленно ослабьте напряжение и вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Лондонский мост"},{"id":"3013","n":"low glute bridge on floor","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Положите руки по бокам ладонями вниз. Задействуйте ягодицы и корпус, затем поднимите бедра от земли, пока ваше тело не образует прямую линию от колен до плеч. Задержитесь на мгновение в верхней точке, напрягая ягодицы. Медленно опустите бедра обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Низкий ягодичный мостик на полу"},{"id":"1352","n":"lower back curl","bp":"back","eq":"body weight","tg":"spine","mg":"glutes","img":null,"gif":null,"ru":"Лягте на живот, вытянув ноги и положив руки по бокам. Задействуйте ягодицы и мышцы задней поверхности бедра и медленно поднимите верхнюю часть тела от земли, сгибая спину вверх. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Сгибание для поясницы"},{"id":"3582","n":"lunge with jump","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Начните с того, что встаньте, поставив ноги на ширине плеч. Сделайте шаг вперед правой ногой, опуская тело в положение выпада. Оттолкнитесь правой ногой и подпрыгните в воздух, меняя положение ног в воздухе. Мягко приземлитесь левой ногой вперед и сразу же опустите тело в положение выпада. Продолжайте чередовать выпады и прыжки желаемое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"high","sp":0,"kn":0,"sh":1,"ru_name":"Выпады с прыжком"},{"id":"1688","n":"lunge with twist","bp":"waist","eq":"body weight","tg":"abs","mg":"quadriceps","img":null,"gif":null,"ru":"Начните с того, что встаньте, поставив ноги на ширине плеч. Сделайте шаг вперед правой ногой, опуская тело в положение выпада. Делая выпад, поверните туловище вправо, поднеся левый локоть к правому колену. Сделайте паузу на мгновение, затем вернитесь в исходное положение. Повторите то же самое с другой стороны, шагнув вперед левой ногой и повернув туловище влево. Продолжайте чередовать стороны желаемое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":0,"kn":0,"sh":1,"ru_name":"Выпады со скручиванием"},{"id":"0613","n":"lying (side) quads stretch","bp":"upper legs","eq":"body weight","tg":"quads","mg":"hamstrings","img":null,"gif":null,"ru":"Лягте на бок, ноги прямые. Согните верхнюю ногу и возьмитесь рукой за лодыжку или ступню. Аккуратно подтяните лодыжку или ступню к ягодицам, пока не почувствуете растяжение квадрицепсов. Удерживайте растяжку 20–30 секунд. Освободите растяжку и повторите с другой стороны.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка квадрицепса лёжа на боку"},{"id":"2312","n":"lying elbow to knee","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Положите руки за голову локтями наружу. Напрягите пресс и поднимите верхнюю часть тела от земли, поднеся правый локоть к левому колену. В то же время вытяните правую ногу прямо и поднимите ее над землей. Сделайте паузу на мгновение, затем вернитесь в исходное положение. Повторите движение, на этот раз поднеся левый локоть к правому колену и вытягивая левую ногу. Продолжайте чередовать стороны желаемое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Касание локтем колена лёжа"},{"id":"0620","n":"lying leg raise flat bench","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на плоскую скамью, прижавшись к ней спиной. Положите руки под ягодицы для поддержки. Держите ноги прямо и вместе и поднимите их к потолку. Задержитесь на мгновение в верхней точке, затем медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём ног лёжа на горизонтальной скамье"},{"id":"0865","n":"lying leg-hip raise","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, вытянув ноги и положив руки по бокам. Положите руки под ягодицы для поддержки. Напрягите корпус и поднимите ноги от земли, поднимая их к потолку. Задержитесь на мгновение в верхней точке, затем медленно опустите ноги обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём ног и таза лёжа"},{"id":"1301","n":"machine inner chest press","bp":"chest","eq":"leverage machine","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Отрегулируйте высоту сиденья и расположитесь на тренажере, прижавшись спиной к подушке. Возьмитесь за рукоятки хватом сверху и расположите локти под углом 90 градусов. Толкайте ручки вперед до полного выпрямления рук, выдыхая во время движения. Сделайте паузу в конце движения, затем медленно вернитесь в исходное положение, вдыхая при этом. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Жим на внутреннюю часть груди в тренажёре"},{"id":"0624","n":"march sit (wall)","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте спиной к стене, поставив ноги на ширине плеч. Медленно сдвиньте спину вниз по стене, пока колени не согнутся под углом 90 градусов. Поднимите правую ногу от земли и поднесите колено к груди. Опустите правую ногу обратно и поднимите левую ногу от земли, поднеся колено к груди. Продолжайте попеременно поднимать правую и левую ногу необходимое количество повторений.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":0,"sh":1,"ru_name":"Марш у стены сидя"},{"id":"1353","n":"medicine ball catch and overhead throw","bp":"back","eq":"medicine ball","tg":"lats","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите медицинский мяч обеими руками на уровне груди. Слегка согните колени и задействуйте корпус. Опустите тело в положение приседа, держа спину прямо и грудь вверх. Резко выпрямите бедра и ноги, одновременно бросая медицинский мяч над головой. Отпустите мяч в верхней точке движения и поймайте его на пути вниз. Опустите тело обратно в положение приседа и повторите желаемое количество повторений.","pos":"standing","ax":"high","iap":"high","imp":"none","sp":0,"kn":0,"sh":0,"ru_name":"Ловля и бросок медбола над головой"},{"id":"1302","n":"medicine ball chest pass","bp":"chest","eq":"medicine ball","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, удерживая медицинский мяч на уровне груди. Вытяните руки вперед, с силой отталкивая медицинский мяч от груди. Выпуская мяч, продолжайте движение руками и туловищем, перенося вес тела с задней ноги на переднюю. Поймайте мяч, когда он отскакивает от стены или партнера, и сразу же повторите движение. Продолжайте необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Пас медболом от груди"},{"id":"1303","n":"medicine ball chest push from 3 point stance","bp":"chest","eq":"medicine ball","tg":"pectorals","mg":"shoulders","img":null,"gif":null,"ru":"Начните с трехточечной стойки, положив одну руку на медицинский мяч, а другую на землю. Вытяните ноги и расположите тело по прямой линии. Опустите грудь к земле, сохраняя спину прямой. Оттолкните медицинский мяч от тела, полностью выпрямив руку. Вернитесь в исходное положение и повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Толчок медбола от груди из трёхопорной стойки"},{"id":"1304","n":"medicine ball chest push multiple response","bp":"chest","eq":"medicine ball","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, удерживая медицинский мяч на уровне груди. Вытяните руки вперед, отталкивая медицинский мяч от груди. Сделайте паузу на мгновение, затем медленно верните медицинский мяч обратно к груди. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Многократный толчок медбола от груди"},{"id":"1305","n":"medicine ball chest push single response","bp":"chest","eq":"medicine ball","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, удерживая медицинский мяч на уровне груди. Вытяните руки вперед, отталкивая медицинский мяч от груди. Сделайте паузу на мгновение, затем медленно верните медицинский мяч обратно к груди. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Одиночный толчок медбола от груди"},{"id":"1312","n":"medicine ball chest push with run release","bp":"chest","eq":"medicine ball","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, удерживая медицинский мяч на уровне груди. Сделайте шаг вперед правой ногой и одновременно толкните медицинский мяч вперед, полностью выпрямляя руки. Когда вы толкаете мяч вперед, отпустите его и позвольте ему катиться вперед. Быстро бегите вперед и поймайте мяч, прежде чем он упадет на землю. Как только вы поймаете мяч, верните его к груди и повторите движение, выставив левую ногу вперед. Продолжайте чередовать ноги и повторять упражнение желаемое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"low","sp":1,"kn":1,"sh":1,"ru_name":"Толчок медбола от груди с выбегом"},{"id":"1701","n":"medicine ball close grip push up","bp":"upper arms","eq":"medicine ball","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Начните с позиции высокой планки, положив руки на медицинский мяч на ширине плеч. Опустите тело к земле, согнув локти и держа их близко к бокам. Вернитесь в исходное положение, полностью выпрямив руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отжимания узким хватом на медболе"},{"id":"1354","n":"medicine ball overhead slam","bp":"back","eq":"medicine ball","tg":"upper back","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, держите медицинский мяч обеими руками над головой. Напрягите корпус и держите спину прямо. Слегка согните ноги в коленях и с силой швырните медицинский мяч на землю перед собой. Когда вы бросаете мяч, используйте все свое тело для создания силы, включая плечи и корпус. Поймайте мяч на отскоке и повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"high","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Удар медболом об пол из-за головы"},{"id":"1750","n":"medicine ball supine chest throw","bp":"upper arms","eq":"medicine ball","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Лягте на спину на скамью, согните колени и поставьте ступни на землю. Держите медицинский мяч обеими руками, вытянув руки прямо над грудью. Опустите медицинский мяч к груди, держа локти близко к телу. Со взрывной силой толкните медицинский мяч вверх, полностью выпрямив руки и подбросив мяч как можно выше. Поймайте медицинский мяч и повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Бросок медбола от груди лёжа на спине"},{"id":"0627","n":"mixed grip chin-up","bp":"back","eq":"body weight","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Возьмитесь за перекладину хватом снизу (ладонями к себе), расставив руки чуть шире плеч. Повисните на перекладине, полностью вытянув руки и оторвав ноги от земли. Задействуйте мышцы спины и подтяните тело к перекладине, ведя грудью. Продолжайте тянуть, пока подбородок не окажется над перекладиной. Задержитесь на мгновение в верхней точке, затем медленно опустите тело обратно в исходное положение, контролируя его. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подтягивания разнохватом"},{"id":"3217","n":"modified hindu push-up (male)","bp":"chest","eq":"body weight","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Начните с позиции для отжиманий, поставив руки чуть шире ширины плеч и ноги на ширине плеч. Опустите тело к земле, сгибая локти и сохраняя корпус напряженным. Опуская тело, перенесите вес назад и поднимите бедра вверх к потолку, создавая своим телом перевернутую V-образную форму. Продолжайте опускать тело до тех пор, пока грудь не окажется чуть выше земли, затем поменяйте направление движения, отталкивая бедра вниз и вытягивая руки, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Облегчённые отжимания индийские"},{"id":"1421","n":"modified push up to lower arms","bp":"lower arms","eq":"body weight","tg":"forearms","mg":"triceps","img":null,"gif":null,"ru":"Начните с позиции отжимания, положив руки прямо под плечи, а тело образуя прямую линию. Опустите тело вниз к земле, сгибая локти и держа их близко к бокам. Как только ваши локти окажутся под углом 90 градусов, опустите предплечья на землю, держа локти прямо под плечами. Сделайте паузу на мгновение, затем надавите ладонями, чтобы поднять предплечья обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Облегчённые отжимания с опусканием на предплечья"},{"id":"0628","n":"monster walk","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Наденьте эластичную ленту на лодыжки. Встаньте, поставив ноги на ширине плеч и слегка согнув колени. Сделайте шаг в сторону правой ногой, сохраняя напряжение на эспандере. Следуйте левой ногой, делая шаг в сторону, чтобы вернуться в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Ходьба монстра"},{"id":"0630","n":"mountain climber","bp":"cardio","eq":"body weight","tg":"cardiovascular system","mg":"core","img":null,"gif":null,"ru":"Начните с позиции высокой планки, положив руки прямо под плечи, а тело образуя прямую линию. Напрягите корпус и поднесите правое колено к груди, затем быстро переключитесь и поднесите левое колено к груди. Продолжайте чередовать ноги в беговом движении, держа бедра низко и напрягая корпус. Поддерживайте устойчивый темп и дышите ровно на протяжении всего упражнения. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Скалолаз"},{"id":"0631","n":"muscle up","bp":"back","eq":"body weight","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Начните с подвешивания на перекладине, повернув ладони от себя и полностью вытянув руки. Напрягите корпус и подтяните тело к перекладине, ведя грудью. Достигнув вершины движения, поменяйте хват так, чтобы ладони были обращены к вам. Продолжайте подтягиваться до тех пор, пока грудь не окажется над перекладиной, а руки полностью не согнутся. Выполните обратное движение, медленно опускаясь обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Выход силой"},{"id":"1401","n":"muscle-up (on vertical bar)","bp":"back","eq":"body weight","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Начните с висения на вертикальной перекладине, повернув ладони от себя и полностью вытянув руки. Напрягите корпус и подтяните тело к перекладине, ведя грудью. Подтягиваясь, слегка откиньтесь назад и разведите локти в стороны. Продолжайте тянуть, пока ваша грудь не достигнет перекладины, а локти полностью не согнутся. Задержитесь на мгновение в верхней точке, затем медленно опуститесь обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Выход силой на вертикальном турнике"},{"id":"2328","n":"narrow push-up on exercise ball","bp":"upper arms","eq":"stability ball","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Положите мяч на землю и примите положение для отжимания, положив руки на мяч на расстоянии чуть уже ширины плеч. Напрягите корпус и держите тело на прямой линии от головы до пят. Опустите грудь к мячу, согнув локти и удерживая их близко к телу. Задержитесь на мгновение в нижней точке, затем вернитесь в исходное положение, выпрямляя руки. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отжимания узким хватом на фитболе"},{"id":"1403","n":"neck side stretch","bp":"neck","eq":"body weight","tg":"levator scapulae","mg":"trapezius","img":null,"gif":null,"ru":"Встаньте или сядьте прямо, расслабив плечи. Наклоните голову в сторону, приближая ухо к плечу. Удерживайте растяжку 15–30 секунд. Повторите с другой стороны. Выполните по 2–4 подхода на каждую сторону.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Боковая растяжка шеи"},{"id":"0634","n":"negative crunch","bp":"waist","eq":"body weight","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Положите руки за голову локтями наружу. Включив пресс, медленно поднимите верхнюю часть тела от земли, наклоняясь вперед, пока туловище не окажется под углом 45 градусов. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Негативные скручивания"},{"id":"1495","n":"oblique crunch v. 2","bp":"waist","eq":"body weight","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Заведите руки за голову или скрестите их на груди. Напрягите пресс и поднимите лопатки от земли, повернув туловище в одну сторону. Сделайте паузу на мгновение, затем опустите лопатки обратно в исходное положение. Повторите с другой стороны. Продолжайте чередовать стороны желаемое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Косые скручивания вариант 2"},{"id":"0635","n":"oblique crunches floor","bp":"waist","eq":"body weight","tg":"abs","mg":"obliques","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на пол. Заведите руки за голову или скрестите их на груди. Напрягите пресс и поднимите лопатки от пола, поворачивая туловище в одну сторону. Сделайте паузу на мгновение, затем опустите лопатки обратно на пол. Повторите то же самое с другой стороны, чередуя стороны при каждом повторении.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Косые скручивания на полу"},{"id":"0636","n":"olympic barbell hammer curl","bp":"upper arms","eq":"olympic barbell","tg":"biceps","mg":"forearms","img":null,"gif":null,"ru":"Встаньте прямо, ноги на ширине плеч, возьмите олимпийскую штангу хватом сверху. Пусть штанга висит на расстоянии вытянутой руки перед бедрами, ладонями к телу. Удерживая плечи неподвижно, выдохните и согните гантели, одновременно сокращая бицепсы. Продолжайте поднимать штангу до тех пор, пока ваши бицепсы полностью не сократятся и штанга не окажется на уровне плеч. Задержитесь в сокращенном положении на короткую паузу, одновременно сжимая бицепсы. Вдохните и медленно начните опускать штангу обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Молотковый подъём на бицепс с олимпийским грифом"},{"id":"0637","n":"olympic barbell triceps extension","bp":"upper arms","eq":"olympic barbell","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Начните с того, что встаньте, поставив ноги на ширине плеч и удерживая штангу хватом сверху. Поднимите штангу над головой, полностью выпрямив руки. Держа плечи близко к голове, медленно опустите штангу за голову, сгибая локти. Сделайте паузу на мгновение, затем вытяните руки обратно в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Разгибание на трицепс с олимпийским грифом"},{"id":"1355","n":"one arm against wall","bp":"back","eq":"body weight","tg":"lats","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте лицом к стене, ноги на ширине плеч. Вытяните одну руку прямо перед собой и прижмите ладонь к стене. Напрягите корпус и наклоните тело вперед, держа руку прямой, а спину ровной. Медленно прижмите ладонь к стене, активируя широчайшие мышцы. Удерживайте положение несколько секунд, затем отпустите и повторите то же самое с другой рукой.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Упор одной рукой в стену"},{"id":"0638","n":"one arm chin-up","bp":"back","eq":"body weight","tg":"lats","mg":"biceps","img":null,"gif":null,"ru":"Встаньте лицом к перекладине, ноги на ширине плеч. Потянитесь вверх и возьмите перекладину хватом снизу, при этом одна рука держится за перекладину, а другая рука удерживает запястье для поддержки. Повисните на перекладине, полностью вытянув руку, сохраняя тело прямым и напряженным корпусом. Подтягивайтесь к перекладине, сгибая локоть и напрягая мышцы спины. Продолжайте тянуть, пока подбородок не окажется над перекладиной, затем медленно опуститесь обратно в исходное положение. Повторите необходимое количество повторений, затем поменяйте руки и повторите.","pos":"standing","ax":"none","iap":"med","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Подтягивания на одной руке"},{"id":"0639","n":"one arm dip","bp":"upper arms","eq":"body weight","tg":"triceps","mg":"chest","img":null,"gif":null,"ru":"Встаньте лицом от скамьи или стула, поставив ноги на ширине плеч. Положите одну руку на скамью или стул позади себя, пальцами направив ее к себе. Вытяните ноги перед собой, удерживая пятки на земле. Согните локти и опустите тело к земле, держа спину близко к скамье или стулу. Задержитесь на мгновение в нижней точке, затем оттолкнитесь ладонями, чтобы выпрямить руки и вернуться в исходное положение. Повторите желаемое количество повторений, затем поменяйте сторону и повторите с другой рукой.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":0,"ru_name":"Отжимания на брусьях на одной руке"},{"id":"0640","n":"one arm slam (with medicine ball)","bp":"waist","eq":"medicine ball","tg":"abs","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, удерживая медицинский мяч одной рукой перед талией. Слегка согните колени и задействуйте корпус. Поднимите медицинский мяч над головой, полностью выпрямляя руку. С силой ударьте набивным мячом по земле, используя корпус и плечи для создания силы. Поймайте медицинский мяч в момент отскока и повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"high","imp":"none","sp":0,"kn":1,"sh":0,"ru_name":"Удар одной рукой медболом об пол"},{"id":"1773","n":"one arm towel row","bp":"back","eq":"body weight","tg":"upper back","mg":"biceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, колени слегка согнуты, одной рукой держите полотенце. Наклонитесь вперед в талии, сохраняя спину прямой и напрягая корпус. Полностью вытяните руку, чтобы полотенце висело перед вами. Подтяните полотенце к груди, сведя лопатки вместе. Задержитесь на мгновение в верхней точке, затем медленно опустите полотенце обратно в исходное положение. Повторите желаемое количество повторений, затем поменяйте руки.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":0,"kn":1,"sh":1,"ru_name":"Тяга полотенца одной рукой"},{"id":"1386","n":"one leg donkey calf raise","bp":"lower legs","eq":"body weight","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, носки направлены вперед. Положите руки на устойчивую поверхность для поддержки, например, на стену или перекладину. Поднимите одну ногу от земли, слегка согнув колено. Поднимите пятку как можно выше, задействуя икроножные мышцы. Задержитесь на мгновение в верхней точке, затем медленно опустите пятку обратно вниз. Повторите необходимое количество повторений, затем поменяйте ногу.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носок на одной ноге в наклоне"},{"id":"1387","n":"one leg floor calf raise","bp":"lower legs","eq":"body weight","tg":"calves","mg":"ankles","img":null,"gif":null,"ru":"Встаньте, расставив ноги на ширине плеч, и положите руки на стену или прочный предмет для равновесия. Поднимите одну ногу от земли и балансируйте на другой ноге. Медленно поднимите пятку от земли, поднимая тело на подушечки стопы. Задержитесь на мгновение в верхней точке, затем медленно опустите пятку обратно в исходное положение. Повторите необходимое количество повторений, затем поменяйте ногу и повторите.","pos":"standing","ax":"low","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём на носок на одной ноге на полу"},{"id":"1476","n":"one leg squat","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч. Вытяните одну ногу вперед, не отрывая ее от земли. Согните стоящую ногу и опустите тело вниз, как будто садитесь на стул. Держите грудь поднятой, а спину прямой. Оттолкнитесь пяткой, чтобы вернуться в исходное положение. Повторите с другой ногой.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Приседания на одной ноге"},{"id":"0641","n":"otis up","bp":"waist","eq":"weighted","tg":"abs","mg":"hip flexors","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Положите руки за голову локтями наружу. Включив пресс, медленно поднимите верхнюю часть тела от земли, наклоняясь вперед, пока туловище не окажется под углом 45 градусов. Задержитесь на мгновение в верхней точке, затем медленно опустите верхнюю часть тела обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"high","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Подъём корпуса с отягощением Отис"},{"id":"0642","n":"outside leg kick push-up","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Начните с позиции для отжиманий, поставив руки чуть шире плеч, а ноги вместе. Опустите тело к земле, согнув локти, сохраняя спину прямой и напряженным корпусом. Отталкиваясь назад, отведите одну ногу в сторону, полностью выпрямляя ее и задействуя ягодицы. Верните ногу в исходное положение и повторите отжимание, чередуя ноги при каждом повторении. Продолжайте чередовать удары ногами и отжимания желаемое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отжимания с махом ногой наружу"},{"id":"0643","n":"overhead triceps stretch","bp":"upper arms","eq":"body weight","tg":"triceps","mg":"shoulders","img":null,"gif":null,"ru":"Встаньте или сядьте прямо, ноги на ширине плеч. Вытяните одну руку над головой, согнув ее в локте так, чтобы рука тянулась к противоположной лопатке. Другой рукой осторожно потяните локоть вытянутой руки к противоположной стороне головы, чувствуя растяжение трицепса. Удерживайте растяжку 15–30 секунд, затем расслабьтесь. Повторите с другой стороны.","pos":"standing","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка трицепса над головой"},{"id":"3147","n":"pelvic tilt","bp":"waist","eq":"body weight","tg":"abs","mg":"lower back","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Положите руки по бокам. Напрягите пресс и наклоните таз вверх, прижимая поясницу к земле. Удерживайте это положение несколько секунд, сосредоточив внимание на сокращении пресса. Освободите наклон и вернитесь в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Наклон таза"},{"id":"1422","n":"pelvic tilt into bridge","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"hamstrings","img":null,"gif":null,"ru":"Лягте на спину, согните колени и поставьте ступни на землю. Положите руки по бокам ладонями вниз. Задействуйте ягодицы и мышцы корпуса. Наклоните таз вверх, отрывая бедра от земли. Удерживайте положение моста в течение нескольких секунд. Медленно опустите бедра обратно в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Наклон таза с переходом в мостик"},{"id":"1388","n":"peroneals stretch","bp":"lower legs","eq":"rope","tg":"calves","mg":"ankles","img":null,"gif":null,"ru":"Сядьте на пол, вытянув ноги перед собой. Оберните веревку вокруг подушечки стопы и удерживайте концы веревки руками. Аккуратно потяните веревку на себя, сгибая ногу и растягивая икроножные мышцы. Удерживайте растяжку 15–30 секунд. Ослабьте натяжение веревки и повторите растяжку для другой ноги. Повторите необходимое количество повторений.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка малоберцовых мышц"},{"id":"3662","n":"pike-to-cobra push-up","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"core","img":null,"gif":null,"ru":"Начните с позиции для отжиманий, поставив руки чуть шире плеч, а ноги вместе. Напрягите корпус и поднимите бедра к потолку, образуя своим телом перевернутую V-образную форму. Опустите верхнюю часть тела к земле, согнув локти и удерживая их близко к телу. Опускаясь вниз, перенесите вес тела вперед и перейдите в позу кобры, выпрямив руки и подняв грудь вверх. Выполните обратное движение, согнув локти и опустив грудь обратно к земле. Протолкните руки, чтобы вернуться в положение перевернутой буквы V. Продолжайте движение, опуская бедра обратно к земле и возвращаясь в исходное положение для отжиманий. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Отжимания из складки в кобру"},{"id":"1306","n":"plyo push up","bp":"chest","eq":"body weight","tg":"pectorals","mg":"triceps","img":null,"gif":null,"ru":"Начните с позиции высокой планки, расставив руки чуть шире плеч. Опустите грудь к земле, сгибая локти, сохраняя тело прямой. Резко оттолкнитесь от земли, используя мышцы груди, чтобы оторвать верхнюю часть тела от земли. Мягко приземлитесь, вернув руки в исходное положение. Повторите необходимое количество повторений.","pos":"lying","ax":"none","iap":"low","imp":"low","sp":1,"kn":1,"sh":1,"ru_name":"Плиометрические отжимания"},{"id":"1687","n":"posterior step to overhead reach","bp":"waist","eq":"body weight","tg":"abs","mg":"glutes","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, руки по бокам. Сделайте шаг назад правой ногой, приземлившись на подушечку стопы. Согните левое колено и опустите тело в положение выпада. Опускаясь в выпад, одновременно вытяните руки над головой. Сделайте паузу на мгновение в нижней части выпада, затем вернитесь в исходное положение, отталкивая левую пятку и вынося правую ногу вперед. Повторите движение в другую сторону, отступив левой ногой назад и согнув правое колено. Продолжайте чередовать стороны желаемое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Шаг назад с тягой над головой"},{"id":"1389","n":"posterior tibialis stretch","bp":"lower legs","eq":"rope","tg":"calves","mg":"hamstrings","img":null,"gif":null,"ru":"Сядьте на пол, вытянув ноги перед собой. Оберните веревку вокруг подушечки стопы и удерживайте концы веревки руками. Аккуратно потяните веревку на себя, сгибая ногу и растягивая икроножные мышцы. Удерживайте растяжку 20–30 секунд. Ослабьте натяжение веревки и расслабьте ногу. Повторите растяжку на другой ноге.","pos":"seated","ax":"none","iap":"low","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Растяжка задней большеберцовой мышцы"},{"id":"3119","n":"potty squat","bp":"waist","eq":"body weight","tg":"abs","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, носки слегка направлены наружу. Опустите тело вниз, согнув колени и отведя бедра назад, как будто вы сидите на стуле. На протяжении всего движения держите грудь поднятой, а спину прямой. Опускайтесь до тех пор, пока бедра не станут параллельны земле или настолько низко, насколько вам будет удобно. Задержитесь на мгновение внизу, затем оттолкнитесь пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"none","sp":1,"kn":1,"sh":1,"ru_name":"Глубокое приседание"},{"id":"3132","n":"potty squat with support","bp":"upper legs","eq":"body weight","tg":"glutes","mg":"quadriceps","img":null,"gif":null,"ru":"Встаньте, ноги на ширине плеч, носки слегка направлены наружу. Для равновесия держитесь за устойчивую опору, например, за стул или стену. Опустите тело в положение приседа, согнув колени и отведя бедра назад. На протяжении всего движения держите грудь поднятой, а спину прямой. Задержитесь на мгновение внизу, затем оттолкнитесь пятками, чтобы вернуться в исходное положение. Повторите необходимое количество повторений.","pos":"standing","ax":"low","iap":"med","imp":"n
